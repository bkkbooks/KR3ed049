附子加生薑理中湯治冬時中寒不作鬱熱四肢厥冷身體骨節盡痛踡臥唇面青色或作嘔吐脈來沉遲或伏欲絶直中陰經真陰症傷寒乾薑人參甘草白朮各七錢五分每服五六錢水煎服加附子一枚名附子理中湯陶節庵方多肉桂陳皮茯苓三味加減服法厥陰消渴氣上衝心不欲食食即吐蛔腹痛大便實者本方加大黃蜜少許利之本經腹濡滿時減者依本方去甘草本經嘔吐者入半夏薑汁本經踡臥沉重利不止少加附子利後身體痛者急溫之加附子自利腹痛者入木香磨薑汁調和服水二鍾薑一片棗二枚服法臨服入炒陳壁泥一匙調服取土氣以助胃氣四逆湯治太陰症傷寒自利不渴脈微或沉欲絶手足厥冷方見中寒門上作一服水煎溫服強人用大附子加乾薑二錢本方乾薑加至一兩名通脈四逆湯治厥逆下利脈不至者每服五錢面赤加蔥白九莖嘔加生薑咽痛加桔梗利止脈不出加人參陶節庵四逆湯又名回陽救急湯治寒邪直中陰經真寒症初病起無身熱無頭疼止惡寒四肢厥冷戰栗腹痛吐瀉不渴引衣自蓋踡臥沉重或手指甲唇青或口吐涎沫或至無汗或脈來沉遲而無力者熟附子乾薑人參甘草白朮肉桂陳皮五味子茯苓半夏加減服法嘔吐涎沫或有小腹痛加鹽炒茱萸無脈者加豬膽汁一匙泄瀉不止加升麻黃耆吐嘔不止加薑汁水二鍾薑三片臨服服法入麝香三釐調服手足溫和即止此後只可用前理中飲加減治之五苓散治傷寒後發熱作渴小便不利方見濕門陶節庵五苓散又名導赤散治小水不利小腹滿或下焦蓄熱或引飲過多或小水短赤而渴脈沉數者以利小便為先惟汗後無津液與陽明汗多者則以利小便為戒茯苓豬苓澤瀉桂枝白朮甘草滑石山梔加減服法中濕身目黃者加茵陳水結胸症加木通燈心如小便不利而見頭汗出者乃陽脫也得病起無熱但譫語煩躁不安精采不與人相當此湯治之水二鍾薑一片燈心二十莖服法用鹽二字調服黃連解毒湯治傷寒雜病熱毒煩悶乾嘔口燥呻吟喘滿或下後發熱煩渴飲水不解以此治之方見火門腹滿嘔吐或欲作痢者每服加生半夏三枚厚朴二錢茯苓二錢生薑三片煎熱服名半夏黃連解毒湯竹葉石膏湯治傷寒汗下後表裡俱虛津液枯竭餘熱不解心煩不眠或氣逆飲吐及諸虛煩熱並宜服之石膏淡竹葉麥門冬粳米百餘粒人參甘草水煎服陰虛甚者加知母黃柏川歸地黃驚悸不寧盜汗加酸棗仁茯神小便不利加山梔氣短無力加人參黃耆大羌活湯解利兩感傷寒經云兩感不治然所稟有虛實所感有淺深若稟實而感淺者間亦可生治之而不救者有矣未有不治而生者用此十中或活一二羌活一錢半獨活防風黃芩黃連白朮川芎各一錢細辛五分生地知母各二錢水煎熱服茵陳蒿湯治陽明裡熱極甚煩渴熱鬱留飲不散以致濕熱相搏身發黃疸但頭出汗身無汗至頸而遠小便不利渴欲飲水漿者服之茵陳大黃大梔子水二鍾半煎至一鍾絞汁溫服以利為度甚者再服當下如爛魚腸膿血膠鰾等物小便黃用五苓散調和服名茵陳五苓散能利大小便陶節庵方名茵陳將軍湯多甘草厚朴黃芩枳實四味治足太陰脾經腹滿身目發黃小水不利大便實發渴或頭汗至頸而遠脈來沉重者加減服法大便自調者去大黃厚朴加大腹皮利小便清為效水二鍾薑一片服法加燈心一握煎之熱服三黃巨勝湯陶節庵方治陽毒發斑狂亂妄言大渴叫喊目赤脈數大便燥實不通上氣喘急舌卷囊縮者治以此方劫之即三黃石膏湯內去麻黃香豉加大黃芒硝是也水二鍾薑一片棗二枚服法臨服入泥漿清水二匙服即安沖和靈寶湯陶節庵方治兩感傷寒起於頭痛惡寒發熱口燥舌乾以陽先受病多者以此湯探之中病即愈羌活防風川芎生地細辛黃芩柴胡甘草乾薑白芷石膏水二鍾煨薑三片棗二枚服法入黑豆一撮煎之溫服取微汗為愈如不愈表症多而甚急者方可用麻黃葛根為解表假如里症多而甚者先以調胃承氣為攻裡是也如以陰經直中病發熱下利身疼脈沉細無力不渴倦臥昏重者又當先救里溫之以回陽救急湯是分表裡寒熱而治此其權變大法也古云兩感雖為死症猶有可救之裡若發表攻裡一誤則枉死者多矣可不慎哉桃仁承氣湯陶節庵方治熱邪傳裡熱蓄膀胱其人如狂小水自利大便黑小腹滿痛身目黃譫語躁渴為蓄血症脈沉有力宜此湯下盡黑物則愈未服前而血自下者不宜服桃仁桂枝芒硝大黃芍藥柴胡青皮當歸甘草枳實水二鍾薑三片煎之臨服服法入蘇木煎汁三匙調服消斑青黛飲陽節庵方治熱邪傳裡裡實表虛血熱不散熱氣乘於皮膚而為斑也或本屬陽誤投熱藥或當下不下或下後未解皆能致此不可發汗重令開泄更加斑爛然班與蚊迹相類發斑多見於胸腹蚊迹只在於手足陽脈洪大病人昏憒先紅後赤者班也脈不洪大病人自靜先紅後黃者蚊迹也其或大使自利拂鬱氣短燥屎不通又如果實靨者不治凡汗下不解耳聾煩悶咳嘔便是發斑之候黃連甘草石膏知母柴胡人參犀角青黛玄參山梔生地大便實者去人參加大黃水二鍾薑一片棗二枚煎之服法臨服入苦酒一匙服生地芩連湯陶節庵方治鼻衄成流久不止或熱毒入深吐血不止黃芩山梔桔梗甘草生地黃連柴胡川芎芍藥犀角如無用升麻外用劫法水紙扎於鼻沖如去血過多錯語失神撮空閉目不知人事者同法治之水二鍾棗一枚煎至八分服法臨服入茅根搗汁磨京墨調服如無茅根藕汁亦可加味犀角地黃湯陶節庵方治煩躁漱水不下咽者屬上焦有瘀血犀角芍藥甘草桔梗陳皮紅花當歸生地丹皮水二鍾薑三片煎之臨服服法入藕節汁三匙溫服回陽反本湯陶節庵方治陰極發躁微渴面赤欲坐臥於泥水井中脈來無力或脈全無欲絶者熟附子乾薑甘草人參麥門冬臘茶陳皮五味子面戴陽者下虛也加蔥七莖黃連少許用澄清泥漿水一鍾煎之臨服入蜜五匙冷服取汗升麻湯治大人小兒時氣瘟疫頭疼發熱及瘡疹已發未發疑似之間升麻葛根芍藥甘草水一鍾煎七分熱服溫膽湯治傷寒氣脈不和食復勞復病症如初半夏枳實橘紅茯苓甘草每服四錢水鍾半薑七片棗二枚竹茹一團煎七分食前熱服柴胡百合湯陶節庵方治瘥後昏沉發熱渴而錯語失神及百合勞復症柴胡人參黃芩甘草知母百合陳皮生地加減服法渴加天花粉胸中煩躁加山梔有微頭疼加羌活川芎嘔吐人薑汁炒半夏胸中飽悶加枳殼桔梗食復者加枳實黃連甚重大便實者加大黃胸中虛煩加竹茹竹葉産後乾嘔錯語失神呻吟睡不安者加黃連犀角咳喘加杏仁百合再加麻黃心中驚悸為血少加當歸茯神遠志虛汗加黃耆脾倦加白朮腹如雷鳴加煨薑勞復時熱不除加葶藶烏梅薑汁水二鍾棗一枚薑三片服法醋煮鱉甲煎之溫逍遙湯陶節庵方治瘥後血氣未平勞動助熱復還於經絡因與婦人交接復發謂之勞復因交接淫欲無病人反得病者謂之陰陽易豫曾見青出數寸而死者此症最難治人參知母竹青甘草滑石生地韭根柴胡犀角如卵縮腹痛倍加黃連水二鍾棗二枚薑三片煎之服法臨服入燒襠末一錢半調服有黏汗出為效無黏汗出再服以小水利陰頭痛即愈燒散治傷寒病新瘥因交接成陰陽易身重少氣小腸裡急引陰中拘攣熱上衝胸頭重不能舉眼中生花婦人則裡急連胯內痛襠燒灰男用女女用男近陰處者水和服方寸匕小便利陰頭腫即愈救苦散治傷寒傷風頭目不清等症川芎藿香玄胡索丹皮硃砂各一錢雄黃白芷皂角各四錢上為細末每用少許以竹管吹入兩鼻孔即飲生蔥熱茶取汗雙解散防風通聖散合益元散是也大黃芒硝麻黃三味對症旋入自利去大黃芒硝自汗去麻黃有因自汗利小便發汗後不通者此為津液內竭雖硬不可攻用蜜導及豬膽以通之蜜導方用蜜微火煎之稍凝似飴狀勿令焦可捻作挺令頭鋭大如指長二寸許納穀道中良久則通豬膽方用大豬膽一枚取汁和醋少許灌穀道中一食頃即大利如聖飲陶節庵方治剛柔二痙頭搖口噤身反張手足攣搐頭面赤項強急與瘛瘲同治法羌活防風川芎白芷柴胡芍藥甘草當歸烏藥半夏黃芩有汗是柔痙加白朮桂枝無汗是剛痙加麻黃蒼朮口噤咬牙者如大便實用大黃利之水二鍾薑三片煎之服法臨服入薑汁竹瀝溫服溫經益元湯陶節庵方治因汗後大虛頭眩振振欲劈地並肉瞤筋惕及因發汗太多衛虛亡陽汗不止或下後利不止身疼痛者並皆治之熟地人參白朮黃耆甘草陳皮肉桂白芍藥飽悶加枳殼去地黃瘦人去芍藥有熱去肉桂利不止加炒白朮升麻陳壁泥去地黃嘔加薑汁製半夏渴加天花粉汗後惡風寒屬表虛去肉桂地黃加桂枝膠飴水二鍾薑三片棗一枚服法加糯米一撮煎之溫服升陽散火湯陶節庵方治病人叉手冒胸尋衣摸床譫語昏沉不醒人事俗醫誤認為風症殊不知汗熱乘於肺金元氣虛不能自持名曰撮空證小便利者可治小便不利者不可治人參當歸柴胡芍藥黃芩甘草白朮麥門冬陳皮茯神有痰加薑汁炒半夏大便燥譫語發渴加大黃泄瀉加升麻炒白朮水二鍾薑二片棗二枚服法入金同煎熱服再造散陶節庵方治頭疼發熱項脊強惡寒無汗用發汗藥二三劑汗不出俗醫不識不論時令遂以麻黃重藥及大劫取汗不知陽虛不能作汗故有此症名曰無陽症黃耆人參桂枝甘草熟附子細辛羌活防風川芎煨生薑夏月加黃芩石膏水二鍾棗二枚煎至一鍾服法加炒芍藥一撮煎三沸溫服黃龍湯陶節庵方治患心下硬痛下痢純清譫語發渴身熱俗醫但見下利便呼漏底傷寒便用熱藥止之誤人多矣不知此因熱邪傳裡胃中燥糞結實此利非內寒而利及日逐自飲湯藥而利也宜急下之名結熱利症身有熱者宜用此湯身無熱者用六一順氣湯大黃芒硝枳實厚朴甘草人參當歸年老氣虛者去芒硝水二鍾薑二片棗二枚煎之服法加桔梗一撮煎一沸熱服調榮養衛湯陶節庵方治頭疼身熱惡寒微渴汗出身痛腳腿痠疼無力沉倦脈空浮而無力庸醫誤認為正傷寒而大發其汗輕反變重害人多矣不知勞力內傷氣血外感寒邪名曰勞力感寒症故經曰勞者溫之損者溫之溫能除大熱正此謂也有下症者大柴胡下之人參黃耆當歸生地川芎柴胡陳皮甘草細辛羌活防風白朮元氣不足者加升麻少許至陰之下求其升提口渴加天花粉知母喘嗽加杏仁去升麻汗不止加芍藥去升麻細辛胸中煩熱加山梔竹茹乾嘔加薑汁炒半夏胸中飽悶加枳殼桔梗去生地甘草黃耆白朮少許痰盛加瓜蔞仁貝母去防風細辛腹痛去耆術加芍藥乾薑因血鬱內傷有痛處或大便黑加桃仁紅花去芍辛羌防耆術太甚者加大黃下盡瘀血即愈水二鍾薑三片棗二枚服法入蔥自一莖煎之溫服導赤各半湯陶節庵方治患傷寒後心下不硬腹中不滿大小便如常身無寒熱漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽不與則不思形如醉人此熱傳手少陰心也心火上而逼肺所以神昏名越經症黃連黃芩甘草犀角麥門冬滑石山梔茯神知母人參水二鍾薑棗煎服法加燈心一握煎數沸熱服益元湯陶節庵方治身熱頭痛全無不煩便作躁悶面赤飲水不得入口俗醫認為熱症而用涼藥不知元氣虛弱是無根虛火泛上名曰戴陽症熟附子甘草乾薑人參五味子黃連知母麥門冬蔥艾水二鍾薑棗煎臨服服法入童便三匙頓冷服桂苓散陶節庵方治初得病無熱譫語煩躁不安精采不與人相當俗醫認為狂發誤用下藥死者多矣不知此因熱結膀胱名曰如狂症豬苓澤瀉桂枝甘草白朮知母黃柏山梔蘇葉水二鍾薑三片煎至一鍾服法加滑石末一錢煎三沸溫服取微汗當歸活血湯陶節庵方治無頭疼無惡寒止身熱發渴小水利大便黑口出無倫語庸醫認為熱症而用涼劑不知內傳心脾二經使人昏迷沉重故名挾血如見崇症當歸赤芍藥甘草紅花桂心乾薑枳殼生地人參柴胡桃仁泥服三帖後去桃仁紅花乾薑桂心加白朮茯苓水二鍾薑一片煎之服法入酒三匙調服加味導痰湯陶節庵方治患憎寒壯熱頭痛昏沉迷悶上氣喘急口出涎沫庸醫誤為傷寒不知此因內傷七情以致痰迷心竅神不守舍舍空則生痰也名曰挾痰如鬼症茯苓半夏南星枳實黃芩白朮陳皮甘草桔梗黃連瓜蔞仁人參年力壯盛者先用吐痰次服此方水二鍾薑三片棗二枚煎之臨服服法入竹瀝薑汁溫服加減調中飲陶節庵方治食積類傷寒頭疼發熱惡寒口氣緊盛但身不痛此為異耳經云飲食自倍腸胃乃傷輕則消化重則吐下蒼朮厚朴陳皮甘草白朮山楂神麯枳實草果黃連乾薑腹痛加桃仁痛甚大便實熱加大黃下之去山楂草果神麯乾薑心中兀兀欲吐者與乾霍亂同吐法用滾水一碗入鹽一撮皂莢末五分探吐水二鍾薑一片煎之服法臨服入木香磨取計調飲加減續命湯陶節庵方治腳氣類傷寒頭疼身熱惡寒肢節痛便祕嘔逆腳軟弱不能轉動但起於腳膝耳禁用補劑及淋洗防風芍藥白朮川芎防己桂枝甘草麻黃蒼朮羌活暑中三陽所患必熱脈來數去桂枝麻黃加黃芩黃柏柴胡寒中三陰所患必冷脈來遲加附子起於溫者脈來弱加牛膝木瓜起於風者脈來浮加獨活元氣虛加人參少許大便實加大黃水二鍾棗二枚薑一片燈心二十莖煎之服法入薑汁調溫服苓連消毒湯陶節庵方治天行大頭病發熱惡寒頭項腫痛脈洪作痰火治喉痹亦用此方柴胡甘草桔梗川芎黃芩荊芥黃連防風羌活枳殼連翹射干白芷先加大黃利去一二次後依本方去大黃加人參當歸調理水二鍾薑三片煎一鍾入鼠黏子一撮再煎一沸服法入竹瀝薑汁調服六神通解散陶節庵方治時行三月後謂之晚發頭疼身熱惡寒脈洪數先用沖和湯不愈後服此湯麻黃甘草黃芩石膏滑石蒼朮川芎羌活細辛水二鍾薑三片服法入豆豉一撮蔥白二莖煎之熱服取汗通真子救苦丹治大人小兒感冒傷寒麻黃去根節洗淨曬乾四兩研極細末溫水浸用細布取汁余渣再搗再浸再取汁必要潔淨細膩為上甘草炙去皮淨研極細末四兩涼水浸照前取汁赤芍一兩研極細末溫水浸照前取汁升麻微炒一兩研極細末涼水浸取計硃砂一兩五錢研極細水飛雄黃一兩五錢研極細水飛當歸身二兩研極細溫酒浸取汁人參去蘆淨研極細末一兩溫酒浸取汁柴胡去蘆研極細末一兩溫水浸取汁細辛五錢研極細末溫水浸取計枳實去心研極細末五錢溫水浸取汁春夏加石膏五錢水飛秋冬加桂皮五錢研極細末溫水浸取汁此藥體有厚薄味有清濁故用水溫涼而多寡不同各味浸汁濃釅精細共合一處細羅再濾三五遍陰乾再研醋糊丸黍米大每服一丸雄黃五分研極細新汲水半盞調雄黃連藥送下用厚被蓋暖處香燒三寸汗出即愈重者二丸即效製藥用庚申甲子日淨室中莫令婦人雞犬見之導引法先教病人盤腳而坐次用兩手交十指攀腦後風池風府二穴乃是風門也向前叩首幾至於地如此連點一百二十數急以蔥醋粥辛辣湯投之汗出立解萬邦孚曰傷寒一症治之最難蓋傳經絡不易識也豫母在廣州南海署中感此症無良醫徑致不救及卒後而遇一醫官高鳳山攜陶節庵傷寒殺車服法來講究甚精時豫妹及家人患此症者依方施治悉應手而愈豫不敢祕謹增入家抄方中以普惠於四方云瘟疫衆人病一般者是此乃天行時疾也冬溫為病非其時而有其氣也當閉藏而反發泄於外宜補藥帶表左手脈大於右手浮緩而盛按之無力人中黃大治疫毒亦治食積痰熱降陰火冬月以竹筒兩頭留一節作一竅納甘草於其中仍以木屑塞閉其竅置糞缸中浸一月取出曬乾為末飯丸緑豆大服十五丸又方大黃酒蒸黃芩黃連人參桔梗蒼朮防風滑石香附人中黃上為細末神麯糊丸每服五七十丸氣虛四君子湯血虛四物湯痰多二陳湯送下熱甚加童便大頭瘟加羌活去滑石九味羌活湯方見傷寒門藿香正氣散方見傷寒門治時病方半夏川芎茯苓陳皮山楂白朮蒼朮甘草薑水煎服頭痛加酒芩口渴加乾薑身痛加羌活薄荷防風芍藥蝦蟆瘟又名大小腮傷寒又名大頭病用側柏葉自然汁調蚯蚓糞燒敷或丁香尖附子尖南星醋磨敷或五葉藤汁敷或車前草汁服紫金錠治四時瘟疫並陰陽二毒傷寒心悶狂言亂語胸膈壅滯邪毒未發薄荷一小葉研下甚效人參敗毒散方見傷寒門活人書中雲治四時疫癘余平生以濟人常無虛日蓋四時不正之氣冬常寒而反熱夏常熱而反寒春宜溫而反涼秋宜涼而反溫故病者大小無異或一郡一邑然惟丘陵澤國高下有差大抵使人痰涎風壅煩熱頭疼身疼等症或飲食如常起居作舊甚至聲啞市井號為浪子以其咳聲不響續續相連儼如蛙鳴故又號蝦蟆瘟或至赤眼口瘡大小腮喉閉風壅噴嚏涕唾稠黏里域皆同者並治之去赤茯苓桔梗加青皮白朮者名清氣散治法並同但以荊芥穗為引子不用生薑薄荷敗毒散中須加乾葛為妙多服未效而有寒熱往來不常者必用小柴胡湯不拘服數並無過失大便祕並口鼻出血痰涕者加黃芩大黃同法煎服治大頭病熱喉痹歌人間治疫有仙方一兩殭蠶二大黃薑汁為丸如彈子井花調服便清涼普濟消毒飲子天行大頭病面暴腫害人甚速互相傳染不救黃芩黃連各半兩人參三錢橘皮二錢生甘草二錢五分白殭蠶七錢炒連翹黍黏子板藍根馬勃各一錢升麻七分柴胡五分桔梗三分水煎服或加防風薄荷芎歸瘟疫不相傳染方赤小豆以新布盛入井中浸二日舉家各服二十一粒凡人疫癘之家以麻油塗鼻孔中然後入病家則不相傳染既出或以紙捻探鼻深入令嚏之為佳山嵐瘴氣神朮散陳皮八兩蒼朮厚朴各四兩甘草石菖蒲各二兩藿香每服四錢加薑棗煎服一方用香附三兩炒代菖蒲名神朮散氣散紫金錠治山嵐瘴氣並嶺南兩廣毒蠱若從宦於此才覺意思不快即服一錠或吐或痢隨手便瘥暑附注夏暑脈虛而微弱按之無力又脈來隱伏弦細芤遲皆為暑脈也脈虛身熱得之傷暑中暍脈虛而微者是也黃連香薷飲治傷暑或作腹痛或噁心或吐瀉等症香薷四錢厚朴薑汁炒白扁豆各二錢甘草一錢黃連二錢水四鍾煎二鍾去渣浸冷徐徐服之夾痰加半夏南星虛加參耆十味香薷飲治人平素元氣虛弱更臨夏月暑氣侵胃所致肢體倦軟精神疲困脾胃不和飲食不甘香薷人參陳皮白朮黃耆白扁豆甘草炙厚朴薑製炒乾木瓜白茯苓水二鍾煎八分通口服清暑益氣湯治長夏濕熱蒸人四肢困倦精神減少懶於動作胸滿氣促肢節疼痛或氣高而喘身熱而煩心下膨悶小便黃而數大便溏而頻或痢或渴不思飲食自汗體虛黃耆蒼朮泔水制炒升麻各一錢人參白朮神麯陳皮澤瀉各五分五味子九粒青皮二分半水二鍾煎一鍾食遠溫服益元散治中暑身熱小便不利此藥性涼除胃脘積熱又淡能滲濕故利小便而散濕熱也滑石六兩水飛甘草一兩另研上和勻每服三五錢新汲水調服生脈散止渴生津人參麥門冬五味子各等分水煎服六和湯治心脾不調氣不升降霍亂轉筋嘔吐泄瀉寒熱交作痰喘咳嗽胸膈痞滿頭目昏痛肢體浮腫嗜臥倦怠小便赤澀並傷寒陰陽不分冒暑伏熱煩悶或成痢疾中酒煩渴畏食婦人胎産中亦可服縮砂仁半夏杏仁人參甘草木瓜白朮赤茯苓藿香葉白扁豆厚朴水二鍾薑三片棗一枚煎一鍾溫服代茶湯夏月服之以代茶健脾止渴白朮錢半麥門冬去心一錢煎作湯代茶服又方治中暑迷悶取蒜研爛熱湯灌之立愈或用連皮生薑一大塊研爛熱湯灌下亦蘇卒急不得熱湯以冷水研搗亦可治注夏屬陰虛元氣不足夏初春末頭疼腳軟食少體熱者是黃耆人參白朮甘草陳皮當歸芍藥黃柏炒水二鍾煎八分空心溫服夾痰加半夏薑汁或加麥門冬五味子夏月汗出惡寒身熱而渴者中暍也白虎加人參湯方見傷寒門發熱惡寒身重疼痛小便澀淋然毛聳手足逆冷小有勞即熱口開前板齒燥脈弦細虛遲表裡中暍也用補中益氣湯加香薷扁豆有熱加黃芩方見內傷門濕有自外人者有自內得者陰雨濕地皆從外人治宜汗散久則疏通滲泄之食生冷濕面潼酪或飲酒其症腫滿皆自內出宜實中淡味滲泄利小便其脈沉而細其自下起以重腿腳氣者亦當汗散加味二陳湯治諸濕陳皮半夏茯苓甘草酒芩羌活蒼朮薑水煎服濕在上倍加蒼朮濕在下加升麻內濕加豬苓澤瀉中焦濕與痛熱加黃連有實熱者亦用之肥白人因濕沉困怠惰是氣虛加二朮人參黑瘦人沉困怠惰是濕熱加白朮黃芩炒芍藥除濕湯治寒濕所傷身體重著腰腳痠疼大便溏泄小便或澀或利半夏曲厚朴蒼朮藿香葉陳皮甘草白朮白茯苓水二鍾薑七片棗一枚煎八分通口食前服五苓散治脾胃有濕小便赤大便溏瀉澤瀉豬苓白朮茯苓肉桂水煎服羌活勝濕湯即痛風門通氣防風湯治風濕甚效薏苡仁粥以薏苡仁和米煮粥常食之去濕極效功勝諸藥四制柏術丸滋陰降火開胃進食盡除周身之濕黃柏去皮淨四斤一斤酥炙十三次一斤乳汁浸十三次一斤童便浸十三次一斤米泔浸十三次無油蒼朮去皮淨一斤川椒炒四兩破故紙炒四兩五味子炒四兩川芎炒四兩上去四味同炒之藥止用蒼朮黃柏為末煉蜜丸桐子大每服三十丸早酒下午茶下晚白湯下山精丸健脾去濕息火消痰蒼朮三斤先用米泔浸三日竹刀刮去粗皮陰乾用桑椹子鬥許取汁去渣將蒼朮浸入汁內令透取出曬乾如是者九次用木杵搗為細末聽用枸杞子一斤地骨皮一斤上俱研為細末與蒼朮末一併和勻煉蜜丸彈子大每服一丸或二丸白湯下黃耆防己湯治風濕相搏一身盡痛或汗出惡風防己一兩甘草炙半兩白朮七錢半黃耆一兩一錢每服一兩入薑棗煎霍亂內有所積外有所感陽不升陰不降乖隔而成皆因飲食脈來伏或絶切勿與穀食米湯飲之必待吐瀉過一二時飢甚方可與之食理中湯加生薑治霍亂不渴方見傷寒門五苓散治霍亂作渴方見濕門六和湯治霍亂方見暑門藿苓散治霍亂吐瀉齊作藿香厚朴陳皮甘草半夏白朮茯苓澤瀉豬苓薑五片水一鍾煎八分通口服回生散治霍亂吐瀉但一點胃氣存者服之回生陳皮去白藿香去土每服一兩水二鍾煎一鍾溫服不拘時治乾霍亂急將病人腿腕橫紋上蘸溫水拍打見有紫血脈以針或磁鋒刺出紫血即愈華陀危病方治霍亂吐瀉其證始因飲冷或冒寒或矢飢或大怒或乘舟車傷動胃氣令人上吐吐不止令人下瀉吐瀉並作遂成霍亂頭旋眼暈手腳轉筋四肢逆冷用藥遲緩須臾不救吳茱萸木瓜食鹽各五錢上三味同炒焦用磁罐盛水三升煮令百沸卻入前藥同煎至一二升以下傾一盞隨病人意冷熱服之藥入即醒如倉卒無藥用枯白礬末每服一錢用百沸湯調服如無白礬只用鹽一撮醋一盞同煎八分溫服或鹽梅鹹酸皆可煮服陰陽湯治霍亂腹痛之甚用水一碗將一半煎滾一半冷水相合吃之甚效紫金錠以薄荷湯磨服一二錠亦效鹽尉法治霍亂吐瀉心腹作痛用炒鹽二碗布包頓其胸前並腹肚上用尉斗火尉氣透又以炒鹽尉其背則十分無事治轉筋法男子以手挽其陰女子以手牽其乳近兩邊此妙法也一方四物湯加酒芩紅花蒼朮南星煎服乾霍亂忽然心腹脹悶刺痛欲吐不吐欲利不利者是也以二陳湯探吐之灸法治霍亂已死腹中有噯氣者鹽納臍灸七壯洗法治霍亂轉筋蓼一把去兩頭水煮薰洗如一時無蓼以鹽代之瀉泄瀉有濕有火有氣虛有痰積胃苓湯治感暑夾食泄瀉煩渴蒼朮泔浸炒陳皮厚朴薑製炒甘草炙白朮炒茯苓豬苓澤瀉各一錢肉桂水煎入鹽少許溫服四神丸治脾胃虛弱大便不實飲食不思或瀉痢腹痛等症兼治腎泄清晨溏泄一二次經年不止者破故紙四兩酒浸炒吳茱萸一兩炒肉豆蔻二兩麵包煨五味子二兩上為末用生薑八兩切片同棗一百枚煮爛去薑取棗肉為丸桐子大每服一錢五分淡鹽湯下治男婦年老氣虛脾弱頻瀉不止人參白芍酒炒白朮炒茯苓甘草炙陳皮肉豆蔻麵包煨乾薑濕紙包煨上等分為末煉蜜丸如彈子大每服一丸米湯下或作煎藥服亦可治濕泄瀉凡水瀉腹不痛者是也豬苓澤瀉白朮蒼朮赤茯苓上各等分水煎服治火泄瀉腹痛瀉水腸鳴痛一陳瀉一陳者是也豬苓澤瀉白朮蒼朮赤茯苓黃芩上水煎服治食積泄瀉痛甚而瀉瀉後痛減者是也陳皮半夏茯苓甘草炙澤瀉山楂厚朴薑製炒蒼朮泔浸炒白朮炒神麯炒水二鍾薑三片煎八分通口服一方神麯大黃作丸下之治虛瀉飲食入胃不佳完穀不化者是也人參白朮芍藥炒升麻甘草白茯苓水煎服治痰積泄瀉或瀉或不瀉或多或少者是也海粉青黛黃芩上為細末神麯糊丸桐子大每服二三十丸淡薑湯下治脾泄瀉五更時候瀉者是也即啓脾丸小兒常服最妙人參白朮茯苓山藥蓮肉各一兩山楂甘草陳皮澤瀉各五錢上為細末煉蜜丸彈子大每服一丸空心米湯下一方用炒白朮四兩炒神麯三兩炒芍藥三兩半寒月加肉豆蔻用粥丸服治冷瀉腹痛而瀉以熱手按之覺緩止者是也白朮豬苓茯苓各半兩肉桂一兩澤瀉二兩半木香芍藥炒陳皮甘草炙乾薑炮上為細末煉蜜丸彈子大每服一丸空心米湯下或作劑服亦可治感寒停食腹脹腹痛泄瀉嘔吐等症蒼朮米泔炒厚朴薑汁炒陳皮各三兩甘草炙五錢砂仁一兩五錢香附炒兩半藿香去土一兩茯苓去皮山楂淨肉二兩枳實炒一兩五錢上為細末薑湯調空心服益元散治暑瀉方見暑門劉草窗治痛瀉要方白朮三兩炒白芍藥二兩炒陳皮一兩防風一兩上銼入服水前或丸服久瀉加升麻六錢治暴瀉不止小便不通用車前子炒為末每服二錢米飲調下其根葉亦可搗汁服此藥利水道而不動元氣五味子散治人到五更初臍下絞痛溏瀉一次乃名腎泄感陰氣而然也五味子二兩吳茱萸半兩上二味炒香熟為細末每服二錢陳米飲下治水瀉老薑三兩搗碎水三鍾煎一鍾半加沙糖二兩以滾湯衝入濾去渣通口服清六丸治瀉兼血痢六一散一兩紅曲五錢上蒸餅為丸去紅曲加乾薑或生薑汁名溫六丸治瀉兼嘔吐藿香正氣散治感濕泄瀉方見寒門升陽除濕湯治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃色四肢困弱升麻柴胡防風神麯澤瀉豬苓各五錢蒼朮一兩陳皮甘草炙麥芽面各三錢上作十服水煎飯後熱服胃寒腸鳴加益智仁半夏各半兩薑棗煎服非腸鳴不用四制香附丸治婦人久瀉諸病通治用香附一斤分作四分一分酒浸一分醋浸一分童便浸一分鹽湯浸皆浸七日取出曬乾為末每服三錢空心好酒送下大已寒丸治寒瀉甚者方見中寒門理中湯加乾葛治積傷於酒每晨起必瀉方見傷寒門白朮理中湯治臟中積冷立夏後泄瀉時作或小腹疼痛茯苓白朮甘草炙乾薑上等分每服三四錢水煎服寒甚加附子腹痛加芍藥腎氣動去朮加桂椒肉九治脾泄水瀉使紅下血等疾久痢先行後依此藥補之神效用健豬肚一個去油淨入大蒜盛滿線縫住仍用陰水七碗陽水七碗先將水燒滾下肚煮得水乾為度杵爛聽用後加藥四味蒼朮淨末厚朴淨末陳皮淨末各五兩川椒淨末二兩俱入前肚內又杵三二百下肚若無絲方可用丸桐子大每服二錢空心白湯下治脾泄方白朮一兩白茯苓八錢人參甘草各一錢砂仁二錢蓮肉四兩泡去皮心微炒廣木香二錢上為末以陳糯米一升炒熟為末拌勻空心或蜜或沙糖湯調服雖經年久者半料即愈灸法治老人虛人及久泄不止灸臍中五七壯又灸臍下三寸關元穴三十壯痢初得一二日元氣未虛必推蕩之此通用之法脈沉小者易治洪大數者難治小承氣湯治痢初發積氣甚盛腹痛難忍或作脹悶裡急後重數至圊而不能通窘迫之甚大黃三錢厚朴二錢枳實一錢半水煎溫服以利為度未利再服鬱積通徹之後隨症調治凡痢五日後不宜下恐胃氣虛也小柴胡湯去參治身熱夾外感下痢不惡寒胃苓湯治暴痢赤白相雜腹痛裡急後重厚朴薑製炒蒼朮泔浸炒澤瀉茯苓豬苓各八分陳皮甘草炙白朮黃連各一錢木香三分檳榔五分水二鍾煎八分通口服治痢初發用生薑細茶煎汁服立愈痢疾膏藥大附子硫黃各四兩乳香沒藥各六錢麝香六分俱為細末松香四斤熬清傾地上一日取起每麻油一斤煎用槐枝攪滴水成珠入松香四斤化開稍冷入前藥末和勻貼臍上水瀉亦治治赤痢生地黃黃柏芍藥地榆白朮各等分水煎服如腹痛加枳殼厚朴後重加滑石木香檳榔有熱加黃芩山梔腹痛甚加沒藥黃芩芍藥湯亦治赤痢黃芩芍藥各一兩甘草五錢水煎服治白痢蒼朮泔浸炒白朮神麯茯苓甘草炙樗皮水煎服如腹痛加枳殼厚朴後重加木香檳榔治初覺肚腹積滯似痢之狀及飲食傷脾悶郁脹滿不快者檳榔一兩白芍藥五錢水二鍾煎八分空心服渣再煎候行一二次即愈保和丸治食積痢方見積食門當歸導氣湯治膿血痢無度腹中痛當歸芍藥各一錢甘草一錢半青皮七錢槐花七分生地黃酒洗陰乾二錢水二鍾煎八分去渣溫服後重加木香檳榔末各三分澤瀉五分如小便利去澤瀉升陽除濕湯加木香治痢如魚凍者最妙方見瀉門胃風湯治風入腸胃作痢或白或赤或如豆汁或痢久人弱脈虛色如塵腐將危者亦能救治人參白朮茯苓川芎芍藥當歸羌活防風黍米水二鍾煎八分通口服一方有桂無羌活防風腹痛甚加木香加味四物湯治下痢純血久不愈屬陰虛川芎當歸芍藥生地黃槐花黃連桃仁水煎服治久痢石蓮肉白朮陳米鍋內炒焦為末白湯調服治氣血虛而痢者用四物湯加人參白朮陳皮黃連黃芩阿膠以補之痢自止治噤口痢用人參二分黃連一分薑炒濃煎細細呷之但呷一呷下咽即開又方引熱下行用田螺肉搗碎入麝香少許合臍內又方用敗毒散加陳倉米一撮石蓮肉七枚煎服加味香連丸黃連二兩一半薑汁炒一半芒硝水炒木香大黃酒蒸九次青皮炒枳殼炒黃芩炒各一兩白芍二兩酒炒甘草五錢薑汁神麯糊為丸桐子大每服七八十丸空心服赤痢用苦茶白痢用薑湯下又方黃連酒炒厚朴薑汁炒各一兩木香五錢為極細末白湯調服香連丸治冷熱不調下痢赤白膿血相雜裡急後重黃連二十兩用吳茱萸十兩同炒令赤色去茱萸木香四兩八錢為末醋糊丸桐子大每服三十丸空心米飲下四味香連丸治痢疾初發三五日不問赤白每日二服有積自行無積自止黃連十兩炒木香二兩大黃四兩酒煨檳榔一兩為細末陳麵糊丸緑豆大每服七十丸空心米飲下紫金錠赤痢涼水磨下白痢薑湯磨下痢純血垂死者以水磨服即愈茱連丸赤白痢分治吳茱萸揀淨黃連去須各等分上為一處以好酒浸透取出各自揀焙或曬乾為未糊丸桐子大赤痢用黃連丸三十粒甘草湯下白痢用茱萸丸三十粒乾薑湯下赤白痢各用三十粒合併甘草乾薑湯下劉草窗治虛弱痢方人參二錢白朮二錢半白茯苓二錢芍藥炒錢半神麯炒七分升麻五分蒼朮一錢上作一服水煎後重加木香三分檳榔七分黃連炒七分澤瀉六分甘草五分炙防風一錢酒當歸一錢滑石炒五分治痢十法惡寒發熱身首俱痛此為表症宜微汗和解用蒼朮川芎陳皮芍藥甘草生薑三片煎腹痛後重小便短下積此為里症宜和中疏風用炒枳殼製厚朴芍藥陳皮滑石甘草煎下墜異常積中有紫黑血而又痛甚此為死血症用擂細桃仁滑石行之或渴及大便口燥辣是名夾熱加黃芩或口不渴身不熱喜熱手尉是名夾寒加薑桂或下墜在血泄之後此氣滯宜於前藥加檳榔一枚或在下則纏住在上則嘔食此為毒積未化胃氣未平當認其寒則溫之熱則清之虛則用參術補之毒解積下食自進或力倦自覺氣少懶食此為夾虛宜加白朮當歸身尾甚者加人參又十分重者止用此一條加陳皮補之虛回而痢自止或氣行血和積少但虛坐努積此為無血倍用當歸身尾卻以生芍藥生地黃而以桃仁佐之復以陳皮和之血生自安或纏墜退減十之七八穢積已盡糟粕未實當用炒芍藥炒白朮炙甘草陳皮茯苓煎湯下固腸丸三十粒然固腸丸性燥恐尚有滯氣未盡行者但當單飲此湯固腸丸未宜遽用或痢後糟粕未實或食粥稍多或飢甚方食腹中作痛以白朮陳皮各半煎湯和之自安或久痢後體虛氣弱滑下不止又當以藥澀之用訶子肉豆蔻白礬半夏甚者添牡蠣然須以陳皮為佐恐大澀亦能作痛又甚者灸天樞氣海上前方用厚朴瀉滯凝之氣然厚朴性大溫而散久服大能虛人滯氣稍行即去之余滯未盡則用炒枳殼陳皮然枳殼亦能耗氣比之厚朴稍緩比陳皮稍重滯氣稍退亦當去之只用陳皮以和衆藥然陳皮去白有補瀉之兼若為參術之佐亦純作補藥用凡痢疾腹痛必以白芍藥甘草為君當歸白朮為佐惡寒痛者加桂惡熱痛者加黃芩達者更能參以歲氣時令用藥萬舉萬全豈在執方而已哉
