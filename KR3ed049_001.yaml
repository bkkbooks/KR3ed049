body:
  text: 卷一中風大率主血虛有疾或夾火與濕當以治痰為先次養血行血又須分氣虛血虛脈浮遲者可治大數而極者難治中腑者面顯五色有表證而脈浮惡風惡寒拘急不仁其病淺多易治中臟者唇吻不收舌不轉而失音鼻不聞香臭耳聾而眼瞀大小便祕結或眼直視搖頭口開手撒遺溺痰如曳鋸鼻鼾其病深多不治中腑者易汗中臟者易下汗下不宜太過汗多則亡陽下多則亡陰治風之法初得即當順氣日久則當活血此萬古不易之理也稀涎散治卒中風昏昏若醉形體惛悶四肢不收或倒不倒微有涎出斯頃不治便為大病故必傷人若胸膈痞氣不通此乃風涎湧於上也用豬牙皂角肥實不蛀者四梃削去黑皮瑩淨明礬一兩二味同搗為散如有患者可服半錢重者三錢溫水調灌下不大吐嘔只是微微稀冷涎出或一升或二升當時蘇醒緩緩調治不可大吐恐傷人命搐鼻方治中風重而口噤者用藜蘆少許加麝灌入鼻內吐之一吐不已再吐之亦有不可吐者虛甚故也通關散治卒中風邪昏悶不醒牙關緊急湯水不下細辛洗去土葉豬牙皂角去核各一兩上為極細末每用少許搐入鼻內取嚏就提頭頂發立蘇候有噴嚏漸可施治無嚏不治或急以生半夏末吹入鼻中亦可祛涎散治卒中風不省人事多因痰壅所致白礬二錢生為末上以薑計調斡開口灌之其痰涎或吐或化下便蘇初昏倒急掐人中至醒方用痰藥又須分血虛氣虛而治紫金錠治中風中氣口眼喎斜言語蹇澀或口噤牙關緊急筋脈攣縮骨節風腫手腳疼痛行步艱辛應是風氣疼痛並用酒磨下甚效方見痰門捉虎丹治初中風不省人事牙關不開研二丸酒調灌下立醒方見痛風門竹瀝四物湯治半身不遂在左屬血虛者川芎當歸芍藥熟地俱用薑汁炒竹瀝水二鍾煎八分通口服竹瀝二陳湯治半身不遂在右屬氣虛夾痰者陳皮半夏茯苓甘草白朮人參竹瀝薑汁水二鍾薑三片煎八分通口服若氣實能食者用荊瀝參耆湯治氣虛卒然倒僕者或遺尿者虛風人參黃耆濃煎服夾痰仍加竹瀝薑汁若肥白人多濕可加附子行經用附必以童便煮過聲如鼾者亦屬氣虛薑製四物湯治血虛卒中者川芎當歸芍藥熟地俱用薑汁炒水煎服有痰加痰藥仍加竹瀝薑汁是無血不能養其也亦用之有因受氣而中者身冷無痰是也用薑湯調蘇合香丸灌之輕者用烏藥順氣散有因停食而厥者必胸中滿悶有夏月卒倒為暑風此類中風病見於夏者有因火者內火外火合而炎爍劉守真作將息失宜一水不勝二火也有因痰者暑氣激搏痰塞礙心竅也以上四者皆用鹽湯吐之俱候吐醒後用調理藥隨症治之婦人産後中風口噤手足瘛瘲如角弓狀亦治血暈荊芥炒末每服三錢豆淋酒下童便亦可如中腑者當隨症發其表如兼中臟則大便多祕澀宜以三化湯通其滯小續命湯麻黃去節人參黃芩芍藥川芎防己甘草炙杏仁泡去皮尖桂各一兩防風一兩五錢附子炮去皮臍半兩每服五錢水鍾半薑五片棗一枚煎溫服取微汗隨人虛實與所中輕重加減於後熱者去附子入白附子或加秦艽半錢亦可筋急拘攣語遲脈弦加薏苡仁筋急加人參去黃芩芍藥以避中寒服後稍輕再加當歸煩躁不大便去附桂倍加芍藥竹瀝如大便三五日不去胸中不快加枳殼大黃言語蹇澀手足顫掉加菖蒲竹瀝發渴亦去附子加麥門冬葛根瓜蔞根身體痛加羌活搐者亦加之煩躁多驚加犀角羚羊角汗多去麻黃恍惚語錯加茯神遠志各半錢不睡加酸棗仁半錢人虛無力去麻黃加人參如其數纂要曰無汗惡寒倍加麻黃防風杏仁名麻黃續命湯有汗惡風倍加桂枝芍藥杏仁名桂枝續命湯有汗身熱不惡風倍加桂枝黃芩外加葛根二兩名葛根續命湯無汗身涼倍加附子並甘草三兩外加乾薑二兩名附子續命湯有汗無熱倍加桂附甘草亦名桂枝續命湯一方治中風不能言而脈沉非大補不可用防風黃耆煎湯數斤置床下湯氣薰蒸滿室如霧使口鼻俱受之便得語蓋人之口通乎地鼻通乎天口以養陰鼻以養陽天主清故鼻不受有形而受無形地主濁故口受有形而兼乎無形也藿香正氣散主中氣中惡尋常止嘔亦可用方見寒門三化湯外有六經形證先以加減續命湯治之若內有便溺阻隔以此湯主之厚朴大黃枳實羌活各等分每服三兩水煎服以利為度小省風湯痰盛者與導痰湯相合煎服導痰湯見痰門防風南星生各四兩半夏米泔浸黃芩甘草生各二兩每服四錢薑十片水煎服八味順氣散中風後稍醒則服之白朮白茯苓青皮白芷陳皮去白臺烏人參各一兩每服五錢水鍾半煎七分溫服仍以酒化蘇合丸間服烏藥順氣散麻黃陳皮臺烏各二兩白殭蠶炒川芎枳殼炒甘草炙白芷桔梗各一兩乾薑炮半兩上為末每服三錢水二鍾薑三片棗一枚煎服治風先理氣氣順則痰消後理其風庶可收效理氣者氣滯氣鬱肩膊麻痛之類此七情也皆宜服之大秦艽湯治中風外無六經形證內無便溺阻隔止因血弱不能養筋故手足不能動舌強不能語宜養血而筋自榮秦艽石膏各二兩甘草川芎當歸羌活白芍藥防風黃芩白芷白朮生地熟地茯苓獨活各一兩細辛半兩春夏加知母一兩每服一兩水煎服如遇天陰加生薑七片心下痞加枳實一錢理血自無表裡之患血弱舉發不時者用之羌活愈風散中風證內邪已除外邪已盡當服此藥以行導諸經久服大風悉去縱有微邪只從此藥加減治之然治病之法不可失於通塞或一氣之微汗或一旬之通利如此乃常治之法也久則清濁自分榮衛自和如初覺風動服此不至倒僕羌活甘草炙防風防己黃耆川芎蔓荊子獨活細辛枳殼麻黃去根人參地骨皮知母甘菊薄荷去梗白芷當歸杜仲炒枸杞子秦艽柴胡半夏前胡厚朴薑製熟地各二兩白茯苓黃芩各二兩生地蒼朮石膏芍藥各四兩桂一兩上銼每服一兩水二鍾薑三片煎去滓服空心一服吞下二丹丸為之重劑臨臥一服吞下四白丹為之輕劑其法是動以安神靜以清肺假令一氣之微汗用愈風湯三兩加麻黃一兩勻作四服加生薑五片空心服以熱粥投之得微汗則佳如一旬之通利用愈風湯三兩加大黃一兩亦勻作四服如前煎臨臥服得利為度此藥常服之不可失四時之輸如望春大寒後加半夏人參柴胡各二兩通前四兩謂迎而奪少陽之氣也如望夏穀雨後加石膏黃芩知母各二兩謂迎而奪陽明之氣也季夏之月加防己白朮茯苓各二兩謂勝脾土之濕也初秋大暑後加厚朴二兩藿香一兩桂一兩謂迎而奪太陰之氣也望冬霜降後加附子官桂各一兩當歸二兩謂勝少陰之氣也無使五臟偏勝太過與不及不動於榮衛如風祕服之永不結燥此藥與天麻丸相表裡治未病之聖藥也若已病更宜常服老幼驚癇搐搦急慢驚風四時傷寒等病服之俱效四白丹能清肺氣養魄謂中風者多昏冒氣不清利也白朮砂仁白茯苓香附防風川芎甘草人參各五錢白芷一兩羌活獨活各二錢半藿香白檀香各一錢五分知母細辛各二錢甜竹葉二兩薄荷二錢半麝香二錢另研龍腦另研牛黃各半錢上為末煉蜜丸每兩作十丸臨臥嚼一丸分五七次細嚼之煎愈風湯咽下能上清肺氣下強骨髓二丹丸治健忘養神定志和血內以安神外華腠理丹參天門冬熟地各一兩半甘草炙麥門冬人參遠志去心菖蒲各五錢茯神一兩上為末煉蜜丸桐子大硃砂五錢為衣每服五十丸至百丸空心食前煎愈風湯送下天麻丸治風因熱生熱勝則動宜以靜勝其燥是養血也天麻牛膝萆薢另研玄參各六兩生地一斤杜仲炒去絲七兩附子炮一兩羌活十四兩川歸十兩一方有獨活去腎間分風上為末蜜丸桐子大每服五七十丸空心溫湯白酒皆可下愈風丹治諸般風證偏正頭痛防風通聖散四物湯黃連解毒湯各一料加羌活何首烏細辛菊花天麻獨活薄荷各一兩上為末煉蜜丸彈子大每服一丸細嚼茶清下不拘時防風通聖散方見癍疹門黃連解毒湯方見火門豨蘞丸治中風口眼喎斜時吐痰涎語言蹇澀四肢緩弱骨節疼痛腰膝無力亦能行大腸風治三十五般風常服此丸必效豨蘞草此草處處有之俗呼為火鍁草其葉對節而生葉似蒼耳用五月五日七月七日九月九日收採洗去土摘其葉不拘多少曝乾鋪入甑中用好酒和蜜層層勻灑蒸之復曬如此九次為末煉蜜丸如桐子大每服四十丸或五十丸空心無灰酒下神效活絡丹治風濕諸痹肩臂腰膝筋骨疼痛口眼喎斜半身不遂行步艱難筋脈拘攣能清心明目寬膈宣通氣血年逾四十預服十數丸至老不生風疾年逾六十者不宜服白花蛇二兩酒浸焙乾烏梢蛇半兩酒浸焙於麻黃二兩去節細辛一兩去土全蠍一兩半去毒川芎二兩赤芍藥一兩兩頭尖二兩酒浸防風二兩半葛根一兩半血竭七錢五分另研沒藥一兩另研硃砂一一兩另研犀角屑半兩地龍半兩去土丁香去枝甘草二兩去皮炙乳香一兩另研麝香半兩另研白殭蠶一兩炒草豆蔻二兩羌活二兩片腦一錢半另研玄參牛黃二錢半另研官桂二兩去粗皮天麻二兩天竺黃一兩虎脛骨一兩酥炙藿香二兩去土人參一兩威靈仙一兩半酒浸何首烏二兩白芷二兩敗龜板一兩酥灸烏藥一兩安息香一兩黑附子一兩去皮炮青皮一兩香附一兩白豆蔻一兩骨碎補一兩黃連二兩熟地黃二兩茯苓一兩黃芩二兩松香脂半兩白朮一兩大黃二兩當歸一兩半木香二兩沉香一兩金箔為衣上為細末煉蜜丸如彈子大每服一丸細嚼溫酒茶清潤下隨證上下食前後服以四物湯煎服之尤妙頭風擂茶下史國公萬病無憂藥酒方專治風疾半身偏枯手足拘攣不堪行步若飲一升便手能梳頭服二升足能屈伸有力服三升言語舒暢行步如故服四升肢體通暖百節遂和舉步如飛其效如神防風去蘆二兩治四肢骨節疼痛渾身拘急秦艽去蘆二兩治四肢拘急言語蹇澀當歸三兩補血生血萆薢三兩酥炙治骨節疼痛羌活三兩治風濕骨節疼痛鱉甲二兩九筋者佳治癱瘓川牛膝去蘆二兩治手麻痹腰膝疼痛補精行血虎脛骨二兩酥炙退骨節中毒壯筋骨白朮去蘆二兩油松節二兩捶碎壯筋節杜仲三兩薑汁拌炒去絲晚蠶沙三兩炒黃色治癱瘓百節不遂皮肉頑麻蒼耳子四兩捶碎去風濕骨節頑麻枸杞子五兩炒治五臟風邪補肝腎明目干茄根八兩飯上蒸熟治諸毒氣風濕在諸骨節不能屈伸上㕮咀盛布袋中入大壇內下好酒三十五斤封口浸十四日滿將壇入鍋懸煮一時取起入土內埋三日去火毒每日清晨午後各服五七鍾大有補益此酒衰年染患者尤宜搜風順氣丸治三十六種風七十二般氣上熱下冷腰腿疼痛四肢無力惡瘡下注風氣腳氣一應老幼男婦年高氣弱並宜常服順三焦和五臟潤腸胃除風濕大黃五兩用酒洗過蒸黑色麻仁微炒銼去殼取仁二兩山藥淨二兩山茱萸酒蒸浸去核二兩郁李仁湯炮去皮二兩獨活二兩菟絲子淘淨酒煮爛為餅干二兩牛膝酒浸曬乾淨二兩檳榔二兩枳殼去穰麩皮炒二兩車前子二兩半酒浸上為末煉蜜丸如桐子大每服三五十丸茶酒任意下百無所忌平旦臨臥各一服服之宿醒盡消百病不生久服精神強健大能補精注顏疏風順氣亦治腸風便血若大便祕實尤宜石菖蒲酒用石菖蒲三斤薄切日內曬乾以絹囊盛之用好酒一罈懸此菖蒲在內閉封一百日取視之如緑菜色以一斗熟黍米納中封十四日開出飲酒則一切三十六種風不能治者悉效千金神草方專治風濕癱瘓手足不仁半身不遂周身麻木或痠疼口眼歪斜並皆神效用萆麻子草一種秋夏用葉春冬用子俱得一二十斤入木甑內置大鍋上蒸半熟取起先將綿布數尺雙摺浸入蒸葉子湯內取出乘熱敷患處卻將前葉子熱鋪布上一層候溫再換熱葉子一層如此蒸換必以患者汗出為度重者蒸五次輕者蒸三次其病即愈內以疏風活血之劑服之針法無汗惡寒宜針至陰足小趾外側爪甲角針二分出血崑崙足外踝後跟骨舉蹻有汗惡風宜針風府項後入髮際一寸針三分禁灸上二證皆太陽經中風也有汗身熱不惡風宜針陷谷足大趾次趾去爪甲如韭葉瀉陽明之實上二證皆陽明經中風也無汗身涼宜刺隱白足大趾內側爪甲角去太陰之賊此太陰經中風也有汗無熱宜針太溪足內踝後跟骨上陷中動脈應手針透崑崙此少陰經中風也上之續命混淆無六證之別今後分經治療又分針刺法厥陰之井大敦足大趾甲後一韭葉聚毛間刺以通其經少陽之經絶骨外踝上三寸灸五壯灸以引其熱是針灸同象法治之大體灸法灸風池百會曲池合谷風市絶骨環跳肩髃三里等穴皆灸之以鑿竅疏風一人患帶下一夕昏僕目上視溲注汗泄脈大無倫此陰虛陽暴絶也蓋得之病後酒色急灸氣海穴在臍下一寸半漸蘇服人參膏數斤而愈厥附手足麻木厥者逆也手足因陰陽不相接逆而冷也因氣虛血虛者多有陽厥有陰厥陽衰於下則寒陰衰於下則熱用厥者身涼不渴脈遲細而微陽厥者煩渴譫妄身熱而脈數瓜蒂散吐之口噤者或先用搐鼻藥瓜蒂炒赤小豆各等分上為末用香豉一合水二盞煮作稀粥去渣取三分之一和末一錢頓服之不吐少加之得快乃止氣厥用蘇合香丸身冷者是或八味順氣散亦可方見中風門痰厥脈弦用玉樞丹或牛黃丸或用白朮竹瀝又方用大半夏三十個巴豆二十個為末丸如豆大硃砂為衣每服一丸薑湯下寒痰迷悶四肢厥冷者是用薑附湯方見中寒門氣虛厥脈細者是用四君子湯血虛厥脈大如蔥管者是用四物湯寒厥脈沉微者是用理中湯方見中寒門熱厥脈數大者是用承氣湯方見傷寒門暑厥腹滿身重自汗脈沉滑者是用白虎湯方俱於後石膏知母甘草糯米各等分水煎服蛔厥胃寒所生宜理中湯加炒川椒五粒檳榔半錢吞烏梅丸方見心脾痛門尸厥此中惡之候因冒犯不正之氣忽然手足逆冷頭面青黑不省人事妄語口噤宜蘇合香丸灌之候稍醒用調氣平胃散方俱於後白豆蔻丁香檀香木香各二錢藿香甘草各八分砂仁四錢蒼木八錢厚朴五錢陳皮五錢上為末每服二錢薑棗煎湯入鹽少許點服灸百會穴四十九壯臍下氣海丹田三百壯身溫乃止又方用附子七錢童便泡熟去皮臍為末分作二服用酒三盞煎一盞服如無附子用生薑自然汁半盞酒一盞同煎令百沸並灌二服仍照前灸補氣湯治皮膚間麻木如蟲行此肝氣不行也黃耆甘草各一兩芍藥橘皮各兩半澤瀉五錢上㕮咀每服一兩水二鍾煎一盞不拘時服手足麻者屬氣虛手足麻木者有濕痰死血十指麻木是胃中有濕痰死血痛風附濕痹鶴膝風四肢百節走痛者是也他方謂之白虎歷節風有痰有風熱有風濕有血虛又有痹病相類行痹即走注疼痛痛痹即痛風著痹即麻木不仁治方陳皮半夏茯苓甘草黃芩酒炒蒼朮羌活白芷川芎當歸香附水二鍾煎八分通口服在臂加薄桂威靈仙在腿加牛膝防己肥人因痰者加南星瘦人血虛者加黃柏生地黃芍藥濕者加白朮肢節腫痛脈澀數者是瘀血加桃仁紅花當歸川芎及大黃微利之因於風者小續命湯二妙散治筋骨疼痛因濕熱者黃柏炒蒼朮米泔浸炒上為末沸湯入薑汁調服二物皆有雄壯之氣表實氣實者加酒少許氣虛加補氣藥血虛加補血藥痛甚加生薑汁熱服捉虎丸治一切風疾走注疼痛手足癱瘓麻木不仁及白虎歷節等風麝香二錢半好真墨燒煙盡一錢半乳香當歸酒洗曬乾沒藥各七錢半白膠香另研草烏去皮臍地龍去土木鱉子去油五靈脂各一兩半上為末和勻用糯米糊丸如雞頭實大每服一丸溫酒化下遠年近日寒濕腳氣臨發時空心服一丸腳面黑汗出為效神仙外應膏治筋骨疼痛手足拘攣川烏一斤為細末用隔年陳醋入砂鍋內慢火熬如醬色敷患處如病有一年者敷後一日發癢癢時令人將手拍以不癢為度先用升麻皮硝生薑煎湯洗患處然後上藥不可見風當歸拈痛湯治風濕為病肢節煩痛背沉重胸膈不和及遍身疼痛流注手足脛腫痛不可忍羌活甘草炙黃芩酒炒茵陳酒製人參防風升麻苦參葛根蒼朮泔水浸炒知母茯苓當歸用身酒洗澤瀉豬苓白朮水二鍾煎一鍾不拘時溫服蒼耳膏治寒濕風症舒筋活血用蒼朮五斤米泔浸三日去外粗皮鉸片同蒼耳草搗碎用水煎取濃汁去渣熬膏後入蜜一斤再滾數沸收磁器內當歸二兩川芎芍藥熟地黃防風各一兩白朮一兩羌活五錢上為末用前膏煉成丸如桐子大空心溫酒下五十丸如下部病重加牛膝木瓜各一兩通氣防風散治肩背痛不可回顧脊痛項強腰似折項似拔此是太陽經氣鬱不通也以本經藥散之羌活獨活各一錢藁本防風甘草各五分川芎蔓荊子各三錢水二鍾煎八分通口服木瓜丸治風濕客摶手足腰膝不能舉動木瓜一枚去穰皮開竅填吳茱萸一兩線系定蒸熟研爛入鹽半兩研勻糊丸桐子大每服四十丸茶酒下治走注風腳膝痛穿山甲醋炙五錢乳香二錢去油沒藥三錢去油威靈仙三錢防風二錢獨活三錢羌活二錢白芷三錢牛膝二錢酒洗當歸酒洗三錢川芎二錢甘松三錢丹皮二錢五靈脂醋炒二錢辛夷一錢半大茴香一錢五分小茴香三錢川椒一錢土茯苓四兩忌鐵器上為末好酒三盞燒酒一碗麻油一兩入面和勻入藥末調成膏貼患處療風濕氣臂腳痛癢攣痹水紅花並枝葉即水蓼也桑葉不拘多少隨意煎湯淋洗不可先濕趾甲令出氣虎骨酒治諸風緩弱及歷節風骨節痠疼虎脛骨酒炙黃捶碎如米上每骨一升以酒三升浸五日空心服一次潛行散治腰半以下濕熱注痛黃柏酒浸為末入湯藥調服治筋攣縮療腳膝筋急痛煮木瓜爛研裹痛處冷即易一夜四五度熱裹即瘥入酒同煮薏苡仁湯治筋急拘攣不可屈伸久風濕痹神效薏苡仁一升搗以水二升煮二時末作粥空腹食之養血壯筋湯治鶴膝風腿膝不能行動當歸白芍熟地黃白朮木瓜牛膝知母陳皮白茯苓水二鍾煎服吃藥後加好酒一杯立效麒麟血竭膏治濕氣疼痛損傷亦治瘡毒松香明淨者四斤蔥汁一斤薑汁一斤燒酒一斤米醋一斤共入松香煮乾每松香一斤下桐油四兩若夏天止用三五錢攪勻傾入水內拔千餘下仍入鍋中化開每斤下黃占二兩礬紅四兩再煮一茶時攪勻又傾入水中拔千餘下收貯用時加乳香沒藥萬應膏治一切風氣寒濕手足拘攣骨節痠疼男子痞積女人血瘕及腰疼脅疼諸般疼痛結核轉筋頑癬頑瘡積年不愈腫毒初發楊梅腫塊未破者俱貼患處肚腹疼痛瀉痢瘧疾俱貼臍上痢白而寒者尤效咳嗽哮喘受寒噁心胸膈脹悶婦人男子面色痿黃脾胃等症及心疼俱貼前心負重傷力渾身拘痛者貼後心與腰眼諸疝小腸氣等症貼臍下治無不效木香川芎牛膝生地黃細辛白芷秦艽歸尾枳殼獨活防風羌活大楓子黃芩南星萆麻子半夏蒼朮貝母赤芍藥杏仁白斂茅香艾葉兩頭尖連翹川烏甘草節肉桂良薑續斷威靈仙荊芥藁本丁香丁皮金銀花藿香紅花青風藤烏藥蘇木玄參白鮮皮殭蠶草烏桃仁山梔五加皮牙皂苦參穿山甲五倍子蟬蛻降真節骨碎補蒼耳頭蜂房鱉甲全蠍麻黃白及各一兩蛇蛻三條大黃二兩蜈蚣二十一條上為粗片用真麻油十二斤桃柳榆槐桑練楮樹枝各三寸浸藥在內夏浸三宿春五宿秋七宿冬十宿方煎以藥枯油黑為度用麻布一片濾出渣貯磁器內另以老黃色松香不拘多少先下淨鍋熔化後方加藥油量香二斤用油四兩試水軟硬仍濾入水缸中抽扯色如黃金即成膏矣若加乳香沒藥血竭麝香阿魏尤佳治風濕作痛不能舉動薑汁一碗牛皮膠三兩官桂三錢麝香三分薑二斤可取汁一碗先煎黑色後加牛皮膠於內熔化盡次加官桂末待煎好方下麝香將草紙作膏藥貼痛處藥汁上一次貼紙一張約十數次藥盡力度至半夜濕水盡出二三日後痊愈也腳氣附足跟痛轉筋治方紫蘇黃柏炒芍藥木瓜澤瀉木通防己檳榔蒼朮枳殼甘草香附羌活各等分上水煎服痛加木香腫多加大腹皮發熱加黃連大黃血虛加牛膝龜板痛除腫退即罷藥東垣羌活導滯湯治腳氣初發一身盡痛或肢節腫痛便溺阻隔先以此藥導之後用當歸拈痛湯羌活獨活各一錢防己一錢二分當歸一錢大黃酒浸一錢五分枳殼炒錢水煎空心服治風濕足膝疼痛不能步履此方乃定海衛夏揮使服之有驗者山藥蓮肉去心芡實淨肉茯苓去皮苡仁炒糖霜各一斤粳米二升炒糯米二升炒上為末拌勻用土茯苓煎湯常調服不過半月即愈服此藥忌茶土茯苓湯當茶當歸拈痛湯治濕熱為病下注於足脛痛不可忍方見痛風門炸洗因氣方威靈仙防風荊芥地骨皮當歸升麻煎湯炸洗五積散治腳氣方見中寒門降氣湯治腳氣衝心甚效方見氣門又方以四物湯加炒柏服再於湧泉穴用附子津拌貼以艾灸之引泄其熱健步丸治足痿腳氣生地黃半兩歸尾酒浸芍藥陳皮蒼朮各一兩米泔水制炒吳茱萸湯泡條芩各半兩牛膝一兩酒洗桂枝二錢大腹子三個上為末蒸餅糊丸桐子大每服百丸空心煎白朮木通湯下防已飲白朮木通防己檳榔川芎犀角甘草梢蒼朮鹽炒黃柏酒浸炒生地酒浸上水煎服大便實加桃仁便澀加杜仲牛膝有熱加黃芩黃連大熱及時令熱加石膏有痰加竹瀝薑汁如常腫者專主濕熱治東垣健步丸治腳氣神效羌活柴胡防己甘草炙滑石炒苦參瓜蔞根各半兩防風三錢川烏一錢澤瀉三錢肉桂半錢上酒糊丸麻子大每服百丸空心荊芥湯下治足跟痛四物湯加黃柏知母川牛膝轉筋皆屬血熱四物湯加酒芩紅花煎服筋動於足大趾上至大腿近腰結痛此奉養厚因風寒而作再加蒼朮南星歷風附紫雲風血風瘡癩也蟲食肝眉落食肺鼻崩食脾聲啞食心足底穿膝虛腫食腎耳鳴啾又耳沿生瘡或痹或痛如針刺食身則皮癢如蛩行自頭面來為順風自足起者為逆風多因感風邪不正之氣換骨丹麻黃五升用水桶煮令味出去渣濾淨慢火熬成膏麝香五分另研大黃酒煮槐花炒白芷川芎各一兩二錢乳香另研沒藥另研木香沉香各三錢蒼朮二兩紫背浮萍一兩五錢苦參一兩五錢上為末麻黃膏為丸彈子大每服一丸臨臥好酒調服忌風二三日若一切疥癬風疾只一二服愈一方無麝香蒼朮有槐角當歸防風甘松各一兩五錢白花蛇四兩尤效醉仙散胡麻仁牛蒡子蔓荊子枸杞子各半兩炒黑色防風瓜蔞根白蒺藜苦參各半兩上為末每一兩半入輕粉二錢拌勻大人用一錢空心日午臨臥各服茶湯調下服後五日間先於牙縫內出臭涎水渾身覺疼昏悶如醉利下臭屎為度量大小虛實加減與之證候重而急者須先以再造散下之候補養得還復與此藥服須斷鹽醬醋諸般肉魚腥椒料水果煨燒炙煿及茄子等物只宜淡粥熟煮時菜食之或烏梢菜花蛇用淡酒煮熟食之以助力可也再造散錦紋大黃一兩皂角刺一兩半獨生經年大黑者鬱金半兩白牽牛頭大六錢半生半炒上為細末每服二錢臨臥冷酒調服一云日未出面東服以淨桶伺候泄出蟲如蟲口黑色乃是多年赤色是為方近三四日又進一服直候無蟲則絶根矣後用通聖散調理可用三稜針刺委中出血終身不得食牛馬驢騾等肉大忌房事犯者必不救換肌散治大風年深不愈以至眉毛脫落鼻梁崩損不逾月取效如神黑花蛇白花蛇即蘄黃蛇並酒浸一宿地龍去土各三兩細辛白芷天麻蔓荊子當歸威靈仙苦參荊芥穗甘菊花不灰木炙甘草天門冬紫蘇赤芍藥定風草何首烏菖蒲九節者胡麻子沙參草烏頭去皮臍蒼朮泔水浸去皮木鱉子川芎沙苑蒺藜木賊各一兩上為細末每服五錢溫酒調下酒多為妙極重者方可服一法用桃柳桑槐楮五般枝濃煎湯大缸浸坐沒頭一日俟湯如油出浴安矣本草治惡疾遍身生瘡濃煎萍湯浴浸半日大效此神方也一方以荊芥穗大黃梔子鬱金地黃杜仲防風羌活獨活白蒺藜等分為細末以大風油入熟蜜丸桐子大茶清下四五十丸一日三次一法用苦參五斤好酒三斗浸一月每服一合三日次常與不絶覺痹既安更為細末服之亦良尤治癮疹敷藥治瘡大爛遍身塗之黑狗脊二兩如無以杜仲代之蛇床子一兩寒水石硫黃白礬枯各二兩朴硝少許上為末用蠟豬油或香油調敷不爛者不必蒼耳丸治諸風並諸風瘡癮疹白紫癜鳳五月五日取蒼耳草葉洗淨曬乾為末煉蜜丸桐子大每服四五十丸日三服若身體有風處或如麻豆粒此為風毒出也可以針刺黃汁出盡乃止七珍膏治血風瘡極癢抓見血者此方極效先用香油一斤槐枝青者截百段陸續下枝俟煎枯再熬至滴水成珠次下黃蠟一兩五錢又下澱粉十二兩提起微溫方下後藥乳香沒藥輕粉白花蛇孩兒茶各三錢潮腦一兩麝香七分俱細末即成膏用水浸一宿去火氣收藏並治一切惡瘡癰毒治大麻風方苦參三斤羌活四兩獨活四兩當歸半斤白芷四兩自斂四兩白蒺藜四兩皂角刺煅灰存性半斤天花粉何首烏各四兩上為細末聽用次後用皂角五斤切細溫水浸五日去渣用砂鍋慢火熬成膏入前藥在內攪勻丸桐子大每服百丸空心好酒下治紫雲血風何首烏四兩五加皮二兩牛蒡子一兩全蠍一兩五錢殭蠶二兩羌活獨活白芷黃連川細辛生地黃芍藥蟬蛻防風荊芥蒼朮各一兩苦參當歸各二兩上為末或煉蜜丸或酒糊丸如桐子大每服七十丸好酒下或米湯下日進三服其病即愈東坡四神丹治大風神效羌活玄參當歸熟地各等分上為末煉蜜丸桐子大每服七十丸酒下丹溪曰大風病是受得天地間殺物之風古人謂之厲風者以其酷烈暴悍可畏也人得之分在上在下氣受之則在上血受之則在下氣血俱受則在上覆在下然皆不外陽明一經陽明胃與大腸也無物不受治之者須致意看其疙瘩與瘡上體先見多者在上也下體先見多者在下也在上者以醉仙散取涎血於齒縫中出在下者以再造散取惡物蟲積於穀道中出後用通聖散更用三稜針委中出血夫上下同得者甚重自非醫者神手病者鐵心罕能免此凡下藥須以稀粥調養半月一月勿妄動勞作頭痛附眉稜骨痛屬痰者多有熱有風有血虛治偏正頭風酒片芩蒼朮防風羌活細辛蒼耳上等分為末每服三錢生薑湯調服在左屬風加薄荷荊芥又屬血虛加川芎當歸在右屬痰加二陳又屬熱瘦人多患之倍加酒芩又屬濕肥人多患之加川芎南星倍蒼朮痰厥頭疼非半夏不能除頭旋眼黑風虛內作非天麻不能除遠年近日偏正頭風痛諸藥不效收功如神白芷三錢川芎三錢上為細末黃牛腦子一個擦藥末入磁器內加酒燉熟乘熱和酒食之儘量一醉睡後酒醒其疾如失一方用蘄艾不時燒煙薰之甚效清空膏治諸般頭痛惟血虛頭痛不治川芎柴胡各五錢黃連炒防風去蘆羌活各一兩甘草炙兩半細挺子黃芩三兩一半酒製一半炒上為細末每服二錢熱盞內入茶少許湯調如膏臨臥抹口內少用白滾湯送下如苦頭痛加細辛二分如痰厥頭痛去羌活防風川芎甘草加半夏一兩五錢如偏正頭痛服之不愈減羌防芎加柴胡一倍頂巔痛加藁本去川芎芎歸湯治血虛頭痛自魚尾上攻者是病在左瘦人多患之川芎當歸白芍藥各等分上服五錢水煎服一方加黃芩用酒浸透曬乾酒黃散壯實人氣實有痰或頭重或頭暈用大黃一兩酒浸炒為末茶調三錢服立效頭癢風屑發黃者亦可服之補中益氣湯多加川芎當歸治勞役氣虛之人似傷寒發熱汗出兩太陽作痛此相火自下衝上甚者加知母蔓荊子方見內傷門安神湯治頭痛頭旋眼黑甘草四錢半生半炙防風二錢五分柴胡升麻知母地黃酒製黃柏羌活各一兩黃耆二兩每服五錢水二大盞煎一盞半加蔓荊子五分川芎三分再煎至一盞去渣臨臥熱服不臥散治頭痛因痰厥者豬牙皂角一錢玄胡青黛少許炒上為末吹鼻中取涎點頭散治偏正頭痛川芎生二兩香附子去毛四兩上為末每服一錢好茶下常服除根紫金錠治年深日近頭痛太陽痛用酒人薄荷研爛敷太陽穴上立效茶調散亦治頭疼薄荷去梗不見火八兩川芎四兩羌活甘草白芷各二兩細辛一兩防風一兩半荊芥去梗四兩上為細末每服二錢食後茶清調下常服清頭目頭上有腫塊痛者名雷頭風用羯羊糞化灰酒調服歌曰雷頭風發悶懨懨羊糞捋來不用錢搗碎細研篩為末酒調熱服便安然選奇方治眉骨痛不可忍大有效羌活二錢防風二錢甘草夏生冬炙二錢酒芩一錢冬月不用有熱用之每服三錢水一鍾煎七分食遠服吹鼻散治偏正頭風以此藥鼻中吹之火眼亦可火硝四兩黃丹二兩石膏二兩乳香二錢沒藥二錢藜蘆三分細辛三分天麻二錢雄黃三分川芎三錢天門冬麥門冬皂角甘草各六錢上為末吹時須令病人含水一口一粒金搐鼻方治偏正頭風蓽撥不拘多少細研用獖豬膽汁拌勻再入膽內懸陰乾藁本玄胡索白芷川芎各等分上為末入制蓽撥末用無根水丸每用一粒以長流水化開搐鼻以銅錢二三文口咬定出涎為度灸法治頭風經年不愈者灸囟會百會前頂上星等穴即瘥中寒主乎溫散有卒中天地之寒氣者有口得寒物者理中湯治五臟直中寒邪者口噤失音四肢僵直腹冷痛瀉兼治胃脘寒冷氣刺痛加附子名附子理中湯方見傷寒門薑附湯治中寒身體強直口噤不語逆冷乾薑一兩附子生去皮臍一個每服三錢水煎服夾氣攻刺加木香半錢夾風不仁加防風一錢夾濕加白朮筋脈牽急加木瓜肢節痛加桂一錢大已寒丸附子炮去皮臍川烏頭炮去皮臍銼作豆大再炒黃色乾薑炮製官桂去粗皮吳茱萸炒各一兩上為細末醋糊丸桐子大每服五七十丸米飲下五積散白芷陳皮厚朴桔梗枳殼川芎甘草茯苓桂芍藥半夏當歸麻黃乾薑蒼朮每服四錢水一盞薑三片蔥白三個煎七分熱服胃寒用煨薑夾氣加茱萸婦人調經催産入艾醋四逆湯甘草三兩乾薑半兩附子半兩生用去皮臍切作片子上為粗末每服三錢水一鍾半煎一鍾去滓溫服二薑湯良薑乾薑炮各三兩上為細末酒糊丸桐子大每服三十丸空心米飲下治冷氣成疾遇寒則發用大附子一個薑汁浸七日用白綿紙浸濕包裹五七層慢火煨熟分作五份每服空心細嚼滾湯送下中寒脈虛而微細雖躁熱煩渴可煎理中湯水中浸冷服之不可熱服誤用寒涼藥決死傷寒附傷風脈陽浮陰弱謂之傷風脈浮緊無汗謂之傷寒脈浮頭頂痛腰脊強病在太陽脈長身熱目疼鼻乾病在陽明脈弦胸脅痛目聾病在少陽脈俱細咽乾腹滿邪在太陰脈俱沉口燥舌乾而渴邪在少陰脈俱微緩煩滿囊縮邪在厥陰卻病法陶節庵傷寒發狂先於病人處生火一盆用醋一碗傾火上其氣衝入鼻內即安方可察其陽狂陰躁用藥若初起頭痛發熱惡寒方除已後登高而歌棄衣而走逾垣上屋罵詈叫喊大渴欲死脈來有力仍因邪熱傳裡陽盛發狂當用寒藥下之舌卷囊縮者不治若病起無頭疼身微熱面赤戴陽煩躁脈來沉微無力欲坐臥於泥水中仍因寒熱而發躁即陰證似陽當用熱藥溫之厥冷下利譫語者不治傷寒腹中痛甚將涼水一盞與病人飲之其痛稍可者屬熱痛當用涼藥清之不已而或繞臍硬痛大便結實煩渴屬燥糞痛急用寒藥下之食積痛亦宜下若小腹硬痛小水自利大便黑身目黃者屬蓄血痛亦用寒劑加行血藥下盡黑物即愈此三者皆痛隨利減之法也若飲水愈加作痛屬寒當用溫藥和之和之不已而或四肢厥冷腹痛嘔吐瀉利急用熱藥救之須詳脈來有力無力此為良法傷寒直中陰經真寒症甚重而無脈或吐瀉脫元而無脈將好酒薑汁各半盞與病人服其脈來者可治當察其陰陽用藥不拘脈浮沉大小但指下出見者生如用此法脈不至者必死又必問病人有何疼痛處若有痛症脈必伏驗舌法白苔舌舌見白苔滑者邪初入里也丹田有熱胸中有寒仍少陽半表半裡之症宜用小柴胡湯梔子豆鼓湯治之將瘟舌舌見紅色熱蓄於內也不問何經宜用牙皂細辛白芷當歸等分為末令病人先噙水一口以藥少許吹鼻內吐去水取嚏為度如不嚏再吹凡瘟疫之家不拘已未患者皆宜用之中焙舌舌見紅色內有黑形如小舌者乃邪熱結於裡君火熾盛反兼水化宜涼膈散大柴胡湯下之生斑舌舌見紅色而有小黑點者熱毒乘虛入胃蓄熱則發斑矣宜用玄參升麻葛根湯化斑湯解之里圈舌舌見淡紅色而中有一紅暈沿皆純黑乃餘毒遺於心胞絡之間與邪火鬱結二火亢極故有是症也以承氣湯下之人裂舌舌見紅色更有裂紋如人字樣者乃君火燔灼熱毒炎上故也宜用涼膈散蟲碎舌舌見紅色更有紅點如蟲蝕之狀乃熱毒熾甚火在上水在下不能相濟故也宜用小承氣湯下之里黑舌舌見紅色內有乾硬黑色形如小長舌有刺者熱毒熾甚堅結大腸金受火制不能平木宜調胃承氣湯下之紅星舌舌見淡紅中有大紅星者乃少陰君火熱盛所不勝者假火勢以侮脾土將欲發黃之候宜用茵陳五苓散黑尖舌舌見紅色頭見黑色者水虛火實腎熱所致宜用竹葉石膏湯厥陰舌舌見紅色內有黑紋者乃陰毒盛於肝經肝主筋故舌見如絲之形也用理中合四逆湯溫之死現舌舌見黑色水剋火明矣患此者百無一治黃苔舌舌尖白根黃其表證未罷先宜解表然後方可攻之如大便祕者用涼膈散加硝黃泡服小便澀者用五苓散薑汁少許白湯調服一加木通滑石甘草共為末每服五錢入薑汁蜜白湯調服黑心舌舌弦白心黑脈沉微者難治脈浮滑者可汗沉實者可下始病即發此色危殆之甚速以調胃承氣湯下之舌尖有白苔二分根有黑色一分必主身痛惡寒如飲水不至甚者五苓散自汗渴者白虎湯下利者解毒湯此亦危證舌見白苔中有黑小點亂生者尚有表證宜涼膈散微表之表退即當用調胃承氣湯下之舌見微黃色者初病即得之發譫語此由失汗表邪入里也必用汗下兼行宜用雙解散加解毒湯主之舌中見白苔外則微黃者必作泄宜用解毒湯惡寒者五苓散舌見微黃色者表證未罷宜小柴胡湯合六一散主之可下者大柴胡湯下之表裡雙除臨症審用舌見黃色者必初白苔而變黃也皆自表傳裡熱已人胃急宜下之如下遲必變黑色為危症宜用調胃承氣湯下之舌右白苔滑者病在肌肉為邪半表半裡往來寒熱宜小柴胡湯和解之舌左白苔而自汗者不可下宜用白虎湯加人參三錢舌左見白苔滑者此臟結之症邪併入臟難治舌見四圍白而中黃者必作煩渴嘔吐之症兼有表者五苓散益元散兼服須待黃盡方可下舌黃而尖白者表少里多宜六一散涼膈散合用脈弦者宜防風通聖散舌見黃而澀有隔瓣如樣者熱已入胃邪毒深矣心火煩渴急以大承氣湯下之若身發黃者宜茵陳湯下血用抵當湯在脅內十棗湯結胸甚者大陷胸湯痞用大黃瀉心湯舌見四邊微紅中央灰黑色者此有失下所致宜大承氣湯下之熱退可愈必三四下方退如五六次下而熱不退者不治舌見黃而黑點亂生者其症必渴譫語脈滑者生脈澀者死循衣摸床者不治若下之見黑糞者亦不治下宜大承氣湯舌見黃中黑至尖者熱氣已深兩感見之十當九死惡寒甚者亦死不惡寒而下利者可治宜用調胃承氣湯舌外見淡紅心淡黑者加惡風表未罷用雙解加解毒湯相半微汗之汗罷急下之如結胸煩躁目直視者不治非結胸者可治舌見灰色尖黃不惡風寒脈浮者可下之若惡風惡寒者用雙解散加解毒湯三四下之見黑糞不治舌見灰黑色而有黑紋者脈實急用大承氣湯下之脈浮渴飲水者用涼膈散解之十可救其二三舌根微黑尖黃脈滑者可下脈浮者當養陰退陽若惡風寒微汗之用雙解散若下利用解毒湯十生七八也舌根微黑尖黃隱見或有一紋者脈實急用大承氣湯下之脈浮渴飲水者用涼膈散解之十可救其二三凡傷寒傳經之邪比雜症不同必辨其脈症舌三者表汗下之庶不有誤況脈者血之府屬陰當其得病之初正氣相搏若真氣未衰脈必滑數而有力病久熱甚氣衰脈必微細而無力方數甚也但可養陰退陽此識脈之要也或初病即惡寒發熱後必有渴水燥熱之症或逆厥而利此熱症傳經之邪也若始終皆熱症則惟熱而不惡寒故傷寒為病初則頭痛必無發熱惡寒渴水之症一病便有逆厥泄利或但惡寒不發熱此寒症也此識症之要也如舌本者乃心之竅心屬火主熱人得病初在表則舌自紅而無白苔等色邪入半表半裡之間其舌色變為白苔而滑見矣邪傳於裡未罷則舌必見黃苔乃邪已入胃急宜下之若醫不以此誤用湯劑失於下遲其苔必黑變症蜂起此為難治若見舌苔如漆黑之光者十無一生此心火自炎與邪熱二火相乘熱極則兼化水象故色從黑而應水化也明於醫道者其詳察之劫病法陶節庵傷寒發狂先於病人處生火一盆用醋一碗傾火上其氣衝入鼻內即安方可察其陽狂陰躁用藥若初起頭疼發熱惡寒方除以後登高而歌棄衣而走逾垣上屋罵詈叫喊大渴欲死脈來有力仍因邪熱傳裡陽盛發狂當用寒藥下之舌卷囊縮者不治若病起無頭疼身微熱面赤戴陽煩躁脈來沉數無力欲坐臥於泥水中乃因寒熱而發躁即陰證似陽當用熱熱溫之厥冷下利諺語者不治傷寒腹中痛甚將涼水一盞與病人飲之其痛稍可者屬熱痛當用涼藥清之清之不已而或達臍硬痛大便結實煩渴屬燥糞痛急用寒藥下之食積痛亦宜下若小腹硬痛小水自利大便黑身目黃者屬蓄血痛亦用寒劑加行血藥下盡黑物即愈此三者皆痛隨利減之法也若飲水愈加作痛屬寒當用溫藥和之和之不已而或四肢厥冷腹痛嘔吐瀉利急用熱藥救之須詳脈來有力無力此為良法傷寒直中厥陰經真寒症甚重而無脈或吐瀉脫元而無脈將好酒薑汁各半盞與病人服其脈來者可治當察其陰陽用藥不拘脈浮沉大小但指下出見者生如用此法脈不至者必死又必問病人有何疼痛處若有痛症脈必伏宜隨病制宜尤當問病人若平素原無正取脈須用覆手取之此為反關脈若平素正取有脈後因病無脈者亦當覆手取取之而脈出者陰陽錯亂也宜和合陰陽如覆取正取俱無脈者必死傷寒舌上生苔不拘滑白黃黑俱用井水浸青布於舌上洗淨後用生薑片子時時浸水擦之其苔自退凡見舌生黑苔芒刺者必死此熱毒入深腎水克心火也若發黃者用生薑時時周身擦之其毒自退若心胸脅下有邪氣結實滿悶硬痛用生薑一斤搗去汁微炒燥帶潤以絹包尉患處稍可又將薑渣和前汁炒乾再尉許久即寬快傷寒鼻衄成流久不止者將山梔炒黑為末吹鼻內外用水紙搭鼻沖其血自止若點滴不成流者其邪在經未解照後祕方用藥傷寒熱邪傳裡服轉藥後用鹽炒麩皮一升絹包於病人腹上尉之使藥氣得熱則行大便易通傷寒吐血不止用韭汁磨京墨呷下其血見黑必止如無韭汁用雞子清亦可蓋赤屬火黑屬水也傷寒直中陰經真寒症或陰毒症身如被杖腹中絞痛嘔逆沉重不知人事四體堅冷如石手指甲唇青藥不得入口六脈沉細或無脈欲絶者將蔥縛一握切去根葉取白三寸許搗如餅先用麝香半分填臍中後加蔥餅臍上以火尉之連換二三餅稍醒灌入生薑汁煎服回陽救急湯如再不醒灸關元氣海二三十壯使熱氣通其內逼邪出於外以復陽氣如用此法手足溫和汗出即醒者為有生也如手足不溫汗不出不省人事者必死傷寒熱病熱邪傳裡亢極無解用黃連煎水一盞放井中頓冷浸青布搭胸上徐徐換之待熱勢稍退即除不可久漬夏月用此方冬月不宜傷寒服藥轉吐不納者用竹管重捺內關後將生薑汁半盞熱飲其吐即止大凡服寒藥熱飲熱藥寒飲中和之劑溫和服之如要取汗雖辛甘之劑亦宜熱服如要止汗雖辛甘之劑亦宜溫服中風痰厥昏迷卒倒不省人事欲絶者先用皂莢末捻紙煙衝入鼻中有嚏可治隨用吐痰法將皂莢末五分半夏白礬末各三分薑汁調服探吐後服導痰湯加減治之無嚏不可治治乾霍亂不得吐者用滾湯一碗入皂角末三分鹽一撮調服探吐莫與米湯飲之即死蓋穀氣反助邪氣也中寒卒倒昏迷不省人事者先用熱酒薑汁各半盞灌入稍醒後服加味理中飲如不飲酒用薑汁灌之依法調治冬月有此症余月少製藥法陶節庵用附子必頂圓臍正一兩一枚者先將鹽水薑汁各半盞用砂罐煮七沸後入黃連甘草各半兩再加童便半盞再煮七沸住火良久撈起磁器盛貯伏地一晝夜取出曬乾庶無毒害用川大黃鬚錦紋者銼碎酒拌炒乾不傷陰血人壯實者生用用麻黃去節先滾醋湯略浸片時撈起備用庶免大發如冬月嚴寒腠理致密生用用茱萸將鹽水拌勻炒燥備用庶無小毒解藥法陶節庵用附子後身目紅者用蘿蔔搗汁二大碗入黃連甘草各半兩犀角三錢煎八分服其紅自除如解遲血從耳目口鼻出必死無蘿蔔用澄清泥漿水亦可用大黃後瀉利不止用烏梅二個炒粳米一撮乾薑三錢人參五錢白朮炒五錢生附子皮一錢半甘草一錢升麻少許燈心一握水二鍾煎八分去渣入炒陳壁泥一匙調服即止取土氣以助胃氣也用麻黃後汗出不止將病人發披水盆中足露出外用炒粳米半升龍骨牡蠣藁本防風各一兩為末周身撲之隨後祕方用藥免致亡陽麻黃湯治傷寒太陽脈浮頭痛發熱惡寒身痛無汗而喘冬時得病宜服春分後忌之麻黃一兩半桂枝一兩甘草五錢杏仁五十個每服五錢水煎溫服取汗為度陶節庵方名升麻發表湯多防風川芎羌活升麻白芷五味治冬月正傷寒頭痛發熱惡寒脊強脈浮緊無汗為表證此足太陽膀胱經受邪當發汗頭如斧劈身如火熾者宜用此湯加減法本經發熱惡寒頭痛無汗而喘加乾葛去升麻本經發熱惡寒身體痛加蒼朮芍藥去杏仁本經發熱惡寒身癢面赤者以其不得小汗故也去白芷杏仁加柴胡芍藥本經頭痛發熱惡寒胸中飽悶加枳殼桔梗本經感寒深重服湯不作汗者宜再服至三二劑汗不出者死本經汗後不解宜再服量證輕重用麻黃升麻分多寡為當水二鍾薑三片蔥白二莖服法加江西豆豉一撮煎之熱服取汗有汗即止不得多服桂枝湯治傷寒太陽經受病頭疼身痛或翁翁發熱淅淅惡風汗出鼻鳴乾嘔冬時得病宜服春分後忌之赤芍藥桂枝各五錢甘草四錢炙每服五錢薑三片棗二枚水煎服須臾啜稀粥助藥力以取微汗無汗者休服若小便數及飲酒人不宜用飲酒人不喜甘恐中滿而嘔夏至前加黃芩夏至後加石膏知母升麻病人素虛寒不須加減陶節庵方名疏邪實表湯多防風川芎羌活白朮四味治冬月正傷風頭痛身熱惡寒脊強脈浮緩自汗為表證此足太陽膀胱經受邪當實表散邪無汗者不可服加減服法汗不止加黃耆喘加柴胡杏仁胸中飽悶加枳殼桔梗水二鍾薑三片棗二枚服法加膠飴二匙煎之溫服九味羌活湯治春分後傷寒代桂枝麻黃湯用羌活防風蒼朮各一錢二分半甘草白芷川芎生地黃芩各一錢細辛四分薑三片棗一枚水煎熱服取汗原有汗去蒼朮加白朮渴加知母石膏陶節庵方云治春夏秋感冒暴寒頭痛發熱惡寒脊強無汗脈浮緊此足太陽膀胱經受邪是表證宜發散不與冬時正傷寒同治法此湯非獨三時暴寒春可治溫夏可治熱秋可治濕治雜症亦有神也加減服法胸中飽悶加枳殼桔梗去生地夏月加石膏知母名神術湯如服此湯後不作汗加蘇葉喘而惡寒身熱加杏仁生地汗後不解宜再服汗下兼行加大黃此釜底抽薪之法春夏秋感冒非時傷風亦有頭痛惡寒身熱脈浮緩自汗宜實表去蒼朮加白朮汗不止加黃耆即加減沖和湯再不止以小柴胡湯加桂枝芍藥一錢如神水二鍾薑三片棗二枚煎至一鍾服法加蔥白搗汁五匙入藥再煎一二沸發汗熱服止汗溫服柴葛解肌湯陶節庵方即葛根湯治足陽明胃經受證目疼鼻乾不眠頭疼眼眶痛脈來微洪宜解肌屬陽明經病其正陽明腑病別有治法柴胡乾葛甘草黃芩芍藥羌活白芷桔梗加減服法本經無汗惡寒甚者去黃芩加麻黃冬月宜加春宜少夏秋去之加蘇葉本經有汗而渴者治法在如神白虎湯下水二鍾薑三片棗二枚服法加石膏末一錢煎之熱服十神湯治時氣不正瘟疫妄行感冒發熱不問陰陽兩感風寒並宜服之川芎甘草麻黃紫蘇升麻白芷陳皮香附子芍藥各四錢乾葛每服五錢或一兩薑三片水煎熱服欲汗以被蓋覆再煎服香蘇飲治四時傷寒頭痛發熱惡寒紫蘇葉香附各二兩陳皮一兩甘草一兩半每服四錢水一鍾薑蔥煎七分空心熱服頭疼加川芎白芷參蘇飲治時氣瘟疫兩感風寒人參紫蘇前胡半夏葛根茯苓桔梗枳殼陳皮甘草水二鍾薑三片蔥頭一枚煎八分熱服氣盛去人參感冒風寒頭疼鼻塞憎寒壯熱名重傷風服之極效若咳嗽加桑皮杏仁頭疼加川芎藿香正氣散治感冒寒邪頭疼拘急惡寒作熱或內夾飲食胸膈不利藿香一錢厚朴陳皮半夏白芷各八分茯苓腹皮白朮桔梗各七分紫蘇一錢甘草五分水二鍾薑三片煎八分熱服人參敗毒散治傷寒頭疼壯熱或感冒非時暴寒頭痛肢節骨痛拘急惡寒漸作外熱之症人參桔梗枳殼茯苓川芎各八分獨活前胡柴胡各一錢羌活一錢二分甘草五分水煎服夾勞役者倍用人參加當歸芍藥小柴胡湯治少陽症脈來弦數發熱耳聾脅痛口苦微嘔或往來寒熱胸膈滿痛小便不利大便祕澀但見一症便是不必悉俱柴胡三錢黃芩二錢半夏一錢甘草八分人參一錢水二鍾薑三片棗一枚煎一鍾通口服胸滿及咽痛加枳殼桔梗名柴胡枳殼湯脅痛加芍藥石菖蒲名柴胡芍藥湯肚腹痛加枳實大黃名柴胡飲子無汗加升麻葛根名柴胡葛根湯咳嗽加杏仁五味子名柴胡五味湯汗下後病不解加黃連黃柏黃芩梔子名黃連解毒湯結胸加瓜蔞子發黃加茵陳黃柏發黃有血症加桃仁當歸狂亂加大黃朴硝衄血下血加黃連陶節庵方名柴胡雙解飲多陳皮芍藥二味治足少陽膽經受證耳聾脅痛寒熱嘔而口苦脈來弦數屬半表半裡宜和解膽無出入有三禁不可汗下吐也止有小柴胡一湯隨病加減再無別湯加減服法本經證小便不利加茯苓本經嘔者入薑汁竹茹脅痛加青皮痰多加瓜蔞仁貝母寒熱似瘧加桂枝渴加天花粉知母齒燥無津液加石膏嗽加五味子金沸草壞證加鱉甲本經證心下飽悶未經下者非結胸乃表邪傳至胸中未入乎腑證雖滿悶尚為在表只用小柴胡湯加枳殼未效就以本方對小陷胸湯加枳桔一服豁然虛煩類傷寒本方加竹葉炒粳米本經與陽明合病本方加葛根芍藥婦人熱入血室加當歸紅花男子熱入血室加生地老婦人傷寒無表證其熱勝者本方加大黃甚者加芒硝水二鍾薑一片棗二枚服法入生艾汁三匙煎之溫服大柴胡湯治傷寒七八日後不解邪氣結在內