body:
  text: 刻萬氏家抄濟世良方序蓋聞天地以生物為心仁人之所以溥解澤神明之所以昭顯佑皆是物也慨厥生民莫不湯陰陽之和以林總於世而遭遇不齊戕賊百出故有蠻夷猾夏寇盜奸宄日恣其凌厲摶噬之性以斬代虔劉而魚肉不休即安處於堯天舜日之下嬉恬於耕田鑿井之世而內梏於七情外侵於六沴又以疾病成愁苦而不勝其夭於之患天地神明有同戚焉自非仁人握勝算著方書以安集而生全之欲以臍世仁壽而登之春臺也其道無由參戎瑞岩萬公式奉簡命都護甌江運籌決勝不遺餘力雖仁以奮勇武而不殺而一聞小驚即嚴號令整部伍躬擐甲冑身先偏裨沖濤追滅而後朝食由是威名震懾島夷潛蹤大海以東晏如也乃於蒐芟之暇又取令太父總鎮公所刻家抄醫方加意披繙益以經驗諸方增以脈訣藥性二篇合先今共六卷以登諸梓而舊題不易焉夫祖刻行世已久活人甚多今且再更賢孫之手細加抽尋醫明三世何見不透心竭三傳何微不晰余以是知是刻之方論詳而應病愈周也以是知是刻之選集要而取效愈神也書成公以質之箕仙而呂韻五章暢然嘉其世澤之遠而炯然必其獲報之降噫萬公滿腔惻隱觸處流行既設奇決策盪滌誨氛以脫民於鋒鏑而又繩祖廣集梓布宇內使一切陰陽諸患不能為人世害公之仁深且弘矣積仁累行神且申祐即日上續祖光建牙開府用樹掀揭洪業固公餘事且見仁人之後益傳而益昌大也余愧不文因敘諸首簡以為後日左券此非能以臆必仁人也能以天地神明常理必之而已矣為敘萬曆壬寅八月一日吉旦萬安朱道相佐卿父撰萬邦孚曰孚先大父刻濟世良方凡五卷行於世久矣日久板壞孚重刻之因以續得經驗諸方隨門增入蓋不敢秘抑欲以承先志也又集脈訣藥性附於末為第六卷庶施治者察脈認藥參以成方或不至以病試云
