body:
  text: 卷二瘧無汗要有汗散邪為主帶補有汗要無汗正氣為主帶散瘧脈俱弦弦數多熱弦遲多寒亦有病久脈極虛微之中少見弦但不搏手細察可見也弦如刀刃者死小者生治瘧屢驗方柴胡有汗一錢無汗二錢白朮二錢無汗一錢茯苓陳皮半夏各七分薄桂二分黃芩熱多五分寒多一分寒熱均七分甘草炙二分脹悶不用草果五分無食不用人參五分虛七分虛甚一錢生薑寒多五片熱多一片寒熱均三片水二鍾煎八分發前空心服清脾飲治脾瘧脈來弦數或熱多寒少口苦咽熱小便赤澀青皮去穰厚朴薑製草果仁各七分白朮炒一錢半夏一錢湯洗十次甘草炙五分黃芩一錢二分柴胡去苗一錢半茯苓去皮一錢水二鍾姜三片煎八分空心服如有汗以白朮茯苓為君熱多加黃芩柴胡寒多加半夏草果大渴加知母麥門冬天花粉柴平湯治熱多寒少者最效小柴胡合平胃散小柴胡湯方見傷寒門平胃散方見傷食門瘧疾塞鼻丹巴豆淨肉五錢麝香五分置東方白礬五錢白芷二錢置西方官桂五錢硃砂一錢置南方青黛五錢黑附子三錢置北方硫黃五錢雄黃五錢置中央五月五日備製為末按方放列於天地位前午時焚香取五家粽尖丸如桐子大每用一丸綿裹於未發日晚男左女右塞鼻孔中立效合時忌雞犬婦人見之用過者以醋洗收起又可用一丸可治八九人人參養胃湯治久瘧虛瘧或間日一發或三五日一發寒多熱少者人參一錢半夏八分陳皮八分甘草五分茯苓蒼朮各八分藿香一錢厚朴一錢草果仁七分上用生薑四兩搗爛取汁不拘多少以碗盛之露一宿次日早將前劑用棗一枚烏梅一個水二盅煎八分入薑汁通口服忌生冷四獸飲人參白朮茯苓甘草減半陳皮草果半夏棗子烏梅生薑上銼同薑棗以鹽少許醃食頃厚皮紙裹以水潤濕慢火煨令香熟焙乾每服半兩水煎未發前並進數服露姜飲治脾胃聚痰發為寒熱瘧疾用生薑四兩和皮搗汁一碗夜露至曉空心冷服七棗湯治瘧但寒不熱者附子一個炮又以鹽水浸再泡如此七次去皮臍上分作二服水二鍾姜七片棗七枚煎七分當發日早溫服又方川烏代附子以水調陳壁土為糊浸七次薑棗煎服小柴胡湯治瘧但熱不寒者方見傷寒門口渴加麥門冬天花粉十將軍丸治久瘧不瘥有瘧母者三稜泡莪朮青皮去瓤陳皮去白草果去殼砂仁檳榔烏梅肉半夏湯泡七次各一兩常山酒蒸二兩上先將常山草果用好醋酒各一碗入瓦器內浸一宿後入八味藥同浸至晚入瓦銚內炭火煮焙乾為末半酒半醋打糊為丸桐子大每服三四十丸白湯下日進三服凡有積聚及煙瘴濕地更宜服一方加蒼朮香附炒各一兩加味補中益氣湯治人平素不足兼以勞役內傷加感寒暑以致瘧疾寒熱交作肢體倦軟乏力少氣黃芩黃耆柴胡各一錢半夏芍藥人參白朮當歸各八分甘草五分升麻三分陳皮六分水二鍾姜三片煎八分空心服有汗及寒重加桂枝五分倍黃耆熱盛倍柴胡黃芩渴加麥門冬天花粉斬鬼丹砒一錢雄黃三錢辰砂三錢甘草二錢綠豆粉一兩五錢上為末豆粉糊丸白豆大辰砂為衣臨發日五更井花水服二丸小兒一丸截瘧丹五月五日取獨蒜不拘多少春爛入好黃丹再舂乾溼適均手搓為丸如圓眼核大曬乾收貯但瘧疾二三發後臨發日雞鳴時以藥一大略捶碎取井花水面東服之紅丸子治食積瘧方見積聚門不食者必從飲食上得之當以食治紫金錠治瘧不問新久臨發時東流水煎桃柳枝湯磨服加減六君子湯治瘧後飲食少進四肢無力面色痿黃人參白朮半夏各一錢茯苓陳皮黃連枳實各八分甘草五分姜三片水一鍾半煎七分食遠服人參白虎湯治暑瘧溫瘧方見傷寒門截瘧青蒿丸青蒿一斤冬瓜葉官桂馬鞭草各二兩上為末飯丸胡桃大每一兩分作四服臨發前一二時盡服之截瘧虛甚者用人參常山各五錢銼碎微火上同炒去常山不用只以參煎湯未發前服拿法黃丹五錢生用白明礬三錢生用胡桃一錢五分為末麝香半分上為末臨發時對日坐定將好米醋調藥末男左女右敷手心外將絹帕緊扎待藥力熱方行出汗為度如無日腳下用火此藥一料能治三人年老身弱怕服藥者用此祝由科治瘧疾不愈出張子和儒門事親咒曰吾從東南來路逢一池水水裡一條龍九頭十八尾問伊食甚的只吃瘧疾鬼上念一遍吹在棗子上念七遍吹七遍上令病人於五更雞吠不聞時面東而立食訖於淨室中安困忌食瓜果葷肉熱物此法十治八九無藥處可以救人火氣有餘便是火氣從左邊起者肝火也氣從臍下起者陰火也熱從腳下起入腹者虛之極也陰虛火動難治輕者可降重則從其性而析之實火可瀉虛火可補升陽散火湯治男婦四肢發熱筋骨間熱表熱如火燎於肌膚捫之烙手此病多因血虛而得或胃虛過食冷物郁遏陽氣於脾土之中並宜服此火鬱發之之義也升麻葛根獨活白芍藥羌活人參柴胡防風甘草半生半炙上水煎服忌食寒冷之物黃連解毒湯治實火燥亂煩渴蓄熱內甚等症黃連黃芩黃柏梔子各等分水煎服去梔子加大黃名大黃金花丸加大黃加梔子名梔子金花丹溪云人壯氣實火甚癲狂可用正治或硝水冰水與之虛火盛狂者以生薑湯與之若投冰水正治立死加減四物湯治陰虛火動皆火起於九泉穴此補陰降火之妙劑當歸川芎芍藥生地黃黃柏黃芩熟地黃各等分上水煎服甚者加龜板兼氣虛加參朮黃耆一法用附子末津調塗湧泉穴五制黃柏丸能降五臟六腑之火滋陰補陽甚效甚大黃柏一斤去皮咀片分作五分一分好酒浸一分醋浸一分童便浸一分米泔浸一分蜜水浸上各浸一宿撈起曬乾炒褐色放地上去火毒為末煮老米二碗將蓮葉蓋飯面上煮熟又將蓮葉蓋面蒸後又將蓮葉包飯煨一刻取出去蓮葉搗如泥和藥丸桐子大焙乾每早鹽湯送下百丸左金丸治肝火氣從左邊起者是黃連六兩吳茱萸一兩湯泡上為末水九或蒸餅丸綠豆大白湯下五十丸柳青丸治肝火黃連用薑汁炒為末粥丸溫湯下兼治心熱人中白亦瀉肝火須風露二三年者佳清金丸治肺火苦參炒為末水丸溫湯下又方用桑白皮各一兩甘草五錢為末服之大補丸治陰火氣從臍下起者是黃柏炒褐者為末水丸溫湯下又方四物湯加白馬脛骨降陰中火代芩連用人中黃亦降陰火滋腎丸治腎熱黃柏三兩酒拌陰乾知母二兩酒浸陰乾肉桂一錢半上柏母氣味俱陰以同腎氣故能補腎而瀉下焦火也桂與火邪同體故曰熱因熱用凡諸病在下焦皆不渴也煉蜜為丸百沸湯下導赤散治小腸實熱生地黃木通甘草各等分入竹葉煎服瀉心湯治心熱黃連為末水調服治脾熱藿香七錢山梔一兩石膏五錢甘草三兩防風四兩上為末用蜜酒拌勻略炒服生甘草緩火邪木通下行瀉小腸穴山梔子仁大能降火從小便泄去其性能屈曲下降人所不知小便降火極速胃虛者勿用二黃丸治男婦三焦積熱咽喉煩躁小便赤澀大便秘結並宜服之黃連去蘆須黃芩去土大黃煨各半兩上為末煉蜜丸桐子大每服四十丸熱水吞下上清丸治咽喉腫痛痰涎壅塞薄荷一斤川芎防風各二兩桔梗五兩砂仁五錢甘草四兩各為細末煉蜜丸皂角子大不時噙化玄明粉治邪熱所幹膈上氣滯臟腑秘澀等症朴硝不拘多少潔淨無砂土者入鍋化開炒極燥貯陽城罐內上以圓瓦蓋之鹽泥連罐身封固大火煅內外通紅為度乘熱傾入水研化用竹籃上布綿紙一二層將水瀝下清汁露一宿明早去水其下凝白如冰復照前用滾湯化開又露約數次待其味淡即成粉矣曬乾收磁罐內其每日瀝下水以磁罐收之再用紙濾過又可如法泡露又有粉大率二斤朴硝可得一斤研為細末每二斤入甘草生熟二兩為末一處攪勻臨臥斟量用之或一錢二錢以桃花煎湯或蔥白湯下益元散降火甚效方見暑門碧雪治一切積熱口舌生瘡心煩喉閉芒硝青黛石膏各研末水漂寒水石朴硝滑石甘草煎湯二升馬牙硝各等分上將甘草湯入諸藥末再煎用柳木篦不住手攪令消溶入青黛和勻傾沙盆內候冷結成霜研為末每用少許含化津咽如喉閉不能咽用竹筒吹入喉中涼膈散大黃朴硝甘草各二兩連翹四兩梔子仁黃芩薄荷各一兩上為末每服二錢加竹葉與蜜些少煎服清咽太平丸薄荷葉十兩川芎二兩枯梗三兩甘草二兩防風二兩柿霜二兩犀角二兩用人兩腋下夾住被汗蒸透取出為末上研細末煉蜜丸如櫻桃大不拘時噙化黃金丸治積熱積痰並三焦五臟有餘之熱夾熱下利食痞膈悶咽痛眼目赤腫中暑中熱煩躁等症及初發腫毒錦紋大黃火煨鬱金比薑黃極小者牙皂去筋膜俱切碎上三味各等分為細末用沙罐將牛膽汁煉成膏和藥丸桐子大每服三五十丸量病輕重加減白湯下大便少去一二次即止不傷元氣甚可服之玉腋丸專瀉胃火並治食積痰火軟石膏不拘多少火煅出火毒為末醋糊丸綠豆大服之地骨皮散治渾身壯熱脈長而滑陽毒火熾發渴地骨皮茯苓各半兩柴胡黃芩生地各一兩羌活麻黃各七錢半有汗並去之石膏二兩知母一兩每服一兩姜水煎服癍疹有色點而無頭粒者謂之癍有頭粒而隨出即沒沒而又出者謂之疹癍屬風熱夾痰而作疹屬熱與痰左肺凡丹從四肢入腹者死又云癮疹多屬脾隱隱然在皮膚之間故言癮疹也發則多癢或不仁者是有兼風兼濕之殊色紅者兼火化也熱微者赤斑出熱甚者黑斑出赤斑五死一生黑斑十死一生通聖散癍疹通治消息隨宜防風川芎當歸麻黃薄荷連翹芒硝大黃白芍藥各五錢黃芩石膏桔梗各一兩滑石三兩荊芥梔子白朮各三錢甘草二兩上水煎服身疼加蒼朮羌活痰嗽加半夏清風散治丹疹屬血風血熱荊芥穗甘草炙陳皮去白厚朴各五錢白殭蠶人參蟬蛻去土炒茯苓防風芎藭藿香羌活上為末每服三錢荊芥茶清調下化斑湯治傷寒汗吐下後斑發脈虛人參石膏知母甘草守真加白朮一方加玄參水煎服一方黃瓜水調伏龍肝服之去紅點斑調中湯治內傷外感而發陰斑此無根失守之火聚於胸中上薰於肺傳於皮膚如蚊蟲咬形狀而非錦紋也蒼朮一錢半陳皮一錢砂仁藿香芍藥炒桔梗甘草炙半夏白芷羌活枳殼各一錢麻黃川芎桂枝各五分姜三片水煎服消毒犀角飲子治斑及癮疹牛蒡子六錢荊芥防風各三錢甘草水煎服玄參升麻湯斑在身治汗下吐後毒不散表虛里實發於外甚則煩躁譫妄玄參升麻甘草等分水煎服傷寒陽證發斑有四惟溫毒發斑至重紅赤為胃熱紫黑為胃爛一則下早一則下晚乃外感熱病發斑也以玄參升麻白虎等湯合服之白虎湯方見傷寒門有內傷發斑者胃氣極虛一身火遊行於外所致宜補以降之消渴上消者肺也多飲水而少食大小便如常中消者胃也多飲食而小便赤黃下消者腎也小便頻數濁淋如膏之狀三消皆禁用半夏脈洪大者生微小者死治方黃連末天花粉末人乳汁藕汁生地黃汁上將三汁佐以薑汁入蜜為膏和二末徐徐留舌上以白滾湯少許送之能食易飢者加軟石膏黃芩小便頻數或如膏者加五味子知母黃柏玄參若泄瀉先用白朮白芍藥炒為末調服後服此藥一方繰絲湯飲之如無繰絲湯以蠶殼煮湯代之此物屬火有資陰之用能瀉膀胱中相火引氣上潮於口天花粉消渴中神藥也人參白虎治上消方見傷寒門豬肚丸治中消黃連五兩麥門冬知母瓜蔞茯神各四兩上為末入雄豬肚內縫之蒸熟於石臼內杵爛如干加煉蜜丸桐子大每服百丸食後米飲下可以清心止渴調胃承氣湯治中消大黃芒硝甘草各等分上銼每服臨期斟酌多少先煮二味熟去渣下芒硝再煮二三沸頓服之以利為度末利再服六味地黃丸治下消乾山藥山茱萸各四錢澤瀉牡丹皮白茯苓各三錢熟地黃八錢上為末煉蜜丸桐子大每服五十丸滾湯空心送下瓜蔞丸治消渴瓜蔞根薄切用人乳汁拌蒸竹瀝拌曬為末煉蜜丸彈子大噙化或丸綠豆大每服百丸米飲下忍冬丸治消渴既愈後須預防發癰疽之患忍冬草不拘多少根莖花葉皆可用置瓦罐內用無灰好酒浸以糠火煨一宿取出曬乾入甘草少許研為細末以所浸酒打麵糊丸桐子大每服百丸不拘時溫酒米飲下麥門冬飲子治隔消胸滿心煩津液短少消渴五味子五分知母一錢甘草炙三分瓜蔞仁乾葛各五分人參麥門冬各一錢生地黃八分茯苓七分水二鍾竹葉十四片煎一鍾溫服黃耆六一湯治諸氣不足胸中煩悸常消渴者方見癰疽門清心蓮子飲治渴而小便濁或澀方見濁門神白散即六一散治真陰素被損虛多服金石等藥或嗜炙煿咸物遂成消渴用溫水調服或大渴欲飲冷者新汲水尤妙方見暑門三黃丸治男子婦人五勞七傷消渴不生肌肉婦人帶下手足發寒熱者春三月黃芩四兩大黃二兩黃連四兩夏三月黃芩六兩大黃一兩黃連一兩秋三月黃芩六兩大黃二兩黃連三兩冬三月黃芩三兩大黃五兩黃連三兩上三味隨時加減搗為細末煉蜜丸如大豆大每服五丸一日三服不去加七丸服一月病愈加味錢氏白朮散治消渴不能食人參白朮白茯苓甘草炙枳殼炒各五錢藿香一錢乾葛二錢木香五味柴胡三分上作一服水煎服茯菟丸治三消渴通用亦治白濁菟絲子酒浸十四兩北五味七兩白茯苓五兩石蓮肉三兩上為末用山藥未六兩作糊丸桐子大每服五十丸米湯下痰凡痰之為患為喘為嗽為嘔為利為眩為暈心嘈雜怔忡驚怖為寒熱痛腫為痞隔為壅塞或胸脅間轆轆有聲或背心一片常如冰冷或四肢麻痹不仁皆痰飲所致或因脾胃虛弱不能攝肺金或為四氣七情所幹氣壅痰聚而然也善治疾者不治痰而治氣氣順則一身之津液亦隨氣而順矣治疾法實脾土燥脾濕是治其本也凡奇怪之症人所不識者皆當作痰治二陳湯此治痰要藥也上中下一身之痰通治橘紅一兩半夏泡五錢甘草二錢生薑茯苓五錢水煎服痰清屬寒倍加半夏食積痰加神麯麥芽山楂濕痰多見倦怠軟弱加白朮蒼朮風痰加南星白附片芩中氣不足加參術火動其痰必眩暈嘈雜加山梔子黃芩黃連內傷夾痰加參耆白朮用薑汁傳送虛甚加竹瀝脾虛宜清中氣以運痰降火加白朮用升麻提起痰在脅下加白芥子以行之痰在四肢加竹瀝痰在皮裡膜外加白芥子薑汁竹瀝以導之氣實者用荊瀝治老痰用海石半夏栝蔞香附五倍子作丸服治熱痰用青黛黃連青礞石作丸服最捷定喘化痰湯紫蘇子炒研一錢半夏湯泡七次七分甘草三分白果五枚去殼微炒前胡杏仁炒去皮尖栝蔞仁研白茯苓陳皮去白桑皮炒各一錢水二鍾姜三片煎一鍾去渣食遠溫服藿香正氣散治胸中寒痰並瘧後寒痰方見傷寒門潤下丸降痰廣陳皮一斤四兩洗淨好鹽四兩同入水煮用宜適中不可過多不可不及約煮鹽味入藥得所為度取出候乾仍切小片炒燥為末入炙甘草末四兩和勻酒糊丸綠豆大每服七十丸不拘時清茶下加味潤下丸降痰最效橘紅半斤將鹽五錢水化拌勻以水煮乾為度南星滾湯泡半夏滾湯泡俱仍以鹽煮黃芩黃連甘草各一兩上為末蒸餅糊丸桐子大每服六十丸白滾湯下一方用雪梨一枚帶蒂切蓋將瓤挖去入川椒每歲一粒蓋定外以紙包八九層水濕入灰火煨半日紙焦梨熟為度取開採熱食之王隱君滾痰丸括曰甑里翻身甲掛金於今頭戴草堂深相逢二八求斤稱硝煅青礞倍若沉十七兩中另半兩水丸桐子意常斟千般怪症如神效水瀉雙身卻不任大黃酒蒸黃芩酒洗各八兩沉香五錢礞石一兩捶碎焰硝一兩同入砂罐內瓦蓋鐵線束鹽泥固濟曬乾火煅紅候冷取出色如黃金者佳上為末水丸桐子大每服三十丸量人虛實加減臨臥食後茶清溫水任下一方用硃砂二兩為衣清氣化痰丸南星薑製半夏薑製各一兩半陳皮枳實麩炒茯苓杏仁去皮尖瓜蔞去油各一兩黃芩一兩二錢上為末薑汁煎水打糊為丸桐子大每服五十丸食後臨臥各一服食積痰加神麯麥芽氣虛用補氣藥送之半夏丸大治濕痰喘急亦止心痛半夏不拘多少香油炒為末粥丸桐於大每服三五十丸薑湯送下一方燥濕痰用南星半夏各一兩蛤粉二兩為丸青黛為衣薑湯送下中和丸治濕痰氣熱蒼朮黃芩半夏香附各等分上為末粥丸桐子大每服五十丸薑湯送下治酒痰用瓜蔞青黛蜜丸噙化治痰要藥用貝母不拘多少以童便春夏浸一日夜秋冬三日撈起水淋洗淨曬乾研末糖霜和成不時服滾白湯調下亦可清膈化痰丸黃連黃芩各一兩黃柏山梔各五錢香附一兩半蒼朮二兩為末蒸餅丸白湯下蘇子降氣湯治虛陽上攻氣不升降上盛下虛涎壅盛方見氣門萬病解毒丹即紫金錠此藥解諸毒療諸瘡利關竅通治百病神效不可具述凡居家出入不可無治疾之功過於牛黃丸等劑山慈姑去皮淨焙三兩文蛤即五倍子捶破去內膜淨二兩麝香三錢千金子即續隨子去油殼淨一兩紅芽大戟一名紫大戟洗焙乾一兩半江南產者佳形如甘草而堅實切不可誤用綿大戟江北有土大戟紅色者亦可用上各研為細末以糯米粉糊和勻於木臼中杵十餘下每料分作六十錠每服半錠病重者或全服一錠以酒或薄荷湯磨下合日於端午七夕重陽如欲急用辰日或天德月德日亦佳勿令婦人孝服不具足人及雞犬之類見之要在淨室焚香修制牛黃清心丸治諸風緩縱不隨語言蹇澀心怔健忘恍惚去來頭目眩暈胸中煩郁痰誕壅塞精神昏憒又治心氣不足神志不定驚恐