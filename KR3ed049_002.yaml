一錢五分用雄豬肝一個不下水者先將溫水煮一滾取出用竹尖鑽孔數個入藥在內蒸熟切片搗蒜蘸食之不過一二個永不發調中健脾丸治單腹脹及脾虛腫滿膈中閉塞胃口作疼並皆神效此藥不傷元氣服有大益勿輕視之白朮六兩黃土水拌炒人參二兩白芍藥二兩半火煨茯苓半夏湯泡七次香附米童便浸一宿薏苡仁炒山楂肉炒各二兩蒼朮米泔浸炒五加皮炒各二兩澤瀉黃連吳茱萸水浸一宿炒燥去萸各二兩半紫蘇子炒蘿蔔子炒草豆蔻酒拌炒各一兩半黃耆二兩蜜炙陳皮三兩鹽水炒沉香六錢另研不見火瓜蔞煅一兩煅瓜蔞法用瓜蔞二個鑽一孔每個入川椒三錢多年糞渣二錢敲米粒大俱納入瓜蔞內外以綿紙糊完再用細紙斤泥封固曬乾入火內煅通紅為度取出去泥與黑皮一併入藥共為細末煎荷葉大腹皮湯打黃米糊為丸如桐子大每服百丸日進三次白湯下抵當丸治有故畜血而腹脹者宜以此下之水蛙七個炒虻蟲八個炒桃仁七個大黃一兩上為末分作四丸每一丸水一盞煎七分溫服血未下再一服廣茂潰堅湯中滿腹脹內有積塊堅硬如石令人坐臥不安大小便澀滯上氣喘促遍身虛腫厚朴黃芩益智草豆蔻當歸各五錢廣茂升麻紅花吳茱萸各二錢黃連六錢柴胡甘草生澤瀉神麯炒青皮各三錢半夏七錢渴者加葛根四錢每服七錢姜三片水煎服一方治肥人腹脹平胃五苓散加人參服之一方治食肉多腹脹三補丸加香附半夏曲糕餅丸服一方治因大怒腹脹宜青皮陳皮香附木香梔子仁蘆薈以前主方消息用之黃疸不必分五疸同是濕熱面黑黃色而渴者不治治方黃芩黃連山梔茵陳豬苓澤瀉蒼朮青皮草龍膽各等分水煎服食積加三稜蓬朮砂仁陳皮神麯治之茵陳五苓散治濕多者上用五苓散五分茵陳蒿末十分和勻先食飯後服方寸匕日三服五苓散因食積者加食積藥又方治飲酒伏暑郁發為疸煩渴嗜飲小便不利茵陳赤茯苓去皮白朮澤瀉各等分每服四錢水一盞煎八分溫服不拘時或加黃連葛粉梔子茯苓滲濕湯治黃疸寒熱嘔吐而渴欲飲冷身體面目俱黃小便不利不得安臥不思食白茯苓五分澤瀉三分茵陳六分豬苓二錢黃連梔子防己白朮蒼朮陳皮枳實各一分水煎服胃苓湯治黃疸怠倦脾胃不和食少小便赤加滑石氣實人心痛渾身發黃用撫藥山梔桔梗茶薑韭汁吐之治諸疸口淡怔忡耳鳴腳軟微寒發熱小便濁此為虛症宜四君子湯吞下八味丸方見虛損門濟生茵陳湯治黃汗染衣而不渴茵陳二兩大黃一兩梔子三錢水煎服上方實者可用虛者用後黃耆散黃耆散黃耆赤芍藥茵陳各二兩石膏四兩麥門冬去心豆豉各一兩甘草炙半兩姜五片水煎服不拘時瓜蒂散治黃汗以濟前方湯散之功瓜蒂二錢母丁香一錢黍米四十九粒赤小豆半錢上為末每夜於鼻內搐之取下黃水凡用先令病人含水一口治女勞疸茵陳白朮茯苓豬苓澤瀉當歸芍藥麥門冬生地黃甘草滑石水煎服加味綠礬丸治黃胖方見積聚門諸氣怒則上喜則緩驚則亂恐則下勞則耗悲則急思則結皆能致疾氣無補法亦有當補者蘇子降氣湯治虛陽上攻氣不升降上盛下虛痰涎壅盛蘇子一錢半厚朴陳皮半夏官桂前胡各一錢甘草五分水二鍾姜三片煎服流氣飲子治男婦五臟不和三焦氣壅心胸痞悶咽塞不通腹脅膨脹嘔吐不食及上氣喘急咳嗽痰盛面目浮四肢腫大便秘結小便不通治憂思太過陰陽之氣鬱結不散壅致成痰又治腳氣腫痛喘急腹脹大便不通及氣攻肩背脅肋走注疼痛紫蘇葉青皮當歸芍藥烏藥茯苓桔梗半夏川芎黃耆枳實各七分防風甘草陳皮木香蓮皮大腹子各五分水二鍾姜三片棗一枚煎一鍾不拘時溫服橘皮一物湯治諸氣攻刺及感風寒暑濕初證通用凡酒食所傷中脘痞塞煩悶嘔吐吞酸並用之橘皮洗淨新汲水煎服壯人氣刺痛宜枳殼烏藥肥白氣虛人刺痛宜參術加木香木香枳朮丸破滯氣消飲食開胃進食方見傷濕門蟠蔥散治男婦脾胃虛冷氣滯不行攻刺心腹痛連胸脅膀胱小腸疝氣及婦人血氣刺痛延胡索肉桂乾薑泡各二兩甘草炙縮砂去皮蒼朮米泔水浸一宿切焙各半兩丁皮檳榔各四兩蓬朮茯苓三稜煨青皮去穰各六兩上為末每服二錢水一盞蔥白一莖煎七分空心熱服三因七氣湯治喜怒悲思憂恐驚氣結成痰涎狀如破絮或如梅核在咽喉間咯不出咽不下此七情所為也或中脘痞滿氣不舒快或痰涎壅盛上氣喘急或因痰飲中阻嘔逆噁心並宜服之半夏五兩茯苓四兩厚朴三兩紫蘇二兩每服四錢水一盞半姜七片棗一枚煎八分去渣熱服治氣六合湯治亡血後七情所傷或婦人產後月信後著氣當歸川芎芍藥地黃木香檳榔水煎服陰虛氣滯者去木香檳榔加玄參黃柏枳殼蘇合香丸治諸氣此藥治冷症痰火喘急熱症不可服沉香丁香訶子煨取肉青木香白朮香附砂仁白豆蔻枳殼炒各二兩廣木香蓽撥烏藥甘草茯苓檀香陳皮犀角硃砂各一兩麝香三錢乳香沒藥各五錢蘇合油一兩安息香用無灰酒熬膏一兩上為細末煉蜜丸彈子大重一錢蠟固封解五臟結氣益少陰經血用梔子炒將黑為末以薑汁入湯同煎服清膈丸治因濕熱氣滯黃芩黃連各五錢炒香附一兩半蒼朮二兩上為末取紅熟瓜蔞去皮搗糊丸綠豆大每服三五十九溫湯送下分心氣飲治一切氣病紫蘇莖葉四兩羌活半夏肉桂青皮陳皮大腹皮桑白皮木通芍藥甘草赤茯苓各一兩姜三片棗一枚煎服治實熱在內相火上衝有氣滯知母黃連黃柏黃芩枳殼水煎服六郁郁者結聚而不得發越也諸病久方皆有郁越鞠丸解諸郁蒼朮香附撫芎神麯梔子炒各等分上為末水丸綠豆大每服六七十丸白湯下六感丸治一切名利失意抑鬱煩惱七情所傷不思飲食面黃形羸胸膈諸症極有神效香附米二斤用瓦器炒令黃色取淨末一斤茯神去皮為末四兩上為末煉蜜丸彈子大每服一丸空心細嚼白湯或降氣湯下降氣湯方見氣門治氣鬱胸脅痛脈沉澀者是香附童便浸蒼朮米泔浸撫芎治濕鬱周身走痛或關節痛遇陰寒則發脈沉細者是白芷川芎蒼朮茯苓治痰鬱動則喘寸口脈沉滑者是海石香附南星薑製治熱鬱瞀悶小便赤脈沉數者是山梔炒青黛香附蒼朮撫芎治血鬱四肢無力能食便紅脈沉者是桃仁去皮紅花青黛撫芎亦可香附治食鬱噯酸腹飽不能食左寸脈平和右寸脈沉緊者是蒼朮香附山楂針砂醋炒七次研極細末春加芎夏加苦參秋冬加吳茱萸上為末作丸服夢遺有熱則流通者有用心過度心不攝腎者有思欲不遂精色失位者有欲太過滑泄不禁者因夢交而出精者謂之夢遺不因夢而泄精者謂之精滑皆相火所動久則有虛而無寒也妙香散麝香一錢另研人參五分木香煨二錢半茯苓茯神黃耆遠志炒各一兩桔梗甘草各五分辰砂二錢另研山藥薑汁炙二兩上為末每服二錢不拘時溫酒調服治滑精藕節一兩獨活川續斷各五錢訶子三錢上為末煉蜜丸桐子大每服十四丸空心酒下黃連清心飲治心有所慕而作夢遺此君火既動相火隨之當治在心黃連生地酒洗當歸身酒洗甘草炙茯神遠志酸棗仁人參石蓮肉水煎服椿樹根丸治房勞內傷氣血兩虛不能固守精滑不時或作夢遺檀根白皮炒為末酒糊丸服或加青黛海石黃柏煎八物湯吞服蛤粉丸治熱則流通並治精滑者黃柏知母蛤粉青黛粥丸服小菟絲子丸治腎氣虛損目眩耳鳴四肢倦怠夜夢遺精石蓮肉二兩菟絲子酒煮五兩白茯苓山藥二兩內分一半打糊上為末用山藥糊丸桐子大每服五十丸空心溫酒鹽湯任下腳膝無力木瓜湯下辰砂既濟丸治元陽虛憊精氣不固夢遺盜汗黃耆鹽水炒人參枸杞當歸酒洗山藥鎖陽敗板酥制牡蠣酒浸一宿煅各二兩熟地四兩酒洗牛膝酒洗一兩半知母酒炒兩半破故紙鹽水炒一兩二錢黃柏酒炒六錢上為末白朮半斤水八碗煎至一半取渣再換水煎至二碗成膏和丸如桐子大辰砂為衣空心鹽湯下七十丸金櫻丸治精滑夢遺及小便後遺瀝金櫻子雞豆實各一兩白蓮花蕊龍骨煅各半兩上為末糊丸桐子大每服七八十丸空心鹽湯下金櫻煎經霜後以竹夾子摘取於木臼中轉杵去刺勿損之掰為二片去其子以水淘洗過搗爛入大砂鍋以水煎不得絕火煎約水耗半取出澄濾過仍重煎似稀飴每服取一匙空心暖酒一盞調服甚效玉環丹治積氣骨虛遺精白濁常服澀精固陽龍骨蓮花蕊芡實去殼黃柏鹽酒炒石菖蒲牡蠣左顧者五味子各一兩上為細末金櫻子竹刀刮去刺掰開去子煎濃汁打糊丸桐子大每服五六十丸鹽湯下水陸遇仙丹芡實粉同金櫻膏相合為丸如桐子大每服七八十丸空心鹽酒下量加秋石為引更妙威喜丸治丈夫陽虛精氣不固小便白濁余淋常流夢寐多驚頻頻遺泄婦人白濁白帶盡皆除之黃蠟四兩白茯苓去皮四兩切塊用豬苓一分於器內同煮二十餘沸取出日曬不用豬苓上以茯苓末溶黃蠟丸彈子大每服一丸空心細嚼津液嚥下以小便清為度忌米醋五味膏北五味子一斤洗淨水浸一宿以手援去核再用溫水將核水洗去取餘味通置砂鍋內用布濾過入好冬蜜二斤炭火慢熬成膏待數日後略去火性每服一二茶匙空心百湯服火候難於適中先將砂鍋秤定斤兩然後稱五味汁並蜜大約煮至二斤四兩為度固精丸治道精夢泄蓮蕊八兩覆盆子菟絲子酒煮搗成餅破故紙炒山茱萸去核各四兩芡實五百粒沙苑蒺藜一兩酒浸龍骨二兩火煅酒淬七次為末蜜丸桐子大空心鹽湯下百丸金鎖思仙丹萬見於嗣門便濁主濕熱有痰有虛赤屬血白屬氣治胃中濁氣下流為赤白濁陳皮半夏茯苓甘草柴胡升麻蒼朮白朮水鍾半煎八分空心服亦加白芍藥以此湯下檀柏丸甚效胃弱兼用人參肥白人患此必多痰亦服之二陳湯加升提之藥能使大便潤小便長檀柏丸檀皮黃柏炒褐色青黛乾薑炒微黑蛤粉炒滑石神麯糊丸虛勞者四物湯下萆薢分清飲治真元不足下焦虛寒小便白濁頻數無度凝白如油光彩不定旋腳澄下凝如膏糊益智仁川萆薢石菖蒲烏藥各等分每服五錢水煎入鹽一攝食前服又方此初起半月服之極驗川萆薢去皮川黃柏酒浸麥門冬去心菟絲子酒蒸北五味酒炒遠志去心各等分竹葉三片燈心七莖大黃少許水鍾半煎一鍾空心服治白濁麝香半分用棗肉研爛成條入莖內氣通即愈珍珠粉丸治白濁夢遺精及滑出而不收黃柏新瓦上炒赤真蛤粉各一斤珍珠三兩一方無珍珠上為末水和丸桐子大每服百丸空心溫酒下或加檀皮青黛滑石等服導赤散治心虛蘊熱小便赤澀遂成赤濁方見淋門清心蓮子飲治上盛下虛心火上炎口苦煩渴五心煩熱小便赤澀或下白濁石蓮肉赤茯苓人參黃耆甘草黃芩麥門冬地骨皮車前子水鍾半煎八分空心服半苓丸治白濁神麯半夏薑汁製豬苓為丸服定志丸和珍珠粉丸治白濁經年不愈或時夢遺形瘦當作心虛治遠志去心石菖蒲各二兩人參白茯苓各三兩上為末蜜丸桐子大硃砂為衣每服七丸加至三十丸空心米湯下又方炒黃柏一兩生黃柏一兩滑石三兩神麯半兩共為末滴水丸茯菟丸治思慮太過心腎虛損便溺餘瀝小便白濁夢寐頻泄菟絲子五兩白茯苓三兩石蓮肉二兩上為末酒糊丸桐子大每服三十丸空心鹽湯下治小便白濁出髓條酸棗仁白朮人參白茯苓破故紙益智大茴香龍骨牡蠣上為末青鹽酒為丸每服三十丸溫酒下一方治白濁炒黑香附為末三錢用酸梅單取汁拌勻以溫酒一盞傾入服之三二日即愈一方菟絲子一兩炒黑色淬酒一大碗去渣熱服
