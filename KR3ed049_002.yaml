肉際夜發灸陰蹻照海在內踝下赤白肉際各二七壯癲狂癲屬陰狂屬陽癲多喜而狂多怒脈虛者可治脈實者死大率多因痰結於心胸間治當鎮心神開痰結治多同癇狂之為病少臥而不飢笑傲好歌樂妄行不休癲之為病意常不樂直視仰面曰僵覆面曰僕脈三部陰陽俱盛治方治癲風麻仁四升水六升猛火煮去渣煎取七合空心溫服或發或不發或多言語勿怪之但人摩手足須定凡進三劑則愈一方治狂邪發無時披頭大叫欲殺人不進水火苦參不拘多少為末煉蜜丸桐子大每服十五丸薄荷湯下紫金錠治急中癲邪鬼氣狂亂喝叫奔走並失心羊兒豬癲等風以酒磨服一睡覺即愈方見痰門治失心癲狂用紫河車一具於長流活水中衝洗極淨全無臭氣煮爛熟同牛肚俱切碎塊和一處隨便與患人食之最效牛黃清心丸治心氣不足神志不定驚恐悸怖虛煩少睡常發狂癲言語錯亂方見痰門虎睛丸治諸風狂症方見癇門一方治癲哭呻吟為邪所憑非狂也燒蠶紙酒下方寸匕一方人醉飽後病狂妄語妄見皆痰所為灌鹽水一大碗吐痰即愈治婦人癲疾歌唱無時躍牆上屋乃經閉血迷心竅所致者當歸酒洗白芍酒炒白朮茯芩遠志去心柴胡桃仁去皮尖蘇木紅花甘草煨姜一片水二鍾煎七分熱服人中黃散治癲邪發狂方見瘟疫門凡人染邪祟者皆宜以痰治之蓋血氣者身之神也神既衰乏邪因而入里或有之若夫血氣兩虛痰客中焦妨礙升降不得運用以致十二官各失其職視聽言動皆有虛妄以邪治之其人必死驚悸怔忡健忘驚者恐怖之謂悸者惕跳之謂怔忡者心中不安惕惕然如人將捕之者是也健忘者轉盼遺忘之謂有痰有慮便動屬虛時作時止者痰因火動硃砂安神丸治血氣心煩懊惱驚悸怔忡胸中氣亂硃砂五錢水飛另研黃連酒洗六錢甘草炙當歸各二錢半生地黃一錢半為細末蒸餅丸如黍米大硃砂為衣每服三五十丸食後津下養血清心湯人參白朮茯苓遠志去心酸棗仁炒川芎當歸酒洗生地酒洗石菖蒲各一錢甘草五分水二鍾龍眼肉七枚燈心二十條煎八分食後服治怔忡川芎茯神芍藥熟地黃黃連硃砂生地黃酒浸當歸身酒浸甘草炙水煎服加減四物湯治瘦人血少怔忡無時但覺心跳者當歸芍藥生地黃茯神酸棗仁遠志水鍾半煎七分通口服安神鎮驚丸治血虛心神不定驚悸怔忡不寐當歸酒洗二兩白芍煨一兩川芎茯苓去皮遠志去心各七錢生地酒洗一兩五錢貝母去心麥門冬去心黃連陳皮硃砂各一兩水飛另研為衣甘草三錢酸棗仁炒五錢煉蜜丸如綠豆大每服五十丸食遠棗湯下加味定志丸治肥人痰迷心膈尋常怔忡遠志菖蒲各二兩白茯苓三兩人參琥珀鬱金各一兩天花粉貝母瓜蔞仁各一兩五錢上為末煉蜜丸桐子大硃砂為衣每服二十丸米飲下如怔忡時作時止者乃痰因火動加黃連一兩五錢治勞疫大虛心跳硃砂白芍藥當歸身側柏葉各三錢川芎甘草陳皮各一錢黃連炒一錢五分為末豬心血丸歸脾湯治思慮過度勞傷心脾健忘怔忡白朮茯神黃耆圓眼肉酸棗仁炒各一兩人參木香各五錢甘草炙二錢半每服四錢姜三片棗一枚水煎服平補鎮心丹治心血不足時或怔忡夜多異夢如墜層崖常服安心腎白茯苓去皮五味子去梗車前子茯神去皮麥門冬去心各一兩一錢半肉桂天門冬山藥洗薑製熟地酒蒸各一兩遠志去心甘草煮一兩五錢人參去蘆五錢酸棗仁去皮炒二錢半龍齒一兩半硃砂五錢另研為衣上為末煉蜜丸桐子大每服二十丸空心米飲溫酒任下養心湯勤政勞心痰多少睡心神不足黃連白茯苓茯神麥門冬當歸芍藥甘草遠志陳皮柏子仁酸棗仁人參水二鍾蓮肉四個去心煎八分食前服天王補心丸寧心保神益血固精壯力強志令人不忘除怔忡定驚悸清三焦化痰涎祛煩熱療咽乾養心神人參五錢去蘆當歸酒浸五味子麥門冬去心天門冬去心柏子仁酸棗仁各一兩白茯苓去皮玄參丹參桔梗遠志各五錢生地黃四兩黃連酒洗炒二兩上為末煉蜜丸桐子大硃砂為衣每服二三十丸臨臥燈草竹葉煎湯進上方聞人道長之所常服故提學南畿心神甚勞而不傷此丹之功也與劉松後中丞所傳少後菖蒲熟地黃杜仲百部茯神甘草六味虎犀丹治七情所傷心神或亂異常怔忡驚悸癇症亦治虎睛一對微炒犀角八錢羚羊角八錢麥門冬去心生地酒洗膽星黃連薑汁炒山梔仁姜炒遠志甘草汁浸去骨半夏薑汁製石菖蒲明天麻酸棗仁炒辰砂各一兩水飛為衣麝香甘草炙各二錢金箔十片入藥當歸酒洗人參茯神去水各二兩上為末煉蜜丸桐子大每服百丸燈心竹葉湯下臨睡五更各一服柏子養心丸柏子仁揀淨微蒸曬乾去殼二兩枸杞子水洗淨曬乾三兩麥門冬去心一兩茯神去皮心一兩熟地酒浸甘草去皮當歸身酒浸石菖蒲去蘆洗淨各五錢黑玄參酒洗淨二兩除柏子仁熟地蒸過石器內搗如泥余藥為末和勻煉蜜丸桐子大每服五十丸臨睡白湯下二神交濟丹茯神去皮木三兩酸棗仁炒枸杞子真神麯炒白朮各二兩柏子仁芡實去殼生地酒蒸九次麥門冬去心當歸酒洗人參陳皮去白白芍藥酒炒白茯苓去皮砂仁各一兩米仁炒三兩上十六味用熱水四碗調蜜四兩煮山藥粉四兩和勻丸桐子大每服七八十丸清米湯下定志丸亦治健忘人參白茯苓各一兩遠志去心菖蒲各二兩為末煉蜜丸綠豆大硃砂為衣每服五十丸燈心湯下寧神固本丸中年之人氣血衰弱脾胃不和精神虛耗夜多不睡服此不助不伐最為平補人參川芎白芍藥酒炒蓮肉去心麥門冬去心石菖蒲橘紅各一兩白朮炒茯神去皮木當歸酒洗生地酒洗各二兩甘草炙三錢山藥遠志甘草湯浸去骨酸棗仁炒各一兩五錢五味子五錢龍眼肉百枚去核小紅棗煮去皮核百枚上將龍眼肉小紅棗搗爛余藥為末煉蜜丸桐子大每服百丸臨睡白湯下溫膽湯治心膽怯易驚方見傷寒門內傷病必氣高而喘身熱而煩短氣上逆鼻息不調怠惰嗜臥四肢困倦不收無氣言動捫摸肌膚必大熱躁熱悶亂心煩不安或表虛惡風是也東垣內外傷辨人迎脈大於氣口為外傷氣口脈大於人迎為內傷外傷則寒熱齊作而無間內傷則寒熱間作而不齊外傷惡寒雖近烈火不除內傷惡寒得就溫暖即解外傷惡風乃不禁一切風寒內傷惡風惟惡些少賊風外傷症顯在鼻故鼻氣不利而壅盛有力內傷症顯在口故口不知味而腹中不和外傷者無此外傷則邪氣有餘發言壯厲先輕而後重內傷則元氣不足出言懶怯先重而後輕外傷手背熱而手心不熱內傷手心熱而手背不熱若顯內證多者是內傷重外感輕宜以補養為先若顯外證多者是外感重內傷輕宜以發散為急補中益氣湯治形神勞役或飲食失節勞倦虛損身熱而煩脈大而虛頭痛或惡寒而渴自汗無力氣高而喘黃耆一錢半人參甘草炙各一錢白朮當歸身柴胡升麻陳皮各五分一方加黃柏三分以滋腎水瀉伏火紅花三分人心養血上作一服水煎午前稍熱服一方有芍藥秋冬不用嗽加五味子十五粒麥門冬一錢夾痰加半夏竹瀝仍少入薑汁傳送頭痛加蔓荊子三分痛甚加川芎五分頂疼腦痛加藁本五分細辛三分諸頭痛並用已上藥四味頭痛有痰沉重懶倦者乃太陰厥陰頭痛加半夏五分或一錢生薑三片若耳鳴目黃頰頜腫頸肩臑肘臂外後廉痛面赤脈洪者加羌活一錢防風七分甘草三分藁本五分通其經血加黃芩黃連各三分消其腫咽痛頜腫脈洪大面赤加黃芩三分桔梗七分甘草三分口乾咽乾或渴加葛根五分升胃氣上行以潤之心下痞悶加芍藥黃連各一錢如痞腹脹加枳實三分厚朴七分木香砂仁各三分天寒加乾薑腹中痛加白芍藥炒半錢炙甘草三分惡寒覺冷痛加桂心半錢夏日腹中痛不惡寒反惡熱加黃芩五分芍藥一錢甘草五分以治時熱臍下痛加熟地半錢胸中滯氣加蓮花青皮一分或二分壅滯可用氣促少氣者去之身體重痛乃風濕相搏加羌活半錢防風半錢升麻一錢柴胡半錢藁本半錢蒼朮一錢病去勿再服大便秘澀加歸梢一錢久病痰喘去人參冬日加不去節麻黃秋涼亦加不去節麻黃春日天溫加沸耳草三分款花一分勿加麻黃初病人雖痰嗽不去人參不必增添久病肺中伏火者去人參以防痰嗽增益長夏濕土客邪太旺加蒼朮白朮澤瀉上下分消其濕熱之氣濕熱大勝主食不消故食減不知穀味則加曲以消之加五味子麥門冬助人參瀉火益肺氣助秋金也在三伏中為聖藥脅下急或痛俱加柴胡人參甘草多唾或唾白沫胃口上停寒也加益智仁胃脘當心痛加草豆蔻仁三分疲甚之人參耆白朮有用至一兩二兩者硃砂安神丸治勞神過度以致心神煩亂怔忡兀兀欲吐氣亂而熱似懊憹狀黃連生地黃當歸身甘草炙各一錢半硃砂另研為衣一錢上為末蒸餅丸黍米大每服十五丸或二十丸唾津下一方人遇勞倦辛苦用力過多即服後方二三服免生內傷發熱之病此方主補氣黃耆一錢五分蜜炙人參麥門冬去心陳皮白朮各一錢甘草七分炙茯神八錢五味子二十粒姜二片棗二枚水鍾半煎溫服勞倦甚加熟附子四五分一方人遇勞心思慮損傷精神心虛氣短驚悸煩熱服後方主補血人參一錢二分當歸酒洗麥門冬去心白芍藥茯神去木酸棗仁炒生地黃各一錢山梔炒甘草炙陳皮川芎各五分五味子十五粒姜二片水一鍾半煎七分食前溫服治陽虛惡寒脈浮無力背惡寒者是黃耆人參白朮甘草肉桂各等分水煎服甚者少用熟附子內傷病退後躁渴不解者有餘熱在肺用參苓甘草少許薑汁冷服或茶匙挑薑汁與之內傷發癍因胃氣虛甚火遊行於外亦痰熱所致火則補而降之痰熱則微寒以散之內傷有二勞倦傷為不足飲食傷為有餘以手按心口不痛為勞倦傷按之刺痛為飲食傷別立傷食門於後傷食右手氣口脈必緊盛胸膈痞塞噫氣如敗卵臭亦有頭痛發熱但身不疼傷食必惡食心口按之必刺痛連實平胃散治傷食發熱困倦心口按之刺痛黃連枳實山楂神麯蒼朮厚朴陳皮甘草水二鍾煎八分通口服虛弱加白朮弱甚加人參枳朮丸治痞消食強胃白朮二兩枳實去穰麩皮炒一兩上為末荷葉裹燒飯研為糊丸桐子大每服五七十丸白湯下此藥久服能使人胃氣強實雖過實不傷加陳皮一兩名陳皮枳朮丸治老幼元氣虛弱飲食不消或臟腑不調心下痞悶加陳皮一兩酒浸炒黃連一兩名橘連枳朮丸補脾和胃瀉火消痰加半夏一兩名半夏枳朮丸治因冷食內傷加炒神麯炒麥蘖面各一兩名曲蘖枳朮丸治勉強多食致心腹滿悶不快加木香一兩名木香枳朮丸破滯氣消飲食開胃進食加黃芩四兩酒炒大黃煨神麯炒陳皮各一兩名二黃枳朮丸治傷肉食濕面辛辣味厚之物填塞悶亂不快以蒸餅為丸各量所傷服之寬中丸治胸膈痞悶停滯飲食山楂不拘多少蒸熟曬乾為末神麯糊丸桐子大每服六七十丸白湯送下治胃脘常疼胸膈痞悶不能飲食白朮四兩炒茯苓去皮淨枳實炒香附炒山楂淨肉當歸蒼朮炒各二兩陳皮厚朴薑汁炒草果去皮淨半夏薑汁製各一兩五錢白豆蔻淨肉一兩二錢白蘿蔔子炒白芍藥酒炒各一兩上為末神麯糊為丸桐子大每服百丸白湯下加味二陳湯治傷食惡食胸中有物宜導痰健脾陳皮半夏茯苓甘草白朮山楂川芎蒼朮水煎服保和丸治食積脾胃虛者以補藥下之山楂淨肉二兩蒸神麯炒半夏茯苓各一兩陳皮蘿蔔子炒連翹各五錢上為末粥丸或以神麯糊丸加白朮二兩名大安丸備急丸治飲食過多心腹脹滿大黃乾薑巴豆去皮油各一兩上為末煉蜜和搗千杵丸如小豆大每服三丸大小量與之葛花解醒湯治酒客病令上下分消甚濕白豆蔻仁砂仁葛花各五錢乾薑神麯炒澤瀉白朮各二錢木香五分青皮去穰三分陳皮去自豬苓去皮人參白茯苓各錢半上為末每服三錢由湯調下但得微汗則病去矣脾胃六君子湯治脾臟不和不進飲食人參白朮各一兩茯苓半夏薑製陳皮各半兩甘草炙五錢每服一兩姜七片棗一枚水二鍾煎一鍾去渣溫服參苓平胃散治脾胃不和不思飲食心腹脅肋脹滿刺痛口苦無味胸滿氣短嘔噦噁心噫氣吞酸面色痿黃肌體瘦弱怠惰嗜臥體重節痛常多自利或發霍亂及五噎諸痞膈氣翻胃悉宜服之厚朴橘皮各五兩蒼朮八兩米泔浸甘草茯苓人參各二兩為末每服三錢薑湯調下八味寬中散治感寒傷食飽悶脹痛嘔吐泄瀉飲食不進及裡急後重赤白痢疾等症蒼朮八兩米泔浸厚朴四兩薑汁炒甘草炙二兩山楂去核八兩枳實炒茯苓去皮各二兩陳皮四兩香附四兩米泔浸炒上為末空心薑湯下赤痢白湯下補脾助元散白朮新者三兩米泔浸一宿曬乾銅鍋內隔紙炒過白茯苓堅者去皮一兩蓮肉去心一兩半廣陳皮去白一兩大麥芽炒去殼取粉五錢用臼內杵為細末和勻入白糖霜二錢磁器盛常安火邊食遠白湯下二三匙大補元氣令人能食老年最宜常服紫霞丹能寬中進食蒼朮半斤米泔浸一宿厚朴五兩薑製陳皮五兩香附子四兩米泔浸甘草三兩炙為末曲糊丸彈子大每服一丸薑湯下保脾丸白朮五兩陳壁土炒茯苓去皮三兩甘草蜜炙一兩半夏薑汁製陳皮神麯炒山梔仁薑汁炒黑色山楂肉枳實麩炒各一兩當歸身酒洗三兩白蘿蔔子一兩炒上為末用荷葉包老米煮飯丸桐子大肚疼薑湯下常服白湯下補脾丸白朮半斤蒼朮茯苓陳皮各三兩為末粥丸服治中湯治脾胃不和嘔逆霍亂或中滿虛痞泄瀉等症人參甘草炙乾薑泡白朮青皮陳皮每服五錢水煎嘔加半夏等分丁香減半名丁香溫中湯溫中湯治傷食痞塞亦治憂抑傷脾不思飲食炒黃連酒芍藥香附同清六丸末薑汁浸蒸餅丸服清六丸見瀉門補胃瑤臺雪蓮肉廿兩去心白朮十兩麩炒陳皮二兩白茯苓二兩薏苡仁八兩芡實十兩山藥八兩砂仁一兩川椒一兩五錢炒去汗為細末入白糖二斤和勻每早白滾湯調服二三錢調中益氣湯升麻二分黃耆一錢甘草蒼朮人參各五分木香陳皮黃柏各二分柴胡五分水煎服六君子湯治脾胃不和不進飲食上燥下寒服熱藥不得者人參白朮茯苓甘草砂仁陳皮又方加半夏姜三片棗一枚水煎服參苓白朮散治脾胃虛弱飲食不進或致嘔吐泄瀉及大病後調助脾胃白扁豆一升炒白茯苓山藥甘草炙人參白朮各二斤蓮子砂仁薏苡仁桔梗各一斤炒黃色為末每服二錢煎棗湯下噁心有熱有痰有虛無聲無物欲吐不吐欲嘔不嘔雖曰噁心皆在胃口宜用生薑開胃豁痰加味二陳湯治胃口有熱時作惡心半夏薑製陳皮茯苓黃連薑汁炒黃芩薑汁炒各半錢甘草炙水二鍾姜五片煎八分通口服加味生薑理中湯治胃氣虛寒時作惡心亦治暈船人參白朮乾薑半夏薑製陳皮各等分水煎服大半夏湯治噁心亦治暈船陳皮半夏薑製茯苓水煎服小半夏茯苓湯半夏五兩茯苓三兩每服八錢水一盞半煎一盞入薑汁更熬一兩沸熱服或用生薑半斤同煎嘔吐有痰膈中焦入食不得下者有氣逆者有寒氣鬱於胃口者有暑氣所侵者有飲食所傷者有瘀血停滯者但因火與痰者為多有物有聲謂之嶇吐有聲無物謂之噦劉河間謂火氣炎上切不可下逆之故也藿香養胃湯治胃氣不和作吐藿香陳皮厚朴薑汁製蒼朮米泔水浸炒各一錢甘草炙五分半夏一錢五分薑汁製白朮一錢二分水二鍾姜五片煎八分通口服冬月胃受寒冷嘔吐不止元氣虛者加人參一錢乾薑泡一錢香薷飲治夏月伏暑嘔吐香薷一兩厚朴扁豆甘草炙各三錢上水四五甌煎至十分之六頓冷徐服芩連二陳湯治胃口有熱膈上有痰時作嘔噦陳皮半夏薑製茯苓黃連姜炒山梔姜炒甘草水二鍾姜五片煎八分通口服六君子湯治久吐胃氣虛弱不納飲食白朮一錢五分茯苓人參陳皮半夏薑製香附各一錢甘草炙五分水二鍾姜三片煎八分通口服一方有黃耆無二陳湯抑青丸治肝火出胃逆上嘔吐方見火門治坐船大吐發渴若飲水即死以童便飲之最妙五苓散加薑汁治夏月嘔吐不止方見暑門濟生竹茹湯治飲酒過度而嘔者葛根半夏湯泡七次甘草炙各二兩每服四錢水一盞入竹茹一小團姜五片煎服小柴胡加竹茹湯治發熱而嘔柴胡二錢半夏湯泡橘皮各一錢黃芩人參甘草炙各七分半竹茹一塊水一盞姜七片煎六分溫服治吐蟲而嘔用黑鉛炒成灰檳榔末等分米飲調下生薑橘皮湯治乾嘔噦或致手足厥冷橘皮四兩生薑半斤水七盞煮三盞去渣徐徐溫服朱奉議方加半夏一切嘔吐以此方主之理中加丁香湯治中脘停寒喜辛辣物飲食入口即吐人參白朮甘草炙乾薑泡各一錢丁香姜十片水煎服或加枳實半錢亦可不效或以二陳湯加丁香十粒並須冷服蓋冷遇冷則相入庶不吐出前方生薑橘皮湯亦治之噎膈附關格膈即翻胃噎乃膈之漸也血液俱耗胃脘乾槁其槁在上而近咽之下水飲可行食物難入或可少食名之曰噎其槁在下而與胃相近食雖可入難盡入胃良久復出名之曰膈治法同大率屬血虛有熱有痰宜薄滋味糞如羊屎者不治年高者不治口中脈大出者不治棗肉平胃散治翻胃厚朴薑製陳皮各三斤二兩去白甘草炙紅棗生薑各二斤蒼朮泔浸一宿炒五斤上棗肉平胃散再加米泔浸炒香附二斤拌勻以水浸過面上半寸煮乾焙燥為末每服二錢鹽湯空心服奪命丹治翻胃噎食裘一個即蜣螂所滾之裘凡糞土下俱有用裘中有白蟲者將裘少破一點仍蓋住火煅黃色存性勿令焦麝香一分孩兒茶二分金絲黃礬三分硃砂春二分夏四分秋六分冬八分上為細末燒酒調空心服如覺飢大小米煮粥漸漸少進一日二三次不可多吃忌生冷醬炒厚味蔥蒜酒面炙煿等物及氣惱五十以後人一二服即效又方治翻胃黃連三錢薑汁炒山楂肉二錢保和丸二錢方見傷飲食門上同為末糊丸麻子大胭脂為衣人參湯入竹瀝再煎一沸每服六十丸又方用韭汁二兩牛乳一盞生薑半兩頓服神效治氣虛翻胃脈緩無力者是人參白朮茯苓甘草治血虛翻胃脈數無力者是當歸川芎芍藥熟地黃上二方各用水鍾半煎至半鍾仍用童便韭汁牛乳竹瀝薑汁共半鍾入煎藥半鍾合成一鍾溫服治翻胃氣血俱虛口中多出沫者是合前八味煎法併入韭乳諸汁和服切不可用香燥之劑治翻胃有痰脈多滑數寸關脈沉或伏而大者是也陳皮半夏茯苓甘草各等分上煎法併入韭乳諸汁和服同前治翻胃有熱脈洪數有力者是黃連黃柏黃芩梔子各等分上煎法併入韭乳諸汁和服同前治翻胃膈中有積血者以韭汁飲之每服半盞日三服治婦人翻胃當歸川芎芍藥地黃陳皮帶白桃仁留尖甘草生紅花酒製各等分水鍾半煎八分入驢尿以防生蟲一粒金丹黃丹三錢水飛三次狗寶一個上與丹共為一丸金箔為衣韭菜湯下一方治翻胃用近山處黃牛糞尖三個燒灰砂糖酒調下金桃酒治翻胃吐酸古銅四錢敲如米粒大核桃肉一斤與銅同研爛用好燒酒一斤和銅桃均入錫瓶內封固瓶口將大鍋貯水錫瓶安鍋內桑柴慢火煮一周時取出埋地下一二時每日空心服一盞病重者午後再服一盞十日內病即減紫金錠治婦人膈氣並男子轉食磨服並愈一方用茱萸黃連貝母瓜蔞仁牛轉草煎服燒針丸此藥清鎮專主吐逆黃丹不拘多少研細用去皮小紅棗肉丸雞頭大每用針簽於燈上燒過人乳汁下一丸關格似噎而與噎稍異胃中覺有所礙欲升不升欲降不降欲食不食此謂氣之橫格也宜二陳湯吐之咳逆氣逆也氣自臍下直衝上出於口而作聲之名也古謂之噦今謂之呃乃胃寒所生寒氣自逆而呃上也有痰有氣虛有火有因飲食太過填塞胸中氣不得升降者有痰閉於上火起於下氣不得伸越者又有傷寒熱病陽明內實過期失下清氣不得升濁氣不得降以致氣不宣通而發呃者此皆實證也治痰咳陳皮半夏姜水煎服或以人參蘆煎湯吐之人參白朮湯治氣虛不足咳逆人參黃芩柴胡乾薑梔子仁甘草炙各兩半白朮防風五味子半夏泡七次每服四錢姜三片煎下大補丸方見虛損門治陰火咳逆黃連黃柏滑石水煎服益元散亦可治咳逆自利滑石甘草黃柏炒白芍藥人參陳皮白朮水煎加竹瀝服橘皮竹茹湯治吐利後胃熱咳逆橘皮一兩竹茹一兩半甘草炙二兩棗子三十個生薑半兩人參半兩水十盞煎三盞作三服嘈雜是痰因火動氣鬱濕熱芩連二陳湯治疾因火動胃口作嘈黃連姜炒黃芩炒陳皮半夏薑製茯苓南星甘草炙山梔炒熱多加青黛水煎服治心嘈索食白朮炒黃連薑汁炒陳皮等分為末作丸白湯下治心嘈不喜食此濕痰氣鬱也三補丸加蒼朮倍香附子方見虛損門治肥人嘈雜二陳湯少加撫芎蒼朮白朮炒山梔子水煎服人多思慮以致血虛五更時嘈雜是也四物湯加香附梔子仁黃連貝母吞酸吞酸與吐酸不同吐酸是平日津液隨上升之氣鬱積而成鬱積之久濕中生熱故從火化遂作酸水而出吞酸者濕熱鬱積於肝而出伏於肺胃之間必用糧食蔬菜自養加味平胃散治香酸或宿食不化蒼朮不制陳皮厚朴不制甘草神麯炒麥芽炒每服五錢姜三片水煎服茱連丸治鬱積吞酸黃連黃芩各一兩俱用陳壁土炒去土用蒼朮七錢半泔水浸炒茱萸泡炒陳皮各五錢上為末神麯糊丸綠豆大每服五六十丸津嚥下又方治鬱積吐酸陳皮半夏白茯苓吳茱萸炒各一兩黃連炒一兩五錢蒼朮一兩為末炊餅丸綠豆大每服二三十丸食後服冬倍茱萸夏倍黃連參萸丸上可治吞酸下可治自利又云治濕而滯氣者濕熱甚者用之為響導六一散七兩茱萸一兩制為末飯丸回令丸瀉肝火行濕為之反佐開痞結治肝邪可助補脾藥黃連六兩吳茱萸一兩俱用壁泥炒為末粥丸治噯氣此胃中有鬱火膈上有稠痰故也南星半夏軟石膏香附梔子炒為末作丸或作湯服治吐清水蒼朮陳壁土炒茯苓滑石炒白朮炒陳皮水煎服痞痞也皆土之病也與脹滿有輕重之分痞則內覺痞悶而外無脹急之形有中氣虛弱不能運化精微為痞者有飲食痰積不能施化為痞者有濕熱太甚為痞者治稟受充實面蒼骨露氣實之人心下痞者枳實黃連青皮陳皮枳殼上為末每服三錢燈心湯下治稟受素弱轉運不調飲食不化而心下痞者白朮山楂麴櫱陳皮各等分上為末每服三錢米飲下治肥人心下痞者乃是濕痰蒼朮半夏砂仁茯苓滑石上為末每服三錢薑湯下治瘦人心下痞者乃是鬱熱在中焦枳實黃連葛根升麻各等分上為末每服三錢薄荷湯下治食後感寒飲食不化心下痞者藿香豆蔻吳茱萸砂仁各等分上為末每服三錢薑湯下治夾血成窠囊心下痞者桃仁紅花香附大黃各等分上為末每服四錢酒下補中益氣湯加芍藥黃連各一錢治內傷心下痞瞀悶者如痞腹脹加枳實三分厚朴七分木香砂仁各三分方見內傷門枳實消痞丸治右關脈浮弦心下虛痞惡食懶倦開胃進食枳實黃連各五錢乾生薑甘草炙茯苓去皮麥芽各二錢半夏面人參白朮各三錢厚朴四錢上為末水浸蒸餅丸桐子大每服三五十丸溫水下橘皮枳朮丸治食已心下痞者方見傷飲食門回令丸即左金丸瀉肝火行濕熱亦開痞結方見吞酸門積聚積者有形之物也氣不能成在中為痰飲在右為食積在左為血積肝積在左脅下如覆杯有頭足久不愈令人發咳逆痔瘡連歲不已心積起臍上大如臂上至心下久不愈令人煩心脾積在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚肺積在右脅下覆大如杯久不己令人灑淅寒熱喘咳發肺癰腎積發於小腹上至心下著奔豚或上或下無時久不已令人喘逆骨痿少氣婦人有塊多是血塊幾積聚之脈實強者生沉小者死遇仙丹治邪熱上攻痰涎壅滯翻胃吐食十膈五噎齁哈酒積蟲積血積氣塊諸般痞積瘡熱腫痛或大小便不利婦人女子面色痿黃鬼疰癥瘕誤吞銀鐵銅物悉皆治之五更時用冷茶送下三錢天明可看去後之物此藥有積去積有蟲去蟲不傷元氣亦不損傷臟腑功效不能盡述小兒減半孕婦勿服白牽牛頭末四兩半生半炒白檳榔一兩茵陳蓬朮醋煮三稜醋煮牙皂各五錢炙去皮弦上為細末醋糊丸綠豆大依前數服行後隨以溫粥啖之忌食他物通玄二八丹治積聚止瀉痢之妙藥如治積聚侵晨用薑湯服稍瀉一二次即除以溫粥補住之如治泄痢飯後用清茶服即止積聚即肚腹飲食宿滯等疾黃連半斤淨芍藥淨當歸淨生地黃淨烏梅淨各五錢上為末以雄豬肚一個盛藥於內線縫之用韭菜二斤鋪底面於鍋內蒸候湯干再添蒸一日以藥熟為度連豬肚共藥石杵搗爛丸桐子大每服七十丸此藥薑湯服則行茶清服則止治痞積白芍藥四兩炒白朮炒枳實炒三稜醋煮蓬朮煨五靈脂炒阿魏醋煮各二兩黃連炒甘草各一兩乳香炙去油沒藥炙去油木香各五錢上為末醋糊丸桐子大每服五十丸半飽時白湯下內服此藥外貼膏藥萬應丸此藥善能追蟲取積面色痿黃肌膚羸瘦胸膈停痰宿食滯胃肚腹膨脹蟲咬心疼凡五臟中諸氣血積滯並皆治之並治吃泥炭米凡婦人癥瘕病淺者一服即效病重者二服除根惟孕婦忌之大腹子二兩效檳榔制史君子仁二十粒貫仲去土土朱雷丸水浸刮去黑皮紅者不入藥各五錢木香三錢另研滑石去黃純白者佳自然銅有金星小者佳用清醋火煅七次以酥為度各一兩雞心檳榔二兩用無灰好酒煮半日至心黑力度以黃豆煎湯熱洗錦紋大黃一兩半用綿紙裹水濕火煨微熟一半生用黑醜四兩一半微妙一半生取頭末二兩上為細末用皂莢水煎成膏丸桐子大大人三錢小兒錢半臨晚勿用夜飯四更時涼茶送下待下利五七次無妨候蟲積諸毒下以溫米粥補之忌生冷油膩麵食數日其病再不復發小溫中丸治諸積青皮陳皮各一兩香附四兩酒浸蒼朮黃連薑汁炒半夏針砂醋炒各二兩白朮苦參各半兩為末麵糊丸阿魂丸治肉積連翹一兩山楂阿魏各二兩醋煮作糊黃連一兩三錢上為末醋煮阿魏作糊為丸每服三十丸白湯下脾虛者以白朮三錢陳皮茯苓各一錢煎湯送下切不可獨用恐虛則禍如反掌小阿魏丸治痰積山楂三兩石𨢑二錢半夏一兩皂角水浸透曬乾上為末粥丸每服三十丸白湯下紺珠木香檳榔丸治食積腹脹有熱者木香檳榔當歸黃連枳殼青皮黃柏各一兩黃芩陳皮三稜牽牛末香附各二兩莪朮大黃各四兩上為末麵糊丸桐子大每服五七十丸臨臥薑湯下尋常消導開胃只服三四十丸有寒加厚朴木香丁香砂仁神麯香附保和丸治食積方見傷寒門紅丸子治傷食冷痛京三稜醋煮莪朮醋煮陳皮去白青皮去穰麩炒各五兩乾薑泡胡椒各二兩上為末醋煮糊丸如桐子大礬紅為衣每服三十丸食後薑湯下小兒臨食加減與服烏梅丸治酒積消食化痰烏梅一斤半夏半斤生薑一斤白礬八兩上石臼搗為細末新瓦兩片夾定火上焙三日三夜為度次入神麯麥芽陳皮青皮莪朮枳殼丁皮大腹子各四兩為末用酒糊丸如桐子大每服四五十丸薑湯下勝紅丸治脾積氣滯胸膈飽悶氣促不安嘔吐青水大人酒積婦人脾血積氣小兒食積並皆治之陳皮莪朮一味同醋煮青皮乾薑泡三稜良薑各一兩香附子炒去皮尖二兩為末醋糊丸桐子大每服二十丸薑湯送下治血塊凡血塊若以行藥行之後須大補海石醋煮三稜醋煮蓬朮醋煮桃仁紅花香附五靈脂為末醋糊丸石𨢑白朮湯吞下治脅下有塊龍薈丸二錢半方見脅痛門薑黃五錢桃仁五錢為末蜜丸服瓦楞子丸瓦楞子即蚶殼燒以醋淬三度埋令壞醋膏丸治一切氣血焫瘕次能消痰千金硝石丸止可磨塊不令困人須量虛實硝石六兩大黃八兩人參甘草各三兩上為細末以三年苦酒三升置器中以竹片作準每人一升作一刻先入大黃不住手攪使微沸盡一刻乃下余藥又盡一刻微火熬便可丸桐子大每服三十丸服後下如雞肝米泔赤黑色等物為效下後忌風冷宜軟粥調理痞塊在皮裡膜外須用補氣藥香附兼二陳湯開之先須斷厚味蜀葵膏用蜀葵根煎湯去粗再入人參白朮青皮陳皮甘草梢牛膝煎成湯入細研桃仁玄明粉各少許熱飲之二服當見塊下如病重者須補接之後加減再行一方治男婦痞塊阿魏一兩漆四兩生用濾過木耳四兩蜂蜜六兩上用錫罐一個內盛封固放鍋內水煮三炷香盡取起冷定每服二茶匙燒酒下日進三服忌油膩發物痞積膏藥此膏不惟治痞凡未潰腫毒瘰癧痰核跌打閃挫及心腹疼痛瀉痢風氣等症並有神效如痞症每膏藥一斤加阿魏五錢酒化和入用紅布攤貼患處常以熱手摩之令藥氣透歸尾紅花大黃蘇木捶碎桃仁杏仁三稜蓬朮枳殼枳實蒼朮厚朴檳榔青皮白芥子香附烏藥青木香水紅花根各五合川烏草烏川桃肉桂乾漆皂角玄胡索白芷仙靈皮南星半夏防風荊芥羌活獨活紫蘇麻黃秦艽木鱉子去殼大風子去殼海風藤防己穿山甲蜂房蜈蚣蛇蛻白附子高良薑骨碎補蘄艾各三錢桑枝槐枝柳枝桃枝長二寸者各三十段上咀片入麻油內用鋼鍋煎藥枯黑色濾去渣再煎滴水成珠取起松香明淨者不拘多少先用水煮濾淨次用老酒煮入水中抽扯數十次每松