body:
  text: 卷八藥性草部人參君味甘氣溫微寒無毒反藜蘆安神定魄止驚悸生津通血脈治五勞七傷虛損肺脾陽氣不足虛喘乏力肺寒宜用之肺受火邪喘嗽者禁用沙參臣味苦甘氣微寒無毒反藜蘆補中益肺氣止驚煩治常欲眠養肝氣療頭痛氣熱肺熱宜用之肺寒禁用天門冬君味苦甘氣平大寒無毒凡用去皮心治肺氣咳逆喘急消痰通腎氣止渴療肺痿生癰吐膿血熱侵肺吐衄妄行瀉肺火利小便冷而能補麥門冬君味甘微苦氣平微寒無毒凡用去心治口乾渴心肺熱虛勞客熱通脈保神補心氣治血妄行瀉肺中伏火療肺痿吐膿地黃君味苦氣寒無毒忌鐵器蔔菜熟地微溫大補血衰滋腎陰益氣力主血虛勞熱産後臍腹痛生地大寒涼血生血補腎水真陰不足主婦人崩中不止及産後血上薄心胎動下血瘀血衄血吐血胃寒者斟酌用痰膈不利者薑汁炒用術君味苦甘辛氣溫無毒白朮除濕益燥生津補脾進食除胃熱消虛痰止下泄利小便消腫滿及霍亂嘔逆在氣主氣在血主血有汗則發無汗則止蒼朮氣味辛烈主大風在身面風眩頭痛除惡氣闢山瘴消癖塊療心腹脹痛健胃寬中發汗除上焦濕功最大鹽水炒佐黃柏力健行下焦腰足濕熱黃耆味甘氣微溫無毒補虛蜜炙用治瘡生用主癰疽久敗瘡內托排膿止痛風癩痔痿脾胃虛弱羸瘦補中生血補肺氣實皮毛瀉陰火療虛勞自汗無汗則發有汗則止又治消渴泄痢腸風婦人血崩帶下經症産前後一切病補腎三焦命門元氣治傷寒尺脈不至性畏防風然防風制黃耆黃耆得防風其功愈大蓋相畏而相使者甘草君昧甘氣平生寒熱溫無毒反大戟芫花甘遂海藻長肌肉解百藥毒及諸毒治咳嗽止渴通經脈利血氣健胃和中養血補血善和諸藥生用瀉火節消瘡疽腫毒又治肺痿吐膿血惟中滿禁用下焦藥少用梢除胸中積熱去莖中痛菊花君味甘氣平寒無毒家種味甘色黃白者佳味苦野菊傷胃不用主風頭眩腫痛惡風濕痹身上四肢諸風胸中煩熱明目養血去目中膜翳根治療腫菖蒲君味辛苦氣溫無毒生石澗一寸九節者良主四肢濕痹不得屈伸開心通竅正氣除煩明耳目出音聲療頭風鬼氣瘡疥殺蟲止小便遠志君味苦氣溫無毒殺天雄附子毒凡用去心補不足利九竅定心志止驚悸夢邪益精壯陽黃精君味甘氣平無毒益脾胃潤心肺除風濕補勞傷山藥臣味甘氣溫平無毒長肌肉止腰痛強陽補心肺不足療煩熱泄精健忘五味子君味酸氣溫無毒主咳逆上氣補不足強陰益精止渴生津在上滋肺在下補腎氣耗散者用此收之肉蓯蓉臣味甘酸鹹氣微溫無毒凡用必酒浸去浮甲並中心白膜強陽益精暖腰膝續筋髓補命門相火治男子絶陽不與泄精尿血遺瀝女子絶陰不産血崩帶下陰痛鎖陽味甘鹹凡使酥油塗炙補陽氣益精治大便躁結菟絲子君味辛甘氣平溫無毒療男婦虛寒腰痛膝冷補精髓強陽堅筋骨治莖中寒精自出泄精尿血牛膝君味苦酸氣平無毒去蘆酒洗用主寒濕痿痹四肢拘攣逐血氣墮胎療男子陽消老人失溺壯陽益精填髓除腰脊痛通月水療血結血暈産後心腹痛活血生血引諸藥下行腰膝萎蕤君味甘氣平無毒主中風暴熱四肢拘攣頭疼目痛皆爛淚出濕注腳膝腰痛去面黑鼾薏苡仁味甘氣微寒無毒根治蛔攻心腹痛主筋急拘攣風濕痹利腸消水腫下氣除筋骨邪氣不仁石斛君味甘氣平無毒酒洗蒸用壯筋骨療腳膝軟弱強陽益精長肌肉治胃中虛熱皮膚邪熱巴戟天使味辛甘氣微溫無毒強陽堅筋骨療頭面遊風大風血癩及陰中引痛夜夢鬼交泄精破故紙味苦辛氣大溫無毒酒炒用主四肢疼痛骨髓傷敗陽衰腎冷精流腰膝痛囊濕小便利及婦人血氣穹藭臣味辛氣溫無毒主寒痹筋攣緩急婦人血閉治少陽頭痛血虛頭痛之聖藥散肝經風頭面風治一切血去宿生新及痔痿腦癰發背癭癧排膿消瘀長肉上行頭目下行血海通肝經血中之氣藥療一切心腹氣痛胸脅痛疝痛閉郁行氣燥濕當歸臣味甘辛氣溫無毒主瘟瘧虛勞寒熱婦人漏下絶子諸惡瘡瘍金瘡齒痛頭痛補不足氣血昏亂服之即定能令各有所歸故名當歸頭止血身和血尾破血全用和血芍藥臣味苦酸氣微寒有小毒反藜蘆除血痹破堅積寒熱疝症益氣順血脈抑肝暖中扶陽收陰補血散惡血利大小腸通月水消癰腫生用下痢疾炒用止腹痛脾經之藥白者補赤者瀉産後不可用以其酸寒伐生髮之性也益母草味辛甘氣微溫無毒主胎前産後諸疾行血養血及難産胎死腹中專治婦女一切血症車前子君味甘鹹氣寒無毒主小便淋瀝除濕痹利水道療肝中風熱沖目赤痛治婦人産難葉根主鼻衄熱痢蒲黃君味甘氣平無毒生用破血消腫炒黑用止血止血消瘀血治一切吐衄崩唾腸風血痢尿血撲血血症帶下月候不均心腹痛産後血症瘡癤風腫續斷君味苦辛氣微溫無毒酒浸用調血脈療金瘡癰腫止痛生肌續筋骨治婦人乳難産前後一切症及崩中漏血尿血跎瘡惡血腰痛縮小便止泄精溫子宮骨碎補使味苦氣溫無毒去毛用破血止血補傷折骨碎堅齒療骨中毒氣風血疼痛蒺藜子君味苦辛氣溫微寒無毒治風明目破惡血療喉痹乳難身體風癢肺痿小兒頭瘡沙苑蒺藜止遺瀝泄精溺血地膚子君味苦氣寒無毒又名落蒂主膀胱熱利小便洗目去熱暗雀盲止痛決明子臣味鹹苦甘氣平微寒無毒草決明治療同主青盲目謠膚赤白膜眼赤痛淚出除肝家熱又解蛇毒丹參臣味苦氣微寒無毒反藜蘆破宿血生新血安生胎落死胎止血崩帶下調經治骨節疼痛頭痛眼赤惡瘡癭贅腫毒排膿止痛生肌及邪氣腸鳴腹痛玄參使味苦鹹微寒無毒反藜蘆明目治結熱積聚暴中風狂邪溫瘧頭風骨蒸傳尸散項核癰腫清咽膈又治空中氤氳之氣無根之火茜根君味苦氣寒炒用勿犯鐵主寒濕風痹衄血吐血內崩下血尿血産後血暈乳結撲損瘀血死血治蠱毒茅根臣味甘氣寒無毒主瘀血血閉吐血利小便下五淋解腸胃熱療婦人崩中止消渴艾使味苦氣微溫無毒主灸百病止下痢赤白吐血衄血瀉血婦人漏血安胎止腹痛避風寒暖子宮殺蛔蟲醋煎治癬地榆味苦甘酸氣微寒無毒主婦人乳痙痛帶下月水不止血崩産前後諸血疾腸風血痢赤白痢小兒疳熱瀉痢療金瘡止痛除惡肉蝕膿諸疾熱瘡虛寒人水瀉冷痢勿用大小薊根味甘苦氣溫又云涼大薊主女子赤白沃安胎止吐血衄血下血療癰腫惡瘡小薊專主血疾紅花味辛甘苦氣溫無毒主一切血症多用破血少用入心養血療産後血暈口噤腹內惡血不盡絞痛胎死腹中牡丹皮味辛苦氣寒無毒凡用去骨主虛勞無汗骨蒸瀉陰火除症堅瘀血留腸胃不散衄血吐血女子經脈不通血瀝腰痛産後一切冷熱血氣療癰瘡排膿止痛鬱金味辛苦氣寒無毒下氣涼心止血破惡血血淋尿血女人血氣心痛療金瘡生肌薑黃味辛苦氣寒又云溫無毒主心腹結積下氣脹破血通月經治撲損瘀血産後敗血攻心消癰腫延胡素味辛苦氣溫無毒破血理月經不調産後血暈暴血衝上又治心氣痛小腹痛暴腰痛香附味甘氣微寒無毒除胸中熱下氣開鬱逐凝血炒黑止血治崩漏血中之氣藥能引血藥至氣分而生血婦人之仙藥也又婦人乳腫痛搗末醋煮厚敷之旱蓮草味甘酸氣平無毒主金刀撲損血不止烏鬚髮及齒血出疼痛劉寄奴味苦氣溫無毒主破血産後余疾下血止痛極效又治心腹痛小脹柴胡君味苦氣平微寒無毒去腸胃結氣明目除往來寒熱傷寒寒熱本經頭痛在經主氣在臟主血瘧症必用之又能引清氣行陽道升提胃氣前胡使味苦微寒無毒主心腹結氣頭痛去痰實下氣療傷寒寒熱明目治小兒一切疳氣黃連臣味苦氣寒無毒酒炒上行薑汁炒辛散主目痛赤腫皆傷淚出腸癖腹痛下痢赤自婦人陰腫痛鎮肝益膽解熱毒瀉心火止驚消渴調胃厚腸除脾胃濕熱煩躁噁心鬱熱在中焦兀兀欲吐心下痞滿及諸瘡腫毒又主小兒疳氣胡黃連味苦氣平無毒主久痢成疳溫瘧骨蒸勞熱補肝膽明目理小兒驚癇治婦人股蒸虛驚黃芩臣味苦氣平寒無毒枯飄者名宿芩主諸熱黃疸火瘍目赤腫疼解肌熱泄肺火消膈上熱痰療天行熱疾療瘡乳癰發背酒炒上行主上部積血條實者名子芩入太陽除熱補膀胱不足治下痢膿血腹痛後重身熱又安胎草龍膽君味苦澀氣大寒無毒主骨間寒熱胃中伏熱時氣溫熱黃疸下焦濕熱益肝膽止驚惕酒浸上行治兩目赤腫睛脹瘀肉高起又療小兒驚癇客忤疳氣防己君味辛苦氣平寒無毒漢防己主水氣木防已主風氣主風寒溫瘧熱氣諸癇利大小便療腰以下濕熱腳氣去膀胱熱及傷寒寒熱肺氣喘嗽隔間脂滿殺癰腫惡結諸疥癬蟲瘡葛根臣味甘氣平無毒亦主金瘡止血花解酒主消渴大熱嘔吐療傷害中風頭痛解肌發表出汗治脾虛口渴除胃熱解酒瓜蔞根味苦氣寒無毒反烏頭主消渴身熱煩滿除腸胃中痼熱黃值唇乾口燥排膿消腫生肌長肉消乳癰發背痔痿瘡癤撲損瘀血仁味苦甘性潤治痰嗽利胸膈甘能補肺潤能降氣治痰之要藥又消乳癰腫苦參味苦氣寒沉無毒反藜蘆主心腹結氣黃疸溺瀝除癰腫療腸癖熱痢皮肌煩熱洗蟲疥治大瘋眉脫及遍身熱疹陰處瘡癢青黛臣味鹹甘氣寒解諸藥毒收五臟鬱火小兒驚癇疳熱瀉肝殺蟲又敷熱瘡惡腫金瘡蛇犬等毒茵陳蒿使味苦辛氣乎微寒無毒主風濕寒熱邪氣熱結黃疸通身發黃小便不利解傷寒煩熱腦痛化痰利膈行滯氣知母君味苦辛氣寒無毒主口乾消渴浮腫下水補不足瀉腎火治有汗骨蒸傷寒久瘧煩熱消痰止嗽潤心肺又治溪毒大勝貝母臣味辛苦氣平微寒無毒反烏頭主喉痹乳難咳嗽上氣消痰潤肺散心胸鬱結項下瘤癭敷惡瘡斂瘡口治人面瘡胞衣不出酒調七枚服地骨皮味苦氣寒主熱中消渴風濕周痹癬有汗骨蒸去肌熱涼血堅筋骨利大小腸紫菀臣味苦辛氣溫無毒凡用蜜水浸一宿去蘆主咳逆上氣益肺療肺痿咳唾膿血消痰止喘及小兒驚癇百部使味甘苦氣微溫無毒主肺虛咳嗽潤肺治疳咳傳尸骨蒸殺寸白款冬花君味辛甘氣溫無毒主咳逆上氣喘息涕唾寒熱邪氣潤心肺消痰止嗽治喉痹肺痿肺癰吐膿血馬兜鈴味苦寒無毒主肺熱咳嗽氣上逆痰結喘促又薰血痔瘻瘡桔梗臣味辛苦氣微溫有小毒主胸脅痛腹滿腸鳴驚悸鼻塞咽痛利胸膈治肺熱嗽逆消痰療小兒驚癇客忤載諸藥不沉又能升提氣血苧根使味甘氣寒主小兒赤丹癰疽發背療瘡乳房毒箭蛇咬妊娠胎動産前後心煩天行熱病狂渴解金石藥毒蘆根使味甘氣寒主消渴客熱嘔吵止小便治時疾煩悶妊孕心熱胃中煩熱獨活一名羌活君味苦甘氣平微溫羌活主賊風失音不語多癢血癩手足不遂口面剮斜遍身肢節疼痛去風濕得川芎治足太陽少陰頭痛獨活治痛風足少陰伏風兩足寒濕不能動止又主風毒齒痛加細辛治少陰經頭痛升麻味甘苦氣平微寒無毒解百毒疫瘴邪氣盅毒中惡腹痛時氣頭痛風腫肺痿肺癰咳唾膿血瘡家之聖藥及發散本經風邪若元氣不足陽氣下陷用此升提又治小兒風癇時熱痘疹細辛臣味大辛氣溫無毒反藜蘆治少陰頭痛百節拘攣風濕痹痛消死肌溫中下氣開胸中滯除齒痛口臭喉痹齆鼻風眼淚下療血閉下乳結利九竅防風臣味甘辛氣溫無毒主大風頭痛惡風風邪目盲風行周身骨節疼痛四肢攣急瀉肺實散頭目中滯除上焦風邪之仙藥乾薑臣辛氣溫大熱無毒生用味辛散寒邪去風濕痹治肺寒咳嗽炮製溫脾理中治裡寒泄痢霍亂脹滿腹中冷痛中下焦寒濕腎中無陽脈氣欲絶與補陽藥