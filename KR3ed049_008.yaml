痘又自縊死心下溫者刺血滴口中男雌女雄百蟲入耳滴之即出腸主遺溺小使數不禁肫胵裹黃皮微寒主泄痢遺溺除熱止煩並尿血崩中帶下黑雌雞主安胎補虛及産後虛羸治癰疽排膿補新血黃雌雞味甘酸主傷中消渴小便不禁腸澼泄痢續絶傷補精助陽雞子主陰熱火瘡癇痙卵白微寒療目熱赤痛除心下伏熱小兒下泄諸雞肉俱補虛但有風人不宜食又患骨熱者不可食能助濕中之火白鴨補虛除熱和臟腑利水道主病水浮腫雀卵味酸氣溫無毒主男子陽痿不起強之令熱多精有子肉大溫壯陽暖腰膝冬月者良妊娠忌食雄雀糞名曰丁香目熱痛生胬肉赤白膜和頭胎男乳汁點之塗癰癤立潰夜明砂主明目治小兒無辜症微炒末任意拌飯與食藥性蟲魚部石蜜君味甘氣平微溫無毒主心腹邪氣諸驚癇痙解毒和百藥養脾胃止腸澼除口瘡蜜蠟使味甘氣微溫無毒主下痢膿血補中續絶傷金瘡露蜂房味苦鹹氣平無毒主驚癇瘛瘲癲疾蠱毒腸痔乳癰又療蜂毒白蠟冬青樹上細蟲食液而生者生肌止血定痛續筋骨補虛全稟收斂堅凝之氣外科要藥桑螵蛸臣味鹹甘氣平無毒桑上螳螂子也主女子血閉腰痛利小便療男子腎衰陽痿夢遺白濁桑蟲大能發痘隨出隨沒者用之蟬蛻治目昏翳頭風目眩風氣客皮瘙癢不已又療小兒豆疹不快天吊驚癇瘛瘲夜啼心悸木虻味苦氣平微寒有毒去翅足炒用又虻能飛如蜜蜂主逐瘀血血閉破癥瘕痞積斑蝥使味辛氣寒有毒去翼足炒用生則吐瀉人主鬼疰蠱毒鼠瘻疥癬瘰癧惡瘡疽蝕死肌石癃通水道積血傷人肌墮胎蜻蛉氣微寒無毒強陽止精暖水臟用青色大眼者去翅足炒蜣螂使味鹹氣寒有毒去足火炙用主小兒驚癇瘛瘲疳蟲大人癲疾又研細貼疔瘡惡瘡鼠瘻箭鏃入骨微熬巴豆並研塗傷處塵沙入眼取一枚手持其背於眼上影塵沙即出蜘蛛氣微寒有毒取身小尻大深色腹內有蒼黃膿者去頭足研用蛇蜂蜈蚣咬主置痛處令吸之又塗蠍螯取鋼絲纏贅蛔自落發背瘡杵以醋和先挑四畔令血出根露敷之干即易鼠疫腫核病已有瘡口出膿水燒二七枚敷之蝟皮臣味苦甘氣平無毒主五痔陰蝕下血赤白五色血汁不止陰腫痛疝積又開胃氣牡鼠味甘氣微溫無毒搗敷跌折續筋骨油煎令消入蠟敷湯火瘡醫針入折針在肉箭鏃在隱處不出搗肝及腦塗之糞名兩頭尖主小兒癇疾大腹時行勞復五靈脂味甘氣溫無毒療心腹冷氣小兒五疳闢疫治腸風利氣脈通女子血閉産後血痛亦能止血婦人心痛血氣刺痛甚效白殭蠶味鹹辛氣平無毒主小兒驚癇夜啼去三蟲滅黑黯男子陰瘍女子崩中赤白治中風失音去皮膚風動如蟲並一切風疾喉痹散痰結封療腫敷金瘡原蠶蛾味鹹氣溫有小毒主益精強陽交接不倦又止泄精尿血蠶沙氣溫主風痹癮疹癰緩蠶退主血風病吐血鼻洪腸風下血小兒走馬疳蠍味甘辛有毒洗炙用主諸風癮疹中風半身不遂口眼剮斜手足抽掣耳聾小兒驚風蜈蚣味辛氣溫有毒去頭足炙用主鬼疰蠱毒蛇蟲魚毒去三蟲療小腹寒熱積聚墮胎去惡血蛤蚧味鹹氣平有小毒主傳尸殺鬼物邪氣療咳嗽出血下淋瀝通水道蝦蟆臣味辛甘氣寒有毒五月五日取者佳煮食發濕不宜破症堅療癰腫陰瘡治小兒疳氣殺疳蟲鼠瘻惡瘡蟲食下部治狂犬咬狂發欲死蟾酥療癰疽疔腫齒縫血出小兒疳瘦斂風痰治腦疳乳調滴鼻中龜味甘寒無毒治小兒熱瘡補虛損尤宜産婦蝸牛味鹹氣寒無毒主賊風蝸僻軼筋及脫肛驚癇攣縮又敷痔瘡白頸蚯蚓味鹹氣寒有小毒主蛇瘕去三蟲伏尸療傷寒伏熱狂謬大腹黃疸利小便糞封狂犬傷及丹瘤諸熱毒田中螺氣大寒主目熱赤痛止消渴醒酒肉敷熱瘡殼煅治反胃牡蠣君味鹹氣平微寒無毒療瘰癧癰腫喉痹鼠瘻女子帶下赤白心脅氣結痛軟積痞澀大小腸療鬼交泄精止盜汗石決明味鹹氣平寒無毒主目障翳痛青盲瀉肝又除肺經風熱海蛤臣味苦鹹寒平無毒主咳逆定喘除煩治浮腫消水氣去癭瘤蚶殼燒醋淬埋令壞治一切血氣冷氣症癖珍珠君氣寒無毒鎮心去目中膚翳障膜除小兒驚熱綿包塞耳治聾龜甲味鹹干氣平無毒酥或酒炙用主漏下赤白損癥瘕痎瘧五痔陰蝕濕癢癱瘓四肢重弱小兒囟不合頭瘡女子陰瘡腰背痠疼骨中寒熱傷寒勞復去瘀血續筋骨治勞倦補陰血不足鱉甲使味鹹氣平無毒九脅者佳醋浸炙用主心腹症堅寒熱去痞積陰蝕並痔惡肉消瘡腫療溫瘧勞瘦骨熱小兒脅下堅婦人漏下五色羸瘦墮胎肉甘溫主傷中益氣補不足忌與覓同食蟹味鹹氣寒有毒即螃蟹療漆瘡其黃能化漆為水殼中黃腳中髓熬為末納金瘡中能續斷筋爪墮胎破宿血及産後血閉水蛭使味鹹苦氣平微寒有毒即馬蝗凡用去腹中子炒熟主逐惡血瘀血月閉破血瘕利水道墮胎治折傷癰腫取生者置腫處令吸毒血皮皺自瘥蚺蛇膽味甘苦氣寒有小毒主心腹䘌痛下部䘌瘡目腫小兒五疳蛇脫味甘鹹氣平無毒主小兒一百二十種驚癇瘛瘲癲疾寒熱腸痔蠱毒蛇癇辟惡明目去翳膜療諸惡瘡白花蛇味甘鹹氣溫有毒主中風濕痹不仁筋脈拘急口面歪斜半身不遂骨節疼痛大風疥癩暴風瘙癢去頭尾酒炙用烏蛇味甘氣平無毒主風瘙癮疹疥癬皮膚不仁頑痹諸風去頭尾酒炙用鯪鯉甲使氣微寒有毒一名穿山甲治痔漏惡瘡疥癬蟻瘻瘴瘧吹乳魚鯽魚味甘氣溫主胃弱不下食補虛療腸痹及赤白久痢入白礬燒灰治腸風血痢鹽入其腹燒之治齒痛丹溪云諸魚皆屬火惟鯽魚屬土故有調胃實腸之功鯉魚療水腫腳滿又安胎治懷妊身腫天行病後不可食膽主目熱赤痛青盲明目塗小兒熱腫青魚膽主目暗汁滴目中並塗惡瘡石首魚味甘無毒開胃益氣干之名為鯗炙食之消瓜積成水又治腹脹食不消烏賊魚骨使味鹹氣微溫無毒主女子漏下赤白陰蝕腫痛又止瘡多膿汁不燥殺蟲治心痛消目中浮翳丈夫陰頭癰藥性人部亂髮氣微溫胎髮用補陰最佳童子發次之壯健男婦發亦可主咳逆五淋通大小便補陰療小兒驚癇燕口瘡碗豆瘧鼻衄血悶血暈金瘡破傷風血痢並燒灰存性用煎膏長肉消瘀血人乳汁味甘氣寒無毒補五臟令人肥白悅澤點眼療赤痛止淚明目人糞氣寒療時行大熱狂走解諸毒破疔腫開以新者封之一日根爛或燒灰醋和敷又燒存性蜜水調服治痘黑陷糞清臘月截竹筒浸廁中令透取汁治天行熱狂解諸毒並惡瘡毒人溺氣寒童男者尤良療虛勞頭痛熱勞咳嗽肺痿除火最速主卒血攻心撲損瘀血吐血鼻洪難産及胞衣不下産後飲之能下敗血惡物氣血虛寒不可用打撲夾瘡及蛇犬等咬熱淋患處襠之襠陰處割取方圓六七寸許名襠燒存性用治陰陽易此症乃男患時病新瘥婦人與之交則男病陰易女患時病新瘥男子與之交則女病陽易小腹絞痛手足攣頭重目中生花者是男用女女用男月水汁解毒箭入肉中欲死者人中白尿桶中積垢火上燒灰用止吐衄理肺痿治緊唇及勞熱傳尸天靈蓋味成平無毒主傳尸久病虛勞熱蒸在骨又犬咬毒入心啼如犬聲燒灰水服又發危痘人胞一名紫河車頭生男子者佳主血氣羸疲勞損白䵟皮黑腹內諸病漸瘦悴者五味和煮食之人牙痘灰白黑陷者火煅一二釐加麝香服乳癰燒灰酥調敷藥性升降淳沉補瀉法手足三陽表裡引經藥太陽足膀胱手小腸上羌活下黃柏少陰足腎知母手心黃連少陽足膽手三焦上柴胡下青皮厥陰足肝青皮手胞絡柴胡陽明足腎手肺上升麻白芷下石膏太陰足脾白芷手肺桔梗用藥大略頭角痛用川芎血虛亦用頂巔痛用藁本遍身肢節痛用羌活風濕亦用腹中痛用炒芍藥厚朴臍下病茴香玄胡索心下痛用吳茱萸胃脘痛用草豆蔻脅下痛用柴胡青皮日晡潮熱往來用柴胡莖中痛用生甘草梢氣刺痛用枳殼胸中寒痞用去自陳皮腹中窄用蒼朮破血用桃仁活血用當歸補血用川芎調血用丹參補元氣用人參凋諸氣用木香破滯氣用枳殼青皮肌表熱用黃芩去痰熱亦用去痰用半夏去風痰用南星諸虛熱用黃耆盜汗亦用脾胃濕用白朮去痰亦用下焦濕腫用漢防己草龍膽中焦濕熱用黃連下焦濕熱用條芩煩渴用白茯苓葛根嗽用五味子咳有聲無痰用生薑杏仁防風咳有聲有痰用半夏枳殼防風喘用阿膠天門冬麥門冬諸泄瀉用白芍白朮諸水瀉用白朮白茯苓澤瀉諸痢疾用當歸白芍上部見血用防風中部見血用黃連下部見血用地榆眼暴發用當歸黃連防風眼久昏用熟地當歸細辛解利傷風用防風為君白朮甘草為佐解利傷寒用甘草為君防風白朮為佐諸風用防風天麻諸瘡傷用黃柏知母為君連翹黃芩為佐小便不利用黃柏知母為君茯苓澤瀉為佐瘧疾用柴胡為君隨所發時所屬經部分以引經藥導之萬邦孚曰用藥不知性而徒信成方是以病試藥也其不至誤殺人也者幾希故豫於本草中摘其常用藥品備録其溫涼寒熱之性與治症之要附梓千家抄方末俾治病者按藥性以定方而不至泥成方以誤病是亦活人濟世之一道也
