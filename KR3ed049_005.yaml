煨各五錢肉豆蔻七錢山楂肉陳皮厚朴薑汁炒神麯炒益智仁白朮炒各三錢甘草八分為末米糊丸桐子大米湯下小兒癖積膏藥水紅花炒二錢大黃朴硝山梔子子石灰各一錢上用酒酵雞蛋大一塊同藥搗為膏青綿布攤貼再用湯瓶熱熨手帕勒之三日後揭起肉黑如墨是其驗也治小兒吐蛔蟲以苦楝根為君佐以二陳湯煎服冬月吐蛔蟲多是胃寒胃虛錢氏白朮散加丁香二粒服之一方小兒吐蛔及糞內有蛔以使君子肉炒與食之每用二三枚不可多腫脹歌曰小兒腫脹脾家濕臟腑氣虛即成疾或因停積於胃中或因瘧疾虛而得肝虛痞塊成血虛飲食飢飽皆為積醫人審察盛與衰分氣補脾不可失有積當與漸省之固本正標方是的陰囊無縫掌無紋臍突如李面如墨唇焦口燥脈不來有藥莫救徒用力分氣飲治四肢浮腫氣喘短急桔梗茯苓陳皮桑皮大腹皮枳殼草果半夏蘇子木瓜木通木香薑棗燈心水煎服小便不利加豬苓澤瀉瀉加肉果腹痛加肉桂胸隔不寬加砂仁厚朴補脾飲治脾虛受濕浮腫白朮炒茯苓人參厚朴薑汁炒陳皮木通木瓜青皮木香乾薑大腹皮砂仁薑棗燈心水煎服治小兒腹脹蘿蔔子炒紫蘇梗乾葛陳皮各等分入甘草少許煎服食少加白朮蘇合香丸治小兒辛中惡毒心腹脹滿刺痛方見諸氣門痢疾冷白熱赤冷熱不調積下赤白疳黃白下無度驚青休息痢黑著魚腸愈而復作瀼痢停積而又下臟大肌瘦大便筆瀝疼痛蠱毒痢下紫血歌曰病因積久多成痢濕熱肥甘滯所為或赤或黃或純白要分氣血屬何之從前導氣湯先用次第香連養臟施禁口刮腸當介處平調臟腑治須知導氣湯初痢用此推去宿滯後服調理臟腑之劑枳殼炒黃連炒檳榔甘草白芍炒當歸厚朴薑汁炒木香山楂木通神麯炒體厚者加大黃芒硝水煎服久痢去檳榔加升麻白朮香橘餅治小兒久瀉痢致脾虛脫肛不收冷熱不調赤白膿血痢疾小腹疼痛或禁口不食日夜無度裡急後重經久不瘥及疳積下痢泄瀉不止大人亦治橘紅青皮厚朴薑汁炒青木香山楂肉茯神去皮木神麯炒麥芽炒白朮炒各四兩香附炒三稜砂仁炒各二兩蓬朮一兩廣木香五錢甘草二兩炙人參二兩人虛者用為末煉蜜作餅空心米湯下白痢姜飯湯下加味香連丸治大人小兒痢疾黃連二兩一半薑汁炒一半芒硝水炒木香青皮炒大黃酒蒸九次枳殼炒黃芩炒香附炒各一兩白芍二兩酒炒甘草五錢上為末薑汁神麯糊為丸桐子大量兒大小白痢薑湯赤痢苦茶服麟丸治大人小兒痢疾如神巴豆百粒去油絹袋盛甘草水煮半日江西淡豆豉一合木香一兩共為細末人乳丸桐子大硃砂為衣每服三丸赤痢淡薑湯下自痢砂糖湯下赤白薑糖湯下五色痢肚疼者艾葉湯下養臟湯平調臟腑去積溫中白朮炒厚朴薑汁炒陳皮甘草茯苓升麻枳殼木香黃連茱萸炒白芍炒蓮肉薑棗水煎服純血加黃芩生地當歸地榆紅痢加地榆當歸白痢加乾薑赤白痢加當歸乾薑腹痛加乳香沒藥久痢加粟殼炙禁口加石蓮冬米發熱加柴胡知母乾嘔加藿香渴加五味子麥門冬天花粉裡急後重倍加檳榔枳殼木香胸膈不寬加砂仁元氣下陷加人參柴胡小便不利加滑石豬苓澤瀉痢症不治歌糞門如筒脈洪數發熱不食渴兼作瀉下渾似爛魚腸豆汁屋水相交錯汗出如流啼不休肚腹疼痛陰囊縮或如齆齈雞子臭有藥莫救備棺槨造神麯法白麵十斤蒼耳草自然汁三升野蓼自然汁四升青蒿自然汁三升杏仁四升去皮尖赤小豆三升煮爛連汁研三伏內上寅日將藥汁拌麵如造麴法曬乾收用甲寅戊寅庚寅乃三奇日也此日修合名三奇神麯大有神效瘧歌曰小兒瘧疾多因食邪正交攻寒熱逼截之太早反不良初用青皮飲消息次退截瘧不二湯神功一服如金石青皮飲治小兒瘧疾方見瘧門瘧疾經驗方柴胡有汗一錢無汗二餞白朮二錢無汗一錢茯苓陳皮半夏各七分甘草三分炙腹脹不可用黃芩熱多五分寒多一分寒熱均七分人參五分虛七分虛甚一錢草果五分無食不用生薑寒多五片熱多一片寒熱均三片薄桂二分水二鍾煎八分發前空心服截瘧不二飲發四五次然後可截檳榔草果知母貝母陳度枳殼半夏常山烏梅蒼朮柴胡酒一鍾水一鍾姜三片煎半鍾露一宿五更溫服渣隔宿再煎服之治乳兒瘧疾痞塊川芎二錢生地白芍炒各錢半陳皮半夏黃芩炒各一錢甘草三分鱉甲醋炙為末五分姜三片水煎臨眼入醋炙鱉甲末瘧疾經久不治歌荏苒經旬瘧不除更加瀉痢悶如癡蒸蒸作熱渾身瘦遍體青筋鼻似煤飲食未嘗沾口腹頂門下陷項常垂生痰喘急時加嗽縱有良方不可醫傷寒夾驚夾食歌曰傷寒六脈皆浮緊虎口三關紅紫影發熱惡寒腰脊強頭疼吐逆煩悶盛夾驚睡臥時驚搐夾食餿酸噎氣逆無汗必須用解表太陽過經終不吉十神湯此發散風寒之劑冬月用之春用參蘇飲川芎白芷麻黃陳皮紫蘇香附升麻乾葛芍藥甘草薑棗煎服有汗去麻黃熱甚加黃芩咳嗽加半夏杏仁喉痛加桔梗前胡譫語加柴胡黃芩泄瀉加訶子木香吐逆加薑汁半夏頂巔痛加羌活藁本便血加桃仁便結加枳殼裡熱盛加大黃傷風咳嗽傷風歌曰傷風貪睡面青黃呵欠頻頻熱似湯口吐氣來渾似火鼻流清涕嗽生痰法當解表消痰嗽加減參蘇飲正當更有抱龍丸可用霎時風散日回光咳嗽歌曰咳嗽皆因風入肺重則喘急熱不退肺傷於寒嗽多痰肺傷於熱生壅滯寒則發散熱必消實當瀉腎虛補肺嗽而不已便成癇痰盛不已驚風至眼眶黑紫如損傷嗽而有血難醫治疏風豁痰補瀉明款花膏內生神秘川芎茶治大人小兒感冒風寒頭疼鼻塞遍身拘急惡寒發熱等症鮮川芎梗葉切碎如無用乾者生薑切絲菖蒲切絲陳皮切絲鮮紫蘇梗葉切碎各等分細茶與藥相對五月五日午時