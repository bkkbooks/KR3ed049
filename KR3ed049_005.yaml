靈脂香白芷青鹽各二錢麝香一分上為末以蕎麵麥湯和搓成條留於臍上以前藥實其中用艾灸之但臍內微溫即好不過二三度鹿角膠片精寒陽痿無子者服之鹿角十斤截半寸長浸七日用淫羊藿一斤當歸四兩黃蠟二兩如法熬去渣成膠角焙燥成霜聽用鹿角膠一斤鹿角霜半斤天門冬去心麥門冬去心黃柏鹽酒炒褐色知母酒洗去毛虎脛骨酥炙龜板水浸刮去浮殼酥炙枸杞子山藥肉蓯蓉酒洗去浮甲白膜茯苓去皮山茱萸淨肉破故紙炒生地酒蒸九次當歸酒洗各四兩菟絲子酒煮搗成餅焙乾六兩白芍酒炒牛膝去蘆酒洗杜仲薑汁炒去絲人參去蘆白朮炒各三兩五味子酸棗仁炒遠志甘草湯浸去骨各二兩川椒一兩去目焙去汗共為末煉蜜丸鹿角膠丸洞子大每服百丸空心鹽湯或酒下延生護寶丹補元氣壯筋骨因精健陽老年無子宜服菟絲子酒煮搗焙乾為末一兩蓯蓉酒洗去甲膜二兩再用酒四升浸半時取起焙乾酒聽用韭子四兩用棗二兩煮熟去棗將韭子再用酒浸一宿焙乾用三兩木香半兩蛇床子三兩用棗二兩煮熟去棗用二兩白龍骨一兩用茅香一兩同煮一日去香綿裹酒浸一宿晚蠶蛾全者二兩炙鹿茸一兩酥炙黃桑螵蛸一兩炒蓮實炒干蓮蕊葫蘆巴各一兩乳香另研丁香各半兩麝香一錢另研除乳香麝香菟絲子末外十二味同為末將前菟絲子末用前浸藥酒二升文武火熬至一半入蕎麵兩匙攪勻次下乳香麝香等不住手攪熬如稠糊放冷和藥如硬再入酒少許搗千餘下丸桐子大每服五十丸空心酒下仙茅酒治男子虛損陽痿不舉仙茅四兩米泔浸去赤水曬乾淫羊藿四兩洗淨五加皮四兩用絹袋裝入酒內浸一月取飲又方燒酒十斤入龍眼肉百枚浸一月取飲種子方寧波龍二守傳試驗者魚膠八兩陳年者佳切碎蛤粉炒成珠當歸酒洗一兩沙菀蒺藜一兩微炒上為末煉蜜丸桐子大每服七八十丸空心鹽湯下男服此藥女服制附丸各養百日後交會即有子種子之法必先寡欲靜養使精氣充實然後擇壯盛女子俟其行經後第一日第三日與之交媾必生男第二日第四日則生女至五六日無用矣此已試之成驗也萬邦孚曰醫家往往誇談種子成方若持符券而不知夫人所以難嗣之故蓋非一端有因自幼斷喪耗其精氣者有因精寒不能成胎者有精滑易淺不足媾女子之陰者有過服熱藥胎毒盛而子難育者是在因病而藥非可執方而論也如雲種之而已一味助長是自喪其真所稱非惟無益而反害之者非耶若夫至本至要則又在方寸心術之間倘一念善天必予以賢嗣一念惡即有子不肖與無子同可不甚斂此又出於方之外者難於嗣者其察之小兒諸病肝與脾病多肝只有余腎只不足病因有二曰飽曰暖藥品與大人同只劑料小耳小兒諸症總訣察小兒之諸症緣病在於胎中乃保育之失調致百病於孩童稟氣之清且厚兮則首脈堅而壽長稟氣之濁且薄兮則首體弱而病無窮稟受各異厚薄不同入門觀色青必驚而白必冷啟關察脈赤乃熱而黑乃凶寒必傷於肺腑熱則蘊於心胸寒能作痛熱能生風夜啼不止皆因孕母胎驚哭聲欠高乃是受胎不足胎中受寒生下則面色青白而啼哭不亂胎中受熱生下則鵝口瘡瘍而重舌赤瘤內傷於寒者不吐則瀉外傷於熱者有風必驚驚哭夜啼當以鎮心為要多啼不止還宜暖胃為先面目青紅定是肝心受熱而黃慘淡乃知脾胃生痰吐而不食清胃口而飲食自進糞下黃臭去積食而腸胃自通小兒無脈觀虎口三關可見一為風關寒在肺腑則紋或青或白熱在心胸則紋或赤或黑二為氣關青黃定然傷食傷風紋上赤紅乃是驚風發熱三為命關赤紋在而可醫可救黑色過關難治難攻小兒不語驗五指寒熱可知中指冷積食痘疹中指熱傷風傷寒五指稍冷驚風立見急驚卒然潮熱手足搐制雙目直視痰涎湧塞治當退熱行痰慢驚得於大病之餘吐瀉之後過服寒冷之藥轉致脾胃虛損風邪乘之眼慢騰騰手足瘛瘲面色青白四肢皆冷必先理氣溫補脾元元氣一盛痰氣自下慢脾由慢驚之後吐瀉損脾病傳已極惟脾所受故曰脾風面青額汗眨目咬牙身體逆冷手足搐掣急與暖脾回陽十救一二胗太衝脈灸百會穴不醒神氣已脫決無生意天行客杵之疾皆關於心心為怪物異人所觸以致命赤發熱驚搐不止欲治此疾必求諸心丁奚脯露之症皆屬於脾外為風寒暑濕所傷內為飲食不節所損以致肚腹高膨手足細小寒熱相兼喘急不止頭骨開解翻胃退食治以調胃為先病有兒未能行母腹懷孕兒飲此乳而作疾下利寒熱毛髮不潤醫者善調脾胃其疾可療口流清水唇紅面白蟲痛也當安其蟲而順其氣其痛自止面黃身冷日夜啼號腹痛也宜調其脾暖其胃其疾自除盜汗煩渴不止者心脾受熱也宜止汗散涼心安神而汗止渴消暑瀉引飲不止者膀胱受熱也宜用五苓散利水道而陰陽自分變蒸之候變者上氣蒸者體熱其狀似驚上唇有白泡如珠以惺惺散主之五臟所因心屬火夏旺節氣合小腸為腑其色赤性主苦熱則驚搐冷則氣痛治心者先息火而症可安肝腑屬木春旺節氣合膽為腑其色青性主辛酸心與肝連心火熱則生風二臟相搏風火相爭故發搐掣治肝者先瀉心火則肝自退脾屬土旺於四季辰戍丑未月各十八日合胃為腑其色黃性好甘美不受苦澀飽則傷脾飢則傷胃霍亂吐瀉生瘧生痰五疸五疳腹痛疳積飲食不節調和失期皆傷於脾先培其土則諸疾可治肺臟屬金秋旺節氣合大腸為腑其色白性好清淨肺主氣懸於上為五臟之華蓋諸家之疾皆出於肺寒則生痰作嗽熱則作喘作急先散其氣則諸疾可醫腎臟屬水冬旺節氣合膀胱為腑其色黑性喜咸腎本虛疳氣竄於上焦生牙疳蟲瘡害人最速諸家之病皆出於腎水生火降百病不生火上水下真元易竭痘疹五臟各有一症要識生死須明順逆肝臟水泡肺臟膿泡心臟發斑赤色而小脾經發疹色黃微赤歸腎變黑青紫干陷春夏為順秋冬為逆痘始出時先發驚搐而後發瘡者生如瘡已出而後發搐或吐或瀉者死先發熱乳食大便如常其瘡紅活雖不服藥自然無害瘡已發而後泄不止者死瘡瘥而急瀉膿血痂皮者順腹中有瘡也瀉血而水穀不消者逆脾胃虛也或瀉血而瘡壞無膿者亦不可救胃爛也秋冬寒腎水得時其瘡黑色此腎症難治春膿泡金剋木夏黑陷水剋火秋髮斑火剋金冬發疹上剋水俱逆症又斑疹療後發驚搐者死鼻有黑氣風攻頤頷唇項腫硬咳嗽氣喘耵耳心痛四肢虛浮肚高而突以上狀症皆不可治小兒之疳皆起於脾失調理病傳各臟症類不同其名有五心之疳驚疳也面赤唇紅看上生瘡小便赤澀煩熱盜汗是也當清熱鎮驚利水為先肝之疳風疳也搖頭側目白膜遮晴頭焦發豎痢青多淚面青是也當驅風散邪消熱養血為主脾之疳食疳也面黃肚大水穀不消減食吃泥瀉下酸臭是也當行滯消積調理脾胃為安肺之疳氣疳也咳嗽喘急毛焦皮燥壯熱惡寒鼻流清涕面白是也當清金補脾利水次之腎之疳急疳也腦熱肌削齒爛泄瀉足冷身多瘡疥面黑是也當補養脾上後治其疳吐瀉所因寒吐寒瀉暖胃為先熱吐熱瀉清胃理氣積吐積瀉宜用化食風痰驚瀉當先治痰濕吐濕瀉專用醒脾藥有三不可忽一熱不可下小兒氣弱下則脾胃易虛反生他症當先化食清熱溫平之藥則熱可消二痢不可止初作即止留毒在內反為所害必用化滯通利之劑則痢自上三瘧不可截截之太早反為不美當快脾化痰其瘧自退傷寒三因一因夾食胃中宿食不化外感風寒面青潮熱口吐酸氣嗞煎不乳夾食傷寒也先宜化食而後退熱消食則吐止身涼二因夾驚關紋紫赤面紅發熱或時驚跳頭痛煩悶啼哭不乳夾驚傷寒也當解散之則驚自定三因兩感傷寒胸滿氣促咳嗽生痰憎寒壯熱嘔吐煩渴頭疼昏悶惡風自汗驚哭不乳兩感傷寒也宜用和解其疾可除病有四不治眼上赤脈囟腫反陷魚口氣粗齧齒咬人冷汗如雨痰熱不退臍風撮口鎖肚吊腸皆不治之症也嗟夫治幼之術不患病之難治惟患識之不真苟識病以施治何藥餌之勿靈延生第一方小兒初生臍帶落後取置新瓦上燒煙將盡放地上以盞覆之存性研末若臍帶有五分重配水飛過辰砂細末二分五釐生地黃當歸身煎濃計調抹兒上齶及母乳上使藥下盡次日大便遺下胎毒穢物可無瘡疹諸疾生一子得一子十分妙法也又初生臍帶下即以枯礬一撮摻之可無臍風之患天一丸治小兒百病燈心十斤以米粉漿洗曬乾研末入水澄之浮者為燈心取出入藥二兩半茯苓去皮茯神去皮木各二兩半滑石水飛五兩豬苓去皮五兩澤瀉去須三兩人參一斤去蘆煎膏一方人參六兩白朮六兩甘草四兩同熬膏上為細末以人參膏和丸如龍眼大硃砂為衣外貼金箔任病換引服大段小兒生理本天一生水之妙凡治病以水道通利為捷徑也驚風急驚慢驚胎驚慢脾天瘹急驚歌曰熱極生風作急驚卒然日霎有疾鳴面青臉赤頻牽引實熱涼驚與利驚金箔鎮心羌活散稀涎更下滾痰輕搐而不已頻多汗生死還須自曉明慢驚慢脾歌曰過服寒涼大病餘或因吐瀉久成之脾虛胃弱虛邪入眼慢騰騰搐四肢面色白青身厥冷痰涎額汗露晴微或兼下痢終難治並用溫脾與醒脾胎驚歌曰壯熱腮紅心不寧四肢抽掣有痰生時時嘔吐身強直半歲中由胎受驚又有項間生大塊此名驚氣積而成消痰清熱先須理定魄安神要鎮驚天瘹歌曰天瘹原由積熱生涎朝心絡又多驚雙眸翻上唇多燥項強痰鳴手爪青治驚風大凡先要行痰一見牙關鎖禁先以稀涎散一二匙用白湯調灌入喉中如口禁不下即從鼻中灌入牙關少舒即以鵝翎蘸薑汁頻探喉中令吐風痰進滾痰丸先使其下降然後用四磨湯以行其氣氣行則痰行稍得甦醒以金箔鎮心丸抱龍丸次第與服如痰盛不得吐用薑汁竹瀝三四匙灌之又以吹鼻散捻紙蘸藥取嚏依法而行不得嚏或啼聲不出口禁不醒額汗如珠遺尿噴藥者決不可治矣丹溪謂驚風有二慢驚屬脾虛當溫補脾胃次以鎮驚用硃砂安神丸參朮湯下急驚屬痰熱宜清涼之劑安神退熱降火下痰丸主之世人以一藥通治之甚妄也上竄搖頭咬牙額紅是心熱黃連甘草目連開閉是肝風柴胡防風甘草左腮紅是肝熱瀉青散右腮紅是肺熱瀉白散鼻上紅是脾熱瀉黃散顴上紅是腎熱知母黃柏炙甘草無故驚跳忽然大叫必死是火大發氣虛甚也稀涎散治痰壅喉閉牙關緊急豬牙皂角明礬各等分為末每服二匙白湯調下要吐加瓜蒂搐鼻散半夏細辛荊芥各一錢牙皂五分麝香少許上為末用紙捻蘸藥入鼻中取嚏四磨湯治氣壅痰滯腹脹行氣之藥氣行則痰行檳榔木香枳殼烏藥薑湯磨服治小兒牙關不開用南星末一錢腦子少許研勻以紙捻薑汁染藥於左右大牙根上擦之立開人參羌活散截風定搐豁痰安神柴胡天麻前胡人參枳殼茯神羌活桔梗陳皮防風殭蠶甘草水煎入薑汁竹瀝服痰盛加南星瀉加澤瀉訶子大便結加皂角昏迷加黃連壯熱加黃芩嗽加杏仁天瘹加鉤藤心跳加當歸胸悶加枳殼目連眶動及肝風加青皮黃連醒脾飲治慢驚慢脾風人參白朮橘紅白附子甘草炙茯苓石菖蒲藿香天麻木香乾薑炒蓮肉陳米百粒薑棗水煎服瀉加訶子不出聲倍加石菖蒲搐加全蠍蟬退渾身厥冷加製附子錢氏保和錠子治小兒急慢驚風辰砂水飛人參白朮茯苓去皮茯神去皮木山藥赤石脂煅七次醋淬七次乳香各二錢半礞石硝煅金色一錢牛黃殭蠶五靈脂麝香各五分上為末糯米糊杵千下成錠量兒大小薄荷湯磨下抱龍丸治風