body:
  text: 卷五婦人經病超前為熱退後為虛血滯宜破血枯宜補常時與經前作痛為血積經後為血虛常時發熱為血虛有積經行發熱為血虛有熱加減四物湯治衝任虛損月水不調臍腹㽲痛當歸川芎芍藥熟地各等分上水煎服經候微少漸漸不通手足痠疼肌瘦潮熱脈微數去地黃川芎加澤蘭葉三倍甘草半分經水過期者血少也加陳皮白朮人參升麻未及期先來者血熱也加黃芩香附黃連肥人亦兼痰治經色紫黑兼有塊者血虛有熱也或作痛加童便制香附芩連或加柴胡有氣血俱熱者宜涼氣血加柴胡黃芩生地香附經行身熱脈數頭昏加柴胡黃芩經水臨行小腹連腰作痛者乃鬱滯有瘀血加香附莪朮玄胡索桃仁紅花木香發熱加黃芩柴胡陰虛血少經水不通小便澀而身體痛加白朮牛膝牡丹皮香附陳皮桃仁經水行後作疼者氣血虛也加四君子湯血枯經閉加桃仁紅花經水適來適斷或有往來寒熱先宜服小柴胡湯後以此湯和之肥白入經水過期者是痰多用二陳湯加南星蒼朮滑石及川芎當歸香附肥人痰多佔住血海地位因而下多者日必漸昏用南星蒼朮川芎香附作丸服肥人不及日數而多者痰多血虛有熱亦用前丸藥中更加黃連白朮經水不通用馬鞭草取汁熬膏為丸或燒灰存性為丸紅花當歸煎湯下肥軀脂滿經閉不行者導痰湯加黃連川芎經水去多不住者以三補丸加香附龜板金毛狗脊逍遙散治血虛煩熱月水不調臍腹脹痛痰嗽潮熱甘草炙五錢當歸去蘆炒茯苓去皮芍藥白朮柴胡去苗各一兩每服五錢水一盞煨姜一塊薄荷少許煎七分溫服一方治經不調而血水淡白宜用參耆歸芎香附白芍腹痛加膠味艾葉玄胡索固經丸治經水過多不止黃芩龜板白芍藥各一兩樗根皮七錢半黃柏三錢炒香附二錢半童便浸一宿為細末酒湖丸服四制香附丸治婦人女子經候不調亦治女人久瀉香附去毛一斤作四分一分酒浸七日一分童便浸七日一分鹽水浸七日一分米醋浸七日各焙乾上為末醋糊丸桐子大每服七十丸空心食前鹽湯下肥人依方服瘦人加澤蘭葉赤茯苓各二兩丹參散治婦人經脈不凋或前或後或多或少產前胎不安產後惡血不下並治之兼治冷熱勞腰脊痛骨節煩疼丹參去蘆不拘多少為末每服二錢酒調下經脈不調食前服冷熱勞服無時導經丸治婦人經水不通臍腹連腰腿疼痛當歸川芎白芍藥甘草炙官桂桃仁一兩炒大黃二兩血竭二錢半紅花少許地膽二十一個去翅足上為末煉蜜丸桐子大每服三十丸空心溫酒下量虛實加減服通經丸治婦人室女經候不通臍腹疼痛或成血瘕川椒炒去汗蓬朮炒當歸去蘆青皮去穰麩炒乾薑炒紅花大黃炒桃仁去皮細研桂心等分乾漆炒去煙為末將一半用米醋熬成膏和余藥一半成劑臼中杵丸桐子大每服五十丸醋湯溫酒空心下紫金活命丹治婦人經脈不通而作痛血瘕等疾錦紋大黃一兩苦葶藶五錢淨巴豆去殼七十粒紅娘子六十個全木香一錢上為末紅棗煮爛去皮核和藥丸彈子大重二錢五分用絲綿如法裹包入陰戶深處當見頭疼暈悶作渴渾身困倦可食白滾粥飯待下有黃水或血水流滴三日其藥自然脫下肚腹作疼三個時辰惡物才下有形可驗補藥方胡椒五錢木香一錢潮腦一錢砂仁五分為細末稀糊丸綠豆大硃砂為衣每服十五丸空心白湯下一鍾茶時食白雞卵三個好酒一二鍾如此三服後服加減四物湯數服此方神妙血竭膏治乾血氣用錦紋大黃酒浸曬乾四兩為末以好醋一升熬成膏丸如雞頭大臨臥服一丸熱酒化開待溫服大便利一二次紅脈自下此調經之仙藥也又方加香附若經血逆行或血暈或吐血或咳血用韭汁服失笑散治婦人血氣痛欲死者方見心痛門紫金錠治婦人腹內結塊久而不消並月經過期不至腹內作痛或為邪所交腹中作痞熱酒磨服並愈孕婦不可服方見痰門一方治室女月經不通紫崴一兩乾漆二錢半芍藥蓬莪朮當歸梢各一兩半為末每服二錢空心酒調下又方雄豬屎一兩燒灰存性為末空心溫酒調下一錢一方治室女經閉不行用錦紋大黃一兩切片好酒浸一日一夜取出曬乾蒸熟再入酒浸再曬乾仍前蒸熟丸桐子大每眼三十丸空心酒下又方蘇木四錢黑豆一升好酒一升半入鍋煮至一甌加童便一甌攪勻服出汗效崩漏皆由傷損衝任二脈血氣俱虛不能約制經血故忽然暴下奇效四物湯治血崩當歸川芎芍藥生地黃阿膠炒艾葉黃芩各等分水二鍾姜三片煎一鍾空心服因勞氣弱者加人參黃耆升麻因熱者倍黃芩因寒者加炒黑乾薑紫色成塊者血熱之甚加黃連崩過多者先用五靈脂半生半炒為末一服後分寒熱用藥一方用白芷煎湯調百草霜服甚者加棕櫚灰稍止即以四物湯加乾薑凋之此急則治其標也四物湯加黃芩黃連人參參黃耆香附乾薑此緩則治其本也又方四物湯加荊芥穗止血甚效治血崩血淋及產後去宿生新取黃黑牛胎一個腹中者去身只留四足酒洗淨蹄殼尤要緊新瓦上炭火煅存性不可煅過研末無灰酒送下每服重者七八錢輕者三五錢治崩漏多因氣所使而下香附末炒黑歸身白芍藥地榆熟地黃各一錢川芎黃耆蒲黃人參各五分白朮一錢升麻三分水煎服甚者加棕毛灰酒調服一方香附炒黑為末每服三錢飲湯調服治婦人血崩不止槐花一兩棕毛灰五錢水二鍾鹽少許煎七分溫服一方治漏下乃熱而虛宜四物湯加黃連一方蠶砂為末每服三五錢熱酒調下如神散治婦人血崩不止赤白帶下香附子赤芍藥等分為末鹽一撮水二鍾煎一鍾去渣食前溫服治血山崩蟹殼舊紅褐子陳棕蓮房各饒灰存性上等分共為末每服三錢用酸漿草汁一鍾衝下熱黃酒一鍾熱服帶下赤屬血白屬氣濕熱為病主燥濕為先漏與帶俱是胃中痰積流下滲入膀胱法當升之甚者用吐以提其氣須斷厚味加味二陳湯治帶下陳皮半夏茯苓付草蒼朮白朮升麻柴胡各等分姜三片水煎服治肥人白帶是濕痰海石半夏薑製南星薑製黃柏炒蒼朮泔浸炒香附川芎酒洗樗皮乾薑各等分上為末醋糊丸桐子大每服五六十丸空心白湯下暑月去乾薑治瘦人帶下多熱黃柏炒黃芩滑石樗皮川芎酒洗海石青黛當歸酒洗芍藥各等分醋糊丸服固真湯治白帶臨行時臍下痛甚人參五分黃柏炒黃芩炒白葵花各一錢乾薑甘草炙各三分郁李仁八分柴胡七分陳皮五分水一鍾半煎七分空心服葵花白者治白帶紅者治赤帶此治氣滯白帶者固腸丸治濕勝者用此以燥其濕亦不可單用須看病作湯使椿根白皮性涼而燥須炒用為末酒糊丸服血虛者加減四物湯氣虛者參朮陳皮間與之樗白皮丸治白帶樗白皮山茉萸苦參香附各五錢龜板二兩梔子二兩黃柏一兩乾薑貝母各二錢白芍藥七錢半白朮為末酒糊丸服一方治赤白帶下用黃荊子炒為末酒調下二錢一方治崩中白帶白芷六兩花椒目四兩以白芷四兩用石灰半斤淹三宿漉去灰將白芷炒焦同椒目為末或加茜草少許粥丸服治婦人上有頭風鼻涕下有白帶南星蒼朮柏皮炒滑石半夏川芎辛夷酒芩牡蠣粉炒各等分水煎食前服治赤白帶下用旱蓮草不拘多少陰乾為細末每用一匙入雞子清內攪勻蒸熟食之後食棗一枚去腥氣胎前當清熱養血安胎飲治孕成之後見胎氣不安或腹微痛或腰間作疼或飲食不美者服之或至五六個月常服數帖白朮當歸芍藥熟地各一錢人參川藥黃芩須沉水者佳陳皮各五分甘草砂仁紫蘇各三分姜一片水煎服又方安胎白朮黃芩炒麴為末粥丸服治妊娠半產或三月墮者於兩月前以杜仲八兩糯米煎湯浸透炒去絲續斷二兩酒浸焙乾為末以山藥五六兩打糊丸桐子大每服六十丸空心米飲下固胎飲當歸身熟地人參白芍藥白朮川芎陳皮甘草薛荔即桑上羊兒藤黃連少加黃柏少加水二鍾糯米一撮煎八分服血虛不安加阿膠痛加宿砂芩術散黃芩條實者酒浸炒一兩白朮壁土炒去上一兩砂仁炒三錢為末米湯調下二三匙芎歸補中湯治婦人性急常慣小產當歸川芎各一錢半茯苓八分黃耆炙一錢黃芩酒炒二錢甘草陳皮阿膠蛤粉炒各五分白朮土炒錢半續斷酒洗二錢桑寄生七分香附炒一錢砂仁三分按月加至一錢水二鍾姜三片煎八分空心服如未孕每服十五帖如前次三月內小產下次亦如期而來必先於兩月半內每日服一帖保過三月半後方穩束胎丸懷妊七八個月服之黃芩炒夏一兩春秋七錢半冬五錢白朮二兩陳皮三兩忌火白茯苓七錢為末粥丸桐子大每服三四十丸白湯下達生散八九個月服大腹皮二錢人參陳皮紫蘇莖葉各五分白芍藥白朮當歸各一錢甘草二錢炙上作一帖人黃楊頭一個蔥五葉煎服夏加黃芩春加川芎冬加砂仁氣虛加參術氣實倍香附陳皮血虛倍當歸加地黃性急多怒人加柴胡有熱加黃芩食少加宿砂神麯渴加麥門冬食易飢多加黃楊腦濕痰加黃芩半夏腹痛加木香胎動加苧根金匱當歸散娠宜常服之當歸川芎白芍藥黃芩各一兩白朮半兩上為末酒飲調服方寸匕日二次或酒糊丸桐子大每服五十九茶湯任下空心食前服日三次此養血清熱之劑瘦人血少有熱胎動不安素曾半產者皆宜服之治婦人胎動不安及下血艾葉阿膠川芎當歸各三錢甘草一錢水四鍾煎二鍾去渣納膠令化分二服一日用八九個月者少加縮仁治產前因火動胎逆上作喘急者用條芩香附為末調服一方治產動出血產門痛用黃連為末酒調一錢日三服佛手散治妊娠胎動不安血氣衝心欲絕者又臨產服之生速產後服之去惡血最效當歸去蘆芎藭各一兩每服四錢酒一鍾煎乾再入水一鍾煎二三沸溫服益母丸益母草四兩酒洗蒸白芍藥一兩酒炒川芎一兩五錢當歸酒洗三兩香附半兩酒炒砂仁一兩熟地兩半酒洗曬乾摘斷薑汁拌摻條芩八錢酒洗炒白朮一兩土炒上為末煉蜜丸桐子大每服七八十九白湯下此藥服之能令小兒無熱毒奶牙之患治胎痛乃血少四物湯加香附為末紫蘇湯下當歸散療妊娠被驚惱胎向下不安小腹連腰痛下血當歸川芎各八分阿膠炒人參各六分艾葉四分大棗二枚茯苓一錢姜三片水鍾半煎八分食前溫服當歸寄生湯治妊娠胎漏非時下血氣虛血虛有熱當歸川芎艾葉白朮各一錢人參續斷桑寄生熟地黃各二錢水二鍾煎一鍾空心服人參橘皮湯治始妊娠噁心阻食白朮麥門冬去心橘紅白茯苓各二錢厚朴薑製二錢人參去蘆一錢甘草三錢每服四錢水盞半淡竹茹彈子大一枚姜三片煎七分去渣澄清空心食前溫服又方白朮為未水丸隨所好或湯或水下經驗青竹藥湯治婦人惡阻多從痰治竹茹彈子大一枝橘皮一錢半生薑二錢白茯苓一錢半半夏二錢湯泡七次水二鍾煎七分溫服忌食羊肉餳炸等物八味丸治轉胞妊娠小便不通者是也方見虛損門又方四物湯加人參白朮製半夏陳皮甘草生薑水煎服全生茯苓散治妊娠小便不通赤茯苓葵子各等分水煎加發灰少許空心服竹葉湯治妊娠心驚膽怯終日煩悶名曰子煩白茯苓四兩防風去蘆麥門冬去心黃芩各三兩每服四錢水一鍾竹葉五片煎服羚羊角散治妊娠中風頭項強直筋脈攣急語言賽澀痰涎不利或時發抽搐不省人事名曰子癇羚羊角川獨活酸棗仁炒五加皮各五分薏苡仁防風當歸川芎茯神杏仁各四分木香甘草各二分半水一鍾姜五片煎七分不拘時服治妊娠無故尿血龍骨一兩蒲黃五錢為末每服二錢酒調服日三次全生白朮散治妊娠面目虛浮肢體腫如水氣名曰子腫白朮一兩生薑皮大腹皮陳皮白茯苓皮各五錢為末每服二錢米飲調下又方山梔子炒一合為細末米飲調下或九服亦可紫蘇飲治子懸股氣不和湊上心腹脹滿疼痛者是也大腹皮川芎白芍藥陳皮紫蘇葉當歸去蘆酒浸各一兩人參甘草各五錢每服四錢水一鍾姜五片蔥白七寸煎七分空心溫服斬鬼丹治鬼胎如抱一甕吳茱萸川烏秦艽柴胡白殭蠶為末煉蜜丸桐子大每服七丸酒下取去惡物即愈治兒在腹中哭用多年空房下鼠穴中土一塊令孕婦噙之即止傷寒熱病護胎法以灶心土水調塗臍下干又塗之就服一錢難產細研一錢酒調服一方在臨月時用當歸川芎黃芩陳皮白朮香附各一錢白芷五分甘草三分虛加人參水煎調益元散一錢服三合濟生湯以枳殼芎歸達生三方抽其精粹而合成此湯治臨產艱難雖一二日不下者服此自然轉動下生枳殼麩炒川芎各二錢香附一錢半炒粉草七分當歸三錢蘇葉八分大腹皮薑汁洗一錢五分水二鍾煎一鍾待腰腹痛甚服之即產如神丹治難產巴豆三粒去殼萆麻子七粒去殼麝香少許研成一餅貼臍上即產產下即去之治難產用紅莧菜與馬齒莧同煮熟臨產食之胎即下如聖膏治難產兼治胞衣不下及死胎用萆麻子七粒去殼細研成膏塗腳心胞衣即下速洗去之不即去腸出不收卻用此膏塗頂上腸即縮入如聖之妙一方用四十九粒治橫逆生或手足先出者菟絲子車前子等分為末每服二錢酒下開骨丹治產五七日不下及矮少女子交骨不開死在旦夕龜殼自死者佳占卜者次之煮熟者不用女人發一握生男女者佳煅存性當歸酒洗川芎各一兩上為末每服三錢水一盞半煎服約人行五里時胎即下豬肝蜜酒法治婦人胞水早行胎澀不下豬肝白蜜醇酒各一升共煎至二升分作二三服不能服者隨其多少緩緩服之催生散白芷炒百草霜滑石為末芎歸煎湯調下濟陰返魂丹治難產逆產俱效方見後張子和曰大凡婦人難產者皆因燥澀緊斂故產戶不得開通宜先於降誕之月自月之日用長流水調益元散日三服產必易產後亦無一切虛熱氣血不和之疾如未入月則不宜服以滑石滑胎故也將產時以鳥不宿莖葉銼碎一大把加甘草一錢酒水各半煎一鍾服之易產且產後無病其葉如杏葉而枝梗有刺鳥不可宿故名又名石米刺產後產後當大補氣血為先雖有他症以未治之不可用芍藥主方白朮歸身尾陳皮川芎甘草炙黃耆人參各等分水煎服大熱加炒黑乾薑熱輕則加茯苓治產後氣血虛甚發熱惡寒切不可發表川芎當歸熟地白朮茯苓人參甘草陳皮或加黃耆水煎服如左脈不足補血藥多於補氣右脈不足補氣藥多於補血一產下即以佛手散用童便一鍾酒一鍾前七分服此藥大能去宿生新無腹痛血暈之患治產後血往上衝昏暈欲絕者以紅花一大撮好酒半碗煎數沸人童便二盞乘熱灌下立醒治產後惡露不盡腹中刺痛當歸川芎熟地桃仁紅花陳皮甘草香附童便浸炒水煎服又方搗生薑真汁熱酒調服又方用五靈脂香附為末醋丸服甚者加留尖桃仁獨行丸治婦人產後血衝心動及治男子血氣心腹痛五靈脂去土半生半炒為末水丸彈子大每服一丸酒或薑湯下加減芎歸湯治產後去血過多暈煩不省一切去血並治芎藭當歸去蘆酒洗焙各等分每服四錢水一鍾煎七分熱服腹中刺痛加白芍口乾煩渴加烏梅麥門冬發寒熱加乾薑白芍水停心下微嘔加茯苓生薑虛煩不得眠加人參竹葉大便秘澀加生地橘紅杏仁小便不利加車前子腹脅臌脹加厚朴血崩不止加香附咳嗽痰多加紫苑半夏生薑腰痛膝痛加牛膝心下疼加玄胡索惡血不下腰腹重痛加丹皮當歸羊肉湯治產後發熱自汗肢體疼痛名曰蓐勞當歸去蘆酒浸人參各七錢黃耆去蘆一兩生薑半兩上用羊肉一斤煮清汁五大盞去肉人前藥煎四盞去渣作六服早晚頻進豬腰子粥治產後蓐勞發熱豬腰子一個去白膜切作柳葉片用鹽酒拌先用糯米一合入蔥椒煮粥鹽醋調和將腰子鋪盆底用熱粥蓋之如作盒生粥狀空心服之一方鹿陰莖焙乾產後虛勞者飯上蒸熟切片酒下極補最效人參湯治產後諸虛不足發熱盜汗歸身人參去蘆等分為末豬腰子一個去膜切片以米三升糯米半合蔥白二莖煮米熟清汁一盞入藥二錢煎八分不拘時服人參當歸散治產後去血過多血虛則陰虛陰虛生內熱其證心胸煩滿吸吸短氣頭痛悶亂晡時轉甚與大病後虛煩相類急宜服之熟地人參去蘆當歸去蘆肉桂去皮各一兩白芍二兩麥門冬去心一兩每服四錢水二盞先以糯米一合淡竹葉十片煎至一盞去米葉入藥並棗三枚煎溫服血甚熱者加生地黃治產後血暈用韭菜細切盛有嘴瓶中以熱醋沃之急封瓶口以瓶嘴納產婦鼻孔中搐之即蘇又法以舊漆器燒煙燻之又方用鹿角燒灰出火毒為末酒調灌下即醒兼治血崩又方荊芥穗研細末用一分吹鼻中清魂散治血迷血暈人參澤蘭葉甘草各二錢荊芥川芎各五分為末溫酒熱湯各半盞調一錢灌之下咽即開眼治胎衣不下以朴硝用童便調一二盞熱飲立下亦治死胎治產後泄渾黃耆白朮川芎茯苓乾薑滑石陳皮芍藥炒甘草炙水煎服白朮散治產後霍亂吐瀉腹痛煩渴手足逆冷白朮橘皮麥門冬人參乾薑泡各一兩甘草炙半兩每服八錢水鍾半姜五片煎八分服草蔻理中丸產後元氣虛弱臍腹疼痛泄瀉不止又治男子脾胃虛弱久瀉人參一兩白朮一兩煨乾薑甘草各五錢炙肉豆蔻七錢麴裹煨上為末煉蜜丸桐子大每服四五十丸空心米湯下酒煮麵糊丸亦可熟地黃湯治產後虛渴不止少氣腳弱眼眩飲食無味熟地一兩洗淨酒浸蒸焙人參去蘆麥門冬去心各一兩甘草炙半兩栝蔞根四兩水煎服一方用八味地黃丸龍眼湯下參朮膏治產後胞損成淋瀝證人參二錢半白朮二錢桃仁陳皮各一錢黃耆一錢半茯苓一錢甘草炙五分水煎豬羊胞後入藥作一服豬蹄湯治奶婦氣少力衰脈澀不行絕乳汁豬蹄一隻通草五兩將豬蹄洗淨依食法事治次用水一斗同通草浸煮得四五升取汁食之又方用萵苣嫩頭作羹食之血風散治產後諸風攣急或痿弱無力川芎芍藥當歸熟地秦艽羌活防風白芷白朮茯苓上為細末一半煉蜜丸桐子大每服五七十丸一半末俱酒送下產後中風切不可作風治大補氣血為主調導散治婦人產前產後大便不通當歸川芎防風枳殼制各四錢甘草炙二錢每服一兩姜三片棗一枚水二盞煎一盞溫服忌動風物治產後敗血不止生地黃一兩石器內搗末每服二錢食前熱酒服連進三服一方消產後血塊滑石三錢沒藥血竭各二錢為末醋丸服瓦龍子丸亦可洛婦人產後惡物不出上攻心痛赤伏龍肝研細酒調三五錢瀉出惡物立止一方琥珀三錢為末酒調下二紗趁痛散治婦人產後遍身疼痛及身熱頭痛當歸牛膝桂心白朮黃耆獨活生薑各半兩甘草薤白各三錢水煎服治乳汁不通通草七分瞿麥柴胡天花粉桔梗各一錢青皮白芷木通赤芍藥連翹甘草各五分上作一帖水煎食後細飲更摩乳房如無子食乳者要消乳用麥蘖二兩炒為末四物湯調下治產後陰腫痛用桃仁去皮尖細研四五次抹之治產後用力太過門突出四物湯煎熱人龍骨末少許空心連進三服用麻油湯薰洗一方治陰挺先以艾湯洗過次將蛇床子半升炒熱絹包熨之自收入治產後生腸不收用枳殼二兩去穰煎湯溫浸良久即入治婦人子宮不收荊芥穗藿香葉臭椿皮各等分煎湯薰洗華佗危病丸治胎衣惡血湊心其證心頭迷悶胎衣上逆衝心須臾不治乾漆五錢為末大附子一枚泡去皮臍為末用大黃末五錢酒醋熬干即入前二味丸桐子大每服三十丸淡醋湯下須臾又進二服胎衣立下如無菌藥以赤小豆一升炒過用水三升煮二升去豆取汁溫服立下又無豆用婦人自己手足指甲燒灰酒調服須臾又進一服更令有力婦人抱起將竹筒於心上趕下烏金散治產後一十八證烏金子即大烏豆肉桂去粗皮當歸去蘆洗真蒲黃皂莢不蛀者煅存性青皮去白木香血餘洗淨煅赤芍藥紫葳大薊根小薊根蠶退紙煅存性新綿灰亦可棕毛煅存性各半兩紅花一兩川烏一個生用硃砂少許細研血竭少許細研上一十八味除灰藥等別研外併為細末入研藥一處和勻每服一錢薑湯或芍藥或凌霄花煎酒調下甚者日夜三四服忌豬魚羊一切生冷油膩等物第一胎死產不下二產難三胎衣不下四產後眼花五產後口乾心悶六產後寒熱似瘧疾七產後敗血四肢浮腫寒熱不定八產後血邪如鬼神顛狂言語無度九產後失音不語十產後腹痛十一產後百節痠疼十二產後敗血似雞肝十三產後咳嗽熱不定十四產後胸脅氣滿嘔逆十五產後小便澀十六產後舌乾鼻中血出繞頂生斑十七產後腰疼如角弓十八產後喉中如蟬聲以上十八證並治余嘗合此劑所在劑人積有年矣但古方原有虻蟲水蛭鯉魚皮余乎生不忍用肉藥由是以大薊小薊紫葳代之又去芫花巴豆而入蠶退紙血竭別撰醋煮大黃膏臨證加減妙不可言自得之妙未嘗語人今既集方故盡發此秘錦紋川大黃不拘多少米泔浸經宿去粗皮為細末用陳年米醋酌量多少先熬稠黏旋人大黃末不住手攪令極勻以磁器貯之紙封口毋致蒸發臨用量輕重虛實入烏金散內服之人壯病實者半彈子大已下漸少或以膏子圓如小彈子大或如圓子大或如皂子大陰於收之密器內臨用旋看虛實以一圓令患人嚼破以烏金散送之或以熱醋浸化入藥服之如尋常產後內熱惡露作痛俗名兒枕痛及大便不利秘結者並煎四物湯浸化一圓同服如發寒熱如瘧內熱者煎小柴胡湯浸化十丸服之未效者再進並不損人大能活血蕩穢潤燥清神開胃倍食兼治男女老幼血疾除傷寒大病表未解者一切服之如神無極丸治婦人血塊痛極重者錦紋大黃四兩一兩酒煮七次一兩醋煮七次一兩童便煮七次一兩鹽水煮七次上為粗末再蒸七次曬七次然後研極細用當歸熟地各一兩五錢濃煎汁一碗煮米糊為丸桐子大產後血塊痛並婦女經水不通俱用紅花酒下心疼氣痛或腰腹疼用小茴香炒過七分煎湯下三十丸即安每日常服有塊者一月之內下小小血粒自此除根濟陰返魂丹治胎前產後一切病症功效甚大一名益母丸益母草一味此草生二種用紫花者白花者不是於端午小暑或六月六日花正開時連根收採透風處陰乾用時不犯銅鐵器以石臼搗羅為細末煉蜜丸彈子大每服一丸各照後開湯送下若量加木香同當歸赤芍藥尤妙其藥不限丸數以病愈為度日服三五丸如桐子大服五七十丸熬膏尤妙治法於後熬膏法益母草不拘多少連根葉莖洗淨石臼內搗爛以麻布濾取濃汁入砂鍋內文人熬成膏如黑砂糖色為度入磁罐內收貯每服一茶匙胎前臍腹刺痛胎動不安下血不止水煎秦艽米湯或當歸湯亦可胎前產後臍腹作痛作聲或寒熱來往狀如瘧疾者溫米湯下臨產併產後各先用一丸童便酒化下安魂定魄血氣自然調順諸病不生又能破血養脈息調經絡功效不能盡述產後胎衣不下落在胞中及產前一切產難橫生不順死胎經日不下脹滿腹中心悶心痛炒鹽湯下產後中風牙關緊急半身不遂失音不語童便無灰酒各半下產後氣喘咳嗽胸膈不利噁心口吐酸水面目浮腫兩脅疼痛舉動失力溫酒下產後兩太陽痛呵欠心鬆氣短身體羸瘦不思飲食血風身熱手足頑麻百節疼痛溫米湯下產後眼前黑暗血暈血熱口渴煩悶如見鬼神狂言不省人事薄荷自然汁下如無生者濃煎乾薄荷湯下及童便酒各半下產後面垢顏赤五心煩熱或結成血塊