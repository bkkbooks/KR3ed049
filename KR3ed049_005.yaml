日又一次瘡頭破血水出即愈仍貼東華解毒膏如日久藥干將留起灰汁加入治外腎腫大木通甘草黃連炒當歸黃芩水煎服用紫蘇莖葉為末干敷如爛以香油調鵝翎刷又用青荷葉包上治小兒臍中汁出並痛用桔礬或黃柏末敷臍不幹以伏龍肝塗或枯礬龍骨等分敷之痘疹辨痘疹熱頭與肢節疼痛無時者時疫熱也面赤汗出鼻流清涕者傷風熱也午後發熱頭與肚熱右額有紋者傷食熱也乍寒乍熱呵欠煩悶驚悸咳嗽嚏噴兩腮赤紅骫涼耳冷者痘疹熱也渾身壯熱妄言鬼神口鼻衄血驚搐不止幾死而復生痘疹時熱在內也既辨認痘疹之熱與諸熱不同又須審其勢之輕重輕則發散重則疏利首尾俱不可汗下蓋汗下二說古人所深戒也痘疹五臟所屬肝為水泡初見標主淚出其痘細雜而色紅肺為膿泡初見標主涕出其痘平大而色白心為斑出初見標其痘尖細而色赤脾為疹初見標三五成群黃赤與皮色相同腎為例靨其色黑初出之時五臟之症皆見者以熱並動於五臟也及已出乃得歸一臟者以一臟受穢多而毒氣盛也亦有兩症三症同出者所受同而併發也其瘡疹欲發時呵欠煩悶者肝也時發驚搐者心也乍涼乍熱手足冷者脾也兩頰赤而嚏者肺也惟腎無症但骫冷耳冷是也骫耳俱屬腎腎居北方主冷故也腎雖無症而其候惡者瘡變倒靨而黑陷則歸腎也此由不慎風寒及內虛所致瘡黑陷耳骫反熱者逆也辨痘輕亙初見苗時用手揣摩其瘡勢宜堅而尖不宜軟而塌三次出者輕一齊出者重臍突去處不宜有頭面心竅不宜多大小不一尋根窠紅活尖頭光澤者最輕平頭者半輕半重陷頂者極重又有出輕而變重出重而變輕顧調養避忌之何如耳此於氣血上見形勢則輕重可知矣看痘法凡看痘輕重未曾出點之先先看兩目不腫肉不紅無淚清淨其痘出來必輕極忌一塊五六個極忌嘴邊出起乃脾家痘十不救一痘有大小不一等乃氣血之所由分也人多有不知一種小痘以為不起用藥發之誤矣凡痘看頭不看身醫頭不管身只要臉上頭上膿足四肢不必懼至落靨時靨如琥珀厚而紅者再無後患倘落下如紙薄如白豆殼者必有後患或有服寒涼藥過多或飲水過多靨白者尚可治只以脾胃健為上能進飲食痘雖犯症終不死孩子不滿一歲一身一頭無縫者決不必醫用藥之法須先去其雜症如因感冒寒邪起者則散其寒因驚起者則定其驚因傷食者消其食雜症即去然後用補血補氣藥氣血充足自然成膿結癡矣又有痘出稀疏而兒體只是不快者必生內癍當看其指甲有青紫色便是急用化癍湯藥治之輕症不可遽發初出三日以後七日以前如痘色紅潤光澤尖凸者雖不服藥亦愈俗人無知專用前炒火煨毒物及人牙川山甲之類發之禍患無窮矣所當切戒若八九日痘色灰白平塌不起者方可用發藥痘疹日期痘出三日至足心為齊三日長肥滿三日成膿窠三日上蠟色結痂首尾十二日可保平安此其大約設使氣候垂違瘡勢沉重則又難定其期也輕痘歌熱緩神清痘少稀根窠紅活出參差四肢溫暖無寒熱乳食如常渴瀉除太陽面頰俱光澤手足累累圓似珠更兼腰項當心少但宜調護不須醫重痘歌初熱一日即便出稠密鮮紅減飲食泄瀉煩渴頭面多紅斑夾疹二便澀平塌灰白欠光明疔毒膿瘡水流濕若此重症須預防莫得臨時有疏失不治痘熱極腰疼發一出昏睡沉沉不納食一齊湧出如蠶種紅紫藍斑兼陷黑邪視皮浮痘若無頂似塵鋪兼火刺面唇先腫目無神腳冷如水漸過膝無分皮肉一般紅聲啞唇焦言不出水泡癢塌並空瘡牙疳臭爛聞不得寒戰咬牙痘後驚靨若竹衣便膿血此皆死症不須醫總遇神仙難著力避忌正當痘疹之時謹司門戶恐被風寒所襲嚴禁房事恐為穢氣所乘月婦經水疱廚煎煿生畜糞穢及狐臭獨忤一切忌之須常燒芸檀蒼朮小棗之類及掛胡荽浸醋炭以逼其氣至若月經狐臭設在父母幼子時刻不可離將如之何必常加澡浴每易新衣不使氣侵其膚可也如有犯者當服托裡散肉桂隨意加減之瘄疹痘辨小兒壯熱有紅斑如錦紋或如蚊咬者謂之瘄子有小泡如痘而微白色易靨者謂之水痘北人謂之疹子初起細小漸漸紅胖貫膿如豆結痂謂之痘子古人謂之豌豆瘡痘與疹發自胎毒故今聯屬言之日痘疹若癍症則傷寒內傷熱病皆能致此不專繫於胎毒也醫者須分別之痘初出或未出以絲瓜近蒂三寸連皮燒存性為末砂糖調服或入硃砂蜜調服之多者可少少者可無痘疹其方才覺發熱服之不出雖出必輕見苗並收早者亦可服復生散明淨硃砂四兩絹袋盛之當歸川芎升麻甘草各六兩用砂鍋取東流水七大碗人芎歸升麻甘草煎三大碗去渣將硃砂袋以一小竹橫擱鍋上離底一指許傾前藥汁浸袋即止旋添煮之水盡力度焙乾為極細末聽用引經散糯米五合淘洗淨瀝乾鹽泥為餅包米在內入火煅通紅取出冷定揀黃色存性者為極細末聽用小兒一歲用復生散一分引經散一分蜜一匙米湯半盞好酒三匙調服稀痘丹黑豆炒殭蠶直者炒硃砂水飛白豆衣苦絲瓜燒存性木通甘草節翹子百節菖蒲各等分為末砂糖丸龍眼大金箔為衣甘草湯下春分秋分日製春分秋分日服又方臘月八日用活兔一隻酒果祭告藥王神必殺取兔血以蕎麥麵和為紅丸取兔腦以蕎麥麵和為白丸小兒周歲內以乳汁調服紅白各三丸身發紅斑為驗即下出豆縱出亦稀兔血散發熱將出時服之解毒稀痘硃砂雄黃細茶乾葛各五錢臘月兔血與藥相停拌勻為細末每服一分茶送下痘將出時必發熱鼻尖耳尖冷方是便服升麻葛根糖球甘草節鼠黏子之類其出必疏初熱以鼠和子為末蜜調貼臚門上兔患眼但見紅點便忌升麻葛根湯恐發表虛須分氣虛血虛補之氣虛用參耆白朮血虛用四物湯血熱加酒炒芩連丹皮等解毒藥出不快者加味四聖散紫蘇飲子紫草木香湯或快斑散絲瓜湯有氣實痰鬱而發不出者川芎防風升麻乾葛芍藥前胡紅花蟬蛻之類初起自汗不足慮乃濕熱熏蒸而然也出太甚者人參敗毒散紅紫者犀角地黃湯初出如胸前多急須解毒藥加糖球又有食少者加白朮色白屬氣虛補氣為主初出色白者太虛宜大補氣血人參白朮黃耆當歸川芎升麻甘草木香之類一云大便滑泄加訶子肉果色黑屬血熱涼血為主初出色黑者大熱便宜解毒芩連黃柏鼠黏子紫草葛根荊芥防風甘草之類黑為北方之色屬火熱甚而反兼水化制之故色黑經所謂亢則害承乃制也且無熱則色黑人所共曉錢氏論中謂冬月盛寒歸腎變黑其義安在何前人未之及也色黑涼血色白補氣有中黑陷外白起者則相兼而治瘡濕者宜補脾燥濕肌表間熱用風藥白芷防風之類初起渴而飲水至後靨不齊宜益元散之類將成就而色淡者宜助血藥芎歸之類補血為主將成就而色紫者宜涼血解毒芩連丹皮連翹之類解毒用絲瓜升麻酒芍藥甘草山楂黑豆犀角赤小豆吐瀉少食為裡虛不吐瀉能食為裡實裡實而補則結癰毒黑陷倒靨灰白為表虛紅活綻凸為表實表實而用表藥則必致潰爛不結痂黑陷倒靨灰白者用燒人糞蜜水調服被外惡氣所傷而倒靨者人參白朮黃耆梢連翹甘草梢白芷當歸川芎木香虛癢以實表之劑加涼血藥實癢如大便不通者以大黃寒涼之劑少許下其結糞活命紫金丹治發不出隱於皮內遍身紫赤瘢點或血熱煩躁癲狂至死者服之即活瘢即散痘起漿滿永保無虞但十二三日氣敗無漿者不治如痘未發之先服之能使稀朗絕無後患當歸甘草荊芥各二兩荔枝二兩去核用肉用瓦罐四個分作四處每處入藥一味再入辰砂細末五錢加清水八分慢火煮一晝夜徐徐添水勿致枯乾煮畢去藥止用辰砂焙乾勻研極細入煅天靈蓋末三錢飛面二錢兔血丸綠豆大量兒大小十歲已上三十丸七八歲二十丸三四歲十五丸白酒漿調服此藥必臘月辰日製外以黃蠟為衣則不壞小兒痘毒臘月內取人貓豬犬糞乾者入砂罐火煅為雪白粉加麝香少許每服五分蜜水調下小兒痘疹餘毒出膿時用脫下痘靨同舊棉花燒存性敷上最效不用貼膏藥亦不再發別處痘毒入眼谷睛草為末豬肝不時蘸服痘瘡抓破膿水不幹用多年牆頭上爛草為末摻之麻疹辨疑賦麻雖胎毒多帶時行氣候暄熱傳染而成其發也與痘相類其變也比痘匪輕標屬於陽本屬於陰毒盛於脾熱流於心臟腑之傷肺則尤甚始終之變腎則無症初然發熱有類傷寒眼胞困倦而難起鼻流清涕而不幹咳嗽少食煩渴難安邪目視之隱隱皮膚之下以手摸之磊磊肌肉之間其形若疥其色若丹出見三日漸沒為安隨出隨沒喘急須防根窠若腫兮疹而兼癮皮膚如赤兮疹尤夾斑似錦而明兮不藥而愈如煤而黑兮百無一痊瘡疹既出調理甚難坐臥欲暖飲食宜淡咳嗽誕沫不禁酸鹼忽生喘急肺受風寒心脾火灼口舌生瘡肺胃蘊熱津液長干有此變症治法不同微汗解毒熱勢少凶二便清調氣行無壅腠里拂鬱兮即當發散腸胃秘結兮急與疏通鼻衄者不必憂治邪從衄解自汗者不必遽止毒以汗松麻後多痢兮熱毒移於大腸咳嗽喉痛兮痰氣滯於心胸口渴心煩法在生津養血飲食減少治宜調胃和中餘症無常臨期變通此則麻之大旨妙用存乎一心發熱咳嗽之時即明麻疹有出不快者用麻黃湯羌活湯消毒飲發散解毒外以芫荽酒糟蒸熱擦之自頭上至足為齊頭面多者佳凡看麻疹多於耳後項上腰眼先見其頂大而不長其形小而勻淨既出之時如紫紅乾燥暗晦乃火盛毒熾宜用六一散解之四物湯換生地加柴胡見風沒早未清爽者宜消毒飲加發散藥有出三日不沒者乃內有實熱宜四物湯加清利之劑麻後瀉痢者乃積熱移於大腸宜四苓散加木通芩連白芍或豆蔻丸香連丸之類麻後痰嗽不止四物合二陳加瓜蔞桔梗五味渴加麥門冬枳殼喘加蘇子桑皮麻後牙疳紅腫者清胃湯合干桔湯加牛蒡子荊芥玄參胃爛者不治孕婦出麻以四物湯加白朮條芩艾葉砂仁安胎清熱為主麻疹正出之時不迸飲食者但得麻色淡紅潤澤亦無害乃熱毒未解內蘊實熱故不食耳麻退不食者四物湯加神麯砂仁出麻疹時大忌葷腥生冷宜避風寒水濕麻疹輕重不治訣或熱或退五六日而後出者輕淡紅滋潤頭面勻淨而多者輕發透三日漸設者輕頭面不出者重紅紫暗燥者重咽喉腫痛不食者重冒風沒早者重移熱大腸變痢者重黑暗乾枯一出即設者不治鼻扇口張目無神者不治利青糞者不治氣喘心前吸者不治麻後牙疳臭爛者不治萬邦孚曰予苦難於嗣故於小方脈尤留意焉既集痘疹方論及小兒脈訣雜症凡三卷付之梓人矣茲重刻家抄方有小兒一門先大父之所遺不敢廢也乃復以續得方訣分別門類益加詳焉庶幾乎我祖活幼廣嗣之念為不孤耳邦孚又曰今人之難於嗣者得一子父母不勝其喜每於滿月百日周歲即會親友殺生設席慶賀及稍有疾病輒又殺生祈禱敦知爾子之命固命也畜類獨非命乎爾子惟恐其有痛楚也殺畜類以祈神宴會彼獨無痛楚乎天雖不言必不默祐爾於冥冥之中矣茲小兒方中若疳症用蝦蟆糞蛆稀痘用兔血兔腦發痘用雞頭天靈蓋等項及為子設席殺生祈禱之類俱宜戒之急救諸方自縊死自旦至暮但心下微溫雖一日以上可活急抱起死者使繩寬解去繩切不可割斷微微捻正喉嚨放倒臥用被蓋急用竹管吹其兩耳一人急牽其發不放手就用腳踏其兩肩一人摩其胸及屈伸其手足摩捋之少活即以粥飲與之此法救人無不活者人溺水死先以刀斡開口橫放箸一隻令其牙銜之使可出水又急解去死人衣帶艾灸臍中即活冬月墮水凍死四肢冷口不能言只有微氣者不可便以火炙用布袋盛熱灰放心頭冷即換待眼開用溫酒或米飲灌之伏暑死者不可使冷冷即死用溫湯常摩洗其心腹間如路途急切用路上熱土鋪腹臍間令人更尿其臍中即活服鹽滷將死者急燒滾水以燈油腳淬在湯內待通口時灌下滿喉嚨即吐矣吐淨愈卒中風不省人事多因喉壅用白礬二錢生研為末生薑自然汁調斡開口灌下其涎或吐或化下便醒華佗救中忤中惡鬼氣用犀角末五錢麝香辰砂各二錢半每服二錢井水調下如無前藥用雄黃末服一錢煎桃枝葉湯調灌又無雄黃用著身上多時久遭汗衣或久著內襯衣婦用男衣男用婦衣燒存性服二錢百沸湯調下又方卒中惡不省人事用韭菜研汁人鼻中華佗急救鬼魘鬼打凡初到客舍館驛及久無人居冷房睡中覺鬼物魘打但其人吃吃作聲便令人叫喚如不醒此乃鬼魘不救即死牛黃雄黃各一錢辰砂五分上研為末和勻每挑一錢床下燒次挑一錢酒調灌之如無前藥用桃柳枝東邊者各折七寸煎湯灌下又無桃柳枝用灶心土捶碎末服一錢並水調灌更挑半指甲許吹入鼻中更用艾灸人中次並灸兩腳大拇指內離甲一韭葉各灸七壯睡臥中不省用韭菜汁滴人鼻冬月用韭根搗汁灌之華佗治脫陽大吐大瀉之後四肢逆冷元氣不接不省人事或傷寒新瘥誤與婦人交其證小腹緊痛外腎搐縮面黑氣喘冷汗自出亦是脫陽須臾不救先以蔥白數莖炒令熱熨臍下次用後藥附子一枚重一兩銼八片白朮乾薑各半兩木香二錢半上四味各研末水二碗煎八分放冷灌服須臾又進一服合滓並服如無前藥用桂枝二兩好酒二升煎一升分作二分灌之又無桂用蔥白連須三七根沙盆內研細用酒五升煮至二升分作二服灌之陽氣即回先用炒鹽熨臍下氣海勿令氣冷又無蔥白用生薑二七片依前法服紫金錠治自縊落水死鬼迷驚死未經隔宿心頭溫者並宜冷水磨灌下良久即蘇治從高墜下瘀血衝心欲死用豆豉一大盞水二碗煎三沸去滓服著便覺氣絕不能言取藥不及急擘開口以熱小便灌之治針失嚥下肚不得出者將蠶豆煮熟同韭菜吃下針即同菜大便出治攪腸沙發即腹痛難忍者陰沙腹痛手足冷看其身上紅點以燈草蘸油點火燒之陽沙腹痛手暖以針刺其十指背近爪甲處一分半許血出即安優先自兩臂捋下其惡血令聚指頭血即出為好又痛不可忍須臾能令人死古方乾霍亂急用鹽一兩熱湯調灌入口中鹽氣到腹即定又將石沙炒令赤色冷水淬之良久澄清水一二合服凡壓死縊死溺死魘死及產後暈絕用半夏一味為末如豆大吹入鼻中須臾即活治人九竅四肢指歧間皆血濺出此暴驚所致乘患人勿知急以井花水猛噀其面即止此法又治衄血如神解諸毒解砒毒早禾杆燒灰新汲水淋汁絹濾過冷服一碗毒下利即安又方用白扁豆末新汲水調下華佗又用黑鉛四兩磨水一碗灌之中諸毒死只要心間暖不妨乃熱物犯之用防風擂冷水與服解諸毒藥用甘草黑豆淡竹葉等分銼碎水一碗煎服解巴豆毒煮黃連汁飲解附子川烏天雄斑蝥毒煮大小黑豆汁飲解食河豚毒倉卒無藥急以清油多灌之吐出毒物即愈紫金錠治凡中蠱毒狐貍鼠蕎惡菌河豚毒死牛馬牛肉毒諸毒飲食毒草木鳥獸毒一切俱用薄荷湯或涼水磨服治刺毛蟲疼用蚯蚓泥干搽濕者又治胡蜂叮解毒丸解世間不測一切毒山豆根山茨菇綠豆粉各三兩板藍根即大葉靜土馬棕黃藥草續隨子五倍子紫河車草木通盆硝藿香薄荷貫眾石膏殭蠶乾葛雄黃百草煎各二兩茜草根大黃辰砂各一兩麝香五錢甘草上為細末蒸餅為丸彈子大以螺青三兩一半和藥一半為衣每服半丸用生薑汁和蜜水化下一覺腹中不快即以生豆試之入口不醒如甜乃中毒也急以升麻濃煎湯連飲一二碗以手探之吐即愈矣若多飲鹽水吐之亦好解一切毒緊急無藥取香油飲之無傷祝由科禁蠍並蠍螫咒法咒曰玉女傅仙攝敕斬蜥滅上如有蠍螫之人來求治者於蠍螫處望而取氣一口默唸七遍怒著作法吹蠍處其痛即止用法之人忌五厭肉扁鵲華佗察聲色定死生要訣病人五臟已奪神明不守聲嘶者死病人循衣縫譫語者不可治病人陰陽俱絕掣衣撮空妄言者死病人妄語錯亂及不能言者不治熱病者可治病人陰陽俱絕失音不能言者三日半死病人兩目皆有黃色起者其病方愈病人面黃目青者至期而死病人面黃目赤不死赤如衃血者死病人面黃目白者不死白如枯骨者死病人面黃目黑者不死黑如苔者死病人面黑目青者不死病人面目俱黃者不死病人面青目白者死病人面黑目白者不死病人面赤目青者六日死病人面黃目青者九日必死是謂亂經飲酒當風邪入胃經膽氣妄泄目則為青雖天救亦不可生病人面赤目白者十日死憂恚思心氣內索面色反好急棺槨病人面白目黑者死此謂榮華已去血脈空索病人面黑目白八日死腎氣絕病人面青目白者五日死病人耳目鼻口有黑色起入於口者必死病人目無精光著土色不受飲食者四日死病人目無精光及牙齒黑色者不治病人耳目及顴頰赤者死在五日中病人黑色出於額上髮際鼻脊兩顴上者亦死在五日中病人黑色出天中下至上顴上者死病人及健人黑色若白色起人目及鼻口者死在三日中病人及健人面忽如馬肝色望之如青近之如黑者死病人面黑直視惡風者死病人面黑唇青面青唇黑者俱死病人面黑兩脅下滿不能自轉反者死病人目不回直視者一日死病人頭目久痛卒視無所見者死病人陰結陽絕目睛脫恍惚者死病人陰陽竭絕目眶陷者死病人眉絲傾者七日死病人口如魚口不能復閉而氣出多不反者死病人臥遺尿不覺者死及屍臭者不可治諸病灸法陰症傷寒小腹痛十指青六脈俱無此必死症灸法離臍之上下左右各一寸各灸五壯又以線量一病人一腳底長即以所量線從兩腳後跟起上量至小腿線盡處以指按入爪肉陷中是穴用墨點記各灸三壯即氣絕者猶能回生又傷寒陰毒四肢厥冷脈微欲絕囊縮遺尿腹痛腹滿腸鳴灸氣海石門關元三穴五七壯當臍中為神闕下一寸為陰交一寸五分為氣海二寸石門三寸為關元哮灸膻中一穴七壯在西乳中間乳根二穴五壯乳根下一寸六分腧府二穴二七壯在璇璣旁一寸五分結喉下四寸是璇璣穴每邊各開一寸五分為腧府鹽醋哮兩手小指頭端各灸七壯一云合灸之喘灸璇璣一穴二七壯氣海一穴七壯飲食不化脾胃痛灸中脘一穴七壯在臍上四寸氣海七壯心疼灸上脘一穴七壯在臍上五寸大陵二穴七壯在掌後兩筋陷腹痛灸中脘一穴七壯足三里二穴七壯三里在膝下三寸兩筋間嘔吐不食灸中脘七壯氣海七壯天樞二穴七壯天樞在臍旁各開二寸霍亂吐瀉灸中脘七壯氣海七壯吐瀉日久垂死者灸天樞二穴七壯氣海一穴七壯泄瀉裡急後重灸下脘一穴七壯在臍上二寸天樞二穴七壯痞塊不散心中悶痛灸大陵二穴中脘一穴三陰交一二穴各七壯三陰交在踝上三寸腹中寒痛泄瀉不止灸中脘一穴天樞二穴關元一穴三陰交二穴各七壯請勞症已深難治者於癸亥日三更初令病人平臥以筋於兩旁腰眼點兩穴各灸七壯中風六脈微遲手足厥冷痰涎壅盛聲如拋鋸服藥不效者於氣海丹田二穴多灸之腰痛灸對臍一穴七壯之愈或灸腎腧二穴各七壯對臍各開一寸五分喉及眼目疼痛灸合谷二穴各七壯在虎口兩指岐骨間水腫灸水分穴七壯臍上一寸氣海七壯臍中心兩旁各開一寸五分七壯雞爪風手足指攣縮疼痛灸左右膝骨兩旁小窩共四穴各三壯諸弱症灸膏盲腧穴各七壯以指端頸後脊骨一節至五節上以墨點之依脊骨向下量四寸至七節又點記之卻兩邊斜量向上各五寸以為左右兩穴婦人氣血不足子宮虛冷不能成孕灸子宮三穴各七壯揣心坎中高骨以墨記之用草心一條從墨記至臍中折斷摺作七分以四分量臍上灸之補血三分量臍下灸之補氣仍以臍下三分折半正子宮穴灸之溫暖精氣受孕之所有神效風氣弱症灸法令患人正身去衣兩手伸開用粗麻線一條以兩中指捻線頭挺直使一人拿住勿動比數停當然後將此線對摺齊不可長短束在項中掛下背心線止處是穴以墨點記唸咒灸之咒曰八法神法不可輕流傳萬古顯神功包含天地陰陽理治病靈功四海聞火向天天開向地地裂向山山崩向海海向人病除向鬼鬼滅火行正氣火除邪氣火除四時不正之氣神火到處百病消散血氣通靈吾奉九天玄女急急如律令攝須齋戒至誠灸之神驗如不至誠無效鬼邪迷將患者兩手大拇指相併以綿線縛住當甲肉相接處騎縫置艾四處皆著火灸之若一處不著火雖灸弗效此名鬼哭穴亦治五癇呆癡及傷寒發狂屍厥不醒灸百會穴七七壯臍下氣海丹田二穴各三百壯自溫而蘇為止夢魘鬼擊人中穴灸七壯並灸兩腳大拇指端離爪甲側韭葉許各七壯此名足鬼眼五癇癡呆及傷寒發狂灸之皆效中風灸丹田氣海法在前又有於臍中一穴名神厥穴先用細鹽填入上加艾炷灸至百壯即蘇多灸更妙若灸至三五百壯不惟愈疾亦且永年若灸少則時下雖或暫療復恐復發難救其中風而口眼歪斜者如歪向右是左邊脈中風而緩也宜灸左喎陷中二七壯喎向左是右邊脈中風而緩也宜灸右喎陷中二七壯艾炷只如麥粒大若中而口開手撒眼合遺尿吐沫直視喉聲如鼾肉脫筋痛髮直頭搖面赤如粧汗珠如綴者必死勿灸此又是驗過一法撮口臍風以小艾炷隔蒜灸臍中候口中有艾氣即可得生又法臍風若成必有青筋一道上行至肚而生兩岔宜灸筋頭三壯截住若見兩岔即灸兩岔筋頭各三壯十活八九否則上行攻心而死矣慢驚風急於兩腳面陷中動處乃太衝脈也灸五壯或七壯又灸百會穴五七壯亦有得生者其穴直取以前後髮際折中橫取以兩耳尖折中在頭之中心端正旋毛處是如有雙旋及旋毛不正者不可為準艾炷僅如麥粒大灸後仍以醒脾散等藥調補收功鼻衄不止多至升斗連口並出者名腦衄諸藥不效急灸上星一穴七七壯即止永不發或灸囟會一穴效亦如之上星穴在鼻直上入髮際一寸囟會在上星後一寸各陷中可容豆者是又有於項後髮際兩筋間宛中穴灸三壯立止蓋血自此入腦注鼻中故灸此立應其取前後髮際穴前在兩眉中直上三寸後在大椎直上三寸是穴若尋常鼻衄不必艾灸只於手之中指下節以線緊扎左衄扎左指右衄扎右指兩孔俱衄則兩手並扎自止鼻塞不聞香臭名曰鼻淵灸囪會穴二七壯至七七壯止如未應灸至四日漸退七日頓愈或灸上星穴亦效齒痛隨所患左右肩尖微近後骨中縫少舉臂取之當骨解陷中灸五壯永不發間有灸之而項或大痛者良久自定不必疑咳逆發呃灸穴在乳下一指許約六分正與乳相直骨間陷中婦人即屈乳頭度之乳頭齊處是穴或云即乳房下起肉處陷中用艾炷如小豆大灸三壯或七壯男灸左女灸右只一處灸火到咳呃即定如灸不定者不可治矣瘰癧灸法以手仰置肩上微舉肘取肘骨尖上是穴即肘髎也隨所患處左即灸左右即灸右艾炷如箸頭大三壯即愈如復作再灸不過三次永絕根亦有兩肘尖並肩尖即肘髎與肩髃穴四處並灸者此治瘰之秘法也或有用隔蒜灸法先從後發核上灸起至初發母核而止多灸自效又有用蝦蟆一個去腸置癧上用艾照癧大小為炷隔蝦蟆皮灸七壯或十四壯熱氣透內方住亦從後發核起至初發核止如蝦蟆皮焦移不焦處於癧上灸之有身面生癭瘤者當瘤灸三壯即消亦有止灸一壯以水滴之而自去者瘰癧灸後用牙皂七個殭蠶七條瓜簍一個連皮子切碎五味子一歲一粒水二鍾煎熟加生大黃末五錢虛人三錢入藥汁內攪勻服只一劑百試百效後服六味地黃丸以滋腎水生肝血為善積聚成痞於十三椎下當中點墨為記墨之兩旁各開三寸半以指揣摸自有動處即點穴灸之大約穴與臍乎多灸左邊或左右俱灸或患左灸右患右灸左者亦效又一灸痞法用破日令患人晨起弗飲食來就灸一入門檻內即覆睡地上將患人男左女右手以草莖量其掌後橫紋至中指根為則後將此草從尾骶骨尖直上貼骨比量草盡處是穴墨筆點記乃取七枝艾葉七人揉熟於患人睡處頭前地上擺大壯如工字樣又於七壯之上每壯取其艾尖為一小壯以灸病人穴上余艾即一齊灸地灸畢至日將沒時方許吃粥忌食生冷七日是日但換門檻可灸數人艾灰及患人身上灰土俱掃送十字路口棄之往來俱不可回顧此法不拘老幼俱可治惟灸瘡不發者難愈婦人橫逆難產危在頃刻者急於本婦右腳小指頭尖灸三壯艾炷如小麥粒大下火即產如神腰重而痛不可轉側冷脾筋攣不可屈伸者只灸曲踿兩紋頭左右四處各三壯每灸一腳二火齊下艾火到內初覺疼痛用二人於兩邊一齊吹火至午時著艾至戍亥時臟腑自動一兩行或轉動如雷聲其疾立愈此神仙灸法妙不可言痎瘧積塊只於第十一椎下兩旁相去各一寸五分灸七壯即止此乃脾腧二穴也不但止瘧有泄痢體重痰癖積聚炎之悉效霍亂吐瀉四肢厥冷脈沉欲絕者又幹霍亂俗名攪腸沙者死在須臾急用細白鹽填滿臍中以艾灸臍上七壯患者立蘇噎膈翻胃灸法以男左女右手拿棍一條直伸其手柱杖在地手與肩平其肩上自有一窩名肩並穴灸三壯十愈八九陰症腹痛面色青慘或口禁失音四肢厥冷或大吐大瀉脈微欲絕痛極頻危者於臍下一寸五分氣海穴二寸丹田穴三寸關元穴各灸二七壯即愈如玉莖縮入死在須臾者將莖捉定用艾炷如綠豆大於龜頭馬口灸三壯其莖即出若臍下忽大痛人中黑色者多死灸如上法可生倘灸而不汗不溫不省者亦死腸風便血量臍心與脊骨相平於脊骨上灸七壯即止如再發再灸七壯永不發然須按脊骨高突之處痠疼者是穴方可於上灸之至於吐血衄血百治不止者灸即除根一切血症皆可灸夢遺精滑於十四椎下兩旁相去各一寸五分與臍平處以指按之痠疼者是名腎腧穴灸以患者年紀為壯數立效久瀉脫肛灸百會穴數十壯即愈又有洞泄寒中一症灸水分穴一百餘壯愈血氣偏墜令患者合口用淨草一莖橫量其口以齊兩角為一則摺斷再照此加以二則共是三則屈成三角以一角安臍中心兩角安臍兩旁當兩角處是穴左患灸右右患灸左左右俱患兩角俱灸艾炷如麥粒大灸十四壯或三七壯即安又法於關元穴兩旁相去各三寸青脈上灸七壯即愈臍痛瀉溏或男婦泄利日久水腫臌脹腸中雷鳴與小兒奶利不絕者俱灸濟乳中神厥一穴三七壯即愈又一人年逾半百左手無力亦灸此穴百壯而力頓生肛門外痔先以槐柳枝煎湯洗過後用壯盛男子篦下頭垢捻成小餅約厚一分置痔上痛處用艾火乾薑上灸三壯黃水即出而散若有二三個者過三五日照依前法逐一灸之俱驗有人患痔如胡瓜貫於腸頭其熱如火用槐柳枝煎湯洗過於患上一灸三五壯覺一道熱氣入腸中因大轉瀉血穢並出而安便毒用薄篾一條隨其所患左右手量中指自手掌盡處橫紋量起通三節至指尖肉盡處為則截斷卻將此蔑於手腕橫紋量起引篾向臂當中蔑盡處是穴用艾炷如麥粒大灸三壯腫散痛止即安如少年患此與下疳者後多變為楊梅瘡若於初起一瘡且痛且癢處灸三五壯去其瘡母即不再發屢驗痘疔隔蒜灸之若毒盛不知痛者不用隔蒜就當著肉灸之務要痛者灸至不痛不痛者灸至痛若灸後瘡頭紅腫發焮仍挑出毒血繼以艾火尤好如或挑破而不痛不出血或吮出血而吐於水中色黑者不治痘癰初起未成膿時即於毒上隔蒜灸之亦可消散破傷風用胡桃殼半邊挖空將野外幹人糞填滿仍以榆白皮一片刺十餘孔掩殼之口合在傷處以大艾炷於殼上灸二七壯偏身汗出其人大困即愈其風犬咬傷亦照此法灸之或著肉灸五七壯亦可一方用白芷蟬蛻等分為末黃酒調下外以槐白皮置傷處灸之孫真人曰春末夏初狗多發狂被其咬者無出於灸其法先就咬處牙痕上灸之一日灸三壯灸至一百一十日乃止宜常食韭菜永不再發瘡久成漏用大附子以溫水泡透切作二三分厚片至漏孔上以艾灸之隔二三日再灸不三五次自然肌肉長滿亦有用麥面硫磺大蒜三物搗爛捻作三分厚餅子置患處灸三七壯每三壯一易餅子四五日後再灸一次無弗效者又有用蠐螬蟲剪去兩頭置瘡口以艾灸七壯一壯一枚不過七枚即愈如無此蟲以淨土水和餅或江西淡豆豉為末唾和作餅置瘡上灸之皆可干則再和凍瘡每冬必發用野外淨土曬乾以大蒜同搗如泥捻作餅子如錢厚置瘡口灸之干則另換不問壯數直至瘡覺痛癢然後口合漿水吐瘡上用雞翎作刷子於瘡上洗刷庶肌肉不致損傷洗畢軟帛拭乾以木香檳榔各二錢黃連四錢為細末摻之或以蠟油調敷瘡口生肌甚速肩冷生風中風人臂骨脫臼不與肩相連接多有醫治不痊者要知才覺肩上冷疼必先灸肩髃環跳二穴肩髃屬手陽明大腸經在肩端兩骨肩陷中舉臂取之有陷處是穴灸七壯若風盛者灸二七壯環跳穴屬足少陽膽經在髀樞碾子骨後宛宛中側臥踡上足伸下足取之灸五十壯蛇咬傷用獨蒜切片置咬處以艾灸之二艾換一蒜片至五十餘壯痛自定而毒自消矣癲癇俟其發時將患者兩手大拇指並以綿線縛住當兩指騎縫去爪甲角如韭葉許是名手鬼眼穴灸七壯又一穴在兩足大拇指亦與取手穴同是名足鬼眼穴灸之大效男子魚嗣者用艾一團以鹽填滿臍眼卻於鹽上隨鹽大小做艾丸灸之如痛即換鹽灸至艾盡力度一日灸不完則二日三日灸之最效婦人如欲不生子者於濟下二寸石門穴一名丹田穴灸二七壯至百壯止終身不孕癰疽發背用濕紙搭在腫處看有一點先乾者即是瘡頭用大獨蒜切作一分厚片置疽頂以艾於蒜上灸之每三壯一換其蒜亦有背上初發赤腫中間有黃如小粟米一粒或一片者尤宜隔蒜灸之書云外形如粟內可容殼外壯如錢里可著拳慎勿視為微小致成莫大之患設或瘡頭開大則以獨蒜十餘個淡豆豉半合乳香二錢同搗成膏照患處大小拍作薄餅置毒上鋪艾灸之務要痛者灸至不痛不痛者灸至知痛乃止大率毒發一二日者十灸十愈三四日者六七愈五六日者三四愈過七日則雖灸不能散矣療瘡灸如前法甚則以蒜膏塗四圍只露腫頂著肉灸之以爆為度如不爆者難愈更宜多灸百壯無弗愈者有腫紅絲疔若生於兩足多有紅絲至膝生於兩手多有紅絲至心生於唇面多有紅絲入喉宜細視之若到過膝過心過喉則毒勢已盛便為難治急用外挑破絲脈或針瘡頭並四畔多出惡血令泄其毒方可望生間有無他病症忽然暴死者急以燈照其遍身如有小瘡即是疔毒宜速灸之若灸後而有焮痛至一宿者乃是火氣下徹其腫內熱氣被火導之隨火而出也如灸隨多畢竟不痛不起發不作膿者是謂為陽症不治又有疔患於足或足指間重而潰者至於脫節是名脫疽亦有患於手及手指間若色黑不痛不潰者不治色赤作痛自潰者亦隔蒜灸之內服托裡之劑庶少收功巢元方云脫疽其壯赤黑者死不赤黑不死又云發於尻尾名曰脫疽若不急治便通洞一身十日死於此見疔疽之生於下部者藥難導達危急殊甚孫真人云在內則割在指則截寧傷遺體異可延生若舍此而用攻毒之劑先壞胃氣毒惡乘虛黑黯延上雖有聖手療無及矣故必以隔蒜灸法為第一取穴法凡取穴分寸當用同身寸法以患者男左女右手屈其中指用稻杆心一條量指中間一節兩頭橫紋尖處即是同身一寸截斷為則寸著多者照此加之或橫或直寸法皆同惟頭部橫寸以眼內眥角至外眥角為一寸耳
