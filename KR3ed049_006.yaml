body:
  text: 卷六診視臟腑生克要說大凡診視坐定調息己之氣呼吸平和然後先以中指於彼人掌後高骨之旁揣定關位次以食指按寸口之位又以無名指按尺下之位凡一指必三般診先輕以取浮次稍重以取中又最重以取沉寸主關以上至頭目關主臍以上至腹脅尺主臍下腰足二便小腸膽胃大腸膀胱三焦以上六脈皆輕手得之表也腑也心肝脾肺腎命門以上六脈皆重手得之裡也心屬手少陰小腸屬手太陽肝屬足厥陰膽屬足少陽腎屬足少陰膀胱屬足太陽肺屬手太陰大腸屬手陽明脾屬足太陰胃屬足陽明三焦屬手少陽命門屬火性水配三焦為表裡氣與腎通三焦者上焦在心下下膈心肺賴之以主榮衛中焦在胃中脘脾賴之以腐水穀下焦在臍下一寸肝腎賴之以流決津液無形狀乃臟腑中有餘不盡之臟腑也左手關前一分為人迎肝膽之位脈緊盛傷於寒右手關前一分為氣口脾胃之位脈緊盛傷於食心與小腸君火也肝與膽風木也腎與膀胱寒水也肺與大腸燥金也脾與胃濕土也命門與三焦相火也五臟者藏精氣而不汙滿而不能食六腑者傳化物而不藏食而不能滿以對待之位言之則左寸火克右寸金左關木克右關土左尺水克右尺火左則右柔為夫婦之別以循環之序言之右寸金生左尺水水又生左關木木又生左寸火大復通右尺相火相火生有關土土又生右寸金而金復生水此五行更相生養有子母之親子能令母實母能令子虛治法云虛則補其母實則瀉其子如水生木是水為母木為子木又生火則子受竊氣矣故水怒而剋火此母為子力爭也火又生土是火為母土為子土見火被水克則母被鬼傷矣故怒而剋水此子為母力救也假如肝木有餘皆緣肺金不足不能制木故木無所畏反薄激而於肺金乘脾土是謂薄其所不勝而其所勝也又肝木氣少不能以制脾土土無畏妄行乃凌其腎水是謂所勝妄行而所生者受病也肝木之氣有餘則肺金之氣自薄是謂所不勝薄之也相生相剋相勝輾轉無窮舉一以例其餘也七表脈七表者何浮芤滑實弦緊洪也歌曰浮脈不足舉有餘芤脈中虛兩畔居滑體如珠中有力實形逼逼與長俱弦如始按弓弦狀緊若牽繩轉索初洪舉按之皆極大此名七表不同途其見於病曰浮為中風芤失血滑吐實郁分明別弦為拘急緊為疼洪大從來偏主熱八里脈八里者何微沉緩澀遲伏濡弱也歌曰微來如有又如無沉舉都無按有途遲緩息間三度至濡來散止細仍虛伏須切骨沉相類弱脈沉微指下圖澀脈如刀輕刮竹分明八里見如途其見於病曰遲寒緩衰微為虛澀因血少沉氣滯伏為積聚濡不足弱則筋痿少精氣九道脈九道者何長短虛促結代牢動細也歌曰迢迢長脈似持竿短脈本部不及間虛則舉尋皆不足促脈來數至無寬結脈緩時來一止代來寧止不能還牢實尋無按卻有動尋似有舉漫漫細脈雖有但如線脈分九道見多般其見於病者長為陽毒三焦熱短氣壅鬱未得昌促陽氣時兼滯虛為血少熱生驚帶主氣耗細氣少牢氣滿急常主疼結主積氣悶兼痛動是虛勞血痢崩診後八式歌左心小腸膽肝腎右肺大腸脾胃命女人反此背看之尺脈第三同斷病心與小腸居左寸肝膽同歸左關定腎居尺脈亦如然用意調和審安靜肺與大腸居右寸脾胃脈從關裡認命門還與腎脈同用心仔細須尋趁若診他脈復手取要自看時仰手認三部須教指下明九候瞭然心裡印大腸共肺為傳送心與小腸為受盛脾胃相通五穀消膀胱腎和為津慶三焦無狀空有名寄在胸中膈相應肝膽同為津液腑能通眼目為清淨智者能調五臟和自然察認諸家病掌後高骨厚為關骨下關脈形宛然以次推排名尺澤三部還須仔細看關前為陽名寸口關後為陰直下取陽弦頭痛定無疑陰弦腹痛何方走陽數即吐兼頭痛陰微即瀉臍中吼陽貫應知面赤風陰微盜汗勞兼有陽實大滑應舌強陰屬脾熱並口臭陽微浮熱定心寒陰滑食滯脾家咎關前關後辨陰陽察病根源應不朽一息四至號平和更加一至大無疴三遲二敗冷危困六數七極熱生多八脫九死十歸墓十一十二絶魂瘥三至為遲一二敗兩息一至死非怪遲冷數熱古今傳難經越度分明載熱即生風冷生氣用心指下叮嚀記春弦夏洪秋似毛冬石依經分節氣阿阿緩若春楊柳此是脾家居四季在意專心察細微靈機曉解通玄記浮芤滑實弦緊洪七表還應是本宗微沉緩漓遲並伏濡弱相兼八里同血榮氣衛定息數一萬三千五百通脈賦欲測疾兮死生須詳脈兮有靈左辨心肝之理右察脾肺之情此為寸關所主腎即二尺分並三部五臟易識七診九候難明晝夜循環榮衛須有定數男女長幼大小各有殊形復有節氣不同須知春夏秋冬建寅卯月兮木旺肝脈弦長以相從當其已午心火而洪脾屬四季遲緩為宗申酉是金為肺微浮短澀宜逢月臨亥子是乃腎家之旺得其沉細各為平脈之客即平脈之不衰反見鬼兮命危子扶母兮瘥速母抑子兮退遲得妻不同一治生死仍須各推假令春得肺脈為鬼得心肺乃是肝兒腎為其母脾則為妻春得脾而莫療冬見心而不治夏得肺而難瘥秋得肝亦何疑此乃論四時休旺之理明五行生剋之義舉一隅而為例則三隅而可知按平弦而若緊欲識澀而似微浮芤其狀相反沉伏殊途同歸洪與實而形同倣佛儒與弱而性帶依稀先辨此情後論其理更復通於藥性然後可以為醫即已明其三部須知疾之所有寸脈急而頭痛弦為心下之咎緊是肚痛之微緩即皮頑之候微微冷入胸中數數熱居胃口滑主壅多澀而氣少胸連脅滿只為洪而莫非引背痛緣是沉而不謬更過關中浮緩不食緊牢氣滿喘急難痊弱以數兮胃熱弦以滑兮胃寒微即心下脹滿沉兮隔上吞酸澀即宜為虛視沉乃須作實看下重緣濡女萎散療之在急水攻因伏牽牛湯瀉則令安爾乃尺中脈滑定知女經不調男子遇此之候必主小腹難消伏脈谷兮不化微即肚痛無憀弱緣胃熱上壅遲是寒於下焦胃冷嘔逆澀候腹脹陰疝弦牢緊則痛居其腹沉乃居在其腰濡數浮芤皆主小便赤澀細詳如此之候何處能逃若問女子何因尺中不絶胎脈方真太陰洪而女孕太陽大是男娠或遇俱洪而當雙産此法推之其驗若神日數斷之各依其部假令中衝若動此乃將及九旬患者要知欲死須詳脈之動止彈石劈劈而又急解索散散而無聚雀啄頓木又住屋漏將絶而復起蝦游苒苒而進退難尋魚澄澄而遲疑掉尾蜣乎遇此之候定不能起縱有丸丹天命而已復有困重沉沉聲音劣劣寸關雖無尺猶不絶往來息均踝中不歇如此之流何優殞滅經文具載樹無葉而有根人因如斯垂死乃當更治診脈切要歌脈為元氣自先天動靜之間更有玄三部九候如綱紀七表八里還相間寸關尺定三寸裡規矩摧沖四時舉何如九道怪脈多學者茫茫失宗旨浮沉遲數為良訣內外之形要分別外陽伏數里沉遲如此觀之當自決大率兩寸管上焦當關胸口至於腰從足抵臍憑二尺三部詳分理莫遜浮而有力則為風無力為虛伐本宗數而有力當為熱無力瘡痍痛癢同沉而有力則為積無力應當為氣逆遲而有力痛難禁遲而無力為寒疾診得心浮神不寧語言錯亂夢多驚肝家見此成癱疾腸澼拘攣身更疼脾浮瘧痢氣喘急泄瀉無度不進食肺浮喘咳大便風面腫生瘡吐血膿腎脈浮虛滯血多齒牙疼痛背腰跎瘡生足膝無多力猶主風搏氣不和沉脈主氣見於心崩漏淋淋血浸精咯血又兼留氣結夜多不寐日惺惺怒氣傷肝肝脈沉脅疼氣痛眼睛昏移來脾部成中滿吐瀉身黃及不仁肺沉喘咳肺癰生嘔吐兼痰興失聲腎脈著沉腰背痛陰頽經閉腹膨脹心脈來遲小便頻悸怔嘔吐及心疼肝遲七疝兼諸積木氣之傷痛在膺冷氣傷脾脾脈遲腸中雷響瀉無時肺遲氣痞寒痰盛飲食難消氣漸衰滑精不禁小便多腿膝痠疼夢涉河及自覺來多有汗都因遲脈腎家疴心家脈數發狂言口舌生瘡小便難頭暈目眩風熱盛祗因數脈見於肝脾數中消好嗜眠胃翻口臭及齦宣肺經脈數上焦熱咳唾痰腥大便難水竭陰消相火生癃癃遺溺兩相侵只因腎脈多夾數女子逢之或胎娠五臟明時六腑同何須物外覓神功若還自把心融會妙理都歸掌握中更看形容把脈求肥人沉細瘦長浮嬰兒脈疾老人澀矮促長流又不詳男子關前脈必充女人尺脈定浮洪弦鉤毛石分時序四季平和胃氣衝萬機四脈既包含生死何嘗另有玄浮散沉無遲一點數來無數病難痊歇罷殘陽閃暮鴉半庭新月照梅花依稀一枕羲皇臥又夢軒轅教煉砂五臟虛實脈歌肝旺於春象木榮弦長之脈是安寧浮洪為實虛沉滑微短之時乃是刑心配南方象火炎脈浮大散是安恬弦虛緩實分明別沉滑為刑理可嫌脾屬中央衆取尊阿阿緩大是其根洪沉微短皆無畏若遇弦長命不存肺屬於金旺在秋脈浮短澀體無憂虛須緩大沉濡實洪大而長病少瘳腎旺於冬配水行沉濡而滑是安平弦長是實虛浮短緩大而浮病少生五臟虛實候歌脅疼目赤偏多怒煩腫頭旋耳不聰此是肝家之實候瀉之方見有神功筋攣目暗脅仍拘善恐多悲爪甲枯太息不能並虛候勸君加補病方除背膺脾脅盡疼痠笑不休時口舌乾此候有餘須減損報君莫誤作虛看驚悸憂悲顏色少舌根多強背腰疼此為不足宜加補若瀉之時病愈增腹脹更兼溲不利足痿身重更饒飢四肢不舉脾為實瀉則誠宜補則非腹脹腸鳴吐逆多食常不化病如何更兼泄痢無時有補益之時氣始和背肩股脛皆疼痛喘嗽仍兼上氣時此是肺金之太過急須著瀉不宜遲呼吸之間仍少氣咳而見血體難任病聲兼有如何療針藥宜先補太陰腹脹體腫仍飧泄汗出憎風面且梨默不欲言兼少氣有餘須瀉莫狐疑眇中清冷脊中疼耳內嘈嘈復又聾厥逆無時小便變鹿茸巴戟有神功五臟積氣歌肝之積氣為肥氣復處如杯左脅邊㾬瘧連年仍發咳此因季夏肺脾生伏梁之疾在心頭如臂連臍病可憂此腎傳心心授肺因而積結在深秋積在痞家名痞氣盤於胃管使人慵肌膚羸瘦成黃疸此病傳來自季冬肺積如杯號息賁右邊脅下是其真令人喘咳兼寒熱心病傳來蓋自春腎之積氣號賁豚上下無時腹內奔病本傳心夏旺因而留結是其根五臟中風歌心中風時惟偃臥汗流唇赤灸心腧青黃白黑唇間見縱遇秦和亦少蘇肝風踞坐不低頭唇目俱青療可瘳目若一黃兼一白神丹雖下愈無由踞而腹滿吐痰涎身著通黃灸可痊手足青時脾已壞不須醫療病難延肺風偃臥胸中滿短氣其人胃悶多口鼻白時尤可治色黃欲救奈伊何踞而腰痛風傷腎視脅兩邊未有黃如此可醫宜灸脅面如土色定知亡五臟察色候歌面腫蒼黑舌卷青四肢力乏眼如盲淚出不止是肝絶八日應當命必傾面黧肩息直視看又兼掌腫沒紋斑狂言亂語身悶熱一日之內到冥間臍跌腫滿面浮黃泄痢不覺汙衣裳肌肉粗澀兼唇反一十二日內災殃口鼻氣出不復面唇反無紋黑似煤皮毛焦乾爪枯折程途三日定知災面黑齒痛目如盲自汗如水腰折頻皮肉濡結髮無澤四日應當命不存妊娠歌妊娠之脈如何認要辨陰陽衰與盛陰陽俱盛滑而和兩手調勻數相應其人能食身無苦容色如常是妊定脈來左盛是男形右手偏洪是女孕孕真常嘔頭昏悶此是停痰惡阻症急宜正胃與消痰因血安胎全兩命若還腰腹俱脹痛日夜咽乾潮熱盛多眠惡食倦昏沉此屬經疑卻非妊大都孕脈數如此在意消詳審安靜又肝為血兮肺為氣血為榮兮氣為衛陰陽配偶不參差兩臟通和皆類例血衰氣旺定無妊血旺氣衰應有體尺微關滑尺帶數流利往來並雀啄小兒之脈已見形數月懷耽猶未覺左疾為男右為女流利相通速來去兩手關脈大相應已歌亦在前通語左手帶縱兩個男右手帶橫一雙女左手脈逆生三男右手脈順産三女寸關尺部皆相應一男一女分形證有時子死母身存或即母亡存子命往來三部通流利滑數相參皆替替陽盛陰虛脈得明遍滿胸膛皆逆氣左手太陽浮大男右手太陰沉大女諸陽為男諸陰女指下分明長記取三部沉正等無疑尺內不止真胎婦夫乘妻兮縱氣霧妻乘夫兮橫氣助子乘母兮逆氣參母乘子兮順氣護小兒日足胎成聚身熱脈亂無所苦汗出不復氣逆時精神結備其中住滑疾不散胎三月但疾不散五月母弦緊牢強滑者安沉細而微歸泉路妊娠候歌血下如同月水來漏極胞干主殺胎亦損妊母須憂慮爭遣神丹救得回心腹急痛面目青冷汗氣絶命必傾血下不止胎衝上心腹冷門定傷身墮胎倒僕舉重輕致胎死在腹中居已損未出血不止衝心悶痛母魂孤産難生死候歌欲産之婦脈離經沉細而滑也同名夜半覺痛應分誕來朝日午定知生身重體寒熱又頻舌下之脈黑復青反舌上冷子當死腹中須遣母歸冥面赤舌青細尋看母活子死定應難唇口俱青沫又出母子俱死總高判面青舌青沫出頻母死子活定知真不信若能看應驗尋知賢哲不虛陳新産生死候歌新産之脈緩滑吉實大弦急死來侵若得重沉小者吉忽若牢堅命不停寸口澀疾不調死沉細附骨不絶生審看此候分明記長鬚念此向心經諸雜病生死脈歌腹脹浮大是出厄虛小命殂須努力下痢微小卻為生脈大浮洪無瘥日恍惚之病定顛狂其脈實牢保安吉寸關尺部沉細時如此未聞人救得消渴脈數大者活虛小病深厄難脫水氣浮大得誕生沉細應當是死別霍亂之候脈微遲氣少不語大難醫三部浮洪必救得古今課定更無疑鼻衄吐血沉細宜忽然浮大即傾危病人脈健不用治健人脈病號行尸心腹痛脈沉細宜浮大弦長命必殂頭痛短澀應須死浮滑風痰必易除中風口噤退浮吉急實大數三魂孤魚口氣粗難得瘥面赤如樁不久居中風發直口吐沫噴藥悶亂起復蘇咽喉拽鋸水雞響搖頭上竄氣長噓病人頭面青黑暗汗透毛端恰似珠眼小目瞪不須治詐汗如油不可蘇內實腹脹痛滿盈心下牢強幹嘔頻手足煩熱脈沉細大小便澀死多真外實內熱吐相連下清注谷轉難安忽然診得脈洪大莫廢神功定不痊內外俱虛身冷寒汗出如珠微嘔煩忽然手足脈厥逆體不安寧必死判上氣喘急候何寧手足溫暖淨濟生反得寒澀脈厥逆必知歸死命須傾咳而尿血羸瘦形其疾脈大命難任唾血之脈沉弱吉忽若實太死來侵上氣浮腫肩息頻浮滑之脈即相成忽然微細應難救神功用盡也無生中惡腹脹緊細生若得浮大命逡巡金瘡血盛虛細活急實大數必危身凡脈尺寸緊數形又似叉直吐轉增此患蠱毒急須救速求神藥命難停中毒洪大命應生細微之脈必危傾吐血但出不能止命應難返沒痊平大凡要看生死門太衝脈在即有憑若動應神魂魄在止便乾休命不停察色觀病生死候歌欲愈之病目皆黃眼胞忽陷定知亡耳目口鼻黑色起入口十死七難當面黃目青酒亂頻邪風在胃喪其身面黑目自命門敗困極八日死來侵面色忽然望之青進之如黑卒難當面赤目白憂息氣待過十日定存亡黃黑白色起入目更兼口鼻有災殃面青目黃中時死余候須看兩日強目無精光齒斷黑面白目黑亦災殃口如魚口不能合氣出不返命飛揚肩息直視及唇焦面腫蒼黑也難逃妄言錯亂及不語唇臭無知壽不高人中盡滿兼背青三日須知命必傾口張直氣命難停足跌趾腫膝如斗十日須知難保守項筋舒直定知掌內無紋也不久唇青體冷及遺尿皆而飲食四日期手足爪甲皆青黑能過八日定難醫脊痛腰重反復難此是骨絶五日看體重溺赤時不止肉絶六日便高判手足甲青呼罵多筋絶九日定難過髮直如麻半日死尋衣語死十知麼外因緊則傷寒定不移濡因傷暑向心推澀緣傷燥須觀肺細緩傷濕更看脾浮則傷風肝即應弱而傷熱察心知外因但把人迎審細別六淫皆可醫內因喜則傷心脈必虛思傷脾脈結中居因憂傷肺脈必澀怒氣傷肝脈定濡恐傷於腎脈沉是緣驚傷膽動相胥脈緊固悲傷心絡七情氣口內因之不內外因勞神役慮愛傷心虛澀之中仔細尋勞役陰陽每傷腎須因脈緊看來因房帷任意傷心絡微澀脈中細忖度疲劇筋力要傷肝仔細思量脈弦弱飢則緩弦脾受傷若還滑實飽無疑叫呼傷氣須損肺燥弱脈中豈能避能通不內不外因生死吉凶都在是辨童男童女欲識童男與童女決在寸關並尺裡自然緊數甚分明都緣未散精華氣童女童男何次別需看太真無損缺大約童子尺脈沉童女尺中洪拍拍傷寒脈大浮數滑動陽脈陰病見陽生可得沉澀弦微弱屬陰陽病見陰終死厄輕手脈浮為在表表實而浮兼有力但浮無力表中虛自汗惡風常析析重手脈沉為在裡裡實脈沉表亦實重手無力大而虛此是表虛宜審的風則虛浮寒實堅水停水蓄必沉潛動則為痛數則熱反飲應須脈急弦太過之脈為可怪不及之脈亦如然止氣脈散為形損耳聾浮澀命難全譫言身熱宜洪大沉細而微壽不延腹大泄利當微細緊大而滑定歸泉吐衄喜得沉細者浮大而牢嘆逝川陰陽俱虛熱不止乍疏乍數命歸天瞥瞥有如止肥此脈定知陽氣微榮榮來似蛛絲細卻是體中陰氣衰脈如瀉潦之絶者疾人亡血更何疑陽結藹藹如車蓋陰結循竿亦象之陽盛則促來一止陰盛則結緩而遲右手氣口當主氣主血人迎左其位氣口緊盛食必傷人迎緊盛風邪熾數為在腑遲為臟浮為在表沉在裡浮緊兼澀寒陽榮脈浮而緩風傷衛脈淨人病內虛故人安脈病行尸是脈微大忌令人吐欲下猶防虛與細沉微氣弱汗為難三者要須常審記陽加於陰有汗證左手沉微卻應未跌陽胃脈定死生太溪腎脈為根蒂脈來六至與七至邪氣漸深須用意浮大晝加並屬陽沉細夜加分陰位九至以上來短促狀若湧泉無入氣如屋漏如雀啄來如彈石去如解索蝦游魚翔脈證乖轉豆偃刀形候惡下上至關陽氣絶上不至關陰氣鑠代脈來時不可醫必定傾危難救藥更加玄絶漸無根命斷天真當死也病人三部脈調勻大小浮沉遲數類此是陰陽氣已和勿藥自然應可喜六經傳變歌傷寒一日二日間發熱頭疼及惡寒腰痛脈浮真可見此脈從頭連腰還無汗麻黃湯發散有汗傷風桂枝單大青龍湯表裡實此屬太陽膀胱間傷寒二日三日內目痛身熱加一倍鼻子不睡脈來長此脈往來緩者是無汗惡寒用葛根有汗桂皮湯一劑便實惡寒大柴胡此屬陽明胃經內三日四日病轉深耳聾胸脅痛如針寒熱嘔逆口乾苦此脈循脅絡耳真強盛之脈真可見小柴胡湯宜酌斟似瘧婦人血結類此屬少陽膽經尋病傳四日及五日腹痛咽乾自溫的自利而渴脈微沉脈布脾胃絡咽嗌四逆理中治臟寒腹痛脈浮桂枝入胸滿痰多瓜吐之此屬太陽脾經脈傷寒五日六日來多眠口燥舌乾訣此脈絡肺系舌本指下脈沉貫腎來舌乾須用小承氣不渴不幹四逆差汗出亡陽豬膚屬此屬少陰腎經排傷寒六日七日到煩滿囊縮脈微緩筋急唇青四肢疼脈循陰氣絡肝道脈若不浮小建中浮緩如瘧各半妙囊縮汗毒承氣加此屬厥陰肝經類傷寒六經正病太陽頭痛身熱脊強陽明目痛鼻乾不眠少陽耳聾脅痛寒熱嘔而口為之苦太陽腹滿自利尺寸沉而津不到咽少陰則舌乾口燥厥陽則煩滿囊拳一日二日可發表而解三日四日宜和解而痊五六日便實方可議下七八日不愈又復再傳日傳二經病名兩感經傳六日應無一痊太陽無汗麻黃為最太陽有汗桂枝可先小柴胡為少陽之要領大柴胡行陽明之祕堅至三陰則難拘定法或可溫而或可下宜數變以曲全生意或可方而或可圓傷寒表裡證傷寒表證是如何無汗惡寒身熱多頭項俱疼脈浮取擇方施劑汗之和傷寒里證腹心膨不惡寒而惡熱蒸其脈數沉兼自汗汗多便祕下之生陽症陰症陽症身熱頭疼痛體痛咽乾難臥動或有譫語及循衣脈息弦洪宜審用陰症身涼二便清病初自汗少頭痛也無煩躁也無渴脈息沉微自可明陽症似陰陰症似陽陽證身涼冷四肢小便赤少大便稀心煩口燥脈沉數白虎湯中竹葉奇陰症如陽面色紅小便清滑大便通渾身微熱沉遲脈真武湯兼用理中陽厥陰厥陽厥時時指甲溫心煩便祕口乾論脈來沉細中還疾承氣柴胡最可吞陰厥身涼熱不回二便通滑不煩時脈來沉浮知端的三建湯兼四逆宜血黃濕黃發黃恰似煙薰色小便自利大便黑唇焦漱水血家黃桃仁承氣湯堪擇發黃渾似桔皮明小便不利大便行濕熱相蒸名曰疸茵陳湯共五苓平剛痙柔痙元來痙病屬膀胱口噤如癇身反張此是傷風感寒濕故分兩證有柔剛無汗為剛須易識惟有葛根湯第一有汗為柔見的端桂枝葛根湯救急二痙皆宜續命湯剛痙去桂用麻黃柔痙去麻當用桂只依此法最為良胎前産後傷寒傷寒頭痛連百節氣急衝心溺如血上生斑點赤黑時壯熱不止致胎滅嘔吐不止心煩熱腰背俱強胎痛裂六七日來熱腹中小便不通大便結産後因得熱病臨脈細四肢暖者生脈大忽然肢過冷須知其死莫能停傷寒五臟受病歌心病舌強笑面赤躁煩掌熱口乾讝臍上動氣洪緊數反得沉兮命不全肝家面青目痛閉筋急怒容臍左氣脈當弦急又兼長浮澀短兮各不治脾家不食麵皮黃體重肢疼喜臥床動氣當臍脈緩大弦長而緊是凶殃肺家面白帶憂愁吐衄寒溫喘嗽求臍右氣兮沉細澀大而牢者死根由腎家面黑爪甲青耳閉足寒泄腹疼臍下氣兮脈沉滑緩而大者死之形傷寒至捷法發熱惡寒身體痛脈浮無汗怎生醫十神湯與香蘇散有汗傷風用桂枝四五日來口舌乾發熱身痛臥不安先服人參敗毒散小柴胡湯在後番七八日來熱在內口渴心煩腹脹匯小便赤少大便難大柴胡湯好通利發熱口乾大便泄小便赤少心煩結小柴胡湯兼五芩加上黃連真一絶汗下之後病不解依然熱渴如見怪解毒湯兼小柴胡諸般熱病皆無礙傷寒證治總略發熱憎寒體痛時脈浮無汗怎生醫十神五積香蘇散有汗傷風用枝枝汗後依前病不除三朝四日莫躊蹰或用參蘇或敗毒加些良劑病當舒病傳人里腹脹滿口乾熱盛小柴胡病若仍前熱泄多只用柴苓湯一碗六日七日病轉熱前後不通好未啜或有亂語及循衣大柴承氣可通別下後仍前病不休黃連解毒免人憂病後虛煩熱已靜白虎竹葉石膏搜陽厥還須用大柴不然承氣也通挨陰厥四逆並真武三建加之自忖裁胸膈停痰氣悶時可將瓜蒂吐之宜怔忡水停微有喘青龍十棗最堪題陽毒發斑是如何梔子大黃黑奴科咽喉腫痛還曾治甘桔湯中也要過膈痰冷氣如何治理中丸子君須記去血還須抵當湯噫氣不絶旋覆輩小便不通五苓宜豬苓八正皆曰奇大便不通蜜導法硝黃服後尉其臍熱吐五苓半夏加冷吐四逆茱萸佳狐惑聲嗄人不曉大黃牡蠣衆皆誇發黃梔子柏皮同退疸茵陳極有功治慝桃仁犀角類大黃甘遂解結胸昏沉多睡萎蕤湯煩躁無眠酸棗方少陽自利白通美腳氣續命越脾當柔痙桂枝加乾葛剛痙麻黃葛根活陰症似陽四逆宜陽證如陰白虎奪食復勞傷怎生醫枳實梔子內中追陽易陰易如何治燒裩鼠糞湯要知吐蛔烏梅與理中風濕黃芩朮附通腹中急痛如何治桂枝加於大黃中吐血解毒與三黃筋惕肉瞤真武湯肺實喘嗽青龍美衄血不止茅花強往來寒熱成瘟瘧小柴胡湯還可托咳逆皆因胃有寒乳下艾灸羌附兼熱深咳逆成陽逆大小柴胡自去攀此自醫家人門訣還宜自己用心參傷寒有四證相類食積寒痰並腳氣更兼亦有患勞煩要識四般相類症不與傷寒一類看小兒脈訣五臟論心臟心主驚實則叫哭發熱飲水而搐虛則困臥驚悸不安又熱則唾口中氣溫及上竄咬牙而合面臥有就冷之意皆心熱也若仰面臥者乃心氣實氣不得上下流通也心病冬見火勝水也當補腎治心輕者病自愈下竄不語者腎虛怯也張潔古云心主熱若肺乘心為微邪肝乘心為虛邪脾乘心為實邪腎乘心為賊邪凡心臟得病必先調其肝腎肝氣通則心氣和肝氣滯則心氣乏此心病先求其肝清其源也五臟受病必傳其所勝腎之邪必傳於心故先治其腎逐其邪也若肝腎俱和然後察其心家虛實治之竊謂仰面臥者因其心胸實熱故喜仰面而向虛也合面臥者因其心胸虛熱故喜合臥而就實也實則調治心肝虛則調治脾肺二者別之盡其狀矣其咬牙等症多有雷同不必拘泥若邪氣已去而病仍作當調補元氣或反甚急溫補元氣其心氣冬見亥子時病病甚或上竄不語者乃腎水虛而心火甚也用補腎肝臟肝主風實則目直大叫項急煩悶虛則咬牙呵缺氣熱則外生風氣溫則內生風須散之若能食飲水不止微下之肝熱則目直不搐手尋衣領及亂捻物狀熱則飲水喘悶肝病秋見肺怯不能勝也當補脾治肝肝有風則目連眨得心熱則搐當肝心兼治甚則身反張目直不搐心不受熱也當補腎治肝唇白者不治又張潔古云肝主風自病則風搐拘急若心乘肝為實邪肺乘肝為賊邪腎乘肝為虛邪凡肝得病必先察其肺腎者肝之母肺者肝之賊今肝之得病若非腎水不能相生必是肺金鬼邪來克故其來在肺先治其肺攻其鬼也其來在腎先補其腎滋其源也然審其本臟之虛實而寒溫之竊謂前症若肝實熱而外生風者宜散若既散之而前症仍作或益甚者此邪氣已去而脾氣虧損也宜補若肝經虛熱或因克伐而內生風者宜補若風邪入臟能食飲冷大便祕結者此邪氣內實也宜下既下而食少飲湯或腹作脹者此脾氣內虛也宜補氣血素弱或因病後或服攻伐之劑而手尋衣領咬牙呵缺目淡青者乃肝經虛甚也急用補腎生肝硬氣短氣長出氣乃肺經虛甚也急用補脾肺若申酉時叫哭直視呵缺頓悶項急驚悸手足搖動發熱飲水此風火相搏而勝肺金也宜治肝火生肝血補脾土生肺金若唇白者為肝絶不治脾臟脾主困實則困睡身熱飲水或不飲水虛則吐瀉生風脾胃虛寒則面光白目無精光口鼻氣冷肌體瘦弱吐水腹痛不思乳食傷風手足冷者脾臟怯也先用補脾後用發散脾病見四季皆仿此順者易治逆者難治脾怯當面赤黃若兼五臟若相反隨症治之張潔古云脾主濕自病則泄瀉多睡體重昏倦若肝乘脾為賊邪心乘脾為虛邪肺乘脾為實邪腎乘脾為微邪凡脾之得病必先察其肝心二臟蓋肝是脾之鬼心是脾之母肝氣盛而鬼邪有餘心氣虧而生氣不足當用抑肝養心若診其脈肝心俱和則脾家自病察其虛實而治之竊謂前症實者病氣實而形氣虛也若面色㿠白吐瀉腹痛口鼻氣冷屬寒水侮土若面青唇黯吐瀉手足並冷此脾土虛寒若面色痿黃手足不冷此脾土虛弱若傷風手足並冷吐痰咳嗽吐瀉腹脹此脾肺氣虛用實脾氣散外邪若發於寅卯二時用補脾土平肝木然面黃者脾之本色也面赤者火生土為順面青者本剋土為逆當平其所勝以補元氣為善肺臟肺主喘實則悶亂喘促或飲水虛則硬氣出氣短氣若肺盛復感風寒則胸滿氣急喘嗽肺實熱則手掐眉目鼻面肺虛熱則唇色深紅肺怯則唇色白苦悶亂氣粗喘促硬氣者難治肺病久唇白者此脾肺子母皆虛也若白如豬脂者吉白如枯骨者死如肺病春見肺勝肝也宜補肝腎治肺目淡青必發驚更有赤者當搐為肝怯也張潔古云肺主燥自病則喘嗽燥則潤之若心乘肺為賊邪肝乘肺為微邪腎乘肺為實邪脾乘肺為虛邪凡肺之得邪必先觀心脾二臟之虛實若心火鑠金當抑心滋肺若脾氣虛冷不能相生而肺氣不足則風邪易感宜補脾肺若腎實中痞熱氣上蒸於肺宜瀉脾氣若心脾脈平和而肺自病當察虛實治之夫肺氣盛者肺中之邪氣盛也其脈右寸必浮而有力宜瀉之若肺虛而有熱者不可執肺熱之故不用人參仍參其症治之腎臟腎主虛無實症惟痘瘡實則黑陷更當分別症之虛實虛則補其母實則瀉其子夫腎虛者由股氣不盛則神短囟開目多白睛面色㿠白此皆難養縱長不過四旬或有因病而致目無精光畏明腎病見夏水勝火也輕者病自退重者當驚發搐張潔古云腎主寒自病則足脛寒而逆腎無實瘡疹黑陷乃實是水制火也若心乘腎為微邪肺乘腎為虛邪肝乘腎為實邪脾乘腎為賊邪本臟虛弱正令不行鬼賊克害當補本臟之正氣大抵五臟各至本位即氣盛不可更補到所克位不可更瀉然五行之中惟腎水一臟母盛而反受邪何則肺屬金射於皮毛所主者氣腎屬水主於骨髓所藏者精氣之輕浮能上而不能下精之沉重能下而不能上今肺氣得熱而上蒸則不能下生於腎而受邪矣急服涼藥解之此腎病必先求肺或脾經之濕刑剋於腎宜去脾濕若脾肺脈平和而腎自病則察其本臟而治之竊謂下竄等症足不喜履者蓋腰以下皆腎所主乃心氣下行於腎部也當壯腎水以制心火若因脾肺虛而不能生腎水者宜滋化源其瘡疹黑陷乃腎虛而邪氣實也看脈紋訣小兒三歲以下男左女右看虎口三關從第二指第一節名風關若脈見初交病第二節名氣關脈見病重第三節名命關脈見病深則危矣又當辨其紋色紫紅熱傷寒青驚風白疳疾黃色隱隱或淡紅隱隱為常候也至見黑色則危矣其他紋色在風關為輕氣關漸重命關尤重也辨虎口手訣曰男以左手觀之女以右手觀之蓋取左屬陽男以陽為主右屬陰女以陰為主然男女俱具此陰陽兩手亦當參看左手之紋病應心肝右手之紋病應脾肺於此消息又得變通之意驚風初得紋出虎口或在初關多是紅色傳至中關色赤而紫病又傳過其色紫青病勢深重其色青黑而紋亂者病深重若純黑危惡不治大抵紅者風熱輕赤者風熱盛紫者驚熱青者驚積青赤相半驚積風熱俱有主急驚青而淡紫伸縮來去主慢驚紫絲青絲或黑絲隱隱相雜主慢脾似出不治大率紋勢彎曲入里者病雖重而症順猶可用力若紋勢弓反出外靠於指甲者斷不可回其有三關紋如流珠流米三五點相連或形於面或形於身危惡尤甚水鏡訣曰四足驚三關必青水驚三關必赤人驚三關必黑紫色瀉利黃色雷驚如三關脈通度是急驚之症必死或青或紅有紋如線一直者是乳食傷脾及發熱驚左右一樣者是驚與積齊發有三條或散是肺生風痰有青是傷寒及嗽如紅火是瀉有黑相兼主下痢紅多白痢黑多赤痢有紫相兼加渴了虛虎口脈紋亂乃氣不和也入門候歌曰五指梢頭冷驚來不可安若逢中指熱必定是傷寒中指獨自冷麻痘正相傳女右男分左分明仔細看初起寅關淺紋侵過卯深生枝終不治辰位實難禁審味訣曰肝酸心苦及脾甘肺礙於辛腎和咸所好即知其臟病更將色脈與相參察形色訣額端紅色主熱燥若逢青色有肝風印堂如有青紋見必系人驚火則紅山根之色青隱隱須識驚遭是雨重若還斯處見赤色還知瀉燥定相攻年上微黃為正色若平更陷夭難禁忽因痢疾黑危候霍亂吐瀉黃色深鼻準徽黃赤白平深黃燥黑死難生人中短縮吐因痢唇反黑候蛔必傾正口常紅號日平燥干脾熱積黃生白主失血黑繞口青黑驚風盡死形承漿青色食時驚黃多吐遂痢紅形煩躁夜啼青色吉久病眉紅死症真白睛青色有肝風若是黃時有積攻或見黑睛黃色現傷寒病症此其縱風氣二池黃吐逆躁煩啼叫色鮮紅更有兩頤胚樣赤肺家客熱此非空太陽青色驚方始紅色赤淋萌孽起要知死症是何如青色從茲生入耳兩臉黃為痰實咽青色客忤紅風熱傷寒赤色紅主淋二色請詳分兩頰吐蟲青色滯順黃一色頤間兩自詳風門黑疝青驚水紋青金匱主驚狂小兒脈訣小兒三歲以下用一指按高骨乃分三關定其息數呼吸八至為平脈九至不安十至危困浮主風沉遲主虛冷實主有熱緊主癲洪主熱盛沉緩主虛瀉微緊有積有蟲遲澀主胃脘不和沉主乳食難化沉細主乳食停滯緊弦主腹中熱痛牢實主大便祕沉而數者骨中有熱弦長是肝膈有風緊數乃驚風為患四肢掣顫浮洪乃胃口有熱沉緊主腹痛有寒虛濡者有氣又主慢驚芤主大便利血四歲以下用一指轉尋三部以關為準七八歲移指少許九歲次第以三關部位尋取十一十二歲亦同十四十五歲依大方脈部位診視全幼心鑑云小兒半歲之際有病當於額前眉端髮際之間以名中食三指曲按之兒頭在左舉右手在右舉左手食指為上中指為中名指為下三指俱熱主感風邪鼻塞氣粗發熱咳嗽若三指俱冷主外感風寒內傷飲食發熱吐瀉若食中二指熱主上熱下冷名中二指熱主夾驚之疾食指熱主胸膈食滯又當參辨脈形主之察聲音訣曰聲輕者氣輕弱也重濁者痛也風也高喊者熱將狂急者神驚也聲塞者痰也聲戰者寒也聲噎者氣不順也喘者氣促也噴嚏者知其風呵缺者知其倦又主風陰陽相雜也哭聲不響者死小兒外症十五候眼上赤脈下貫瞳人囟門腫起兼及作坑鼻乾黑躁肚大青筋目多直視靚不轉睛指甲黑色忽作鳩聲虛舌出口齧齒咬人魚口氣急啼不作聲蛔蟲既出必是死形小兒變蒸三十二日一變生癸腎臟氣屬足少陰經六十四日二變一蒸生壬膀胱腑氣屬足太陽經九十六日三變生丁心臟氣屬手少陰經一百二十八日四變二蒸生丙丁小腸腑氣屬手太陽經能坐一百六十日五變生乙肝臟氣屬足厥陰經能匍匐一百九十二日六變三蒸生甲膽腑氣屬足少陽經二百二十四日七變生辛肺臟氣屬手太陰經二百五十六日八變四蒸生庚大腸腑氣屬手陽明經二百八十八日九變生己脾臟氣屬足太陰經三百二十日十變五蒸生戊胃腑氣屬足陽明經學行心胞絡臟屬手厥陰經三焦為腑屬手少陽經此一臟一腑俱無形狀故不變不蒸也又有三大蒸六十四日為一大蒸計三百八十四日又六十四日為二大蒸計四百四十八日又六十四日為三大蒸計五百一十二日至五百七十六日變蒸俱畢兒乃成人矣變者生五臟也蒸者養六腑也變蒸之時先看兒唇上有白泡如珠是其症也即宜少與乳食不可妄投藥餌切不可艾火灸鄞人兒生下即灸頂門其害非淺蓋兒初生乃一塊血豈能當艾火燒灸火氣入內反為不美如生下無他症平穩切不可亂灸又鄞人兒生下多患奶牙每用針挑破進風輒斃殊為可傷此皆緣孕母多食胡椒故也鄞人平最嘗胡椒故兒有此症若孕時能戒食胡椒仍常服黃芩白朮清涼之劑即可無此症矣
