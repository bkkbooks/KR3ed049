body:
  text: 卷七藥性目錄草部人參沙參天門冬麥門冬地黃術白朮蒼朮黃耆甘草梢節菊花菖蒲遠志黃精山藥五味子肉蓯蓉鎖雨菟絲子牛膝威蕤苡仁石斛巴戟大破故紙芎藭當歸芍藥白芍赤芍益母草車前子葉根蒲黃續斷骨碎補蒺藜地膚子決明子丹參玄參茜根茅根艾地榆大小薊紅花牡丹皮鬱金薑黃延胡索香附旱蓮草劉寄奴柴胡前胡黃連胡黃連黃芩草龍膽防己葛根葉花瓜蔞仁根苦參青黛茵陳蒿知母貝母地骨皮紫菀百部款冬花馬兜鈴桔梗苧根蘆根羌活獨活升麻細辛防風乾薑生薑麻黃白芷藁本天麻蒼耳秦艽狗脊白鮮水萍木賊豨薟附子烏頭天雄蓽撥半夏天南星何首烏威靈仙仙茅白附子高良薑萆薢葫蘆白頭翁阿魏木香茴香肉豆蔻白豆蔻草豆蔻砂仁蓽澄茄澤瀉旋覆花開葉木通通草瞿麥百合紫草燈心草酸菜石韋海藻澤蘭昆布甘遂大戟澤漆芫花商陸牽牛子蓖麻子海金沙白葛常山淫羊藿續隨子鶴蝨紫河車馬鞭草蛇床子王不留行牛蒡子根葉青蒿藜蘆射干山豆根白蘞白及羊蹄根子百草灰金星草蒲公英穀精草夏枯草山慈姑千里光金銀花貫眾木部桂肉桂桂枝桂心柳桂槐實枝花柏實葉松脂節花茯苓茯神琥珀柳枸杞酸棗梔子黃柏竹葉淡竹竹瀝竹茹苦竹楮實山茱萸五加皮杜仲女貞實桑根白皮葉枝皮椹皮中汁桑寄生益智子乾漆蔓荊實牡荊實荊瀝辛夷蕤核鉤藤秦皮密蒙花丁香蘇合香沉香藿香龍腦香安息香乳香沒藥檳榔枳殼枳實厚朴茗茶烏藥巴豆皂莢皂角刺大腹皮豬苓郁李仁吳茱萸蜀椒目胡椒梧實皮根訶黎勒麒麟竭紫葳松煙墨天竺黃蘇方木棕桐楓香脂大楓子蕪荑雷丸五倍子樗白皮沒石子木鱉金櫻子菜部黃蜀葵子萊菔根子白芥子瓜蒂馬齒莧並子茄根茄蒂胡荽蓼馬蓼水蓼蔥白韭子蒜荊芥紫蘇子香薷薄荷絲瓜果部蓮肉蒂藕節雞頭實覆盆子山楂陳皮青橘葉核青皮大棗柿梅實桃仁花葉杏仁龍眼荔枝核肉木瓜實安石榴梨胡桃枇杷葉沙糖草果谷部胡麻白油麻油麻子生大豆大豆黃卷豆豉赤豆白扁豆花綠豆粟殼粟米陳廩米糯米大麥麥芽小麥浮麥神麯酒糟醋飴糖石部丹砂雲母陽起石膽礬空青禹餘糧赤石脂硯石綠礬芒硝朴硝玄胡食鹽戎鹽無名異滑石石膏寒水石雄黃雌黃石硫黃水銀輕粉蜜陀僧金銀珊瑚硇砂鵬砂磁石砒霜鐵鐵鏽秤錘鐵花粉鐺墨赤銅屑銅青自然銅古文錢鉛丹粉錫伏龍肝石灰石蟹代赭青礞石花乳石臘雪秋露獸部龍骨象牙牛黃牛角腮髓肉膽乳阿膠鹿茸角角膠髓肉腎熊膽麝香犀角羚角青羊肝膽肉虎骨睛壯狗陰莖頭骨血肉兔頭骨肝肉腦豚卵懸蹄四足膽肉心腎肚膃肭臍禽部丹雄雞冠血腸䏶胵卵白黑雌雞黃雌雞蛋白鴨雀卵肉白丁香夜明砂蟲魚部石蜜蜜蠟露蜂房白蠟桑螵蛸桑蟲蟬脫木虻斑蝥蜻蛉蜣螂蜘蛛蝟皮牡鼠兩頭尖五靈脂白殭蠶原蠶蛾蠶砂蠶退蠍蜈蚣蛤蚧蝦蟆蟾酥蝸牛白頸蚯蚓田中螺牡蠣石決明海蛤蚶殼珍珠龜甲鱉甲蟹水蛭蚺蛇膽蛇蛇脫白花蛇烏蛇鯉甲魚鯽魚鯉魚鯉魚膽青魚膽石首魚烏賊骨人部亂髮人乳汁人糞糞清人溺襠月水汁人中白天靈蓋人牙人胞
