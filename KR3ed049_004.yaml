body:
  text: 卷四癰疽只是熱勝血陰陽相滯而生人中年以後不宜有此病真人活命飲治一切癰疽腫毒穿山甲三片切碎蛤粉炒天花粉甘草節乳香白芷赤芍貝母各一錢防風七分沒藥皂角刺各五分當歸尾酒洗陳皮各一錢半金銀花三錢在背俞皂角刺為君在腹白芷為君在胸加瓜蔞仁二錢在四肢金銀花為君如疔瘡加紫河車草三錢作一帖用老酒鍾半煎一鍾溫服煎法須用大瓦器以紙封口勿令泄氣服時須辨症上下飢飽服之能飲酒者再飲數杯忌酸物鐵器此劑宜服於未潰之先治癰疽神方豬蹄湯用肥牙豬後蹄一隻約二斤半不用鹽井花水入大瓦罐煨爛取出著鹽少許與病者下飯其湯吹去面上油以鵝翎蘸洗患處不住手洗令瘡知腥氣易潰洗畢以抿子塗麥飯石膏但有紅暈處盡塗之麥飯石膏白麥飯石二兩有小如鵝卵石者有大如鵝卵石者其色有青黑紅白點相間惟鬆脆為佳一捶即碎者是白蘞一兩鹿角灰四兩以大火煅麥飯石今紅用陳米醋淬十二次將清水洗淨焙乾為極細末白蘞去皮為末鹿角用新者東流水浸三日一日一換三日後火煅煙將盡急入磁罐內布包以糍粑一團急急封固存性冷定取出石臼中杵為末陳米醋調勻如稀醬用文武火熬槐枝不住手攪俟藥起魚眼泡即取出入大磁碗封固置水中出火氣一日夜先將豬蹄湯洗以抿子挑此膏塗患處中留一孔一日一換令膿水盡出陳肉腐落瘡內黑物如蝌蚪子者一一脫下不留一顆然後用神異膏若黑子不盡則餘毒未除數年再發神異膏玄參全蛇蛻鹽水洗焙乾男子發洗淨各五錢杏仁一兩去皮尖黃耆三兩露蜂房有小蜂多者一兩黃丹水飛過六兩麻油一斤先入發熬化盡即入杏仁熬黑色後下玄參黃耆慢火熬一二時取起冷半時火力稍息旋入蜂房蛇蛻用槐枝急攪卻移於火上不住手攪慢火再熬紫黃色用布濾過下黃丹急攪片時又移上火熬不住手攪成膏傾入水中三日出火毒日日換水神效托裡散治癰疽發背腸癰奶癰無名腫毒焮作疼痛增寒壯熱不問老幼虛弱人並治之忍冬草去梗黃耆各五兩當歸五兩二錢甘草炙八錢為細末每服二錢酒二鍾煎一鍾病上食後服病下食前服少頃再進留滓外敷未成內消已成即潰人參敗毒散治癰疽焮赤腫毒方見傷寒門陰陽黃治發背癰疽疔瘡惡癤一切無名惡瘡腫毒焮熱疼痛初起未潰者錦紋大黃不拘多少一半火煨熟一半生用甘草節等分為細末每服一匙空心溫酒調下一二服疏利為度內托復煎散焮腫於外根盤不深形症在外而其脈浮者病在皮肉非氣盛則必侵於內急宜服之托裡健胃地骨皮黃芩茯苓芍藥人參黃耆白朮桂甘草防己當歸各一兩防風二兩先以蒼朮一斤水五升煎三升去朮入前藥再煎至三四盞取出清汁分三四次終日飲之如未已再煎半料飲之如大便祕煩熱少服黃連湯如微利及煩熱已退仍與此散使榮衛俱行邪氣不能內傷也治癰疽發背一切腫毒藥酒神方天花粉一兩新鮮者甘草節二錢皂角刺三錢乳香豆大者五粒先炒皂角刺後入三味共炒以乳香氣透為度下無灰老酒三碗煮至一碗去渣隨毒上下飢飽服未成者即散已成者即潰已潰者不必服槐花酒治發背疔瘡腫毒不問已成未成但焮痛者並治槐花四兩炒微黃乘熱入酒二鍾半前十餘沸去渣熱服一二服未成者即消已成者即愈忍冬酒治癰疽發背婦人乳癰初發者忍冬藤五兩捶碎生甘草節一兩入砂罐內水二碗慢火煎一碗入好酒一大碗再煎數沸去渣作三次溫服一日夜吃盡如病重者一日一夜服兩劑俟大小腸通則藥力到又取忍冬葉搗爛入白酒少許塗瘡四圍中留一口以泄毒氣敗毒流氣飲治發背木香獨活紫蘇白芷芍藥黃耆各一錢羌活當歸各二錢枳殼一錢半防風厚朴茯苓陳皮各八分官桂甘草各五分水二鍾煎八分食後服治發背並一切無名腫毒穿山甲炙甘草節防風赤芍白芷沒藥各六分乳香當歸尾天花粉皂角刺貝母各八分金銀花陳皮紫花地丁各三錢水鍾半酒鍾半煎一鍾食運服渣再煎內疏黃連湯治瘡皮色腫硬發而嘔大便燥結脈洪實者黃連芍藥當歸檳榔木香黃芩梔子薄荷桔梗甘草各一兩大黃二兩五錢連翹二兩每服一兩水鍾半姜三片煎七分食前服止痛當歸散治腦疽發背穿潰疼痛當歸黃耆人參官桂芍藥生地甘草炙各一錢五分水鍾半煎一鍾去渣溫服日進三服治一切腫毒宣藥無膿即散有膿從大便出穿山甲炒羚羊角炒乳香大黃各一錢俱為末皂角刺七枝金銀花天花粉厚朴各一錢桃仁四十九個水一鍾煎六分入前四味藥末調服益氣養榮湯白朮炒二錢人參陳皮香附甘草熟地白茯苓貝母當歸酒拌桔梗白芍各一錢水二鍾煎八分隨瘡上下食前後服口乾加五味子麥門冬往來寒熱加軟柴胡地骨皮膿清加黃耆膿多加川芎肌肉遲生加白蘞肉桂黃耆六一湯治癰疽發渴黃耆六兩蜜炙甘草一兩炙酒煎服血虛加當歸生地紫金錠治癰疽發背疔腫對口天蛇等一切惡瘡諸風隱疹赤腫諸瘤未破時並用淡酒磨服冷水調塗瘡上日夜各數次覺癢立消已潰出膿者不宜服治諸腫發背一應惡瘡用明礬不拘多少五月五日午時研為細末曬乾磁器收貯但遇腫毒初起時以礬三錢加蔥頭細搗拌勻為丸好酒吞下在上飽服在下空心服儘量一醉或吐以茶壓之仍以前曬過礬末五錢加麝香一分取活蝦蟆腸搗爛敷毒周圍留頭出氣不一日夜即愈若端午未制臨時以礬照前用亦可透膿散治諸癰瘡及貼骨癰不破者不用針刀一服即透蛾口繭用出子蠶蛾者燒灰酒調服即造不可多若多服一個即多一個瘡口切勿輕忽黃蠟作小粒服之亦可亦不可多治發背陰毒不焮腫熱者是用雄雞剪其冠尖少許懸腳向下滴血瘡上血盡再換不過五六雞止痛消毒其瘡不數日自愈發背諸腫毒外掃神方用雄狗下頦連皮毛燒灰存性一兩生豌豆一兩白蘞一兩為細末醋調雞翎掃患處待乾再掃不論數十遍甚者醋調服如瘡破者以椿白皮煎湯洗淨拭乾將赤石脂石青磁為末各一兩摻之凡癰毒發背無名腫毒初起者急取蟾酥三五分廣膠一塊釅米醋一二碗入銚內火化開用筆蘸乘熱令人不住手周圍運之以散為度諸腫毒初起敷藥大黃南星各二兩五倍子一兩銅青二錢上為末醋調敷十味鐵箍散治發背諸腫毒瘡黃柏黃連白蘞半夏何首烏白芷陳小粉百草霜各一兩半大黃二兩芙蓉葉三兩半上為末用豬膽汁或米醋調塗患處留頭烏龍膏治一切癰疽發背無名腫毒初發焮熱未破者用陳年小粉不拘多少人鍋炒令成黃黑色取出待冷碾極細以陳米醋調稀稠得所如過稀微火熬之其色如漆磁瓶收貯遇有腫毒量所腫大小用榜紙攤成膏藥中剪一孔露出毒頭貼上疼痛即止少頃覺癢久則腫毒自消甚效諸腫毒圍藥巴豆去殼加豬膽汁擂細再加陳米醋擂如稀糊鵝翎刷上留頂如干又刷待皮皺漸漸自消不過半日刷一二十次愈矣不可刷在好肉上又方云一切癰疽識者希醋磨京墨達四圍薑汁豬膽同塗上天明恰似鬼神移又方用尿瓶內垢塗之初起者能散腫硬者速軟凡一切腫毒發背將蒜搗爛鋪上用文火周圍灸之不疼者以疼為度疼者以不疼力度其毒即收小自愈如灸過二十艾不痛不癢者不治凡一切腫毒掀熱疼痛不出膿者用田螺連殼搗爛合上即咬頭出膿試效神仙蠟硯丸治癰疽及腸癰托裡消毒固臟腑止疼痛黃蠟二兩明礬三兩先將黃蠟熔開離火待少溫入礬末和勻衆手急丸如桐子大每服二三十丸食前酒下每日二服此藥不惟定痛生肌且護膜止瀉消毒化膿內癰排膿托裡之功甚大金石藥毒發疽非此莫治更用白礬為末每日酒服一錢尤效有遍身生瘡狀如蛇頭者尤宜服之每日百丸若蛇蠍並一切毒蟲所傷熔化熱塗患處內更服之毒即解服至三四兩以上愈見其功此宜於癰毒潰後服之腸癰尤效五疔五發奇效丸治疔瘡發背乳香沒藥血竭木香巴豆不去油各一兩為末煉蜜丸龍眼核大每服一丸時酒嚼蔥爛送下麝香膏蟾肝以銅刀割取石灰各等分麝香和勻搗成膏俟癰疽腫毒成膿未破者用此黏瘡上頭即破緑膏藥腫毒不出膿者用此咬頭乳香沒藥銅青松香萆麻子去殼木鱉子去殼杏仁去皮巴豆去殼各等分上為末搗成膏油紙攤貼瘡頭上洗癰疽法腫時用紫葛天喬麥忍冬藤金絲草各等分煎湯洗潰時白芷甘草羌活黃芩露蜂房赤芍藥當歸頭先將豬前蹄一隻煮汁去油花取清汁煎藥去渣溫洗以絹拭之灸癰疽法男左女右以篾一根前齊中指端後至手腕橫紋凹中截斷為準卻以竹一根兩頭擱起令病人騎之兩足不著地挺身正坐將前篾植於竹上以正頭置脊骨中盡處各開一寸名騎竹馬法灸七壯灸畢宜用乳香真緑豆粉為末水調服之以防火氣入心癰疽收口藥白龍骨白蘞乳香沒藥各等分為末摻之治騎馬癰大粉草帶節四兩長流水一碗以甘草淬水盡焙為末入皂莢灰少許作四服湯調下治附骨疽熱在血分之極初覺先以青皮甘草節服之後破當養血以人參黃連茯苓各二錢瓜蔞子四十八粒作二帖入竹瀝熱飲之三生散治漫腫光色附骨疽露蜂房頭髮燒存性蛇蛻各等分為末每服三錢酒調下治朽骨久疽取烏骨雞脛骨以上等雌黃實之鹽泥固濟火煅通紅取出置地上出火毒去泥用骨研細飯九粟米大以紙捻送入孔中竅內更用膏藥貼之治痔漏亦效乳癰結核初起時須忍痛搓令稍軟吮令汁透自散否則必成癰以艾灸兩三壯於腫處其效尤捷不可輒用針刀治乳癰未潰者有用何首烏搗爛和糟炒微熱合之甚效青皮甘草節瓜蔞仁金銀花當歸沒藥皂角刺青橘葉如無橘葉用橘紅水一鍾酒半鍾煎八分蜈蚣一條炙為末調入食後服己潰用參耆芎歸白芍青皮瓜蔞甘草節煎服一方用蒲公英金銀花煎以少酒佐之治乳癰化熱毒消惡腫結核有奇效服後即欲睡是其功也凡乳癰發痛者生於心也俗呼吹奶是也吹者風也風熱結於乳房之間血脈凝注久而不散潰腐為膿宜用益元散生薑湯調下冷服或新汲水時時呷之晝夜可三五十次自解或煎解毒湯頓服之婦人憂怒阻積遂成隱核不痛不癢年久方陷下名曰乳岩此極難愈用華皮油胡桃燒灰存性入枯礬輕粉少許香油調敷治乳有核南星貝母連翹瓜蔞仁甘草節各一兩水煎入酒服治乳硬痛沒藥一錢甘草當歸各三錢水煎入酒少許熱服祝由科乳癰咒法出張子和儒門事親咒曰謹請東方護司族吹奶是灰奶子上用之時先問病人曰甚病病人曰吹奶取此氣一口但吹在兩手坎寧紋上用大拇指緊捏定面北立一氣念七遍吹在北方如此者三遍作法時以二婦人面病人左右立於病乳上揉一二百數如此亦三遍即愈諸癰疸受病經絡頂門癰受在六腑不調陰陽不和熱氣上壅而成毒傷於胞絡此是惡症先用散毒流氣飲後用內托流氣飲赤面疔受在脾經傷於筋骨氣血凝滯毒氣風熱侵肝先用流氣追毒飲後用內托飲耳風毒受在心經腎氣不行心經傷於五腫耳痔耳疳耳癰耳濕耳爛先用清肝流氣飲後用定痛降氣湯如不退耳痔耳癰用針刺破以紅玉膏貼之肩癰受在腎膀胱血氣凝滯不行結成珠毒先用人參敗毒散後用內托飲肩疽受於腎肝血氣不行結成惡毒藥同前乳根癰受於脾經氣血不行凝結成毒先用散毒流氣飲後用乳香飲脅肚癰受在大小二腸二經氣壅用加味內托流氣飲腎氣遊毒受在腎膀胱冷氣傷於腎結成惡毒用紫蘇流氣飲檳榔丸手背疽受在心脾陰毒反生流於手用定痛流氣飲內托散腳心癰受在心腎壅在腳心乃為濕毒用定痛流氣飲檳榔丸鞋帶癰受在腸濕傷手為毒上發背受在胸神經上傷於肺經鬱結怒氣傷肝中發背受在神靈經惡毒血湧出不能歸肝氣血壅在背肝經之症發背受在肝脾經流於五臟傷於三經用敗毒流氣飲內托流氣飲肺癰咳唾膿血其脈數實或口中咳胸中隱痛脈反滑數者為肺癰先以小青龍湯一帖解表之邪氣然後以葶藶大棗瀉肺湯葦葉湯隨症用之以取膿此治腫瘍之例終以黃昏湯以補里之陰氣此治潰瘍之例也試肺癰法凡人胸中隱隱疼咳嗽有臭痰吐在水內沉者是癰症浮者是痰治肺癰野毛栗根二兩水二鍾煎五分服之覺肺中微有聲服數次即愈又方百合搗汁酒和服六七次又方山冬青葉搗酒服凡肺癰已破入風者不治或用太乙膏丸服以搜風湯吐之治吐膿血如肺癰狀口臭他方不應者宜消風散入男子發灰清米湯下兩服除根葶藶大棗瀉肺湯治肺喘不得臥葶藶炒黃研末丸如彈子大大棗水三鍾入大棗煎二鍾去棗入葶藶又煎至一鍾服葦葉湯治咳而微熱心煩胸中錯雜蘆葦葉二斤切碎薏苡仁瓜蔞仁各半斤桃仁五十個去皮尖水煎服黃昏湯合歡樹皮一掌大水三鍾煎至一半作兩服腸癰大腸有痰積死血流注作濕熱積治近肛門破入風者難治千金方謂其病小腹重強按則痛小便似淋時時汗出復惡寒身皮甲錯腹皮急如腫脈數者微有膿也或云洪數已有膿脈若遲緊者未有膿甚者腹脹大轉側有水聲或繞臍生瘡或膿自臍出或大便膿血此其症也又云脈遲緊則為瘀血下則安治法桃仁承氣湯加連翹秦艽入風者加防風蠟礬丸最效灸法曲兩肘正肘頭鋭骨灸百壯下膿即安囊癰者濕熱下注也有作膿者膿儘自安不藥可也太乙膏可貼臀癰臀疽小腹之後在下此陰中之陰也道遠位僻雖曰多血然氣血不到血亦罕來中年後尤慮此才有腫痛參之脈證但見虛弱便與滋補血氣可保終吉凡癰先發為腫氣血鬱積蒸肉為膿故其痛多於瘡之始作者也膿潰之後腫退肌寬痛必漸減而反痛者此為虛宜補亦有穢氣所觸宜和解如風寒逼者宜溫散治便毒己結成膿用大黃連翹各五錢枳實三錢厚朴甘草節各二錢桃仁二十一粒姜三片分三帖煎服消毒散治便毒初發三四時可消皂角刺金銀花防風當歸甘草節大黃瓜蔞仁各等分水酒各一鍾煎食前溫服仍頻提頂中發立效便毒初發用獨核肥皂一個入亂髮裝滿燒存性為末作一服好酒下又將肥皂和米醋搗爛合之治魚口用榆皮為末醋調敷神仙太乙膏治一切癰疽瘡毒已未成潰者如發背先以溫水洗淨軟絹拭乾用緋帛攤貼更為丸冷水送下血氣不通溫酒下赤白帶當歸酒下咳嗽及喉閉纏喉風並用新綿裹置口中噙化一切風赤眼捏作小餅貼太陽穴更以山梔子湯下打撲傷損外貼內服橘皮湯下腰漆疼痛貼患處鹽湯下唾血桑皮湯下以蛤粉為衣其膏可以十餘年不壞又治瘰癧瘡並用鹽湯洗貼酒下一丸楊梅瘡毒潰爛者尤效婦人經脈不通腹痛甘草湯下並攤貼之經行痛止一切疥瘡用麻油煎滾和膏塗之虎犬蛇蠍湯刀斧傷皆可內服外貼玄參白芷當歸赤芍肉桂大黃生地各一兩麻油二斤入銅鍋內煎至黑濾去渣入黃丹十二兩再煎滴水捻軟硬得中即成膏矣腫毒跌撲疼痛加乳香沒藥制丹法黃丹先炒紫色傾缸內用滾水一桶泡之再汲涼水滿缸用棒常攪浸一宿去水再炒如前二次方研令極細用比天膏此淮安王寡婦家祕傳麻黃川芎白芷薄荷草烏全蠍各二兩防風連翹黃芩黃連大黃知母貝母當歸蒼朮羌活梔子桔梗柴胡荊芥五倍子海螵蛸白及穿山甲木鱉子大楓子蛇蛻血餘各三兩椿皮桑枝槐枝柳枝二小許者各二十段片腦一錢麝香二錢乳香沒藥各五錢龍骨血蠍赤石脂各三錢輕粉二兩上麻黃等粗藥人麻油內浸一宿文武火熬至藥枯黑色去渣再熬滴水成珠每油二斤入蜜陀僧一斤收成膏下片腦等細藥柳枝不住手攪入水中出火毒收用癰疽發背無名腫毒疔瘡瘰癧鼠瘡臁瘡棒瘡刀傷便毒魚口風癬頑瘡多日不滿口常流膿水婦人吹乳奶疽瘡癤等項先將花椒湯洗淨貼肩背風吹兩膊痠疼貼肩並穴左右肘疼貼曲池穴風寒濕氣腰眼大腿痠麻貼患處兩曲膝冷痛貼膝眼上腳氣舉發貼疼處跌打損傷貼患處以上諸症俱用食鹽炒熱布包尉患處令透毛孔方貼之麒麟竭膏當歸木鱉子知母五倍子細辛白芷各五錢槐枝柳枝長寸許者各十四條血竭三錢乳香沒藥各五錢輕粉二錢雄黃四錢麝香二錢松香十兩搗末瀝清二兩搗末一方用山茨菰紅芽大戟千金子各五錢上用麻油三兩半同前粗藥入鍋以文武火熬用槐枝不住手攪令焦色濾出渣再將油入鍋先下松香瀝青不住手攪如沸溢取下火攪之再上火熬滴水成珠為度下火將血竭等六味細藥下內速攪令勻傾出水盆中半日後以手搏之漸漸軟和揉扯翻覆如金絲狀再入水浸如前揉扯春夏頻換水若急用亦浸一兩宿一切癰疽毒瘡生者貼之即散熟者即穿敗生肌一切疔腫結核並貼患處臁瘡先用齏汁白礬入湯用鵝翎洗淨以牛蒡子葉或金剛膝葉先貼瘡半日取盡惡水然後貼此膏一切臀股黃濕癢痛等瘡並洗淨揭干貼患處一切打撲損傷脞肭氣閃等症俱貼患處頭疼貼兩太陽赤眼貼眼胞魚尾際暴傷風冷嗽貼脊心牙疼刮藥塞齒縫面腫者再貼面上小兒疳痢等疾丸緑豆大米飲下二三十丸一切風寒濕癢臂腿痛貼痛處仙傳萬靈膏忌用鐵鍋煎羌活獨活山梔官桂玄參大黃當歸白芷皂角兩頭尖五倍子赤芍生地熟地防風天花粉黃連川芎山慈姑連翹紅芽大戟桔梗白及白蘞苦參各六錢穿山甲十片木鱉子二十粒去殼萆麻子八十粒去殼杏仁四十粒巴豆三十粒去殼血餘四兩槐枝柳枝桑枝寸許長者各三十段麻油二斤四兩春秋浸三日夏浸二日冬浸五日熬枯黑色去渣再熬滴水成珠每油二斤下飛丹一斤松香三兩黃蠟二兩桐油二兩熬不老不嫩稍冷入乳香沒藥各六錢血竭阿魏孩兒茶百草霜輕粉馬莧膏各三錢桑枝攪勻攤貼癰疽發背癧瘡用火烘手熱摩百餘下貼已出膿者不必摩疥癬瘡瘙癢貼風癩用木鱉子火煨研爛置腫上貼無名腫毒貼患處跌撲刀斧傷貼患處風痰壅塞貼心上熱手摩百下痞塊木鱉子研爛置膏藥上貼之以皮硝一兩鴿糞五錢蒜二個搗勻用面作一圈圍定在膏藥外尉斗火運藥上令氣透蠱脹加煨木鱉貼心下臍上熱手摩百次癱瘓濕氣痛加煨木鱉貼患處手摩百下月經不調貼血海穴手摩百下大黑虎膏癰疽發背跌撲損傷折骨疔瘡並皆治之白芷大黃黃連白及白蘞黃芩木鱉子黃柏羌活獨活金毛狗脊杏仁當歸芍藥川芎肉蓯蓉生地前胡肉桂柴胡荊芥穗黃耆連翹防風萆麻子各一兩乳香沒藥血竭各一兩樟腦血餘各四兩香油三斤飛丹一斤麝香五錢槐柳枝各二兩上乳香等細藥另研聽用余藥入油熬黑枯色濾去渣再熬滴水不散入飛丹以槐枝不住手攪入水和軟不斷不黏住火入乳香沒藥血竭三味次入樟腦麝香攪勻收用攤貼靈異膏一縣君腿患毒疽屢治不愈欲辭官後得此膏一貼即愈以百金易其方豫偶得之不敢私因梓以傳勿用鐵鍋煎防風梔子黃芩當歸生地忌鐵器甘草苦參金銀花大黃海風藤赤芍黃柏連翹荊芥白蒺藜槐枝各二兩何首烏忌鐵器牛蒡子白芷杏仁地榆各一兩木通川芎山豆根蒼朮獨活羌活蜂房蟬蛻姜蠶白及白蘞麻黃丹皮各五錢乳香二兩沒藥血竭海螵蛸孩兒茶龍骨各一兩赤石脂二兩麝香二錢樟腦輕粉黃蠟白蠟各五錢黃丹水飛過淨三斤麻油六斤浸藥七日入亂髮三兩熬焦黑色發化盡去渣再熬滴水成珠下丹收成膏停火下乳香等細藥再候少溫下輕粉麝香黃白蠟溶化入水中出火毒磁瓶收用呼膿長肉膏癰疽發背疔癤等毒已破出膿者用油攤貼如膿多以絹揩淨火邊略烘再貼第三次不可用矣另換一個再貼俟瘡勢將收口量瘡大小貼之麻油三斤發一團入油熬化次入後藥當歸黃耆黃連各一兩半黃柏大黃黃芩白芷杏仁防風荊芥羌活獨活連翹山梔各一兩赤芍地黃白及金銀花青藤各八錢桃柳槐枝各七寸煎法通以前藥入油內熬枯黑色為度住火去渣用飛過黃丹八兩黃蠟五兩瀝青二兩同煎至油滾漸漸加之滴水軟硬得所不黏乎為度加乳香沒藥各六錢輕粉五錢血竭三錢收用攤貼雲母膏治一切瘡腫折傷白芷川椒閉口者去目微炒赤芍肉桂當歸菖蒲黃耆白及川芎龍膽草自蘞防風厚朴桔梗柴胡蒼朮黃芩夜合皮硝石雲母甘草各四兩高良薑附子茯苓各五錢陳皮一兩桑槐柳枝柏葉各二兩木香鹽花乳香沒藥麒麟竭松香各四兩麝香四錢黃丹十四兩水飛清油四十兩上除細藥並用鹽木香九味另研外余藥入油浸七日文火煎以柳枝不住手攪藥黑枯為度去渣再煎滴水成珠後入細藥仍攪不住手取起俟將凝入麝香攪勻磁器收貯用水銀三兩以絹包細彈藥上謂之養藥每用時刮去水銀攤貼紅膏藥貼諸腫毒瘡癤極能呼膿松香一斤用蔥薑汁各一碗煮過入燭油四兩化勻再入紅礬四兩攪勻離火後再入後藥川芎三奈白芷黃連黃柏各五錢乳香沒藥孩兒茶血竭輕粉各一錢半為極細末人油內攪勻收用千里光膏貼瘡癤風癬楊梅瘡毒鵝掌風極效千里光採莖葉搗汁砂鍋內熬成膏防風荊芥黃柏金銀花當歸生地各二兩川椒白芷大黃紅花各一兩苦參四兩麻油浸三日熬桔黑色去渣每油二碗配千里光膏一碗再熬滴水成珠飛丹收成膏入試香沒藥各一兩輕粉三錢槐枝攪勻收用百草膏貼一切瘡腫風氣跌打損傷甚效五月五日採活血去風敗毒凡可治病草木百種洗淨搗汁砂鍋內熬成膏每草膏五斤配麻油十斤再熬滴水成珠為度每油二斤入黃白蠟飛丹各二兩松香四兩用鉛粉收成膏加乳香沒藥樟腦各五錢槐枝攪勻收用必慣識草藥人採取不治病野草勿用十香膏治癰疽發背乳癖便毒閃腰挫氣跌打損傷筋骨疼痛手足頑麻痞塊疝氣未破楊梅風毒一切腫毒瘡癤大黃當歸尾桃仁鱉甲半夏麻黃牙皂細辛烏藥赤芍穿山甲草烏大戟白芷桂皮貝母天花粉防已金銀花巴豆去殼萆麻子去殼黃耆防風荊芥兩頭尖牛膝羌活獨活良薑紅花牛蒡子蘇木連翹白及白蘞天麻甘草節海風藤黃連黃柏黃芩柴胡千金子全蠍殭蠶蜂房各五錢玄參苦參各二兩發灰五錢蝟皮一兩蜈蚣三條蛇蛻一條桃柳槐桑枝寸許長者各二十一段上麻油浸七日熬黑枯色去渣再熬滴水成珠每油二斤入鉛粉半斤飛丹半斤收成膏人後細藥木香沉香檀香降香丁香藿香楓香各三錢麝香一錢樟腦五錢乳香八錢沒藥血竭雄黃各五錢為極細末桑枝不住手攪勻入水中出火毒收用瘰癧附馬刀瘡屬血氣痰熱必起於少陽一經不守禁忌延及陽明大抵食味之厚部氣之積曰毒曰風曰熱皆此三端拓引變換須分虛實實者易治虛者可慮以其屬膽經主決斷有相火且氣多血少婦人見此若月經如期不作寒熱易治稍久轉為潮熱危矣自非斷欲食淡神仙不治也瘰癧初發將朴硝海螵蛸五倍子為末以薑汁和成餅置瘡上又用商陸根切片如三個錢厚蓋藥上艾灸二七壯如患處疼再換餅子根片夏枯草湯治瘰癧馬刀不問已未潰或日久成漏用夏枯草六兩水二鍾煎七分去渣食遠服此生血治瘰癧之聖藥虛甚當煎濃膏並塗患處多服益善兼十全大補湯加香附子貝母遠志尤妙本草云夏枯草大治瘰癧散結氣有補養厥陰血脈之功能退寒熱虛者可服實者以行散之藥佐之瘰癧經驗方海鹽鐘上舍諱祖述者十五歲患此症幾致不救遇一金陵異人傳此方服之而愈鍾君欲廣其傳因授豫梓之煎藥方人參射干當歸桔梗茯苓川芎何首烏忌鐵器白芍陳皮熟地薑汁拌炒貝母各一錢連翹玄參各七分白朮一錢半黃耆八分甘草山慈姑各五分金銀花夏枯草各二錢水二鍾酒一鍾煎八分臨睡或食遠服渣煎四分藥酒方夏枯草上昆布中當歸中龍膽草中金銀花上上川芎中連翹上柴胡下白鮮皮下薄荷中半夏下瓜蔞仁上黃芩中甘草下下皂角刺下淡竹茹上生薑下上用老酒七斤入前藥蒸隨量不拘時服敷藥方瘡已破膿正多瘡正腫用此敷之呼膿退腫蚯蚓糞韭菜地上者佳茶葉炒灰存性肥皂核用獨核者鍛存性蜣螂用泥包煅存性壁虎瓦上焙乾貓頭骨炙雄鼠糞焙共為細末和生麻油調敷每日清晨藥湯洗淨敷之一日洗五六次敷五六次待膿干即用膏藥貼之膏藥方膿已盡腫已平瘡口未斂用此貼之蝦蟆皮二個要活剝者鼠皮二張蛇退二條蜂房大者一個上四味俱煅灰將水膠一兩用井花水一酒鍾化開後加蜜一兩蜈蚣煎麻油一小鐘攪勻前四味灰臨起入麝香一分將絹攤來不濕為度洗藥方金銀花夏枯草甘草防風紫花地丁荊芥煎濃湯溫洗勿入生水此症一要絶欲即心動瘡口便出清水旬日難取藥效二要禁口如魚蝦蟹雞鵝豬首肝腸羊筍面煎炒油膩一切有毒發病助火之物俱勿用最宜食淡三要戒怒氣患此症者生死相半勿輕視之鐘上舍雲海鹽一道人患瘰癧兩年後忽痊愈詢之載無別藥惟日服夏枯草春夏搗汁溫服秋冬煮汁飲之不食一切發物及飲酒茹葷止淡粥白菜而已此真得戒口絶欲之法者豈特夏枯草一味之功哉瘰癧奇方亦可消瘤去痣石灰半斤研極細末大黃四兩同入鍋內炒通紅去大黃取石灰聽用又將洗減四兩和水四五碗枇粑葉七片共煮水乾至一半入前石灰攪勻再煮水將干聽用又以蛇含石二兩醋煅七次為末又以芫花五錢為末漸漸加入攪勻成膏每膏一兩加瞻酥麝香各二分為丸胡椒大未破者將一丸黏核上其丸自入以淡豬肉湯洗過又黏又洗如此三次其核自動將皮繃開以銀鉤取出核即貼生肌膏生肌膏麻油一斤化胎髮一團熬滴水成珠龍骨煅黃占熟豬油赤石脂乳香沒藥輕粉象皮煅各一錢俱為細末入油內攪勻成膏攤貼一日一換仍以豬肉湯洗三四次即平半月收口取核時先服提氣湯提氣湯人參白芷生地龍膽草川芎升麻柴胡乳香甘草貝母橘紅香附桔梗各等分薑棗水煎服又方治瘰癧牡蠣四兩煅過玄參三兩共為末糊丸梧子大每服三十五丸酒下一方加甘草二兩又方海藻洗淨曬乾昆布揉去土同藻洗研為末何首烏木臼搗為末公蛇退一條樹上或牆上是雄平地上者是雌皂角刺炒令黃色共為細末和勻以豬項下刀口肉燒熟蘸前藥末吃食後倒患處眠一伏時每核灸七壯口中覺煙氣為度膿盡即安神仙太乙膏貼已破瘰癧甚效方見癰疽門一方桑椹黑熟者搗汁熬膏白湯調服紅色者曬乾為末湯調服一方大田螺連肉燒灰存性為末入麝香少許濕則干敷干則油調敷蠟礬丸治瘰癧甚效方見癰疽門紫金錠治瘰癧亦效方見痰門一方斑蝥七八個去頭足翅將雞子一個頂上敲開入藥在內紙封固飯上蒸熟取出藥止將雞子空心飯嚼服小便通如米泔狀即驗也後當服連翹丸連翹丸連翹三兩漏蘆胡桃仁夏枯草土瓜根射干澤蘭沙參白及各一兩上為末以桃仁研勻酒糊丸桐子大每服五十丸空心鹽酒下升陽調經丸治瘰癧神效升麻八錢葛根草龍膽酒炒黃連桔梗連翹黃柏酒炒黃芩廣朮酒炒甘草炙京三稜酒炒夏枯草各五錢當歸尾芍藥煨各三錢生黃芩四錢上藥將一半為末煉蜜丸緑豆大每服一百二十丸白湯下一半㕮咀每服五錢煎服半月後即愈治馬刀瘡柴胡黃芩各二錢黃連牛蒡子炒各五錢黃耆瓜蔞當歸尾甘草各一錢連翹三錢紅花少許每服半兩水二大盞煎一盞去粗食後熱服忌酒面治血少馬刀瘰癧肚泄以四物湯加炒芍藥牡蠣陳皮柴胡甘草黃連玄參神麯炒桑椹膏為丸灸法治瘰癧久不愈者灸肘尖並間使二穴患左灸右患右灸左一云初生時灸曲池男左女右癭氣結核治方用海藻一兩黃柏二兩為末置掌中時時舐之以津咽下消三分之二止藥須斷厚味海帶丸海帶貝母青皮陳皮各等分上為末煉蜜丸彈子大每服一丸食後噙化下治氣核連串身發寒熱夏枯草五錢香附貝母各二錢五分水二鍾煎八分熱服治頸項下生核不紅不痛不作膿推動者多是痰聚不散陳皮半夏茯苓甘草大黃連翹桔梗柴胡水煎食後服治臂核作痛陳皮半夏茯苓防風酒黃芩各一錢連翹二錢川芎蒼朮各五分甘草三分皂角刺一錢半水煎服治耳後頂門各有一塊殭蠶炒大黃酒炒青黛膽星各等分為末蜜丸噙化南星膏治肌膚頭面生瘡瘤大如拳小如栗或軟或硬不疼不痛宜用此藥不可輒用針灸亦可治癰腫天南星大者一枚細研稠黏滴好醋五七滴和膏如無鮮者則以乾者為末醋調如膏先將小針刺腫處令氣透卻以膏攤紙上相瘤大小貼之覺癢則頻貼取效治頸項浮腫大黃一兩榆皮五錢皮硝三錢共為末用醋水各一半調敷周圍自散疔瘡飛龍奪命丹專治疔瘡發背胸疽吹乳癰疽一切無名腫毒惡瘡無頭者服之有頭不痛者服之知痛已成形者服之立愈危急者服之無失蟾酥乾者酒化雄黃各二錢血竭膽礬寒水石各一錢乳香沒藥銅緑各二錢輕粉麝香各五分海洋即蝸牛連殼二十一個硃砂一錢作衣為末先將海洋研為泥和勻為丸緑豆大如丸不就加好酒杵千下每服二三丸先用蔥白三寸病者嚼爛吐於男左女右手心將嚼爛蔥裹藥用無灰酒三四盞溫熱送下於避風處臥以衣蓋暖約人行五七里許飲熱酒數杯少助藥力發熱大汗為度其疾立愈大重不過三服龍牙一醉飲治疔瘡龍牙草五月五日午時採取陰乾用好酒浸搗絞汁量加乳香沒藥緑豆粉和飲將渣敷瘡上不許吃茶水只可飲酒即洗面亦用酒又方紫河車菊花根紫花地丁芝麻頭和一處搗爛絞汁酒和服又方蝸牛一個荔枝肉半個霜梅向半個銀硃三分搗合治芝麻疔以丫藤絲瓜燒存性酒調服鮮芝麻頭嚼合治疔瘡用針刀鏈破頭上以蟾酥敷之後用緑豆野菊花末酒調飲醉睡覺即痛定熱除不必去疔自愈也治一切疔瘡用紫梗菊花根莖葉共搗取汁滴口中飲之一方巴豆一粒螳螂一個搗極爛敷瘡上又能拔箭頭一方用夏月廁中取糞蛆洗淨曬乾為末酒調服紫金錠亦可敷服方見痰門針頭萬應膏治諸般疔瘡疽癤惡毒歹瘡乳香麝香雄黃各一錢輕粉硇砂蟾酥血竭各三錢蜈蚣一條炒冰片一分為末研搗成丸黍米大如瘡有頭用針破出血捺一丸在內用紙封或膏藥貼之保生錠子治發背疔瘡救苦取真蟾酥三錢青桑皮二兩同搗如泥入雄黃二錢再搗掏作錠每錠重六分硃砂為衣陰乾如發背用冷蔥湯磨下八分仍用冷蔥湯嗽口亦咽下再磨二分用雞翎掃患處被蓋出汗療瘡用披針於瘡頭上刺一孔用一分填孔內二日爛出亦用冷蔥湯磨服汗出力度治疔瘡發背腫毒瘰癧服一丸膿從小便出千金子五錢檳榔一兩用巴豆百粒去殼同炒黑去巴豆麝香三分冰片二分紫河車草一兩為末緑豆粉丸龍眼大照後引經藥送下頭上川芎手脅桂枝面上蔓荊子胸前枳殼遍身防風威靈仙足牛膝木瓜便毒燈草通草肚腹歸尾腰背杜仲各煎楊為引服治疔瘡及頭面熱毒瘡雄黃一兩釘鏽白梅肉各五錢消風散一兩夏月加鬼螺螄二十個上研細末苦鹽滷調勻貯磁罐內凡患疔腫毒瘡用銀針挑破毒頂敷上此藥以棉紙蓋定其毒收斂不走三日後即愈楊梅瘡楊梅瘡祕方先服防風通聖散二帖一帖去大黃芒硝加麻黃髮汗以除骨髓之毒一帖去麻黃加大黃芒硝令瀉以除腸胃之毒方服後藥十帖永不再發矣防風八錢當歸一兩二錢苡仁一兩半荊芥七錢赤芍木瓜五加皮白鮮皮金銀花各一兩生地熟地川芎各八錢上分作十貼每貼加上茯苓四兩去皮搗碎水酒各一鍾煎食後服渣再煎加味遺糧湯治楊梅瘡並楊梅風毒及誤服輕粉癰瘓筋骨疼痛不能動履者此藥能除根永無後患仙遺糧即硬飯糰濕者一兩乾者七錢白者佳紅者傷人薏苡仁木通自鮮皮木瓜防風金銀花各五分皂英子四分虛弱人加人參當歸各七分用水鍾半煎一鍾空心一服午前一服午後一服以前二渣並煎一服日進三服病淺者十餘日而愈病深者四十日痊忌牛肉燒酒此瘡發時多先起於下疳若與此方預服之則為功甚易可以止其不成瘡也又方土茯苓一斤酒洗七次蠶沙五錢白鮮皮五加皮各三兩荊芥穗二兩麻黃根二兩五錢天花粉連翹各一兩半防風當歸大黃各一兩羌治獨活各七錢牙皂九錢上勻為二十四帖水煎臨起約藥有一鍾對酒一鍾通口服以此一料全瘥治楊梅瘡方當歸川芎苡仁木通木瓜生地熟地金銀花漢防己防風荊芥黃柏白芷知母甘草皂莢豬苓二兩人參加硬飯糰二兩白色者佳山紅花刀豆殼上水煎服忌魚腥生冷四劑痊愈祕煉楊梅瘡藥辰砂雄黃鹽炒白礬炒緑礬炒焰硝名兩硼砂五錢上為末入陽城罐封固水火升打一炷香取出冷定開罐將升盞者剷下用磁瓶貯之黃蠟封口入井內三日取出每藥二分半配槐花末炒褐色者一兩飯丸桐子大每服十丸神效罐底渣可合疥瘡藥封罐口神膠破砂罐末草鞋灰山黃泥傾銀罐末燒鹽粽各一兩為極細末用鹽滷調如膠再入乳鉢擂細用抿子挑封罐口治廣瘡用槐花一升為細末滴水丸每服百丸不拘時溫酒送下楊梅瘡薰藥方水花朱榆樹皮線香水浸各二錢珍珠一分上為末和一處分作三錠曬乾一日一錠量人虛實薰有瘡處又方薰楊梅疥癬諸瘡用艾一兩雄黃一錢硃砂三分研細入艾拌勻草紙捲成筒薰之內服敗毒散薰楊梅瘡結毒方輕粉雄黃水銀水花朱鉛錫各等分將鉛用火熔開入水銀攪勻傾地上冷定輕粉水花朱各火炙黃色同雄黃三味為細末捻成紙條每一條用藥六分北方氣實者八分先以升子覆地上安空燈盞一個用油燈草一根夾紙捻同燒薰之每日一條令病人含緑豆湯以被裹頂坐蒸只七條痊愈點楊梅瘡法輕粉一錢杏仁十四粒以針刺向火中燒半熟半生研去皮尖共為綱末用真香油調搽即意結靨一方用千里光草煎膏點之立效太乙膏貼楊梅瘋毒破爛者甚效方見癰疽門治楊梅瘡初起擦法用晉礬四兩研細末令患者坐重幃中擦手足心少少細擦以盡為度七日汗出不上瘡即愈治痛風楊梅瘡此方平和而取效速當歸防風牛膝羌活甘草木瓜金銀花皂莢子懷熟地川芎各一錢土茯苓四兩水五鍾煎三鍾空心服一鍾將晚服一鍾渣再用水三鍾煎鍾半作茶用治筋骨疼痛遠年楊梅瘋毒頑瘡乳香沒藥孩兒茶丁香木香各三錢當歸一兩皂角四錢風蛇五錢酒浸去骨共為細末用麻油二兩銅鍋內煎滾下黃蠟二錢蜜一匙柿霜一錢燒酒三分米醋三分然後下藥末攪勻取起用北棗一斤煮爛去核和前藥內再搗丸如楊梅大每服用土茯苓三兩水三碗煎二碗下藥二丸再煎一二沸待化去渣溫服日三服渣再煎忌生冷魚腥茶酒房事治楊梅瘡潰爛年久不愈者用苦參連根葉搗爛取汁和酒飲治楊梅瘡筋骨疼痛久不愈者茜草麻黃烏藥各一撮細茶魚鰾三錢用苘麻炒成珠槐子炒焦花椒各五錢乳香一錢水二鍾姜五片蔥五根煎一鍾通口服二三帖即效治四塊鵝掌瘋千里光草一大握加蒼耳草一中分朝東牆頭草一小分共煎百沸將湯人瓶內以手少擦麝香入瓶薰之仍用絹布纏臂上勿令走氣薰三次即愈解輕粉毒用佛前照過陳年琉璃燒存性為末每服二錢酒調下日服一二次一月痊愈諸瘡升麻和氣飲治瘡腫癤疥癢痛憎寒發熱陳皮赤芍大黃如欲利倍加乾葛蒼朮桔梗升麻當歸白茯苓白芷枳殼各等分甘草減半乾薑減半水二鍾姜三片煎八分眼馬齒莧膏治兩足血風瘡並兩腳背風濕瘡疼癢至骨馬齒莧焙乾淨末五錢黃丹水飛過黃柏孩兒茶枯礬各三錢輕粉一錢為末用生桐油調攤紙上先用蔥椒湯洗淨患處貼之治風癬膿疥諸瘡及諸毒赤芍白芍黃芩黃柏各一錢歸尾一錢半木鱉子去殼一個大黃三錢七分水八分酒七分煎待藥將好臨時下大黃再煎三四沸露一宿五更服如腸風下血加槐花一錢去木鱉子治一切瘡疥鐵甲葳靈何首烏苦參荊芥石菖蒲更兼胡麻香白芷一身瘡疥盡消無凡治諸瘡以黃連當歸為君連翹甘草黃芩為佐下焦加黃柏水煎服治一切癤毒槿樹根皮加醋搗爛成膏合上不一二次愈大楓膏治一切干濕疥瘡並膿窠爛瘡大楓子二兩去殼枯礬四兩蛇蛻燒存性樟腦蜂窠燒存性各三分水銀五分桕油燭四兩大楓子諸藥為末人柏油燭次入水銀同搗勻塗擦又方水銀一錢生礬三錢松香五錢柏油九錢搗爛塗擦治多年不愈頑癬輕粉五分川徑皮斑蝥七個大楓子七個河井水各一鍾煎一鍾至夜露一宿筆蘸塗之一方治頑癬浮萍蒼朮各一兩苦參一兩半黃芩五錢香附二錢半共為末酒糊丸白酒下頭上大包膿癤軟而未潰者以大枳殼去穰合上周圍麵糊封之坐板瘡羊蹄根搗爛麻油一盞同炒遇癢抓破塗之仍煎湯洗又方用輕粉枯機等分豬油熬化調塗治臁瘡先將綿紙看瘡大小裁成方塊十二張四角以紙捻釘住聽用麻油二兩川椒四十九粒入銅杓內煎黑色取起次入槐枝一寸長者四十九根再煎枯黑取起次入黃蠟一兩並研細輕粉二分枯礬一錢俟溶化即以前紙入油內少煎即起但令油滲透勿使紙焦黃貼時先將槐枝蔥椒煎湯洗瘡用絹拭淨後將所製紙齊沓貼之面用油紙蓋一張又用紅絹緊縛每周時去紙一張待紙取盡則瘡自愈矣臁瘡經驗方黃柏去皮淨一兩用蜜六錢塗炙蜜盡為度輕粉五錢麻油二酒盞黃蠟五錢同煎用綿紙裁成長塊入油內旋三次先用苦茶洗瘡淨上黃柏輕粉末以油紙蓋面縛定日洗一二次紙汙壞去之另換臁瘡經驗方槐藍根皮葉如槐葉而樹矮小加柿心搗爛罨瘡上仍以枝葉煎湯洗之治多年不收口臁瘡鮮桑根掘起去外紅衣取白皮搗爛入人乳少許用苦茶洗瘡淨合之兩三日一換俟肉長平用上好油胭脂攤貼收口臁瘡隔紙膏黃香五錢輕粉一錢銀硃七分銅絲一分麻油調隔紙貼又方白蘞六錢飛丹一兩白及四錢桑皮六錢松香一兩半水粉三錢輕粉一錢飛礬四錢乳香沒藥各一錢共為細末香油調作隔紙膏苦茶洗淨貼一方用老松香一味同豬脂搗爛作隔紙膏貼一方黃丹水飛赤石脂輕粉水龍骨百草霜黃柏伏龍肝各二錢共為細末熟桐油調作隔紙膏貼紅玉膏治濕毒臁瘡黃丹水飛五錢輕粉乳香炙去油沒藥炙去油白蠟各一錢黃蠟二錢豬板油夏三錢春秋四錢冬五錢先將豬板油熬去渣將二蠟溶化離火即下諸藥末攬勻隨瘡口大小用綿紙作隔紙膏刺細孔貼上以帕縛之三日一換臁瘡寸金膏菜油一兩五錢桐油五錢先熬數沸次下白蠟五錢韶粉一兩五錢攪勻下乳香沒藥血竭各二錢雄黃一錢齊下攪勻下飛丹一錢五分用榜紙裁方塊就鍋內旋過即成紙膏任瘡大小剪貼三聖散治臁瘡疔瘡搭手背癰等瘡蔥白馬莧石灰各一斤濕搗為團陰乾為細末摻之天泡瘡用通聖散及蚯蚓泥略炒蜜調敷從肚皮上起者裡熱發外還須服通聖散又方治天泡瘡不問遠年近日黃芩黃柏連翹梔子甘草乾葛前胡桔梗黃耆茯芩白芍升麻川歸頭上用頭腳上用尾荊芥穗薄荷半夏各等分姜三片水一碗煎五分食前服瘡將好加防風羌活遍身四肢疼痛加大黃六錢皮硝一錢生泡溫服以焦為度又方用野菊花棗木根煎湯洗黃柏滑石為末敷苦參丸治肺受熱毒遍身生瘡苦參為末粟飯丸桐子大每服五十丸空心米湯下治肥瘡以松香用米泔水洗淨入大蔥管內扎定煮熱去蔥用淨松香五錢加黃丹一錢枯礬三錢共為細末瘡濕乾摻瘡干香油調塗治腳指縫爛瘡及手腳爛瘡用細茶一口嚼碎塗之乳香散治下疳瘡乳香沒藥輕粉黃丹龍骨黃連烏魚骨黃芩銅絲各等分麝香少許上為細末先以濕漿水洗過摻瘡上珍珠散治下疳瘡珍珠一分以紙裹燈上燒過吹去灰細研琥珀五釐黃柏末一分半血竭孩兒茶熊膽輕粉冰片各一分麝香五釐乳香二分同下沒藥二分俱置箬上於新瓦上炙去油爐甘石二分半製法每石四兩用黃連黃柏黃芩各五錢煎湯分作三半碗將石大火煅一炷香浸在一碗內吃干再煅一炷香浸一碗吃干又煅又浸如此三次取起細研共研極細末用苦參防風荊芥甘草黃柏大黃各等分煎湯洗淨敷之如腫用桃葉槐葉煎湯入生礬五錢冷洗如再不消用細茶川椒炒鹽各一錢煎湯冷洗自消白玉膏治一切下疳瘡臁瘡俱效入血竭一錢名紅潤膏治症同冰片七分輕粉一錢乳香沒藥各九分雄黃二分阿魏一錢龍骨五分煅孩兒茶烘去油一錢黃占一兩半白占五錢香油一盞燭油一錢半珍珠五分煅過入水去火毒水粉三兩飛過瓦上微炒焙乾不可使黃先將油蠟二味煎滴水不散次下各藥攪勻略住火方下冰片一方治下疳瘡用抱退雞子已成形有毛者煅過存性為末人片腦五釐米泔水洗淨摻之三四日愈地骨皮煎湯洗更妙一方治下疳瘡用蠶繭一個剪小孔入頭垢滿以一繭套上燒存性出火毒濕則乾摻干則香油調敷凡下疳瘡不愈必成楊梅瘡須服仙遺糧湯以御之比發後而治易成功矣治遠年近日風癢腳瘡流黃水者以黃柏去皮不拘多少用豬膽汁塗曬乾數次令透柏皮研為末先用花椒煎湯洗淨拭乾後以柏末摻之二三次即愈治一切腿上寒濕瘡取鴿糞煅過細研如瘡有黃水乾摻如瘡乾燥痛加黃丹少許桐油調敷擦諸瘡並楊梅風毒經驗方黃柏去皮一錢黃連去蘆一錢川大黃五分三味另研雄黃膽礬銅青孩兒茶青黛輕粉枯礬各三分冰片一分半另研入大楓子七個去殼去油人言壯人七釐弱者半分上為極細末作三分分開每分約一錢七八分打麻即番舶打火把之物另為末瘡毒盛而人壯健能食者每分五分毒盛而人弱者每分用三分不健不弱之人每分用四分和入前藥內研勻水銀壯健人每分用一兩中等人用五錢弱極人用三錢不可多藥須研極細否則粒粗恐傷皮肉上先將水銀一分並前藥末一分入盞內加真芝麻油少許以指研開逐漸添油研至不見水銀為度大約如稀糊可矣於兩手兩足掌後動脈處周圍擦之每一分藥擦三日每日早晚各擦一次每次以七八百擦為止大率擦使熱透則住擦凡周身破傷處俱用無麝香膏藥貼之每一日一換不可經風避帳幔內冬月用暖床厚被褥即春夏秋暖時亦不可見風擦至七日必口吐臭涎若口齒破爛出血者用黃蜂窩煎湯候冷漱解勿咽下輕則只用花椒湯漱之擦處多皮破不可畏痛而少擦忌魚腥生冷發風等物及醋茶醬一個月尤忌房事其牛肉燒酒團魚之類忌二三年若蕎麥麵與羊肉則終身忌之每次擦畢以藍布尺許包裹所擦處此治楊梅風毒法也如楊梅瘡初發者擦五六日痊愈所用藥皆同惟水銀止用四五錢足矣不必貼膏藥久遠臁瘡應擦處如有破爛可於腳手心擦之其藥料照中等者亦包布貼膏如前下疳及蛀乾重者亦照中等藥擦治貼膏喉內瘡癬潰爛不能進飲食者亦照前用中等藥擦遍身牛皮風癬作癢作痛出水者亦照前用中等藥擦又方楊梅瘡輕者不必擦止用雄黃一錢五分杏仁去皮用三十粒輕粉一錢為末先將瘡洗淨以雄豬膽汁調敷二三日即愈楊梅癬亦效凡擦藥仍須內服煎藥兼之方開後煎藥方防風荊芥金銀花防己白芷連翹苡仁白鮮皮桔梗川芎當歸赤芍生地黃連黃柏知母牛膝木通陳皮羌活獨活粉草梔子上每帖用土茯苓乾者四兩鮮者八兩水六碗煎至三碗分三次一日早午晚服完自擦起之日服至七日發口止人虛者加人參二三錢神授五公散治漏孔並諸瘡眼久不斂者痔瘡亦效大五倍子個蜈蚣一條去頭足將倍子開一孔入蜈蚣濕紙包煅存性為末先以蔥湯洗瘡淨摻前藥再用膏藥貼之每日一換即斂口如神治手癡瘡用皂角枯礬輕粉黃連黃柏為末敷治頭瘡用豬油二錢一半生一半熟雄黃水銀各二錢五分搗勻敷之治頭疼用黑棗燒存性加飛礬川椒末研勻菜油調塗神效癩痢頭瘡用松香研碎入厚綿紙條中作指大藥線絞緊麻油內浸一日夜取出倒吊燒之滴下油塗瘡上立愈治金絲瘡俗呼紅絲疔其狀如繩線巨細不一上下行至心即死可於瘡頭上截經刺之出血嚼萍草根塗之治身上虛癢四物湯加黃芩調浮萍末一錢服又遍身癢凌霄花為末酒調一錢治婦人陰戶瘡作癢作痛杏仁白礬雄黃各五錢麝香二分為末敷入治婦人陰內爛冰片一分乳香沒藥各三分血竭爐甘石各五分甘草三錢共為細末搽之治婦人妒精瘡婦人交接妒精瘡地骨蛇床作洗湯細研黃連款冬末生津調敷妙良方治手指上天蛇毒用總關門草入鹽少許香油搗敷寧波衣梅嚼敷尤好一方取天蛇石灰醃死收干搗敷又方用霜梅金錢草船積汗香油搗敷治鼠瘡用山羊角燒褐色為末每服一二錢黃酒送下四五服如斷根者豬蹄甲燒黃色為末每服三錢好酒調下治手足皺裂用瀝青二兩黃蠟一兩共熬攪勻瓦罐盛貯先以熱湯洗令皮軟拭乾將藥於慢火上略炙擦敷治凍瘡用煎熱桐油調密陀僧末敷又方用茄根煎湯洗神效治體氣方田螺大者一個巴豆去殼研碎一粒膽礬一豆許研麝香少許研共拌勻將螺用水養三日去泥土揭起螺靨入礬豆麝末在內以線拴住置磁器中次日化成水五更時將藥水以手自抹在兩腋下不住手抹直待腹內欲行卻住手先擇深遠無人空地內去大便黑糞極臭是其驗也以土蓋之勿令人知不盡再抹藥水又去大便次用白礬一兩蛤粉五錢樟腦一錢為末擦之永絶病根又方用密陀僧研細末汗出時擦之雖不能絶病根然常擦極能塞臭氣最好治對口瘡芭蕉根搗汁兩碗和酒服須醉飲睡覺即愈治拍蟹毒用生薑半斤搗爛和水四碗煎二碗趁熱從肩臂上洗至手掌上漸洗漸消治一切日久頑瘡不收斂者香油一兩松香五錢銀硃一錢千年地下灰五分溶開蘸軟紙上用之治臁瘡亦效治一切惡瘡並諸刺所傷以蒲公英搗爛貼之即愈治陰莖翼熱瘡用輕粉研細摻之即結靨而愈有瘡在穀道外腎之間狀如松子癢甚漸大如蓮子四十餘日後如核桃赤腫遂破若大小便出不可治矣治方用大粉草節四兩截長三寸以澗長流水慢火炙之炙一碗水盡為度劈視甘草中水濕透焙乾為末入皂莢灰少許作四服湯調頓飲效一方以甘草用無灰酒二碗煮乾一半作一服溫下跌撲損傷附金刃木石湯火犬咬棒瘡治方用蘇木炒黃連白朮等分童便酒煎服在上宜飲韭汁或和粥吃在下者可下血令則凝不可飲冷水但一絲血入心即死復元活血湯治從高墮下惡血流於脅下疼痛不可忍柴胡五錢天花粉當歸各三錢紅花甘草各一錢大黃酒浸一兩桃仁五十粒酒浸研如泥穿山甲三錢炙每服一兩水二鍾煎一鍾加桃仁泥八分服以利為度雞鳴散治從高墮下及木石壓傷瘀血凝積痛不可忍大黃酒蒸一兩桃仁七粒去皮尖當歸尾五錢上為末酒一碗煎會渣五更雞鳴時服取下惡血即愈若氣絶不能言急以熱小便