候半日後孔中覺無本來氣味乃將四孔塞密不容透氣仍前燒煉二日夜至第三日只用金粟火緩緩燒煉晝夜不斷至第七日去火候冷揭開則黃芽結於罐口並銀盞上俱取下大率可得一兩將黃芽研細取二八露水和用紙一層置竹器內濾下用磁盤盛之慢火煉為白霜收起用小磁瓶裝盛多則二錢少則一錢仍前固濟用炭火煉三炷香揭開結於盞上大率二錢可得一錢九分上是為黃芽其前黑渣打碎亦用清水濾過磁盤中煉成鮮白是為白雪黃芽日服三釐或半分白雪日服三分或二分久服可得長生神仙既濟丹人參白茯苓各二兩半當歸身酒洗乾山藥山茱萸肉川牛膝酒洗柏子仁枸杞子生地酒洗另搗龍骨煅另研杜仲酒製炒斷絲各一兩半五味子遠志去心石菖蒲麥門冬去心天門冬湯泡去心各一兩菟絲子酒浸炒另搗熟地酒浸另搗各二兩共為細末煉蜜丸桐子大每服八十丸空心淡鹽湯下延年益壽不老丹生地酒浸一宿曬乾熟地酒洗淨曬乾人參好者各三兩地骨皮酒洗淨曬乾白茯苓去皮酒洗曬乾各五兩天門冬酒浸一二時取出去心曬乾麥門冬製法同上各三兩何首烏半斤鮮者竹刀刮去皮切作片乾者米泔水浸軟刮去皮切片用砂鍋內先下烏羊肉一斤烏豆一二合量著水於上加竹篦放此藥後覆蓋蒸一二時取出曬乾共為細末煉蜜丸桐子大每服三五十丸清晨酒下此藥千益百補服至十日或一月自知為另等人也二至丸熟地二兩肥大沉水者佳酒和九蒸九暴竹刀切碎生地二兩肥大者酒浸洗過曬乾竹刀切碎菟絲子一兩酒浸一宿煮熟搗碎作餅曬乾為末山茱萸鮮紅者六兩水泡去核取淨肉一兩肉蓯蓉一兩去淨甲白膜無灰酒浸一日酥炙敗龜板三兩酒浸一夜酥炙黃人參肥白人用一兩蒼黑瘦健人止用五錢黃耆一兩去應徽黃色肉中白綿柔者佳牛膝一兩長大柔潤者酒浸一夜枸杞子一兩甘州者佳破故紙一兩炒五味子一兩肥大者白朮三兩無油者麥麩炒白芍一兩酒浸一時去皮炒當歸二兩大者酒洗虎脛骨一兩酥炙黃色山藥一兩白淨者知母二兩肥者酒浸一宿炒杜仲一兩酒浸炒去絲陳皮一兩薄而陳者水泡去白白茯苓一兩堅白者去皮黃柏三兩堅厚鮮黃者酒浸春秋日半夏一日冬三日炒褐色上二十二味名二至丸取冬至一陽生夏至一陰生之義如法制造為末取分兩淨數煉蜜丸桐子大每服百丸無灰酒及鹽湯不拘時下斑龍二至丸鹿角鋸成段長流水浸七日入砂鍋內用桑柴火煮七日夜取出外去粗皮內去血穰研為細末淨用一斤糜角製法同前淨末一斤生地酒浸一宿曬乾為末淨四兩黃柏去皮切粗片酒炒老黃色為末淨半斤熟地酒浸一宿曬乾為末淨四兩天門冬酒浸去心曬乾淨為末四兩知母去皮鹽酒炒老黃色為末淨半斤麥門冬酒浸去心曬乾淨為末四兩當歸酒洗曬乾為末淨二兩白茯苓去皮為末用水淘去筋膜淨二兩何首烏去皮人乳拌勻九蒸九曬為末淨二兩勿犯鐵上共研細煉蜜丸桐子大每服五十丸空心黃酒下或鹽湯亦可十珍膏人參四兩枸杞子十兩淨白朮淨黃精各八兩山藥茯苓去皮柏子仁各四兩天門冬去心淨麥門冬去心淨各六兩熟地八兩上用水熬成膏入煉蜜三斤磁瓶收貯每服五錢清晨白湯調服全鹿丸黃柏七斤用清鹽四兩煮酒浸焙乾為末取淨末五斤金櫻子五斤去核用淨一斤五味子三斤酒洗曬乾取淨末半斤車前子二斤水淘淨曬乾取淘淨末一斤共為細末雄鹿一隻取血和藥曬乾又為末鹿角煮膠霜鹿肉熬膠俱入前藥末內拌勻以鹿角膠和秋石二斤化開和藥少加蜜為丸桐子大每服五十丸空心鹽酒白湯任下八造丸紫河車一具男用男胎女用女胎須頭生者佳以米泔水洗淨新瓦上焙乾為末敗龜板年久者良童便浸三日酥炙黃脆二兩除腰背痠疼骨中寒熱此藥大補陰黃柏去粗皮鹽酒浸炒茶褐色一兩五錢瀉下焦隱伏之火補腎經不足之水蓋邪火止能動物不能生物此藥與前味補陰補腎之至藥同為河車之佐沖和而無弊也杜仲酥炙去絲一兩五錢此藥主治腎虧精竭腰疼又壯筋骨益氣牛膝去苗酒浸曬乾一兩二錢壯陽益精主腰脊手足拘攣此引藥下行與前四味是少陰腎精之藥古方加陳皮名補腎丸配河車名補天丸生地懷慶肥大沉水者二兩半入砂仁末六錢白茯苓二兩用稀絹同包入砂罐內好酒煮乾添煮七次去茯苓砂仁止用地黃蓋地黃得砂仁茯苓及黃柏則入少陰腎精此四味為天一生水劑涼心火血熱除五心煩熱人參去蘆一兩止瀉生津和中益氣安神止驚悸天門冬去心一兩三錢麥門冬去心一兩三錢夏加五味子七錢前四味手太陰肺經藥也二門冬保肺氣不令火邪上升降肺氣下行生腎然其性有降無升得人參則補而降本草云至多生子以此也古方加生地名固本丸只麥門冬五味子人參三味名生脈散此方配合之意大抵以金水二臟為生化之源用補肺腎二藥及人參補氣地黃補血合河車以成大造也一方去麥門冬婦人加當歸二兩去龜板男女患怯症者去人參男子遺精白濁女人赤白帶下加煅過牡蠣粉一兩五錢上諸藥各為細末惟地黃另用木臼乘熱搗爛再添酒米糊與諸藥和勻共搗千餘杵為丸梧子大每服八九十丸空心鹽湯進一服臨臥再進一服寒月以好酒進亦妙此乃滋補中第一方也鹿角霜丸黃柏八兩去粗皮用人乳拌勻曬乾如此三次炒重褐色或六兩或七兩隨時加服鹿角霜半斤天門冬二兩去皮心淨麥門冬二兩去心人參一兩或二兩生地二兩置水中去枯浮酒浸一宿熟地二兩酒浸一宿曬乾上為細末煉蜜丸梧子大每服六七十丸加至百丸空心談鹽湯下或酒下制鹿角霜法鹿角用本年鮮及新鋸血氣不幹枯者截寸半長置長流水中浸七晝夜滌去醒穢每角一斤加桑皮二兩黃蠟二兩楮實子一兩置壇鹽泥固濟炭火煮七晝夜水耗以熱水添之角軟如熟芋取出曬乾用將煮角汁去藥渣桑柴火熬膠收貯每用一二錢酒化服其功更倍一方四物湯加黃蠟煮以桑皮楮實湯添煮尤佳何首烏丸八月採赤白各半極大者佳以竹刀刮去皮切碎用米泔水浸一宿濾出曬乾以壯婦生男乳汁拌曬一二度候乾用木臼舂為末羅細以紅棗煮熟去皮核取肉和藥未千杵為丸焙燥磁器貯之初服二十丸每十日加十丸至百丸止空心鹽湯或酒任下忌鐵器諸血蘿蔔又方喬白岩服此何首烏二斤竹刀切片乾者米泔浸切川牛膝去苗銼一斤上二藥以黑豆一斗淘洗淨用甑一具先以豆薄鋪甑底後薄鋪何首烏又鋪豆又鋪牛膝重重鋪盡安於釜上蒸之令豆熟為度去豆暴乾又換豆蒸如此三次去豆取藥為末蒸棗肉丸桐子大每服三五十丸食前溫酒下忌蘿蔔蔥蒜又方蔣敬所服此何首烏雌雄各半斤銅刀去粗皮為片米泔水浸夏一宿春秋二宿冬三宿取出曬乾為末無火病者以棗肉為丸否則蜜丸清晨鹽湯下或酒下本草服何首烏用茯苓煎湯勝似鹽湯龜鹿二仙丹鹿角十斤大龜板五斤如法熬成膠枸杞子三十兩人參十五兩當歸酒洗淮生地酒洗蒸熟肉蓯蓉酒洗去鱗甲自膜破故紙炒各五兩上為末酒化龜鹿膠丸桐子大空心酒服或鹽湯服松梅丸飢腸健體之驗松脂一斤煉熟者懷慶地黃十兩酒蒸烏梅淨肉六兩如後法治煉丸桐子大每服五十丸空心米飯鹽湯任下此方西域異人所傳云服之最能加飲食致身肥健小便清大便潤及精神不倦嘗考諸本草云松脂味苦甘溫無毒安五臟除熱去胃中伏火咽乾消渴久服輕身不老延年聰耳明目圓齒潤肺辟邪氣去歷節風厲風痠痛不可忍仙家多煉服日無倦怠老年發黑同白茯苓末和煉蜜服可以辟穀煉之須得明淨者十餘斤先以長流水入砂鍋內桑柴火煮拔一二次再淋桑灰汁仍煮七八次扯拔又用好酒煮二次完則以長流水煮過一次扯拔色白昧不苦澀為度陰乾入木臼內搗取淨末依方配合再搗一日作丸須要日曬乾為佳熟地黃味甘無毒填骨髓補五臟不足及男女勞傷通血脈益氣力利耳目一名地髓久服輕身不老黑髮增壽服此味須忌三白禁銅鐵器取沉水者佳曬乾以清酒洗淨木甑砂鍋蒸半日入臼搗用烏梅肉味酸平無毒能下氣除熱安心神療肢體痛生津液及好睡口乾利筋脈去痹消痰治骨蒸虛勞贏瘦解煩毒久服令人思睡不睡故東垣有言凡酸味最補元氣謂其有收之義耳取潤大者三五斤以溫酒浴洗甑內蒸熟去核取肉搗和前二味以成丸也延壽丹赤白何首烏竹刀刮去皮切片各淨一斤川牛膝去蘆銼碎淨半斤用黑豆三升並何首烏以木甑一處蒸之取牛膝去豆共搗成泥曬乾赤茯苓去粗皮切片淨一斤用磁器人牛乳五升文武火煮曬乾白茯苓去粗皮切片淨一斤用磁器入人乳五升文武火煮曬乾菟絲子半斤酒煮成泥塊研開曬乾破故紙半斤炒香熟為末上六味皆不犯鐵器制共為末煉蜜滴水成珠退火毒三日和丸彈子大每服一丸日進一二次外加生地熟地各一斤熟地酒浸蒸九次生地酒浸研爛加入前藥尤妙固本酒生地熟地各八兩天門冬去皮心麥門冬去心各四兩白茯苓人參各二兩用磁瓶盛好酒十大壺將前藥切碎人瓶內浸二三日文武火煮一二時以酒黑色為度如熱去人參五錢如下虛或寒將韭子炒重黃色為細末空心服三五盞每盞用銅錢炒韭末一錢飲之婦人下虛寒久飲能生子用核桃連皮作引子食之此藥甚和平治勞疾補虛弱烏鬚髮久飲面如童子忌蘿蔔蔥蒜豆飯四聖不老丹松脂透明者一斤四兩以無灰酒砂鍋內桑柴火煮數沸竹杖攪稠黏住火以磁器盛水傾入水內結塊又復以水煮之九遍一日煮乾次日亦如是如此者三日通計二十七遍其脂瑩然如玉嘗之不苦不澀乃止為細末淨用十二兩凡煮脂不宜酒少少則易乾焦煮之三分之一就可傾入水白茯苓去皮淨黃菊花家種味甘者去梗蒂淨柏子仁去殼紙里捶去油淨各八兩上為細末煉蜜丸桐子大每服七十五丸清晨好酒下修合時必擇天醫黃道吉星毋令婦人雞犬見之服藥亦擇吉日此方雲陽王都完五一翁所傳云渠方伯陝西時授之於一總戎總戎年九十餘自幼服此丸精力倍加胃氣強健飲食日增壽考彌長祕而不傳翁懇得之服之如法不問寒暑今年八十有六矣行步不筇不仁而談論膏宜飲酒可百盞食飯數碗許而饈饌果核盡其席遍嘗之不輟口且室御數女皆能有子人以仙稱豫舟往來兩度詣翁而翁始以是方授豫歸筆此以識翁之善云七珍至寶丹功效甚大不能細録與延壽丹差二味何首烏赤白各一斤酒浸竹刀刮去皮同牛膝煮赤茯苓一斤用牛乳五升煮乳干為度川牛膝半斤去蘆同何首烏用黑豆三升木甑砂鍋蒸白茯苓一斤用人乳五升煮乳干為度破故紙半斤炒香當歸酒浸焙乾枸杞子酒洗淨焙乾各四兩菟絲子半斤酒浸研成泥焙乾俱不犯鐵器制共為細末煉蜜丸雞頭子大每服一丸日進一二服空心溫酒午後薑湯臨臥鹽湯服接命丹治男婦氣血衰弱痰火上升虛損之症右癱左瘓中風不語手足腰體疼痛動履不便飲食少進甚效人乳二酒盞梨汁一酒盞傾放錫器內入湯鍋頓滾熱有黃沫起開青路為度每日五更後一服能消痰補諸虛生血延壽乃以人補人其效無盡加其中風不語半身不遂曾照此方治驗長春真人保命服食治五勞七傷虛損無力四肢困倦腳手頑麻血氣耗散面黃肌瘦陽事不升虛暈噁心飲食減少此藥能補諸虛添精補髓滋潤皮膚充神壯氣身體輕健光澤開胃進食返老還童發白再黑齒落更生神效茯苓去皮大門冬去心山藥熟地枸杞子何首烏去皮鹿角膠麥