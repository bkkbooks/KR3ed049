蜜頓銅釜中水煮一日火用桑柴水及藥罐之半不可沒肩製成空心白滾湯服煩郁躁渴一切下部諸疾可除打老兒丸西川有一大夫名陳轉運者到青城山下見一婦人在高山上望南行走如飛約年三十餘歲手執棒一條趕一百歲老兒轉運問婦人曰因何打老兒婦人答曰是女子之孫吾乃五百餘歲老兒一百一十歲是老兒不肯修煉服藥所以打之轉運下馬跪拜曰願求此方傳流救濟世人因名為打老兒丸能治五勞七傷陽事不舉真氣衰弱精神短少小便無度眼目昏花腰膝疼痛兩腳麻冷不能行走石菖蒲去鬚毛嫩桑枝條拌蒸曬乾不犯鐵器乾山藥蒸出曬乾川牛膝去頭用黃精自然汁浸漉出酒浸一宿若無黃精酒浸三日漉出細挫焙乾遠志去心甘草湯浸一宿巴戟去心枸杞子湯浸一宿漉去酒浸一伏時菊花同焙令黃去菊花續斷去筋酒浸一伏時焙乾五味子蜜浸蒸從已至申又以漿水浸一宿焙乾楮實子水浸三日去浮者曬乾酒浸一伏時湧出蒸從已至亥焙乾杜仲去皮酥蜜炒去絲山茱萸取肉暖火焙乾茯神去皮心搗細於水盆攪濁去浮熟地磁鍋柳木甑蒸之攤令氣歇拌酒再蒸曬乾勿犯銅鐵器小茴香酒浸一宿炒肉蓯蓉酒浸一宿刷去沙土乳甲劈破中心去白膜枸杞子上為細末各等分酒糊丸桐子大每服三十丸空心溫酒下或白湯亦可服五日便覺身輕十日精神爽快二十日語言輕響手足便利一年頭白再黑行走如飛久服百病消除容顏頓加面如童子不老方用十六七歲女子候該月行經時用無灰綿紙收之陰乾剪去白紙用芝麻油燈燒灰用童子童女發各三兩洗淨入罐內鹽泥固完大火燒過取出為極細末同前經灰每服二分發灰三分及清白童便一鍾送下取童便用十二三歲童子令服白米湯每服一碗用棗子二個先服三碗棗六個行一時再服一碗棗二個有便黃色不用隨即與湯一碗棗二個再取即清白方用彭祖接命丹用大附子重二兩二錢一個或一兩六錢亦可切薄片夏布包定甘草二兩甘遂二兩俱捶碎二味燒酒二升共浸半日文武火煮酒干為度取起附於甘草甘遂不用加麝香三分捶千下作二丸陰乾一丸填臍內七日一換一丸放黑鉛盒內養之此丹暖丹田助兩腎添精補髓卻病久固返老還童延年益壽固真丸治腎經虛損真元不足鹿角霜一斤白茯苓五兩鹿角膠二兩上為末將膠水搜丸桐子大空心米湯或酒下百丸金主杖鹿角霜丸又名班龍珠丸益氣力補精髓強陽壯陰固精補腎滋血補腦既濟陰陽尤固元氣久服延年悅色面如童少鹿角霜十二兩天門冬末淨麥門冬末淨生地末淨熟地末淨各二兩俱如法制厚黃柏四兩先用酒浸一宿焙乾又以鹽水浸一宿焙乾碾為細末淨四兩共前藥未攪勻外用蜜十二兩煉滴水成珠入酒化鹿角膠四兩待溫和前藥搜為丸桐子大每服五十丸空心溫酒下或鹽湯亦可各加乾薑一錢五分炒黑仙傳斑龍丸蜀中有一道人童顏漆發眉宇疏秀自歌曰尾板不禁滄海竭九轉神丹都謾說惟有斑龍頂上珠能補玉堂關下血仙人許仲源得受其方道人曰吾餌此藥今壽四百三十二歲緣汝有仙骨故此相授言訖化白鶴飛去許仙后傳於世此藥理百病養五臟補精髓壯筋骨益心志安魂魄令人悅懌駐顏轉身延年益壽鹿角霜鹿角膠各二十兩菟絲子二十兩酒浸二日蒸焙乾為末柏子仁二十兩去殼淨另研熟地二十兩酒浸二宿蒸焙乾為末上為細末將膠用無灰酒磁器內慢火化開煮糊和杵二千下丸桐子大每服四五十丸空心溫酒或鹽湯下添精補髓玉環垂珠丸忌食諸血物蔥蒜戒房事六十日遠志酒浸甘草水煮大蓯蓉酒浸三日鹽水洗去甲膜酥炙天門冬酒浸三日去心麥門冬酒浸三日去心生地米泔水浸一日炒熟地酒浸二日焙乾巴戟酒浸一日去心鎖陽酒浸酥炙黃耆童便浸一日炒以上各一兩大黃火煨三錢京墨焙存性白朮各五錢黃狗腎二副腰子股子全用酥炙焙乾槐樹枝燒存性二兩隔路交後蕩著妙為細末酒糊丸每服六七十丸空心鹽湯或溫酒下辟穀方此藥大忌欲事大豆五升淘淨蒸三遍去皮為細末大麻子五升湯浸一宿漉出蒸三遍令口開去皮為末糯米五升淘淨共白茯苓一處蒸熟白茯苓五兩去皮同糯米蒸熟為末先將麻仁末同糯米茯苓搗如泥漸入豆末和勻團如拳大再入甑蒸從初更至半夜後住火寅時出甑午時曬乾為末服以飽為度不得吃一切物用麻子汁下如渴飲麻子汁遇應食時用葵菜子三合為末煎湯放冷服之初間吃三五日白米稀粥湯三日後諸般食飲無避忌又方白茯苓去皮五斤切塊用白米五斗水淘淨入茯苓千中大甑蒸之米熟為度去米曬乾再用米五斗仍前蒸米熟去米曬乾為末以牛乳煉成濃膏和拌搗作餅曬乾收貯服之不飢可為行兵入山避亂之乾糧最妙染須方五倍子用潔淨不曾沾油小銅鍋一口磚四塊砌風爐以鍋置火上入水滾沸去水待熱量用倍二兩入鍋炒至白煙濃暖略轉青煙則倍已黑軟如青精飯一團此便是火候足時先時用青布方尺水洗扭干攤地上將前藥趁熱傾布上扭成團腳踏成餅候冷取出置地上去火氣其餅劈開褐色者佳黑色則無用矣量鬚髮多寡用銅花以銅敲成片入猛火中燒透紅淬米醋中其花自落百燒百淬其花積多其醋漸干卻用綿紙攤熱灰上以醋傾紙上滲干取銅花炒燥研細諸方皆用銅末獨此方用銅花硇砂透明潔白者佳明礬用明淨者生用白及切片炒令黃色以上五味各研為極細末每五倍一兩銅花三錢硇砂五分明礬七分白及四分最要明白蓋倍黑則無力銅多則發黃礬多則不黑硇多則爛肉及多則損發分毫增減不得和勻再研極細愈細愈佳以下三味煎湯用細茶石榴皮酸榴皮尤佳須陰乾黃色腐黑者不可用訶子去核用皮茶四兩榴皮一兩二錢訶皮二錢水十甌煎至二甌去渣入鉛罐內聽用愈久愈好久則澄沏如黑水矣頓藥法以鉛甌一隻調和藥物量人茶滷不稠不稀綿紙封甌人湯鍋頓令紙濕而將干開看藥面生青水四邊水氣盡收柞砂糖香即取起候溫用染髮法先將頭髮用溫湯肥皂洗極淨揩乾復用溫湯洗去肥皂餘氣揩極干皮肉不潤然後將前藥用抿子細細搽上務令無處不到候其盡干夜分後略略爬動自落落後溫湯肥皂洗盡若根下皮肉有黑色用綿蘸油擦淨復洗干後少用核桃油潤之此方贛州董揮使乃生而鬚眉發皆白不能承襲後得此方染之始得替職一月染一次久而且黑極妙方也九陽烏須不老丹血餘一斤擇黑潤者用皂莢一斤煎湯洗淨清水漂過五六次曬乾置鍋內用川椒二兩去梗目與發層層鋪蓋以小鍋蓋定鹽泥封固上用重石壓之先用武火煅一炷香次用文火煅半炷香以清煙盡力度冷定取出有四兩二三錢為則童子發更妙赤白何首烏各八兩竹刀去皮石器內搗碎上下用黑豆二升鋪蓋蒸熟取出曬乾又蒸又曬如此五次赤茯苓八兩去皮切片牛乳二碗浸一日夜白茯苓八兩去皮切片人乳二碗浸一日夜破故紙八兩酒拌砂鍋內炒香當歸四兩去尾酒洗生地四兩酒洗菟絲子四兩人乳一半好酒一半浸一宿取出蒸熟炒香熟地四兩酒蒸上為末煉蜜丸桐子大空心臨睡各五十丸白湯或酒下忌蘿蔔蒜燒酒破血之物一方無當歸年老加酥炙龜板四兩無子加川椒去梗目微炒二兩痰火加蜜炙黃柏一兩鹽水炒知母三兩用藥酒下服烏須丸藥酒方當歸生地川芎白芍五加皮枸杞子各二兩核桃肉黃柏炒各一兩砂仁研五錢小紅棗去核百枚無灰老酒三十六斤內分五斤和前藥入瓶內隔湯煮約酒耗三斤為度取冷濾去渣入前藥內淘熟收用烏須得效方又名四制首烏丸何首烏大塊者赤白各半以竹刀去皮搗碎曬乾忌鐵器如干者即以米泔水浸一宿待溫透以竹刀去皮搗碎曬乾羅末聽用首烏末一耳子炒去刺牛膝酒洗沙菀蒺藜炒肉蓯蓉酒洗去膜各一兩甘州枸杞白朮炒麥門冬去心當歸杜仲薑汁炒去絲各二兩防風去蘆沉香各五錢天麻一兩上銼片生絹袋盛無灰醇酒九斗磁瓶中春浸十日夏浸七日秋冬十四日取出藥袋控干曬為末煉蜜丸桐子大每服五十丸酒下其藥酒午夕夜坐各服三杯五更服三杯百骸快諸病潛消身體強壯鬚髮不變耳目聰明牙齒堅固精神勝常保命丹治虛損風氣濕痹心腹胃脅膀胱疼痛腰膝無力及膈噎膚燥瘡癲一切惡症並婦女赤白癥瘕久服益精潤肌胡桃肉小紅棗去核白蜜各半斤酥油四兩蒼朮炒陳皮厚朴姜炒白朮炒香附炒當歸砂仁生地烏藥赤白何首烏竹刀去皮以上各二兩麥門冬去心破故紙炒白芍炒牛膝去蘆枳殼炒半夏人參五加皮杏仁去皮川椒去目虎脛骨酥炙以上各一兩甘草小茴香獨活防風木香沉香各五錢川芎八錢烏藥白茯苓去皮各一兩荊芥五錢上銼片絹袋盛堆花燒酒一大壇入藥固封浸百日取起藥曬乾為末酒糊丸桐子大每服三十丸酒下其酒空心及午戌時任意服二三盞
