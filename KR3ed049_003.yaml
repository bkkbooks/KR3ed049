body:
  text: 卷三虛損多屬陰虛凡虛勞不受補者不治四君子湯治氣虛人參五錢白朮茯苓各一兩甘草三錢每服四五錢水煎服四物湯治血虛川芎當歸各一兩芍藥熟地黃各二兩半每服一兩水煎服八物湯四君子合四物湯治氣血俱虛十全大補湯人參黃耆白朮茯苓甘草芍藥熟地黃肉桂當歸川芎每服一兩加薑棗水煎服固真丸補氣血固精壯陽烏鬚髮忌食蘿蔔仙茅四兩米泔水浸一宿黑豆拌同何首烏蒸何首烏赤白各一斤竹刀刮去皮黑豆拌蒸牛膝三兩同何首烏蒸當歸酒洗四兩熟地酒蒸五兩破故紙炒山藥菟絲子酒煮炒蒼朮米泔浸炒白朮炒各四兩枸杞子三兩茯苓赤白各三兩人乳拌曬乾人參二兩去蘆為末蜜丸空心鹽湯下百丸三補丸治上焦積熱泄五臟火黃芩黃柏黃連各等分為末蒸餅丸大補陰丸降陰火補腎水黃柏炒褐色知母酒炒各四兩熟地黃龜板酥炙各六兩為末豬脊髓和蜜丸空心鹽湯下補陰丸又名虎潛丸黃柏半斤鹽酒炒知母酒炒熟地各二兩龜板四兩酥炙白芍藥陳皮牛膝各二兩鎖陽當歸各一兩五錢虎脛骨一兩酥炙上為末酒煮羊肉丸鹽湯下冬加乾薑五錢八珍酒當歸三兩南芎一兩白芍二兩煨生地四兩人參一兩白朮三兩炒茯苓二兩粉草一兩半五加皮八兩小紅棗肉四兩核桃肉四兩上絹袋裝用好酒四十斤煮二炷香埋土中五日取出過二七日隨量服滋陰大補丸牛膝酒浸山藥各一兩半杜仲酒和薑汁浸炙斷絲山茱萸鮮紅者去核巴戟去心肉蓯蓉酒浸新瓦上焙乾五味子白茯苓去皮茴香遠志甘草同煮去心各一兩石菖蒲枸杞子各五錢熟地黃二兩上為末紅棗煮取肉和煉蜜為丸桐子大每服八十丸淡鹽湯或酒空心下與加味虎潛丸相間服之佳所謂補陰和陽生血益精潤肌膚強筋骨性味清而不寒溫而不熱非達造化之精微者未足與議於斯加味虎潛丸人參黃耆芍藥黃柏堅厚金色者酒浸炒當歸酒浸山藥各一兩鎖陽比蓯蓉干而色淡者酥炙黃枸杞甘州者佳杜仲炒去絲虎脛骨酒浸一宿酥炙黃龜板同上制菟絲子鹽浸炒各五錢破故紙炒黃五味子各七錢半牛膝酒洗一兩熟地黃四兩上為末煉蜜和豬脊髓丸桐子大每服百丸溫酒或鹽湯下六味地黃丸治腎氣虛損久新惟悴寢汗發熱五臟齊損瘦弱虛煩骨蒸萎弱下血乾山藥山茱萸各四兩澤瀉牡丹皮白茯苓各三兩熟地黃八兩上為末煉蜜丸桐子大每服五十丸自滾湯空心下人參固本丸天門冬去心麥門冬去心生地黃熟地黃人參上為細末煉蜜丸桐子大每服五十丸空心鹽湯或酒下紫河車丸當歸酒洗熟地酒蒸白朮炒山藥山茱萸淨肉各二兩茯神去皮木川芎酒洗人參麥門冬去心枸杞子破故紙炒肉蓯蓉酒洗去鱗甲白膜菟絲子酒煮炒各一兩白芍藥酒浸炒棗仁炒杜仲薑汁炒去絲天門冬去心各一兩五錢紫河車一具酒洗挑去血筋瓦上焙乾搗末如干者酒浸洗牛膝酒浸去蘆八錢五味子五錢上為末煉蜜丸桐子大每服百丸空心鹽湯下三味補陰丸治酒色過傷少陰龜板半斤酥炙黃柏一斤酒炒知母半斤酒炒上煉蜜丸桐子大每服四十丸空心酒或鹽湯下八味丸治腎氣虛乏下元冷憊臍腹疼痛夜多旋溺腳膝緩弱肢體倦怠麵皮痿黃或黧黑及虛勞不足渴欲飲水腰重疼痛小腹急痛小便不利熟地八兩澤瀉牡丹皮白茯苓各三兩山藥山茱萸肉各四兩附子炮桂心各一兩上為末煉蜜丸桐子大每服五十丸酒下或鹽湯下婦人淡醋湯下一方不用附子用肉桂五味子各一兩加味太極丸黃柏去皮淨三兩六錢鹽酒浸一晝夜炒褐色知母去毛淨二兩四錢鹽酒浸一晝夜曬乾炒砂仁一兩二錢一半生用一半川椒炒去椒用破故紙二兩八錢鹽酒浸半日曬乾炒胡桃肉去皮三兩二錢柏子仁菟絲子酒浸炒甘枸杞生地酒洗杜仲鹽酒浸一宿炒去絲熟地酒蒸山藥白茯苓去木牛膝去蘆酒浸人參各二兩山茱萸去核淨肉五味子各一兩赤白何首烏各一斤不犯鐵器切片用牛膝半斤並黑豆拌蒸一炷香取出又換豆再蒸三次曬乾各用二兩六錢共為末煉蜜丸桐子大每早晨溫酒或白湯下坎離丸此藥取天一生水地二生火之意藥輕而功用大久服而取效速先賢王道之藥無出於此大能生精益血升水降火當歸全用好酒浸洗三日曬乾銼碎川芎大者用清水洗淨挫碎白芍藥溫水洗淨銼碎用好酒浸一日曬乾炒赤知母去毛與黃柏制同各四兩熟地黃八兩淮慶者佳四兩用砂仁四兩用白茯苓同人絹袋用好酒二壺煮乾去二味只用地黃厚黃柏去皮八兩二兩鹽水浸二兩酒浸二兩人乳浸二兩蜜浸俱曬乾炒赤上六味修制明白和合一處平鋪三四分厚夜露日曬三日夜以收天地之精日月之華研細末用真冬蜜一斤八兩加水半碗共煉至滴水成珠再加水一碗煎一滾和前藥丸桐於大每服八九十丸空心鹽湯下冬用溫酒下人參膏治傷寒汗吐下後及行倒倉法吐下後用此補之韓飛霞曰人參煉膏回元氣於無何有之鄉王道也又肺虛嗽亦宜人參膏補之如氣虛兼有火邪者人參膏與天門冬膏對服人參去蘆或一斤二斤隨意切片入砂鍋水浮於藥一手指文武火煎乾一半傾在一瓶盛之又將渣煎又如前傾於瓶凡煎三次驗參咀嚼無味乃止卻將三次所煎之汁去渣仍入砂鍋內文武火慢慢熬成膏如一斤參只好熬一碗及成膏入碗內隔宿必有清水浮上亦宜去之只留調膏秋石四精丸治腎虛盜汗腰疼秋石蓮肉茯苓芡實俱一兩上四味為末棗肉十二兩為丸桐子大每服五六十丸溫酒下大補丸去腎經火燥下焦濕治筋骨軟氣虛以補氣藥下血虛以補血藥下並不單用川黃柏炒褐色水丸服補腎丸黃柏酒炒龜板炙各三兩杜仲炒牛膝酒浸各二兩乾薑五錢冬月用之五味子一兩夏月用之上為末薑汁糊丸或酒糊丸每服七十丸鹽湯下八味定志丸補益心神安定魂魄治痰去胸中邪熱理肺腎虛勞人參一兩半菖蒲遠志去心茯神茯苓各一兩白朮麥門冬硃砂水飛各五錢牛黃二錢另研上為末煉蜜丸桐子大米飲下三十丸髓竭不足加生地當歸肺氣不足加天門冬麥門冬五味子心氣不足加人參茯神菖蒲脾氣不足加白朮白芍藥益智牡丹皮膽氣不足加細辛酸棗仁地榆神昏不足加硃砂預知子茯神太乙神應丸治一切虛損勞症人乳一碗用磁鍋煮乾去水不用將干乳用磁碗焙乾聽用牛乳一碗同前制白果汁一碗同前制杜仲三兩薑製炒黃色破故紙二兩半用大麥炒黃色白鮮皮二兩童便浸三日白茯苓二兩川牛膝二兩燒酒浸三日當歸二兩童便浸三日黍米金丹一個曬乾即初生嬰兒口中血珠共為細末煉蜜丸桐子大每服一丸夜間噙化驚加珍珠琥珀吐血吐全是血者是乃火載血上錯經妄行其脈必芤身熱脈實大者難治身涼脈微細者易治血症腹下惡痢者其邪易去犀角地黃湯吐血嘔血衄血通治犀角鎊生地黃芍藥牡丹皮各等分每服五錢水煎溫服面色痿黃大便黑者更宜服之又方用童便一分酒半分擂側柏葉溫飲去渣非酒不能行血惟嘔血衄血不用酒以水擂服七生湯治血向口鼻中出如泉湧諸藥止之不效生地黃汁生荷葉汁生藕汁生韭汁生茅根汁各一碗生薑五錢取汁磨京墨與各汁同服加味四物湯治吐血當歸芍藥側柏各錢半川芎生地黃梔子炒各一錢水二鍾煎八分入水研京墨汁二三匙童便半小鐘薑汁少許徐徐服之若吐血夾痰積吐一二碗者加黃柏知母治吐血不止用乾薑炒黑色為末童便調服玄霜膏治吐血虛嗽神應烏梅汁蘿蔔汁梨汁柿霜白糖各四兩薑汁一兩款冬花紫菀各二兩為末以上藥聽用另以白茯苓半斤為末用乳汁三斤將茯苓浸入取出曬乾又浸入取出曬乾乳盡為度卻將前款冬花紫菀末再入蜂蜜四兩同前柿霜白糖並各汁作一處入砂鍋內慢火熬成膏丸如彈子大臨睡噙化一丸治吐血槐花炒焦發煅灰繭煅灰茅根各一錢俱研細末白及膏和丸芡實大每服五分又用繭黃四兩煎湯三碗每碗送藥五分日進三服忌油膩煎炒魚腥如欲飲茶以藕節數個扁柏四兩茅根三兩煎湯磨京墨一寸許在內作茶飲之愈後須服固本丸治暴吐紫血成塊雖多不妨用四物湯合解毒湯調之若吐血覺胸中氣塞上吐紫血者桃仁承氣湯下之四生丸治吐血衄血陽盛於陰血熱妄行此方甚效生荷葉生艾生柏葉生地黃各等分上研爛丸雞子大每服一丸水三鍾煎一鍾濾過溫服治先見吐紅後見痰嗽此陰虛火動痰不降下當歸川芎芍藥生地黃各一錢五分貝母山梔炒天花粉各一錢牡丹皮八分麥門冬八分水二鍾煎八分童便少許服治先痰嗽後見吐紅是痰積熱知母貝母瓜蔞仁生地黃各一錢山梔炒一錢二分天花粉一錢半芍藥一錢麥門冬一錢水二鍾煎八分通口服芎藭湯治一切失血過多眩暈不蘇芎藭當歸去蘆酒浸各等分每服四錢水二鍾煎七分溫服不拘時治見血後脾胃弱精神少血不止者人參一錢黃耆二錢五味子十三粒芍藥甘草當歸麥門冬各五分水煎服加鬱金研入亦可華他危病方治吐血下血其證皆因內傷損或因酒色勞損或心肺傷破血氣妄行血如湧泉口鼻俱出須臾不救側柏葉蒸乾一兩人參焙乾一兩為末每服二錢入飛羅面二錢新汲水調和稀糊服如無前藥用荊芥一握燒過蓋地上出火毒碾如粉陳米飲調下三錢不過二服如無荊芥用釜底墨研如粉服二錢米飲下連進三服治舌上無故出血如線不止以槐花炒為末摻之血餘散治吐血衄血頭髮燒存性為末米飲調下二錢衄血者以少許吹入鼻中嘔血先噁心而嘔出成升碗者是多因怒氣過甚所致治方當歸川芎芍藥生地黃山梔炒水二鍾煎八分入童便薑汁少許服治嘔血脈大發熱喉中痛者此是氣虛人參黃花蜜炙黃柏荊芥當歸生地各等分水煎服又方韭汁童便薑汁鬱金飲之其血自清如無鬱金以山茶花代亦可吐血亦治又方黃柏蜜炙搗為末煎麥門冬湯調二錢服一方側柏葉為末米飲調下一方治怒氣逆甚而嘔血瓜蔞子當歸生地黃桔梗牡丹皮通草上等分水煎服衄血血熱妄行從鼻出者是治法與吐血同河間生地黃散治鬱熱衄血或咯吐血皆治之枸杞子柴胡黃連地骨皮天門冬甘草白芍藥黃芩黃耆生地熟地各等分水煎服若下血加地榆止衄散治勞傷出衄黃耆六錢赤茯苓白芍藥當歸生地阿膠各三錢為末每服二錢食後黃耆湯下麥門冬飲子治衄血不止麥門冬生地黃各等分水煎服犀角地黃湯治衄血或加黃芩升麻或加鬱金末童便薑汁調服亦可方見吐血門一方伏龍肝半升以新汲水一大碗淘取汁和蜜頓服一方頭髮燒灰以竹管吹入鼻孔中即止亦可以酒調服一方韭汁飲之立效吐血嘔血亦可用又法將患人頭髮從中分取井花水濕紙頂上搭之即止又法如左鼻孔出血者以色線扎右手中指根右孔出血者扎左手中指根兩孔俱出者扎二指根又方鼻衄不止搐鼻側從口中出者以牛乳二小盞溫暖連服之則止又治腸風酒痢咳血因嗽而去痰痰內有血者是治方當歸芍藥知母桔梗麥門冬各一錢生地黃天花粉各一錢五分貝母一錢二分甘草五分茯苓八分水二鍾煎八分通口服辟穀丹治咳血天門冬斤熟地黃半斤上為末煉蜜丸彈子大每服三丸溫酒下或湯下日進三服一方治咳血痰盛身熱多是血虛用青黛瓜蔞仁訶子海石山梔為末薑汁蜜丸噙化嗽盛者加杏仁後以八物湯加減調理痰盛再加痰藥咯血此出於腎咯出血屑者是亦有痰帶血絲出者治方白朮牡丹皮各一錢半當歸芍藥貝母桃仁研各一錢山梔炒黑黃芩各八分桔梗