消化丸一百丸送下後即噙嚼此丸仰面睡從其流入肺竅消化丸白茯苓青礞石炒黃色橘紅牙皂火炙半夏南星各二兩白礬枳實兩半枳殼兩半薄荷葉一兩上為末神麯糊丸桐子大每服百丸上床時飴糖拌吞次噙嚼太平丸二藥相攻痰嗽掃跡治傳尸勞殺蟲神效散真川椒去合口者炒去汗為細末每服二錢米湯下或酒糊丸每服三十丸一應蟲疾並宜服之痿起於肺熱有濕熱者有濕痰者有血虛者有氣虛者有瘀血者不可作風治東垣健步丸治濕熱痿弱膝中無力屈伸不得腰背腿腳沉重行步艱難羌活柴胡滑石炒甘草炙瓜蔞根酒洗肉桂各五分防風澤瀉各三錢防已酒洗一兩川烏一錢苦參酒浸一錢加蒼朮黃芩黃柏牛膝上為細末酒糊丸桐子大每服七十丸空心服原方用愈風湯下治氣虛痿弱人參黃耆白朮甘草黃柏黃芩蒼朮水煎空心服或就以此藥吞補陰丸尤妙治濕痰痿弱蒼朮白朮黃芩黃柏竹瀝薑汁陳皮半夏茯苓甘草水煎空心服治骨軟風腰膝疼行履不得遍身瘙癢大何首烏牛膝各一斤酒一升浸七宿曬乾木臼內搗為末煉蜜丸桐子大每服三五十丸空心溫酒白湯下虎潛丸補腎丸治痿方見虛損門腰痛有腎虛有瘀血有濕熱有挫閃有痰治腎虛腰痛動止軟弱不能支持脈弦大虛疼不已者是杜仲酥炙去絲龜板酥炙黃柏酒炙炒知母酒炙炒枸杞子芍藥五味子當歸酒洗黃耆破故紙炒各一兩上為末煉蜜同豬脊髓和丸桐子大每服八十丸空心鹽湯下一方當歸芍藥破故紙黃耆四味治腰疼杜仲薑汁炒去絲破故紙炒各一兩木香三錢胡桃肉四兩上搗爛為丸桐子大每服五十丸空心酒下煨腎丸治腎虛腰痛杜仲三錢鹽酒製炒去絲為末以豬腰子一枚薄披五七片以鹽椒醃去腥水摻藥末在內包以荷葉外加濕紙煨熟酒下青娥丸專滋腎水壯陽益筋骨治腰膝足痛久服無不驗補骨脂即破故紙四川者佳洗淨酒浸少頃隔紙炒香為度四兩萆薢真者四兩切片作四分一分鹽水浸一分童便浸一分米泔浸一分無灰酒浸各一宿曬乾杜仲四兩薑汁炒去絲胡桃肉泡去皮八兩黃柏四兩蜜炒知母三兩蜜炒牛膝去蘆淨四兩酒洗上為細末春夏用粥秋冬用蜜其粥用糯米一碗煮之將胡桃肉搗爛為膏和勻後臼舂千餘下丸如桐子大每服五十丸至八十丸空心鹽湯或鹽酒下以乾物壓之秋石四精丸亦治腎虛腰痛方見虛損門治腰痛川烏草烏川椒南星半夏皂莢各五錢為末薑蔥搗爛炒熱和前藥置腰上用布纏定滿腰極熱一周時立愈腎著湯治腎虛傷濕身重腰冷如坐水中不渴小便自利乾薑泡茯苓各四兩甘草炙白朮各二兩每服五錢水煎空心服獨活寄生湯治腎氣虛弱為風濕所乘流注腰膝或攣拳掣痛不得屈伸或緩弱冷痹行步無力秦艽獨活桑寄生如無以續斷代之細辛牛膝茯苓白芍桂心川芎防風人參熟地當歸杜仲炒甘草各三兩炙每服三錢水煎空心服下利去地黃仍灸腎俞崑崙尤佳又方當歸酒浸杜仲薑汁炒去絲各五錢赤芍白芷威靈各二錢肉桂一錢水酒各一鍾半煎至一鍾空心服治濕熱腰痛動止滯重不能轉便遇天陰或久坐則發脈緩者是也杜仲鹽酒製炒去絲黃柏酒製炒蒼朮米泔浸炒當歸酒洗川芎白朮破故紙炒各一錢水煎空心服一方無當歸破故紙摩腰丹治寒濕腰痛附子尖烏頭尖南星硃砂乾薑各一錢雄黃樟腦丁香麝香五分上為末蜜丸圓眼大每服一丸薑汁化開如厚粥烘熱置掌中摩腰上令盡黏著肉烘綿布縛定腰熱如火妙間三日用一丸或加茱萸桂治寒濕腰痛見熱則減見寒則增宜用五積散加吳茱萸半錢杜仲一錢方見寒門治痰積腰痛脈滑者是南星薑製半夏薑製各一錢半茯苓八分甘草五分蒼朮米泔浸炒陳皮黃柏炒各一錢水煎空心服治瘀血腰痛日輕夜重脈澀者是川芎八分當歸酒洗錢半芍藥一錢桃仁九個紅花酒洗八分杜仲鹽酒製炒去絲一錢香附水煎空心一服復元通聖欲治閃挫腰痛茴香穿山甲蛤粉炒各二兩白牽牛炒甘草陳皮玄胡索各一兩木香上為末每一錢酒調服一身腔子盡痛必用木香行氣一方治腰痛用刀豆殼化灰好酒調服外以皂角燒煙薰之又方生薑一斤取真汁四兩水膠一兩同煎成膏厚紙攤貼腰眼甚效腹痛有寒有積熱有食積有痰有死血有蟲痛有絞腸痧者有暑痛者臍下急忽大痛人中黑者多死理中丸治冷痛綿綿而病無增減以熱手尉之稍止者是若手不可按者宜下之方見寒門治感寒腹痛宜薑桂嘔加丁香或五積散亦可治絞腸痧痛用樟木煎湯吐之或鹽湯探吐亦可又宜刺委中出血治不思飲食其體素弱而腹冷痛者養胃湯加桂茱萸各一錢半木香三分或理中湯建中湯加茱萸亦可蟠蔥散治脾胃虛冷氣滯不行攻刺心腹痛連胸脅方見氣門治傷冷食而痛用紅丸子方見積聚門治稟受素弱飲食過傷腹痛者當補脾胃以消導之人參白朮山楂黃連枳實木香水煎服治食枳腹痛其脈弦其痛在上以手重按愈痛甚欲大便利後痛減者是也陳皮山楂神麯枳實麩炒香附各一錢半夏厚朴各八分甘草川芎各五分木香三分蒼朮米泔制炒六分乾薑七分水二鍾姜三片煎八分一通口服治老年婦人脾胃不謂虛寒心氣不順腹內作痛香附一斤青蒿子橘紅艾葉各四兩上用童便老酒米醋糯米泔各一鍾先將香附一斤浸內一宿次早即入橘紅艾文武火煮如干再加童便酒醋米泔以香附爛為度取起搗成餅焙乾入青蒿子為末以饅頭去皮鹽水打糊丸黍米大日服六十丸白湯下備急丸治飽食心腹脹滿刺痛欲死者方見傷食門調氣散治氣滯於內胸隔虛痞腹中刺痛木香五分檳榔七分陳皮八分甘草三分青皮麩炒一錢紫蘇五分香附一錢半夏八分乳香沒藥各三分水二鍾姜三片煎八分服治七情不順鬱火攻衝腹痛時發時止痛無定處者是陳皮青皮麩炒香附芍藥山梔炒黃連炒黃芩炒各一錢半夏薑製八分甘草五分水二鍾姜三片煎八分熱服玉龍丸治傷暑腹痛黃連二斤好酒五升煮乾為末麵糊丸桐子大每服三十丸熱湯下治腹中水鳴作痛此火動其水也陳皮半夏茯苓甘草黃芩黃連山梔水煎服治腹中常有熱而痛此為積熱以調胃承氣湯下之芒硝半斤甘草炙二兩大黃四兩去皮酒洗臨期酌量多少先煮二味熟去渣下硝煮二三沸頓服之治痰積作痛脈滑者是凡痛必小便不利臺芎香附白芷蒼朮為末以姜計入熱湯調服治肥人腹痛屬氣虛兼濕痰人參白朮蒼朮半夏水煎服芎歸湯治死血作痛每痛不移動者是川芎當歸桃仁紅花芍藥各等分水二鍾煎八分通口服痛甚加酒製大黃桃仁承氣湯治跌撲損傷瘀血作痛厚朴枳實各一錢半大黃酒製三錢桃仁九個當歸蘇木紅花各一錢水酒各一鍾入童便少許同服五神散治腹痛心脾痛亦治草果玄胡索五靈脂沒藥乳香各等分上為細末每服三錢空心溫酒服治青筋即沙症也氣逆而血不行惡血上攻於心也此症或怒氣或憂鬱或惱怒腹傷生冷或房勞後受寒濕以致精神恍惚心慌氣喘噎塞嘔噦頭昏目眩胸痞腹痛脅肋腰背痛口苦舌乾面青唇黑四肢沉困百節痠疼憎寒壯熱遍身麻痹不仁手足厥冷顫掉默默不語皆惡血攻心而致治法惟以砭針於兩曲池青筋上刺之出瘀血即愈有不愈而變為大患者白虎丸治之白虎丸千年石灰不拘多少去泥土水飛過水桐子大每服五十丸看輕重加減燒酒下初覺頭疼噁心腹脹疼腰痛即進一服當時血散若過三五日青筋已老者多服取效又治心腹痛及婦人血崩漏帶下男子久患痢疾便血及一切打撲損傷血不散心腹痛欲死者俱可服脅痛肝火盛木氣實有死血有痰流注當歸龍薈丸治肝火熾盛而痛甚者當歸酒洗龍膽草酒洗梔子仁黃連黃芩各一兩大黃酒製蘆薈青黛各五錢木香二錢半麝香五分另研上為末炒神麯糊丸桐子大每服二十丸薑湯下一方柴胡五錢青皮一兩如熱甚者炒熟服之左金丸治肝火脅痛又治脅下有食積一條槓起者黃連六兩吳茱萸一兩湯泡上為末蒸餅糊丸緑豆大每服三十丸淡醋湯下柳青丸瀉火丸方見火門柴胡瀉肝湯治鬱怒傷肝脅肋痛在左者柴胡錢二分甘草五分青皮麩炒一錢黃連炒八分山梔炒八分當歸酒浸錢二分芍藥一錢龍膽草酒洗八分水煎服治氣弱人脅下痛脈細緊或弦多從怒氣勞役得者人參茯苓川芎各八分白朮芍藥生地青皮炒各一錢當歸一錢半木香甘草各五分水煎服或加桂治死血作痛瘦人多怒者常患此桃仁九個紅花酒製川芎酒洗柴胡青皮各八分香附芍藥各一錢當歸梢酒洗錢半水煎服治肥白人氣虛脅痛發熱者人參七分黃耆黃芩各八分柴胡青皮各一錢木香六分川芎五分姜三片棗一枚水鍾半煎七分服一方治脅下痛發寒熱小柴胡湯煎服方見傷寒門枳芎散治左脅疼痛不可忍枳實炒川芎各五錢粉草二錢半炙上為末每服二錢薑棗湯或酒調下推氣散治右脅痛脹滿不食者枳殼炒桂心片子薑黃各半兩甘草一錢半炙上為末每服二錢薑棗湯調下酒亦可控涎散治兩脅走痛有痰積者甘遂去心紫大戟去皮白芥子痰在脅下非白芥子不能達各等分上為末糊丸桐子大每服五十丸至百丸食後臨臥薑湯下治痰飲流注作脅痛陳皮半夏薑汁製南星薑製蒼朮米泔水制炒各錢半茯苓八分甘草五分川芎七分水二鍾姜三片煎八分通口服咳嗽而痛者去蒼朮川芎加香附青皮青黛薑汁治脅下疼痛小茴香一兩炒枳殼五錢為末每服二錢鹽湯調下一方解脅痛外以琥珀膏貼之方見積聚門又方芥菜子水研敷又方茱萸醋研敷又方韭菜炒尉心脾痛即胃脘痛雖不食不妨治而痛止不宜即食真心痛旦發夕死治方用山梔十五枚去皮濃煎入薑汁再煎少沸又入川芎一錢徐徐呷之一方以二陳湯加川芎蒼朮梔子煎服甚者加炒乾姜乃佐之以薑汁蒸餅為丸服亦可以手按而痛止者乃夾虛亦用二陳湯加炒乾薑末和之痛輕者以麻黃桂枝之類散之或以韭汁桔梗升提之重者加石鹼一方心疼九種皆治木通中赤芍中蒲黃上五靈脂上水煎臨起下鹽滷一蛤殼通口服又方用飛礬飛丹各等分溶黃蠟丸桐子大薑湯下半夏丸治心疼亦治哮喘又治疾涎若痰積者右手脈必緊實用半夏一味切碎香油炒為末薑汁炒餅為丸薑湯下三十丸紫金錠以淡酒或淡薑湯磨服一二錠甚效一方用蔓荊子炒焦為末米飲調下一方以鹽置刀頭燒紅淬入水中就飲之失笑散治心氣痛不可忍及小腸氣痛蒲黃炒五靈脂酒研淘去砂土各等分上先以醋調二錢煎成膏入水一盞煎食前溫服有蟲痛者必面上白斑唇紅又痛後便能食時作時止者是上半月蟲頭向上易治下半月蟲頭向下難治先以肉汁及糖蜜食下則引蟲頭向上然後用藥打出楝樹根皮檳榔鶴蝨取汁飲各濃煎湯下萬應丸最好萬應丸檳榔五錢末大黃八錢末黑牽牛四兩末苦楝樹皮十斤皂角十枚肥而不蛀者先將皂角苦楝樹皮二味用水十大碗熬成膏一處攪和前三味藥為細末丸如芡實大先用沉香為衣後用雷丸木香衣每服三丸四更時砂糖水送下沉香定痛丸治胃脘痛胸中滿悶停痰積塊滯氣壅塞不拘遠年近日服之即效沉香二錢乳香二錢沒藥大黃炒各五錢玄胡索酒炒莪朮各三錢瓦楞子一個煅紅醋淬上為末醋糊丸緑豆大每服九丸壯實者十一丸白滾湯送下行二次米飲補之即安草靈丹治心腹疼痛草果仁白豆蔻玄胡索酒炒各五錢乳香沒藥川芎五靈脂炒厚朴薑汁炒半夏薑製各三錢砂仁香附炒山楂肉枳實炒蒼朮炒各五錢陳皮四錢木香二錢為末神麯糊和作錠子每服一錠生薑紫蘇湯磨下治氣實心痛山梔子炒六錢香附一錢吳茱萸一錢上為末蒸餅丸花椒大以生地酒洗同生姜煎湯送下二十丸治初病心痛明知身受寒氣口傷寒物而得者陳皮香附吳茱萸山梔炒水煎服若得病稍久成鬱熱者另方治之治死血留胃脘作痛者左手脈必澀玄胡索兩半肉桂滑石紅花紅曲各五錢桃仁三十個上為末蒸餅糊丸桐子大每服五十丸酒下或以桃仁承氣湯下之又脈堅實不大便者亦可下治胃脘痛經驗方孕婦忌服蒲黃炒五靈脂炒防己各一兩乾薑五錢用斑蝥二十個同炒去斑蝥為末每服三錢沸湯調服治服山梔並諸劫藥止後復發者不可再服前藥只用玄明粉一服立止耳病加味涼膈散治耳濕腫痛大黃酒炒黃芩酒浸防風荊芥羌活朴硝甘草各二兩連翹四兩梔子仁薄荷各一兩上為末加竹葉水煎服蔓荊子散治上熱耳出膿汁甘草炙升麻木通赤芍桑白皮炒生地前胡赤茯苓蔓荊子甘菊各等分每服三錢加薑棗水煎服又方治耳聾用大菖蒲葉揉軟塞之治耳中出血用蒲黃炒黑色研細摻之聾病必用龍薈丸四物湯養陰大病後耳聾與陰虛火動聾耳內鬨然俱用四物湯降火因鬱而聾者通聖散內大黃酒煨再用酒炒三次後入諸藥通用酒炒耳痛以茱萸烏尖大黃為末罨湧泉足心治耳中無晝夜聽如流水聲及癢烏頭燒存性石菖蒲等分為末綿裹塞耳中二次效耳鳴宜當歸龍薈丸方見脅痛門耳鳴因酒過者大劑通聖散加枳殼柴胡大黃甘草南星桔梗青皮荊芥不愈四物湯治之聤耳膿出用桑螵蛸一個炙麝香二分為末滲之又加染坯枯礬吹之耳疳丸白枯礬五分麝香五釐胭脂胚二分半陳皮炭五分先用綿枝子纏去膿另用綿子裹藥作丸塞入治蟲入耳中香油灌入即出或驢牛乳或雞冠血皆妙凍耳以生薑自然汁熬成膏塗之又方用橄欖核燒灰清油調敷雀腦亦可通靈丸治耳聾松香五錢巴豆二十顆為末上將松香入鐵鍋內溶化下巴豆末蔥汁丸如蓮子大用綿裹塞過夜如左耳聾塞右耳右耳聾塞左耳雙耳聾次第塞之治風熱搏之津液結成核塞耳生豬脂地龍釜下墨上細研以蔥汁和捏如棗核薄綿裹入耳令潤即挑開眼目屬風熱血少神勞腎虛如暴失明昏澀翳膜眵淚斑入眼皆表也風熱也宜表散以去之如昏弱不欲視物內障見黑花瞳散皆里也血少神勞腎虛也宜養血補水安神以調之治暴赤眼防風黃芩各二錢黃連當歸各一錢羌活柴胡升麻甘草各七分水煎服白睛紅加白豆蔻少許一方加龍膽草生地去羌活名瀉熱黃連湯治眼胞腫大如拳霜梅三個去核白果七個去殼銅青五分共搗成餅置磁器內以井花水浸一宿上用綿紙隔阻待水浸上以古銅錢蘸洗之散熱飲子治眼暴赤暴腫防風羌活黃芩黃連各等分水鍾半煎八分食後溫服大便祕加大黃痛甚加當歸生地煩躁不眠加梔子四物龍膽湯治目赤暴發作雲翳瘀痛不可忍者當歸川芎芍藥生地各五錢羌活防風各三錢防己草龍膽各二錢每服八錢水鍾半煎八分食後通口服撥雲散治男婦風毒上攻眼目昏暗翳膜遮睛怕日羞明一切風毒眼疾悉皆治之羌活防風柴胡甘草炙各一斤上為末每服二錢食後薄荷湯或茶或菊花苗煎湯服忌諸毒物治風熱眼黃連二兩冬青葉四兩水浸三日夜待黃緑色熬成膏不時點眼四角治瞳子散大主散熱涼血養血黃芩黃連各二錢半歸身生地各一錢半天門冬地骨皮水煎服治肥人眼痛乃是風熱防風羌活荊芥酒芩水煎服治瘦人眼痛乃血少兼熱當歸玄參川芎防風荊芥菊花酒生地水煎服久病昏暗者亦以當歸熟地為君防風甘菊之類佐之蔓荊湯治勞役飲食不節內障昏暗一名益氣聰明湯耳目俱治黃耆人參各一錢甘草炙蔓荊子各八分白芍藥黃柏酒浸曬四次一錢水煎服又方四物湯加酒芩連柏芍藥凡人病眼至春夏便當作郁治黃芩酒浸南星薑製香附童便浸蒼朮童便浸各二兩川芎酒浸一兩半山梔一兩炒龍膽草酒浸陳皮連翹蘿蔔子蒸青黛各五錢柴胡二錢為末神麯糊丸治天絲眼刺雞冠血滴眼內捉絲去治方治暴赤眼歸尾黃連各一錢赤芍防風各五分杏仁四個去皮尖水半鍾加乳汁少許蒸過澄清點洗不拘時一方洗紅爛眼當歸黃連杏仁銅緑皮硝淨鹼各五錢為細末每用三分井水半小盞隔紙洗治眼痛用生地酒浸搗爛罨眼上用草烏南星乾薑桂枝為末醋調貼兩足心眼用牛膝膏洗點方治火眼用臘月羯羊膽一枚以蜂蜜灌滿掛陰乾用時取一粒入磁器內水化點之二制黃連膏治風熱退眥黏澀等眼雞爪黃連不拘多少截碎洗淨先將姜一大塊切作兩片挖空將黃連入姜內以綿縛之濕紙包略煨少時紙焦為度以紅棗去核同黃連盛入棗內少加礬末亦以溫紙包仍人慢火煨熟待礬化取出黃連浸乳內點之洗暴赤眼熱眼經驗極效方黃連一錢防風荊芥蒼朮皮硝各五分連翹三分銅青半分水二碗煎二三沸濾出渣乘熱洗四五次即愈蕤仁膏蕤仁淨仁一兩用紙裹筆管碾去油淨加硼砂一錢麝香三分同研極細末收入磁器貯之專去翳障治爛眶眼薄荷荊芥細辛各等分上為粗末如燒香狀燒之以青碗塗蜜少許於內覆煙上俟煙盡後以小碗或磁罐收取藏之凡眼有風熱多淚者皆可點此是陽明經有風熱所致珍珠散治爛眩赤眼爐甘石不拘多少於炭灰內煅淬先用童便或黃連煎汁浸過焙乾又用當歸黃連芍藥生地薄荷荊芥防風蔓荊子甘草各等分煎汁仍將爐甘石再浸焙乾研入小瓶內水浸使出火毒然後再乳極細次加冰片亦乳極細相和點之治目多淚鯽魚膽七個人乳一盞和勻飯上餐一二次點眼其淚自收撥風雲翳膏硇砂硼砂珍珠琥珀火煅紫色珊瑚火煅瑪瑙火煅硨磲火煅各三錢熊膽水化石燕子火煅入醋三個自然