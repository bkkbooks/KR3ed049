壓出油在紙上就將此紙作為紙捻點燈吹滅以煙薰入鼻中一霎時口鼻涎流牙關即開治鎖喉風青木香葉搗汁和醋入口沃之痰來頻吐之即愈治喉或單蛾或雙蛾或皮內有紫血凝結或有紫線紋或起膿頭白泡俱用利刀挑破去紫血以蘆管燒著入口內吸烟薰之凡三吸後用米醋磨山豆根漱過點胎髮散胎髮散此乃治諸般喉症之總方也驗過極效胎髮煅灰存性一錢硼砂煅過七分膽礬三分上研極細以綿花裹箸頭蘸米醋拈藥末點瘡上過宿次日用射干磨米醋漱過再點如此點過二三次瘡愈後尚未除根常以逼麝葉搗汁嗽之以茶柏散吹之或用黃花蒂丁煎湯或用金星草搗汁或用吉祥草根搗汁漱俱可茶柏散細茶清明前者佳二錢黃柏三錢蘇州薄荷葉三錢硼砂煅二錢上各研極細取淨末和勻加冰片三分吹入煎藥方明天麻八分白殭蠶八分炒黃柏蜜炒一錢知母蜜炒一錢薄荷八分玄參八分牛蒡子炒七分桔梗一錢五分天花粉七分連翹八分山豆根一錢梔子炒八分粉草三分水二鍾煎八分服熱盛者加枯芩八分川黃連八分俱酒炒吹喉散喉瘡生膿不收口者黃柏蜜炙三錢硼砂煅過二錢五分孩兒茶一錢硃砂八分寒水石七分冰片一分上為極細末先用大黃防風羌活薄荷黃柏煎湯漱過吹入如有蟲者加雄黃一錢治喉瘡毒甚熱極者先用陳年絲瓜子去殼取仁煎湯漱過仍飲少許次用金線重樓磨米泔水漱之次用雪裡開根並八角銅盤草根以米泔水磨濃汁敷瘡上一方以山豆根湯漱過用硼砂一錢煅過加冰片三釐吹入一方治喉瘡用梁上掛塵過絹篩取淨塵末三分生白礬三分細研吹入緑雄散治喉瘡毒盛或有蟲者雄黃七分緑礬三分硼砂煅三分上研極細吹入如熱痰盛用生硼砂治喉症熱盛大便不通射干七分風化硝三錢水二鍾煎一鍾一半漱喉一半服之以通為度如不通再服凡治喉藥不可用當歸致難收斂治喉瘡並痛多屬虛火遊行無制用人參黃柏蜜炙荊芥如氣虛用人參竹瀝血虛用四物竹瀝實熱者黃連荊芥薄荷硝蜜姜外調噙化治走馬喉痹巴豆去皮綿紙微裹隨左右塞鼻中立透如左右俱有者用二枚左右俱塞治暴失音豬脂一斤入鍋先煉成油撈出渣入白蜜一斤再煉少頃濾過淨磁器內冷定成膏不時挑服一茶匙即愈無痰亦可常服潤肺治聲音不清訶子三錢半半生半熟泡木通三錢半生半熟泡桔梗五錢生用甘草三錢半生半熟炙水煎用生地搗爛入藥又方訶子真阿膠知母天門冬鹽炒麥門冬鹽炒各五錢白茯苓去皮黃柏蜜炙當歸生地熟地各一兩人參三錢烏梅十五個去核人乳牛乳梨汁各一碗共為細末煉蜜丸黃豆大每服八九丸訶子煎湯或蘿蔔煎湯送下急喉丹單蛾雙蛾重舌俱治山豆根殭蠶炒蚤休各一兩連翹玄參防風射干各七錢白芷五錢冰片三分上為極細末糯米粉糊和成錠銅緑二錢為衣水磨服祝由科治咽中刺塞以左手屈中指及無名指作三山印坐水盞於其上右手捏印是金瘡印腳踏丁字立望太陽或燈火取氣一口吹在淨水盞中咒曰吾取老君東流順老君奉敕攝去毒水吾託大帝尊所到稱吾者各各現帝身急急如律令攝念七遍吹在盞中虛攪三次為定與飲之即愈疝睪丸連小腹痛者是也有痛在睪丸者有痛在五樞穴邊者或無形無聲或有形如瓜有聲如蛙素問皆以為寒也專主肝經與腎經絶無相干宜灸大敦三陰交二穴治方枳實橘核山梔炒山楂吳茱萸湯泡濕勝加荔枝核屬瘀血加桃仁夾虛加參術為君按之不定者是寒疝囊冷結硬得於寒濕而發冬月加吳茱萸桂枝乾薑水疝腎囊腫痛陰汗時出囊或腫如水晶得於飲水醉酒者加澤瀉豬苓茯苓筋疝陰脛腫脹或莖中痛痛極則癢或挺峰不收得於房勞所致加炒黃連白朮茯苓氣疝其狀上連腎區下及陰囊或因號哭忿怒氣鬱而復發者加柴胡青皮香附狐疝其狀如瓦臥則入小腹行立則出小腹入囊中者加青皮香附蒼朮㿗疝陰囊腫縋如升如斗不癢不痛得之地氣卑濕加白朮茯苓澤瀉豬苓蒼朮加減柴苓湯治諸疝此和肝腎順氣消疝治濕之劑柴胡甘草半夏茯苓白朮澤瀉豬苓山梔炒山楂荔枝核各等分水二鍾姜三片煎八分空心服又方用烏頭梔子各等分水煎服按之不定者屬虛加桂枝薑汁丸助此劫劑茴香丸治疝氣神效茯苓白朮山楂子八角茴香炒茱萸荔枝核各一兩枳實八錢橘核三兩上為細末煉蜜丸每丸重一錢五分空心細嚼一丸薑湯下治諸疝方用黑雄豬腰子一對不見水外去膜內去血切作片以大茴香二兩小茴香二兩俱炒為粗末同腰子拌勻再以前豬尿泡一個入腰子茴香於內扎固用無灰好酒二三碗入砂鍋內懸胞煮酒至半碗取出將胞連藥切碎焙乾研細末將前煮剩酒打麵糊為丸桐子大每服七十丸空心好酒下疝氣神方其病甚至氣上衝如有物築塞心藏欲死手足冷者二三服除根硫黃火中溶化即投水中去毒研細荔枝核炒黃為末陳皮各等分上為末飯丸洞子大每服十四丸酒下其疼立止自覺疼甚不能支持略用六丸不可多千金不傳韋氏方治疝及腎大如斗日三服除根八角大茴香青皮荔枝核各二兩俱炒黃色煙盡為度置土上以碗覆之少時取出研末每服二錢無灰酒下清晨午後臨睡各一服青木香丸治腎冷疝氣脹疼吳茱萸一兩分二分酒醋各浸一宿焙乾香附子一兩蓽澄茄五錢青木香五錢上為末米糊丸桐子大每服七十丸空心鹽湯下或乳香蔥白湯下亦可奪命丹治遠年近日小腸疝氣臍下撮疼外腎偏墜腫硬陰間濕癢抓成瘡癬吳茱萸一斤四兩酒浸四兩醋浸四兩湯浸四兩童便浸各浸一宿用火焙乾澤瀉去灰土二兩上為末酒煮麵糊丸桐子大每服五十丸溫酒鹽湯任下五葉湯枇杷葉紫蘇葉椒葉蒼耳葉水晶葡萄葉水煎服治小腸氣偏墜生薑二兩半去皮一半留一半共搗碎去渣取汁傾熱酒內加鹽少許空心服不過三服即愈治疝㿗而不痛者蒼朮神麯白芷山楂川芎枳實半夏凡潰須斷欲與厚味一方治木腎皆因嗜欲內戕腎家虛憊故陰陽不相交水火不相濟而沉寒痼冷凝滯其間脹大作痛頑痹結硬勢所必至桔核散主之桔核為末每服二錢空心溫酒或鹽湯調下五積散治子痛發熱方見寒門灸法治疝氣偏墜以淨草一條度量患人口兩角為一則折斷如此三則折成二角如字樣以一角安臍中心兩角安臍下兩旁尖盡處是穴若患在左灸右在右灸左兩邊俱患即兩穴皆灸艾炷如麥粒大灸十四壯或二十一壯即安又灸兩足三陰交穴尤妙治婦人橫梁疝氣在小肚上板住者是補骨脂拌芝麻同炒以芝麻熟為度去芝麻為末無灰酒調下每服二錢五分男子亦治小便不禁出而不覺者是也治有熱不禁白朮茯苓澤瀉豬苓黃連梔子山茱萸各等分五味子十五粒水煎空心服治虛弱不禁白朮茯苓澤瀉豬苓川芎當歸芍藥生地山茱萸各等分五味子十五粒肉桂五分水煎空心服茯苓丸治心腎俱虛神志不定小便淋瀝不禁赤茯苓白茯苓各等分為末新汲水擂洗澄去浮沫曬乾別取地黃計與無灰酒同於磁器內熬成膏搜和丸如彈子大空心鹽湯嚼下一丸六味地黃丸治內虛熱者小便頻數不禁方見虛損門燥結血少不能潤澤其面多黃理宜養陰導滯通幽湯治大便難幽門不通上衝吸門不開噎塞燥祕氣不得下當歸身酒洗升麻桃仁各一錢生地熟地甘草炙各五分紅花三錢上作一服水煎食前調檳榔末半錢或加麻仁泥一錢加大黃名當歸潤燥湯麻仁丸治血燥大便不通麻子仁當歸桃仁生地枳殼各一兩上為末煉蜜丸桐子大每服五十丸空心白湯下治大便祕澀消風順氣枳殼麵炒防風各一兩甘草五錢潤腸丸治久病腹中有實熱者脾胃中伏火大便祕澀不思飲食及風結血祕桃仁去皮尖麻仁各一兩當歸梢大黃煨羌活各五錢上除二仁另研余為末煉蜜和丸白湯下如風濕加秦艽皂角煨去皮如脈澀覺氣短加郁李仁脾胃丸麻仁一兩一錢五分枳實厚朴芍藥各二兩大黃四兩蒸杏仁去皮尖炒一兩二錢上為末煉蜜丸桐子大每服二三十丸溫湯下治老人大便祕澀綿黃耆陳皮各等分為末用麻仁一合研爛投水濾去渣取漿一盞於銀器內煎候有乳起即入白蜜一二匙再煎令沸調藥末三錢未食前服搜風順氣丸治風熱之人大便燥結方見風門治大腸虛祕而熱白芍一兩半陳皮生地歸身各一兩條芩甘草各二錢為末粥丸白湯下八九十丸蜜導法凡諸祕結不通或兼他症又或老弱虛極不可用藥者用蜜入皂角末少許同熬至蜜老乘熱捻如棗大納入穀道中良久即通又方用豬膽汁滴入穀道即通治大小便不通用蝸牛三枚連殼為泥再加麝香少許貼臍中以手揉按之立通田螺亦可治孕婦燥結煮菠菱葵菜或以車前子苗作茹雜豬羊血作羹食之諸淋淋病有五皆屬於熱治諸淋方白朮茯苓澤瀉豬苓各一錢滑石二錢甘草五分燈草三十莖山梔一錢半水二鍾煎八分空心服虛而淋下當補腎精而利小便不可獨用利藥又方益元散用炒梔子一合煎湯吞下夏月以茴香煎湯調服氣虛者以人參煎湯調服五淋散治腎氣不足膀胱有熱水道不通淋瀝不出或如膏如沙如石又或如豆汁並皆治之青茯苓山梔各二錢赤芍當歸各一錢甘草五錢生用條芩八分水鍾半煎八分空心服車前子散治諸淋小便痛不可忍車前子五錢淡竹葉赤茯苓燈草荊芥穗各二錢作二服水煎空心服八正散治大人小兒心經蘊熱臟腹祕結小便赤澀癃閉不通熱淋血淋膏淋沙淋石淋並皆治之方見小兒熱門參茯琥珀湯治淋莖中痛不可忍引脅下痛人參五分茯苓四分琥珀三分為末生甘草川楝子炒各一錢當歸梢澤瀉柴胡各三分玄胡索七分上作一服長流水煎空心下清心蓮子飲治上盛下虛心火炎上口苦咽喉煩苦微熱小便赤澀或欲成淋並皆治之方見便濁門導赤散治心虛蘊熱小便赤澀或成淋痛生地甘草木通各等分每服三錢水一鍾竹葉十片煎六分溫服發灰散治血淋若單小便出血為莖衄皆主之亂髮不拘多少燒灰入麝香少許米醋湯調下治痰熱隔滯中焦淋澀木通二陳湯煎大碗頓服調其真氣而吐之治下焦無血小便澀數而黃者海金沙七錢五分滑石五錢外加黃柏知母牛膝甘草梢名加減二神散上為末每服二錢五分多用燈心木通麥門冬煎入蜜少許調下治老人氣虛而淋者溺有餘瀝並治之人參白朮木通梔子各等分水二鍾煎八分空心服治婦人諸淋用苦杖根俗名杜牛膝洗淨捶碎一握水五碗煎一碗去渣入麝香乳香末各少許調服小便內當下沙石剝剝有聲是其效也牛膝膏牛膝銼一合用水五碗煎耗其四入麝香少許空心服只單以酒煮亦可治死血作淋滋腎丸治不渴而小便聞邪熱在血分也黃柏三兩酒拌陰乾知母二兩酒浸陰乾肉桂一錢半上二味氣味俱陰以同腎氣故能補腎而瀉下焦火桂與火邪同體故曰寒因熱用凡請病在下焦皆不渴也熟水為丸百沸湯下老人氣短小便不通四物湯加黃耆人參吞此丸甚效灸法治小便淋澀不通用食鹽炒熱填臍中以艾灸七壯即愈脫肛氣虛不能固而下脫也治方脫肛多主氣虛人參黃耆川芎當歸升麻水二鍾煎七分食前服兼血虛加芍藥地黃血熱加炒黃柏虛寒加炒黑乾薑外以五倍子托而上之又方治積熱條芩六兩升麻一兩共為末麵糊丸服香荊散治肛門出大人小兒並治之香附子荊芥穗各等分一方加砂仁上為末每服三匙水一大碗煎十數沸熱洗一方以陳壁土泡湯先薰後洗以五倍子末三錢枯礬少許水二碗煎洗亦可一方以浮萍為末干貼患處治脫肛氣熱者神效亦治痔瘡熊膽五分孩兒茶三分冰片一分上為細末以人乳調搽肛上熱汁自下而肛即收一方用鱉魚一個水煮留湯洗肛將鱉食之又留骨燒存性研細敷肛脫上痔漏此因風熱歸於大腸也治血為主其肛邊發露肉珠狀如鼠乳時滴漬膿血曰牝痔肛邊生瘡腫痛突出一枚數日膿潰即散曰牡痔腸口顆顆發癗且痛且癢出血淋瀝曰脈痔腸內結核有血寒熱往來登溷脫肛曰腸痔若血痔則每遇大便清血隨下而不止若酒痔則每遇飲酒發動瘡腫痛而流血若氣痔則憂恐鬱怒邊臨乎前立見腫痛大便艱難強力則肛出而不收矣此諸痔之外證也諸痔久不愈必至穿穴為漏治法總要大抵以解熱調血順氣先之治方條芩人參黃連生地槐角當歸川芎升麻枳殼水煎服痔瘡洗藥方荊芥芒硝蓮房槐花五倍子白礬煎湯每日洗一二次敷藥方五倍子一個鑽一孔入水銀一錢用黃泥包固火煅通紅冷定取出為末用津吐調搽加冰片半分更妙如疼加乳香沒藥少許清涼飲治諸痔熱甚大便祕結當歸赤芍甘草炙大黃飯上蒸曬乾上等分為末每服二錢新水調下治腸痔每大便常有血蒲黃末方寸匕米飲調下日三服頓瘥秦艽羌活湯治痔漏成塊下垂不任者羌活錢二分秦艽黃耆各一錢防風七分升麻麻黃炙甘草柴胡各五分藁本三分細辛紅花各少許水煎服忌風寒處大小便橘皮湯治氣痔橘皮枳殼炒川芎槐花炒各五錢桃仁炒去皮檳榔木香紫蘇莖香附甘草炙各二錢半每服二錢薑棗水煎服治酒痔便紅腸風臟毒一切症或暴發或久者青蒿一味用葉不用莖用莖不用葉為末糞前紅冷水調下糞後紅酒調下每服二錢干菖湯治每遇飲酒發動痔瘡腫痛流血乾葛枳殼炒半夏茯苓生地黃杏仁各五錢黃芩甘草炙各二錢五分每服三錢黑豆百粒姜三片白梅一個水煎服豬甲散治諸痔豬懸蹄甲不拘多少為末陳米湯調二錢空心服一方治痔瘡初發以熊膽研細人乳調搽一二次即平治痔瘡方用大雄雞一隻罩地板上不與食伺飢甚別移於淨地上用豬胰子四兩銼碎旋餵雞令其放糞旋收藏如此三二日候雞糞至四兩曬乾入後藥透明礬四兩葉子雌黃六錢膽礬半兩朴硝一兩雄黃六錢上各另研為粗末用寬高砂鍋約貯藥之餘上有半節空者先以雞糞一兩置鍋底次以晉礬一兩次以膽礬次以雌黃次以朴硝次雄黃然後盡下晉礬在內次加雞糞在上然後以新碗蓋鍋頂簇炭火煅青煙盡為度放冷取出入乳鉢中加乳香沒藥各半兩同研極細末以磁盒收貯用藥時以津吐於手心中調勻新筆蘸點患處一日三五次一夜二次先以無心筆蘸溫湯拭淨軟絹挹干然後敷藥庶得藥力透肉敷後黃水瀝出不止最妙雖多不妨三日後其痔自乾枯剝落倘硬煎湯頻洗白脫腸自紅軟收上忌毒物酒色即除根矣神繭散治諸痔有神效蠶繭納入男子指甲以滿為度外用童子發纏裹燒灰存性蜜調敷之治翻花痔用荊芥防風朴硝煎湯洗次用木鱉子鬱金研末入龍腦些少水調敷或用熊胎和勻貼之尤妙又方用白雞膽或二三枚取汁熊膽二分半片腦半分共研一處磁罐內收藏勿令泄氣如用以手指擦立效紫金錠治諸痔並便毒堅硬痔未成膿苦痛大小便俱難各進一錠去後三次痛即止不日而消痔漏退管丸枳殼一錢厚朴六錢蟾酥六分海洋十二條瓦焙乾甘草三錢草烏五錢甘草水煮三炷香母丁香十四個上為末人粉霜三錢用槐角風藤煎膏為丸桐子大不問內外痔服丸藥七日後服煎藥七帖即愈如痔漏有管者服丸藥二七日煎藥十四帖其管即退打粉霜法水銀一兩鵝管石明礬皂礬食鹽各五錢雄黃二錢硃砂一錢牙硝五錢上為末入罐內上用鐵燈盞蓋定鹽泥封固水火打三炷香取霜收用煎藥方歸尾川芎生地黃連條芩山楂連翹秦艽地榆枳殼白芍槐角槐花白芷各等分每帖加雷丸五分干棕根一兩人肥加升麻麻黃各三分弱者頭帖下如痔漏服丸藥宜早空心用銀三錢黑鉛三錢煎湯送下丸藥二分申時服煎藥一帖神效又灸法先須用補藥以生氣血參耆歸術為主大劑服之外以附子末津和作餅子如錢厚以艾灸之漏大艾炷亦大漏小炷小灸令微熱不可令痛餅乾則易之再和再灸如困且止次日再灸直至肉平為度或仍前用補氣血藥作膏藥貼之治痔漏及脫肛便血當歸洗淨全用四兩黃連多用酒浸約三日淨四兩防風去蘆二兩枳殼水洗去穰麩炒二兩上為末以前浸黃連酒和成麵糊丸桐子大每服六七十丸空心米飲或沸湯下忌羊鵝雞魚炙炒一切熱味生肌散乳香血竭各五錢沒藥四錢全蠍十個炒輕粉硃砂黃丹生用海螵蛸去殼煅存性各三錢龍骨二兩火煅紅好酒淬五次明礬二錢半鳳凰退二錢煅赤石脂一兩半火煅好酒淬七次上為細末待瘡洗淨上之一方治痔漏遠年不愈者先以雞子七個每個入明礬一分飯內煮熟每清晨服一枚次用後方黃連末八兩枳殼末六兩甘草末四兩雄豬臟一副切作數段入前末在內煮一日取出聽用後存汁一碗將糯米一升大麥仁一升將汁均炒熟連前藥搗為丸桐子大每服百四五十丸卯午戍時白湯下忌燒酒膽槐丹十月上已取槐角子揀肥嫩結實者用新黃瓦盆二個如法固濟埋背陰牆下約二三尺深預先尋取黑牛膽五六個臘月八日取出裝膽內高懸陰乾至次年清明日取出盛好磁罐內每日空心白湯送下一日服一粒二日服二粒以漸加至十日則服十粒十五日服十五粒止以後一日減一粒周而復始不問遠年近日痔瘡並皆治之加味槐角丸治痔漏通用及治腸風下血槐角生地各二兩當歸身黃耆黃連條芩枳殼秦艽防風連翹地榆升麻各一兩川芎阿膠白芷各半兩上為末煉蜜丸或酒糊丸桐子大每服五十丸漸加至七八十九百丸空心溫酒或米湯下淨固丸治痔漏下血癢痛槐花炒枳殼去穰各一兩上為末醋糊丸桐子大每服二十丸空心米湯下黑玉丹治男婦久新腸風痔漏著床頭疼不可忍此藥不過三服見效初得或癢或痛穀道周圍多生硬核此是痔破便血下血腸鳳皆因酒色氣風食五事過度致成此疾人多外塗殊不知病在腸臟有蟲去根易愈刺蝟皮銼八兩豬懸蹄百尺牛角腮八兩槐角三兩雷丸芝麻各二兩亂髮皂角煎湯洗淨焙敗棕各四兩苦楝根二兩半上入磁罐內燒存性研細末入乳香一兩麝香四錢研和勻酒糊丸桐子大每服十五丸細嚼胡桃一枚溫酒吞下日二服甚者三服空心下切忌別藥鯽魚散治痔漏久不愈鯽魚一個破開去腸入白礬令滿瓦上燒存性為末用雞毛卷藥敷之立效漏有八種氣漏或腫或消乃氣脹痛不可忍者是也風漏癢甚者是也陰漏男女水道生孔竅小便出時痛者是也冷漏多出白膿如豆汁黃水者是也熱漏時常下鮮血者是也痔漏痔瘡日久不醫破敗者是也痿姑漏平地生孔竅出紅膿者是也痿腮漏因漏在平處黑爛出黃水者是也平肌散治漏瘡久不合黃狗頭骨亂髮穿山甲各燒灰為末等分上令勻乾摻患處如干則用津唾調敷薰洗方五倍子朴硝桑寄生蓮蓬各等分上以水煎入白礬先薰後洗或以苦絲瓜緑礬各等分煎湯薰洗亦可腫者用木鱉子五倍子為末調敷三品錠子上品錠子專治痔漏一十八證紅礬二兩半乳香沒藥硃砂去鐵各三錢牛黃五分半硇砂一錢四分二分熟一分生白信一兩火煅中品錠子專治翻花癭瘤等痔白礬三兩八錢半乳香沒藥各五錢半硃砂三錢牛黃七分半硇砂一錢半生半熟白信一兩四錢半火煅煙盡半日取用下品錠子專治疔瘡發背等症紅礬三兩二錢乳香六錢沒藥蟾酥三錢牛黃四分半硇砂二錢四分半生半熟白信各依法制用麵糊和勻捻成錠子看瘡漏大小深淺插入錠子如肉內黑色勿上生肌散只待黑肉落盡方可上若瘡無頭太乙膏一個加後藥一粒貼之白礬二兩乳香二錢二分沒藥三錢七分硃砂四分牛黃五分薑黃三錢半順的用白丁香錢半巴豆三錢草紙去油淨用白信二兩火煅煙盡半日取用上為末或唾沫調敷瘡一日三次但瘡破插上前錠子治痔瘡用胡桃打開作兩半去肉入五倍子末仍合定外用泥裹燒存性為末空心白湯調服此江西巡撫陸仲鶴公所親驗者腸風臟毒腸風獨在胃與大腸出腸風者邪氣外入隨感隨見臟毒者蘊積之久而始見香附散治臟風香附一兩炒枳殼七錢半炒當歸半兩川芎半兩槐花炒一兩上為末每服工錢水一鍾姜三片棗一枚煎七分溫服槐角丸治五種腸風下血痔瘡脫肛槐角炒一兩地榆黃芩防風去蘆當歸酒浸一宿焙乾枳殼麩炒各八兩上為末酒糊丸桐子大每服三十丸空心米湯下又方黃芩秦艽槐角升麻黛青酒糊丸服又方茄蒂燒存性梔子炒各等分為末蒸飯丸桐子大每服百丸空心米湯下乾柿散治腸風臟毒臟癖神效乾柿不拘多少焙乾燒存性為末每服二錢米飲調下一方治腸風臟毒以四物湯加刺蝟皮臟連丸治臟毒方見下血門一方治便血久遠傷血致虛並麻風癬瘡見面者龜板二兩酥炙升麻香附各五錢芍藥一兩五錢側柏葉一兩椿根皮七錢半上為末粥丸以四物湯加白朮黃連甘草陳皮作湯送下一方治積血便血蒼朮陳皮各兩半黃連黃柏條芩各七錢半連翹上為末生地膏六兩丸桐子大每服五七十丸白湯下灸法治腸風臟毒最效以患人平立量脊骨與臍平處椎上灸七壯或年深者更於權上兩旁各一寸灸七壯無不除根
